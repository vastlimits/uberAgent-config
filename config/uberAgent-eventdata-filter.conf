############################################
#
# Documentation for EventDataFilter: https://docs.citrix.com/en-us/uberagent/current-release/uxm-features-configuration/event-data-filtering/
#
############################################

##############################################################
#
# Clear extended process info for receivers with EnableExtendedInfo disabled
#
##############################################################

[EventDataFilter]
Action = clear
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStartup
Sourcetype = Application:Errors
Sourcetype = Process:DnsQuery
Sourcetype = Process:ProcessStatistics
Field = ProcID
Field = ProcGUID
Field = ProcParentID
Field = SessionID
Field = SessionGUID
Field = ProcParentName
Field = ProcPath
Field = ProcCmdline
Query = Receiver.EnableExtendedInfo == false

# vast limits event data filter
@ConfigInclude uberAgent-eventdata-filter-vastlimits-Windows.conf platform=Windows
@ConfigInclude uberAgent-eventdata-filter-vastlimits-macOS.conf platform=macOS
@ConfigInclude uberAgent-eventdata-filter-vastlimits-Linux.conf platform=Linux

# vast limits DNS exclusions
@ConfigInclude uberAgent-eventdata-filter-vastlimits-DNS.conf platform=Windows
@ConfigInclude uberAgent-eventdata-filter-vastlimits-DNS.conf platform=macOS
