[ThreatDetectionRule platform=Windows]
# Detects the creation of PFX files (Personal Information Exchange format).
# PFX files contain private keys and certificates bundled together, making them valuable targets for attackers seeking to:
# 
#     - Exfiltrate digital certificates for impersonation or signing malicious code
#     - Establish persistent access through certificate-based authentication
#     - Bypass security controls that rely on certificate validation
# 
# Analysts should investigate PFX file creation events by examining which process created the PFX file and its parent process chain, as well as unusual locations outside standard certificate stores or development environments.
# Author: Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)
RuleId = dca1b3e8-e043-4ec8-85d7-867f334b5724
RuleName = PFX File Creation
EventType = File.Create
Tag = pfx-file-creation
RiskScore = 25
Annotation = {"mitre_attack": ["T1552.004"], "author": "Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)"}
Query = iendswith(File.Path, ".pfx") and not ((Process.Path in ["C:\\Program Files\\Microsoft OneDrive\\OneDrive.exe", "C:\\Program Files (x86)\\Microsoft OneDrive\\OneDrive.exe"]) and iendswith(File.Path, "\\OneDrive\\CodeSigning.pfx") or istartswith(File.Path, "C:\\Program Files (x86)\\Microsoft Visual Studio\\") or istartswith(File.Path, "C:\\Program Files\\Microsoft Visual Studio\\") or istartswith(File.Path, "C:\\Program Files\\CMake\\"))
GenericProperty1 = File.Path


