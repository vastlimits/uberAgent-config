[ThreatDetectionRule platform=Windows]
# Detects the execution of "BitLockerToGo.EXE".
# BitLocker To Go is BitLocker Drive Encryption on removable data drives. This feature includes the encryption of, USB flash drives, SD cards, External hard disk drives, Other drives that are formatted by using the NTFS, FAT16, FAT32, or exFAT file system.
# This is a rarely used application and usage of it at all is worth investigating.
# Malware such as Lumma stealer has been seen using this process as a target for process hollowing.
# Author: Josh Nickels, mttaggart
RuleId = 7f2376f9-42ee-4dfc-9360-fecff9a88fc8
RuleName = BitLockerTogo.EXE Execution
EventType = Process.Start
Tag = proc-start-bitlockertogo.exe-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1218"], "author": "Josh Nickels, mttaggart"}
Query = iendswith(Process.Path, "\\BitLockerToGo.exe")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new office macro files on the systems
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 91174a41-dc8f-401b-be89-7bfc140612a0
RuleName = Office Macro File Creation
EventType = File.Create
Tag = office-macro-file-creation
RiskScore = 25
Annotation = {"mitre_attack": ["T1566.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(File.Path, ".docm") or iendswith(File.Path, ".dotm") or iendswith(File.Path, ".xlsm") or iendswith(File.Path, ".xltm") or iendswith(File.Path, ".potm") or iendswith(File.Path, ".pptm")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of "sc.exe" to query information about registered services on the system
# Author: frack113
RuleId = 57712d7a-679c-4a41-a913-87e7175ae429
RuleName = SC.EXE Query Execution
EventType = Process.Start
Tag = proc-start-sc.exe-query-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1007"], "author": "frack113"}
Query = iendswith(Process.Path, "\\sc.exe") and Process.Name == "sc.exe" and icontains(Process.CommandLine, " query") and not Process.CommandLine == "sc query dokan1"


[ThreatDetectionRule platform=Windows]
# Detects changes to the "MaxMpxCt" registry value.
# MaxMpxCt specifies the maximum outstanding network requests for the server per client, which is used when negotiating a Server Message Block (SMB) connection with a client. Note if the value is set beyond 125 older Windows 9x clients will fail to negotiate.
# Ransomware threat actors and operators (specifically BlackCat) were seen increasing this value in order to handle a higher volume of traffic.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 0e6a9e62-627e-496c-aef5-bfa39da29b5e
RuleName = MaxMpxCt Registry Value Changed
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = maxmpxct-registry-value-changed
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.005"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\Services\\LanmanServer\\Parameters\\MaxMpxCt")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects the execution of regini.exe which can be used to modify registry keys, the changes are imported from one or more text files.
# Author: Eli Salem, Sander Wiebing, oscd.community
RuleId = 5f60740a-f57b-4e76-82a1-15b6ff2cb134
RuleName = Registry Modification Via Regini.EXE
EventType = Process.Start
Tag = proc-start-registry-modification-via-regini.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1112"], "author": "Eli Salem, Sander Wiebing, oscd.community"}
Query = (iendswith(Process.Path, "\\regini.exe") or Process.Name == "REGINI.EXE") and not Process.CommandLine regex ":[^ \\\\]"


[ThreatDetectionRule platform=Windows]
# Detects the use of the "SET" internal command of Cmd.EXE with the /p flag followed directly by an "=" sign.
# Attackers used this technique along with an append redirection operator ">>" in order to update the content of a file indirectly.
# Ex: cmd /c >> example.txt set /p="test data". This will append "test data" to contents of "example.txt".
# The typical use case of the "set /p=" command is to prompt the user for input.
# Author: Nasreddine Bencherchali (Nextron Systems), MahirAli Khan (in/mahiralikhan)
RuleId = 65e4c134-ee52-4099-9e35-5e17a4b45c62
RuleName = Potential File Override/Append Via SET Command
EventType = Process.Start
Tag = proc-start-potential-file-override/append-via-set-command
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems), MahirAli Khan (in/mahiralikhan)"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and (icontains(Process.CommandLine, "/c set /p=") or icontains(Process.CommandLine, "\"set /p=") or Process.CommandLine like r"%>>%set /p=%")


[ThreatDetectionRule platform=Windows]
# Windows Test Authoring and Execution Framework (TAEF) framework allows you to run automation by executing tests files written on different languages (C, C#, Microsoft COM Scripting interfaces
# Adversaries may execute malicious code (such as WSC file with VBScript, dll and so on) directly by running te.exe
# Author: Agro (@agro_sev) oscd.community
RuleId = 634b00d5-ccc3-4a06-ae3b-0ec8444dd51b
RuleName = Malicious Windows Script Components File Execution by TAEF Detection
EventType = Process.Start
Tag = proc-start-malicious-windows-script-components-file-execution-by-taef-detection
RiskScore = 25
Annotation = {"mitre_attack": ["T1218"], "author": "Agro (@agro_sev) oscd.community"}
Query = iendswith(Process.Path, "\\te.exe") or iendswith(Parent.Path, "\\te.exe") or Process.Name == "\\te.exe"
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of the "systeminfo" command to retrieve information
# Author: frack113
RuleId = 0ef56343-059e-4cb6-adc1-4c3c967c5e46
RuleName = Suspicious Execution of Systeminfo
EventType = Process.Start
Tag = proc-start-suspicious-execution-of-systeminfo
RiskScore = 25
Annotation = {"mitre_attack": ["T1082"], "author": "frack113"}
Query = iendswith(Process.Path, "\\systeminfo.exe") or Process.Name == "sysinfo.exe"


[ThreatDetectionRule platform=Windows]
# Detects changes to shell context menu commands. Use this rule to hunt for potential anomalies and suspicious shell commands.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 868df2d1-0939-4562-83a7-27408c4a1ada
RuleName = Shell Context Menu Command Tampering
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = shell-context-menu-command-tampering
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\Software\\Classes\\") and icontains(Reg.TargetObject, "\\shell\\") and icontains(Reg.TargetObject, "\\command\\")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects the deletion of the "Zone.Identifier" ADS. Attackers can leverage this in order to bypass security restrictions that make use of the ADS such as Microsoft Office apps.
# Author: frack113
RuleId = 7eac0a16-5832-4e81-865f-0268a6d19e4b
RuleName = ADS Zone.Identifier Deleted
EventType = File.Delete
Tag = ads-zone.identifier-deleted
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.004"], "author": "frack113"}
Query = iendswith(File.Path, ":Zone.Identifier")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects changes to the "TracingDisabled" key in order to disable ETW logging for services.exe (SCM)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 4f281b83-0200-4b34-bf35-d24687ea57c2
RuleName = ETW Logging Disabled For SCM
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = etw-logging-disabled-for-scm
RiskScore = 25
Annotation = {"mitre_attack": ["T1112", "T1562"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "Software\\Microsoft\\Windows NT\\CurrentVersion\\Tracing\\SCM\\Regular\\TracingDisabled") and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects modification of the registry settings used for Internet Explorer and other Windows components that use these settings. An attacker can abuse this registry key to add a domain to the trusted sites Zone or insert JavaScript for persistence
# Author: frack113
RuleId = d88d0ab2-e696-4d40-a2ed-9790064e66b3
RuleName = Modification of IE Registry Settings
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = modification-of-ie-registry-settings
RiskScore = 25
Annotation = {"mitre_attack": ["T1112"], "author": "frack113"}
Query = icontains(Reg.TargetObject, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Internet Settings") and not (istartswith(Reg.Value.Data, "DWORD") or isnull(Reg.Value.Data) or Reg.Value.Data in ["Cookie:", "Visited:", "(Empty)"] or icontains(Reg.TargetObject, "\\Cache") or icontains(Reg.TargetObject, "\\ZoneMap") or icontains(Reg.TargetObject, "\\WpadDecision") or Reg.Value.Data == "Binary Data") and not icontains(Reg.TargetObject, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\Accepted Documents")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects DNS server discovery via LDAP query requests from uncommon applications
# Author: frack113
RuleId = a21bcd7e-38ec-49ad-b69a-9ea17e69509e
RuleName = DNS Server Discovery Via LDAP Query
EventType = Dns.Query
Tag = dns-server-discovery-via-ldap-query
RiskScore = 25
Annotation = {"mitre_attack": ["T1482"], "author": "frack113"}
Query = istartswith(Dns.QueryRequest, "\_ldap.") and not (icontains(Process.Path, ":\\Program Files\\") or icontains(Process.Path, ":\\Program Files (x86)\\") or icontains(Process.Path, ":\\Windows\\") or icontains(Process.Path, ":\\ProgramData\\Microsoft\\Windows Defender\\Platform\\") and iendswith(Process.Path, "\\MsMpEng.exe") or Process.Path == "<unknown process>" or isnull(Process.Path)) and not (istartswith(Process.Path, "C:\\WindowsAzure\\GuestAgent") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\firefox.exe") or iendswith(Process.Path, "\\opera.exe"))
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects calls to the "New-NetFirewallRule" cmdlet from PowerShell in order to add a new firewall rule with an "Allow" action.
# Author: frack113
RuleId = 51483085-0cba-46a8-837e-4416496d6971
RuleName = New Windows Firewall Rule Added Via New-NetFirewallRule Cmdlet
EventType = Process.Start
Tag = proc-start-new-windows-firewall-rule-added-via-new-netfirewallrule-cmdlet
RiskScore = 25
Annotation = {"mitre_attack": ["T1562.004"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\powershell\_ise.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and icontains(Process.CommandLine, "New-NetFirewallRule ") and icontains(Process.CommandLine, " -Action ") and icontains(Process.CommandLine, "allow")


[ThreatDetectionRule platform=Windows]
# Detects the execution of clip.exe in order to copy data to the clipboard. Adversaries may collect data stored in the clipboard from users copying information within or between applications.
# Author: frack113
RuleId = ddeff553-5233-4ae9-bbab-d64d2bd634be
RuleName = Data Copied To Clipboard Via Clip.EXE
EventType = Process.Start
Tag = proc-start-data-copied-to-clipboard-via-clip.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1115"], "author": "frack113"}
Query = iendswith(Process.Path, "\\clip.exe") or Process.Name == "clip.exe"


[ThreatDetectionRule platform=Windows]
# Detects the creation of a process via the Windows task manager. This might be an attempt to bypass UAC
# Author: Florian Roth (Nextron Systems)
RuleId = 3d7679bd-0c00-440c-97b0-3f204273e6c7
RuleName = New Process Created Via Taskmgr.EXE
EventType = Process.Start
Tag = proc-start-new-process-created-via-taskmgr.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1036"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\taskmgr.exe") and not (iendswith(Process.Path, ":\\Windows\\System32\\mmc.exe") or iendswith(Process.Path, ":\\Windows\\System32\\resmon.exe") or iendswith(Process.Path, ":\\Windows\\System32\\Taskmgr.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects file access requests to chromium based browser sensitive files by uncommon processes.
# Could indicate potential attempt of stealing sensitive information.
# Author: X__Junior (Nextron Systems)
RuleId = c5f37810-a85f-4186-81e9-33f23abb4141
RuleName = Access To Chromium Browsers Sensitive Files By Uncommon Applications
EventType = File.Read
Tag = access-to-chromium-browsers-sensitive-files-by-uncommon-applications
RiskScore = 25
Annotation = {"mitre_attack": ["T1003"], "author": "X__Junior (Nextron Systems)"}
Query = (icontains(File.Path, "\\User Data\\Default\\Cookies") or icontains(File.Path, "\\User Data\\Default\\History") or icontains(File.Path, "\\User Data\\Default\\Network\\Cookies") or icontains(File.Path, "\\User Data\\Default\\Web Data")) and not (Process.Path == "System" or istartswith(Process.Path, "C:\\Program Files (x86)\\") or istartswith(Process.Path, "C:\\Program Files\\") or istartswith(Process.Path, "C:\\Windows\\system32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\")) and not (istartswith(Process.Path, "C:\\ProgramData\\Microsoft\\Windows Defender\\") and (iendswith(Process.Path, "\\MpCopyAccelerator.exe") or iendswith(Process.Path, "\\MsMpEng.exe")))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects specific combinations of encoding methods in PowerShell via the commandline
# Author: Teymur Kheirkhabarov (idea), Vasiliy Burov (rule), oscd.community, Tim Shelton
RuleId = cdf05894-89e7-4ead-b2b0-0a5f97a90f2f
RuleName = Potential Encoded PowerShell Patterns In CommandLine
EventType = Process.Start
Tag = proc-start-potential-encoded-powershell-patterns-in-commandline
RiskScore = 25
Annotation = {"mitre_attack": ["T1027", "T1059.001"], "author": "Teymur Kheirkhabarov (idea), Vasiliy Burov (rule), oscd.community, Tim Shelton"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and ((icontains(Process.CommandLine, "ToInt") or icontains(Process.CommandLine, "ToDecimal") or icontains(Process.CommandLine, "ToByte") or icontains(Process.CommandLine, "ToUint") or icontains(Process.CommandLine, "ToSingle") or icontains(Process.CommandLine, "ToSByte")) and (icontains(Process.CommandLine, "ToChar") or icontains(Process.CommandLine, "ToString") or icontains(Process.CommandLine, "String")) or icontains(Process.CommandLine, "char") and icontains(Process.CommandLine, "join") or icontains(Process.CommandLine, "split") and icontains(Process.CommandLine, "join"))


[ThreatDetectionRule platform=Windows]
# Detects the execution of "wmic" with the "group" flag.
# Adversaries may attempt to find local system groups and permission settings.
# The knowledge of local system permission groups can help adversaries determine which groups exist and which users belong to a particular group.
# Adversaries may use this information to determine which users have elevated permissions, such as the users found within the local administrators group.
# Author: frack113
RuleId = 164eda96-11b2-430b-85ff-6a265c15bf32
RuleName = Local Groups Reconnaissance Via Wmic.EXE
EventType = Process.Start
Tag = proc-start-local-groups-reconnaissance-via-wmic.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1069.001"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\wmic.exe") or Process.Name == "wmic.exe") and icontains(Process.CommandLine, " group")


[ThreatDetectionRule platform=Windows]
# Detects file association changes using the builtin "assoc" command.
# When a file is opened, the default program used to open the file (also called the file association or handler) is checked. File association selections are stored in the Windows Registry and can be edited by users, administrators, or programs that have Registry access or by administrators using the built-in assoc utility. Applications can modify the file association for a given file extension to call an arbitrary program when a file with the given extension is opened.
# Author: Timur Zinniatullin, oscd.community
RuleId = 3d3aa6cd-6272-44d6-8afc-7e88dfef7061
RuleName = Change Default File Association Via Assoc
EventType = Process.Start
Tag = proc-start-change-default-file-association-via-assoc
RiskScore = 25
Annotation = {"mitre_attack": ["T1546.001"], "author": "Timur Zinniatullin, oscd.community"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and icontains(Process.CommandLine, "assoc")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a child "explorer.exe" process from a shell like process such as "cmd.exe" or "powershell.exe".
# Attackers can use "explorer.exe" for evading defense mechanisms by proxying the execution through the latter.
# While this is often a legitimate action, this rule can be use to hunt for anomalies.
# Muddy Waters threat actor was seeing using this technique.
# Author: Furkan CALISKAN, @caliskanfurkan_, @oscd_initiative
RuleId = 9eb271b9-24ae-4cd4-9465-19cfc1047f3e
RuleName = Potential Proxy Execution Via Explorer.EXE From Shell Process
EventType = Process.Start
Tag = proc-start-potential-proxy-execution-via-explorer.exe-from-shell-process
RiskScore = 25
Annotation = {"mitre_attack": ["T1218"], "author": "Furkan CALISKAN, @caliskanfurkan_, @oscd_initiative"}
Query = (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\powershell.exe") or iendswith(Parent.Path, "\\pwsh.exe")) and iendswith(Process.Path, "\\explorer.exe") and icontains(Process.CommandLine, "explorer.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# When C# is compiled dynamically, a .cmdline file will be created as a part of the process.
# Certain processes are not typically observed compiling C# code, but can do so without touching disk.
# This can be used to unpack a payload for execution
# Author: frack113
RuleId = e4a74e34-ecde-4aab-b2fb-9112dd01aed0
RuleName = Dynamic CSharp Compile Artefact
EventType = File.Create
Tag = dynamic-csharp-compile-artefact
RiskScore = 25
Annotation = {"mitre_attack": ["T1027.004"], "author": "frack113"}
Query = iendswith(File.Path, ".cmdline")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of files in a specific location by ScreenConnect RMM.
# ScreenConnect has feature to remotely execute binaries on a target machine. These binaries will be dropped to ":\Users\<username>\Documents\ConnectWiseControl\Temp\" before execution.
# Author: Ali Alwashali
RuleId = 0afecb6e-6223-4a82-99fb-bf5b981e92a5
RuleName = Remote Access Tool - ScreenConnect Temporary File
EventType = File.Create
Tag = remote-access-tool-screenconnect-temporary-file
RiskScore = 25
Annotation = {"mitre_attack": ["T1059.003"], "author": "Ali Alwashali"}
Query = iendswith(Process.Path, "\\ScreenConnect.WindowsClient.exe") and icontains(File.Path, "\\Documents\\ConnectWiseControl\\Temp\\")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects attempts to enumerate file shares, printer shares and sessions using "net.exe" with the "view" flag.
# Author: Endgame, JHasenbusch (ported for oscd.community)
RuleId = 62510e69-616b-4078-b371-847da438cc03
RuleName = Share And Session Enumeration Using Net.EXE
EventType = Process.Start
Tag = proc-start-share-and-session-enumeration-using-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1018"], "author": "Endgame, JHasenbusch (ported for oscd.community)"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and icontains(Process.CommandLine, "view") and not icontains(Process.CommandLine, "\\\\")


[ThreatDetectionRule platform=Windows]
# Detects Deno writing a file from a direct HTTP(s) call and writing to the appdata folder or bringing it's own malicious DLL.
# This behavior may indicate an attempt to execute remotely hosted, potentially malicious files through deno.
# Author: Josh Nickels, Michael Taggart
RuleId = 6c0ce3b6-85e2-49d4-9c3f-6e008ce9796e
RuleName = Suspicious Deno File Written from Remote Source
EventType = File.Create
Tag = suspicious-deno-file-written-from-remote-source
RiskScore = 25
Annotation = {"mitre_attack": ["T1204", "T1059.007", "T1105"], "author": "Josh Nickels, Michael Taggart"}
Query = (icontains(File.Path, "\\deno\\gen\\") or icontains(File.Path, "\\deno\\remote\\https\\")) and icontains(File.Path, ":\\Users\\") and icontains(File.Path, "\\AppData\\")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of "rar" to add files to an archive for potential compression. An adversary may compress data (e.g. sensitive documents) that is collected prior to exfiltration in order to make it portable and minimize the amount of data sent over the network.
# Author: Timur Zinniatullin, E.M. Anhaus, oscd.community
RuleId = 6f3e2987-db24-4c78-a860-b4f4095a7095
RuleName = Files Added To An Archive Using Rar.EXE
EventType = Process.Start
Tag = proc-start-files-added-to-an-archive-using-rar.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1560.001"], "author": "Timur Zinniatullin, E.M. Anhaus, oscd.community"}
Query = iendswith(Process.Path, "\\rar.exe") and icontains(Process.CommandLine, " a ")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new PowerShell module ".psm1", ".psd1", ".dll", ".ps1", etc.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = e36941d0-c0f0-443f-bc6f-cb2952eb69ea
RuleName = PowerShell Module File Created
EventType = File.Create
Tag = powershell-module-file-created
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and (icontains(File.Path, "\\WindowsPowerShell\\Modules\\") or icontains(File.Path, "\\PowerShell\\7\\Modules\\"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of "hh.exe" to open ".chm" files.
# Author: E.M. Anhaus (originally from Atomic Blue Detections, Dan Beavin), oscd.community
RuleId = 68c8acb4-1b60-4890-8e82-3ddf7a6dba84
RuleName = HH.EXE Execution
EventType = Process.Start
Tag = proc-start-hh.exe-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1218.001"], "author": "E.M. Anhaus (originally from Atomic Blue Detections, Dan Beavin), oscd.community"}
Query = (Process.Name == "HH.exe" or iendswith(Process.Path, "\\hh.exe")) and icontains(Process.CommandLine, ".chm")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a scheduled task via Registry keys.
# Author: Center for Threat Informed Defense (CTID) Summiting the Pyramid Team
RuleId = 93ff0ceb-e0ef-4586-8cd8-a6c277d738e3
RuleName = Scheduled Task Created - Registry
EventType = Reg.Key.Create
EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = scheduled-task-created-registry
RiskScore = 25
Annotation = {"mitre_attack": ["T1053.005"], "author": "Center for Threat Informed Defense (CTID) Summiting the Pyramid Team"}
Query = icontains(Reg.TargetObject, "\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\TaskCache\\Tasks\\") or icontains(Reg.TargetObject, "\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\TaskCache\\Tree\\")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects nltest commands that can be used for information discovery
# Author: Arun Chauhan
RuleId = 903076ff-f442-475a-b667-4f246bcc203b
RuleName = Nltest.EXE Execution
EventType = Process.Start
Tag = proc-start-nltest.exe-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1016", "T1018", "T1482"], "author": "Arun Chauhan"}
Query = iendswith(Process.Path, "\\nltest.exe") or Process.Name == "nltestrk.exe"


[ThreatDetectionRule platform=Windows]
# Detects the creation of a file with the ".dmp"/".hdmp" extension. Often created by software during a crash. Memory dumps can sometimes contain sensitive information such as credentials. It's best to determine the source of the crash.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 3a525307-d100-48ae-b3b9-0964699d7f97
RuleName = DMP/HDMP File Creation
EventType = File.Create
Tag = dmp/hdmp-file-creation
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(File.Path, ".dmp") or iendswith(File.Path, ".dump") or iendswith(File.Path, ".hdmp")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects changes to the registry values related to outlook that indicates that a reminder was triggered for a Note or Task item. This could be a sign of exploitation of CVE-2023-23397. Further investigation is required to determine the success of an exploitation.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = fc06e655-d98c-412f-ac76-05c2698b1cb2
RuleName = Outlook Task/Note Reminder Received
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = outlook-task/note-reminder-received
RiskScore = 25
Annotation = {"mitre_attack": ["T1137"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Office\\") and icontains(Reg.TargetObject, "\\Outlook\\") and (icontains(Reg.TargetObject, "\\Tasks\\") or icontains(Reg.TargetObject, "\\Notes\\"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects DNS queries initiated by "QuickAssist.exe" to Microsoft Quick Assist primary endpoint that is used to establish a session.
# Author: Muhammad Faisal (@faisalusuf)
RuleId = 882e858a-3233-4ba8-855e-2f3d3575803d
RuleName = DNS Query Request By QuickAssist.EXE
EventType = Dns.Query
Tag = dns-query-request-by-quickassist.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1071.001", "T1210"], "author": "Muhammad Faisal (@faisalusuf)"}
Query = iendswith(Process.Path, "\\QuickAssist.exe") and iendswith(Dns.QueryRequest, "remoteassistance.support.services.microsoft.com")
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects file access requests to files ending with either the ".hive"/".reg" extension, usually associated with Windows Registry backups.
# Author: frack113
RuleId = 337a31c6-46c4-46be-886a-260d7aa78cac
RuleName = Access To .Reg/.Hive Files By Uncommon Applications
EventType = File.Read
Tag = access-to-.reg/.hive-files-by-uncommon-applications
RiskScore = 25
Annotation = {"mitre_attack": ["T1112"], "author": "frack113"}
Query = (iendswith(File.Path, ".hive") or iendswith(File.Path, ".reg")) and not (istartswith(Process.Path, "C:\\Program Files (x86)\\") or istartswith(Process.Path, "C:\\Program Files\\") or istartswith(Process.Path, "C:\\Windows\\System32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the export of the target Registry key to a file.
# Author: Oddvar Moe, Sander Wiebing, oscd.community
RuleId = f0e53e89-8d22-46ea-9db5-9d4796ee2f8a
RuleName = Exports Registry Key To a File
EventType = Process.Start
Tag = proc-start-exports-registry-key-to-a-file
RiskScore = 25
Annotation = {"mitre_attack": ["T1012"], "author": "Oddvar Moe, Sander Wiebing, oscd.community"}
Query = (iendswith(Process.Path, "\\regedit.exe") or Process.Name == "REGEDIT.EXE") and (icontains(Process.CommandLine, " -E ") or icontains(Process.CommandLine, " /E ") or icontains(Process.CommandLine, " –E ") or icontains(Process.CommandLine, " —E ") or icontains(Process.CommandLine, " ―E ")) and not ((icontains(Process.CommandLine, "hklm") or icontains(Process.CommandLine, "hkey\_local\_machine")) and (iendswith(Process.CommandLine, "\\system") or iendswith(Process.CommandLine, "\\sam") or iendswith(Process.CommandLine, "\\security")))


[ThreatDetectionRule platform=Windows]
# Detect indirect command execution via Program Compatibility Assistant pcwrun.exe
# Author: A. Sungurov , oscd.community
RuleId = b97cd4b1-30b8-4a9d-bd72-6293928d52bc
RuleName = Indirect Command Execution By Program Compatibility Wizard
EventType = Process.Start
Tag = proc-start-indirect-command-execution-by-program-compatibility-wizard
RiskScore = 25
Annotation = {"mitre_attack": ["T1218"], "author": "A. Sungurov , oscd.community"}
Query = iendswith(Parent.Path, "\\pcwrun.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of the builtin "rmdir" command in order to delete directories.
# Adversaries may delete files left behind by the actions of their intrusion activity.
# Malware, tools, or other non-native files dropped or created on a system by an adversary may leave traces to indicate to what was done within a network and how.
# Removal of these files can occur during an intrusion, or as part of a post-intrusion process to minimize the adversary's footprint.
# Author: frack113
RuleId = 41ca393d-538c-408a-ac27-cf1e038be80c
RuleName = Directory Removal Via Rmdir
EventType = Process.Start
Tag = proc-start-directory-removal-via-rmdir
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.004"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and icontains(Process.CommandLine, "rmdir") and (icontains(Process.CommandLine, "/s") or icontains(Process.CommandLine, "/q"))


[ThreatDetectionRule platform=Windows]
# Detects the execution of Microsoft Quick Assist tool "QuickAssist.exe". This utility can be used by attackers to gain remote access.
# Author: Muhammad Faisal (@faisalusuf)
RuleId = e20b5b14-ce93-4230-88af-981983ef6e74
RuleName = QuickAssist Execution
EventType = Process.Start
Tag = proc-start-quickassist-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1219.002"], "author": "Muhammad Faisal (@faisalusuf)"}
Query = iendswith(Process.Path, "\\QuickAssist.exe")


[ThreatDetectionRule platform=Windows]
# Detects the execution of a Sysinternals Tool via the creation of the "accepteula" registry key
# Author: Markus Neis
RuleId = 25ffa65d-76d8-4da5-a832-3f2b0136e133
RuleName = PUA - Sysinternal Tool Execution - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = pua-sysinternal-tool-execution-registry
RiskScore = 25
Annotation = {"mitre_attack": ["T1588.002"], "author": "Markus Neis"}
Query = iendswith(Reg.TargetObject, "\\EulaAccepted")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects PowerShell creating a PowerShell file (.ps1). While often times this behavior is benign, sometimes it can be a sign of a dropper script trying to achieve persistence.
# Author: frack113
RuleId = 576426ad-0131-4001-ae01-be175da0c108
RuleName = PowerShell Script Dropped Via PowerShell.EXE
EventType = File.Create
Tag = powershell-script-dropped-via-powershell.exe
RiskScore = 25
Annotation = {"author": "frack113"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and iendswith(File.Path, ".ps1") and not (icontains(File.Path, "\_\_PSScriptPolicyTest\_") or istartswith(File.Path, "C:\\Users\\") and icontains(File.Path, "\\AppData\\Local\\Temp\\") or istartswith(File.Path, "C:\\Windows\\Temp\\"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects DNS query requests to "update.onelaunch.com". This domain is associated with the OneLaunch adware application.
# When the OneLaunch application is installed it will attempt to get updates from this domain.
# Author: Josh Nickels
RuleId = df68f791-ad95-447f-a271-640a0dab9cf8
RuleName = DNS Query Request To OneLaunch Update Service
EventType = Dns.Query
Tag = dns-query-request-to-onelaunch-update-service
RiskScore = 25
Annotation = {"mitre_attack": ["T1056"], "author": "Josh Nickels"}
Query = Dns.QueryRequest == "update.onelaunch.com" and iendswith(Process.Path, "\\OneLaunch.exe")
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Adversaries may attempt to get a listing of network connections to or from the compromised system they are currently accessing or from remote systems by querying for information over the network.
# Author: frack113
RuleId = 1c67a717-32ba-409b-a45d-0fb704a73a81
RuleName = System Network Connections Discovery Via Net.EXE
EventType = Process.Start
Tag = proc-start-system-network-connections-discovery-via-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1049"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and (iendswith(Process.CommandLine, " use") or iendswith(Process.CommandLine, " sessions") or icontains(Process.CommandLine, " use ") or icontains(Process.CommandLine, " sessions "))


[ThreatDetectionRule platform=Windows]
# Detects default PsExec service filename which indicates PsExec service installation and execution
# Author: Thomas Patzke
RuleId = 259e5a6a-b8d2-4c38-86e2-26c5e651361d
RuleName = PsExec Service File Creation
EventType = File.Create
Tag = psexec-service-file-creation
RiskScore = 25
Annotation = {"mitre_attack": ["T1569.002"], "author": "Thomas Patzke"}
Query = iendswith(File.Path, "\\PSEXESVC.exe")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects changes to the AppInstaller (winget) admin settings. Such as enabling local manifest installations or disabling installer hash checks
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 6db5eaf9-88f7-4ed9-af7d-9ef2ad12f236
RuleName = Winget Admin Settings Modification
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = winget-admin-settings-modification
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\winget.exe") and istartswith(Reg.TargetObject, "\\REGISTRY\\A\\") and iendswith(Reg.TargetObject, "\\LocalState\\admin\_settings")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects a non-browser process communicating with the Notion API. This could indicate potential use of a covert C2 channel such as "OffensiveNotion C2"
# Author: Gavin Knapp
RuleId = 7e9cf7b6-e827-11ed-a05b-15959c120003
RuleName = Potentially Suspicious Network Connection To Notion API
EventType = Net.Any
Tag = potentially-suspicious-network-connection-to-notion-api
RiskScore = 25
Annotation = {"mitre_attack": ["T1102"], "author": "Gavin Knapp"}
Query = icontains(Net.Target.Name, "api.notion.com") and not (iendswith(Process.Path, "\\AppData\\Local\\Programs\\Notion\\Notion.exe") or iendswith(Process.Path, "\\brave.exe") or Process.Path in ["C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe", "C:\\Program Files (x86)\\Google\\Chrome\\Application\\chrome.exe"] or Process.Path in ["C:\\Program Files\\Mozilla Firefox\\firefox.exe", "C:\\Program Files (x86)\\Mozilla Firefox\\firefox.exe"] or Process.Path in ["C:\\Program Files (x86)\\Internet Explorer\\iexplore.exe", "C:\\Program Files\\Internet Explorer\\iexplore.exe"] or iendswith(Process.Path, "\\maxthon.exe") or istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeWebView\\Application\\") or iendswith(Process.Path, "\\WindowsApps\\MicrosoftEdge.exe") or Process.Path in ["C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe", "C:\\Program Files\\Microsoft\\Edge\\Application\\msedge.exe"] or (istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeCore\\") or istartswith(Process.Path, "C:\\Program Files\\Microsoft\\EdgeCore\\")) and (iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\msedgewebview2.exe")) or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\safari.exe") or iendswith(Process.Path, "\\seamonkey.exe") or iendswith(Process.Path, "\\vivaldi.exe") or iendswith(Process.Path, "\\whale.exe"))
GenericProperty1 = Net.Target.Name


[ThreatDetectionRule platform=Windows]
# Adversaries may enumerate browser bookmarks to learn more about compromised hosts.
# Browser bookmarks may reveal personal information about users (ex: banking sites, interests, social media, etc.) as well as details about
# internal network resources such as servers, tools/dashboards, or other related infrastructure.
# Author: frack113, Nasreddine Bencherchali (Nextron Systems)
RuleId = 725a9768-0f5e-4cb3-aec2-bc5719c6831a
RuleName = Suspicious Where Execution
EventType = Process.Start
Tag = proc-start-suspicious-where-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1217"], "author": "frack113, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\where.exe") or Process.Name == "where.exe") and (icontains(Process.CommandLine, "places.sqlite") or icontains(Process.CommandLine, "cookies.sqlite") or icontains(Process.CommandLine, "formhistory.sqlite") or icontains(Process.CommandLine, "logins.json") or icontains(Process.CommandLine, "key4.db") or icontains(Process.CommandLine, "key3.db") or icontains(Process.CommandLine, "sessionstore.jsonlz4") or icontains(Process.CommandLine, "History") or icontains(Process.CommandLine, "Bookmarks") or icontains(Process.CommandLine, "Cookies") or icontains(Process.CommandLine, "Login Data"))


[ThreatDetectionRule platform=Windows]
# Adversaries can carry out malicious operations using a virtual instance to avoid detection. This rule is built to detect the registration of the Virtualbox driver or start of a Virtualbox VM.
# Author: Janantha Marasinghe
RuleId = bab049ca-7471-4828-9024-38279a4c04da
RuleName = Virtualbox Driver Installation or Starting of VMs
EventType = Process.Start
Tag = proc-start-virtualbox-driver-installation-or-starting-of-vms
RiskScore = 25
Annotation = {"mitre_attack": ["T1564.006", "T1564"], "author": "Janantha Marasinghe"}
Query = icontains(Process.CommandLine, "VBoxRT.dll,RTR3Init") or icontains(Process.CommandLine, "VBoxC.dll") or icontains(Process.CommandLine, "VBoxDrv.sys") or icontains(Process.CommandLine, "startvm") or icontains(Process.CommandLine, "controlvm")


[ThreatDetectionRule platform=Windows]
# Detects Microsoft Word loading an Add-In (.wll) file which can be used by threat actors for initial access or persistence.
# Author: Steffen Rogge (dr0pd34d)
RuleId = 1337afba-d17d-4d23-bd55-29b927603b30
RuleName = Microsoft Word Add-In Loaded
EventType = Image.Load
Tag = microsoft-word-add-in-loaded
RiskScore = 25
Annotation = {"mitre_attack": ["T1204.002"], "author": "Steffen Rogge (dr0pd34d)"}
Query = iendswith(Process.Path, "\\winword.exe") and iendswith(Image.Path, ".wll")
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of findstr with the "s" and "i" flags for a "subfolder" and "insensitive" search respectively. Attackers sometimes leverage this built-in utility to search the system for interesting files or filter through results of commands.
# Author: Furkan CALISKAN, @caliskanfurkan_, @oscd_initiative, Nasreddine Bencherchali (Nextron Systems)
RuleId = 04936b66-3915-43ad-a8e5-809eadfd1141
RuleName = Insensitive Subfolder Search Via Findstr.EXE
EventType = Process.Start
Tag = proc-start-insensitive-subfolder-search-via-findstr.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1218", "T1564.004", "T1552.001", "T1105"], "author": "Furkan CALISKAN, @caliskanfurkan_, @oscd_initiative, Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "findstr") or iendswith(Process.Path, "findstr.exe") or Process.Name == "FINDSTR.EXE") and (icontains(Process.CommandLine, " -s ") or icontains(Process.CommandLine, " /s ") or icontains(Process.CommandLine, " –s ") or icontains(Process.CommandLine, " —s ") or icontains(Process.CommandLine, " ―s ")) and (icontains(Process.CommandLine, " -i ") or icontains(Process.CommandLine, " /i ") or icontains(Process.CommandLine, " –i ") or icontains(Process.CommandLine, " —i ") or icontains(Process.CommandLine, " ―i "))


[ThreatDetectionRule platform=Windows]
# Detect suspicious parent processes of well-known Windows processes
# Author: vburov
RuleId = 96036718-71cc-4027-a538-d1587e0006a7
RuleName = Windows Processes Suspicious Parent Directory
EventType = Process.Start
Tag = proc-start-windows-processes-suspicious-parent-directory
RiskScore = 25
Annotation = {"mitre_attack": ["T1036.003", "T1036.005"], "author": "vburov"}
Query = (iendswith(Process.Path, "\\svchost.exe") or iendswith(Process.Path, "\\taskhost.exe") or iendswith(Process.Path, "\\lsm.exe") or iendswith(Process.Path, "\\lsass.exe") or iendswith(Process.Path, "\\services.exe") or iendswith(Process.Path, "\\lsaiso.exe") or iendswith(Process.Path, "\\csrss.exe") or iendswith(Process.Path, "\\wininit.exe") or iendswith(Process.Path, "\\winlogon.exe")) and not (iendswith(Parent.Path, "\\SavService.exe") or iendswith(Parent.Path, "\\ngen.exe") or icontains(Parent.Path, "\\System32\\") or icontains(Parent.Path, "\\SysWOW64\\") or (icontains(Parent.Path, "\\Windows Defender\\") or icontains(Parent.Path, "\\Microsoft Security Client\\")) and iendswith(Parent.Path, "\\MsMpEng.exe") or isnull(Parent.Path) or Parent.Path in ["", "-"])
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of "RegAsm.exe" without a commandline flag or file, which might indicate potential process injection activity.
# Usually "RegAsm.exe" should point to a dedicated DLL file or call the help with the "/?" flag.
# Author: frack113
RuleId = 651f87f7-12db-47f9-84c5-f27b081b94b6
RuleName = RegAsm.EXE Execution Without CommandLine Flags or Files
EventType = Process.Start
Tag = proc-start-regasm.exe-execution-without-commandline-flags-or-files
RiskScore = 25
Annotation = {"mitre_attack": ["T1218.009"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\RegAsm.exe") or Process.Name == "RegAsm.exe") and (iendswith(Process.CommandLine, "RegAsm") or iendswith(Process.CommandLine, "RegAsm.exe") or iendswith(Process.CommandLine, "RegAsm.exe\"") or iendswith(Process.CommandLine, "RegAsm.exe'"))


[ThreatDetectionRule platform=Windows]
# Detects the stopping of a Windows service via the "sc.exe" utility
# Author: Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)
RuleId = 81bcb81b-5b1f-474b-b373-52c871aaa7b1
RuleName = Stop Windows Service Via Sc.EXE
EventType = Process.Start
Tag = proc-start-stop-windows-service-via-sc.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1489"], "author": "Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)"}
Query = (Process.Name == "sc.exe" or iendswith(Process.Path, "\\sc.exe")) and icontains(Process.CommandLine, " stop ")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new office macro files on the system via an application (browser, mail client).
# This can help identify potential malicious activity, such as the download of macro-enabled documents that could be used for exploitation.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 0e29e3a7-1ad8-40aa-b691-9f82ecd33d66
RuleName = Office Macro File Download
EventType = File.Create
Tag = office-macro-file-download
RiskScore = 25
Annotation = {"mitre_attack": ["T1566.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\RuntimeBroker.exe") or iendswith(Process.Path, "\\outlook.exe") or iendswith(Process.Path, "\\thunderbird.exe") or iendswith(Process.Path, "\\brave.exe") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\firefox.exe") or iendswith(Process.Path, "\\iexplore.exe") or iendswith(Process.Path, "\\maxthon.exe") or iendswith(Process.Path, "\\MicrosoftEdge.exe") or iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\msedgewebview2.exe") or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\safari.exe") or iendswith(Process.Path, "\\seamonkey.exe") or iendswith(Process.Path, "\\vivaldi.exe") or iendswith(Process.Path, "\\whale.exe")) and (iendswith(File.Path, ".docm") or iendswith(File.Path, ".dotm") or iendswith(File.Path, ".xlsm") or iendswith(File.Path, ".xltm") or iendswith(File.Path, ".potm") or iendswith(File.Path, ".pptm") or icontains(File.Path, ".docm:Zone") or icontains(File.Path, ".dotm:Zone") or icontains(File.Path, ".xlsm:Zone") or icontains(File.Path, ".xltm:Zone") or icontains(File.Path, ".potm:Zone") or icontains(File.Path, ".pptm:Zone"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Local accounts, System Owner/User discovery using operating systems utilities
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = 502b42de-4306-40b4-9596-6f590c81f073
RuleName = Local Accounts Discovery
EventType = Process.Start
Tag = proc-start-local-accounts-discovery
RiskScore = 25
Annotation = {"mitre_attack": ["T1033", "T1087.001"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = iendswith(Process.Path, "\\cmd.exe") and icontains(Process.CommandLine, " /c") and icontains(Process.CommandLine, "dir ") and icontains(Process.CommandLine, "\\Users\\") and not icontains(Process.CommandLine, " rmdir ") or (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, "user") and not (icontains(Process.CommandLine, "/domain") or icontains(Process.CommandLine, "/add") or icontains(Process.CommandLine, "/delete") or icontains(Process.CommandLine, "/active") or icontains(Process.CommandLine, "/expires") or icontains(Process.CommandLine, "/passwordreq") or icontains(Process.CommandLine, "/scriptpath") or icontains(Process.CommandLine, "/times") or icontains(Process.CommandLine, "/workstations")) or iendswith(Process.Path, "\\whoami.exe") or iendswith(Process.Path, "\\quser.exe") or iendswith(Process.Path, "\\qwinsta.exe") or Process.Name in ["whoami.exe", "quser.exe", "qwinsta.exe"] or iendswith(Process.Path, "\\wmic.exe") and icontains(Process.CommandLine, "useraccount") and icontains(Process.CommandLine, "get") or iendswith(Process.Path, "\\cmdkey.exe") and icontains(Process.CommandLine, " /l")


[ThreatDetectionRule platform=Windows]
# Detects non-interactive PowerShell activity by looking at the "powershell" process with a non-user GUI process such as "explorer.exe" as a parent.
# Author: Roberto Rodriguez @Cyb3rWard0g (rule), oscd.community (improvements)
RuleId = f4bbd493-b796-416e-bbf2-121235348529
RuleName = Non Interactive PowerShell Process Spawned
EventType = Process.Start
Tag = proc-start-non-interactive-powershell-process-spawned
RiskScore = 25
Annotation = {"mitre_attack": ["T1059.001"], "author": "Roberto Rodriguez @Cyb3rWard0g (rule), oscd.community (improvements)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and not (iendswith(Parent.Path, ":\\Windows\\explorer.exe") or iendswith(Parent.Path, ":\\Windows\\System32\\CompatTelRunner.exe") or iendswith(Parent.Path, ":\\Windows\\SysWOW64\\explorer.exe") or Parent.Path == ":\\$WINDOWS.~BT\\Sources\\SetupHost.exe") and not (iendswith(Parent.Path, "\\AppData\\Local\\Programs\\Microsoft VS Code\\Code.exe") and icontains(Parent.CommandLine, " --ms-enable-electron-run-as-node ") or icontains(Parent.Path, ":\\Program Files\\WindowsApps\\Microsoft.WindowsTerminal\_") and iendswith(Parent.Path, "\\WindowsTerminal.exe") or iendswith(Parent.Path, ":\\Program Files\\Windows Defender Advanced Threat Protection\\SenseIR.exe"))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects potential DLL sideloading of "7za.dll"
# Author: X__Junior
RuleId = 4f6edb78-5c21-42ab-a558-fd2a6fc1fd57
RuleName = Potential 7za.DLL Sideloading
EventType = Image.Load
Tag = potential-7za.dll-sideloading
RiskScore = 25
Annotation = {"mitre_attack": ["T1574.001"], "author": "X__Junior"}
Query = iendswith(Image.Path, "\\7za.dll") and not ((istartswith(Process.Path, "C:\\Program Files (x86)\\") or istartswith(Process.Path, "C:\\Program Files\\")) and (istartswith(Image.Path, "C:\\Program Files (x86)\\") or istartswith(Image.Path, "C:\\Program Files\\")))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of the "dir" command part of Windows CMD with the "/S" command line flag in order to enumerate files in a specified directory and all subdirectories.
# Author: frack113
RuleId = 7c9340a9-e2ee-4e43-94c5-c54ebbea1006
RuleName = File And SubFolder Enumeration Via Dir Command
EventType = Process.Start
Tag = proc-start-file-and-subfolder-enumeration-via-dir-command
RiskScore = 25
Annotation = {"mitre_attack": ["T1217"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and (Process.CommandLine like r"%dir%-s%" or Process.CommandLine like r"%dir%/s%" or Process.CommandLine like r"%dir%–s%" or Process.CommandLine like r"%dir%—s%" or Process.CommandLine like r"%dir%―s%")


[ThreatDetectionRule platform=Windows]
# Detects file access requests to browser credential stores by uncommon processes.
# Could indicate potential attempt of credential stealing.
# Requires heavy baselining before usage
# Author: frack113, X__Junior (Nextron Systems)
RuleId = 91cb43db-302a-47e3-b3c8-7ede481e27bf
RuleName = Access To Browser Credential Files By Uncommon Applications
EventType = File.Read
Tag = access-to-browser-credential-files-by-uncommon-applications
RiskScore = 25
Annotation = {"mitre_attack": ["T1003"], "author": "frack113, X__Junior (Nextron Systems)"}
Query = (iendswith(File.Path, "\\Appdata\\Local\\Microsoft\\Windows\\WebCache\\WebCacheV01.dat") or iendswith(File.Path, "\\cookies.sqlite") or iendswith(File.Path, "\\places.sqlite") or iendswith(File.Path, "release\\key3.db") or iendswith(File.Path, "release\\key4.db") or iendswith(File.Path, "release\\logins.json") or icontains(File.Path, "\\User Data\\Default\\Login Data") or icontains(File.Path, "\\User Data\\Local State")) and not (Process.Path == "System" or istartswith(Process.Path, "C:\\Program Files (x86)\\") or istartswith(Process.Path, "C:\\Program Files\\") or istartswith(Process.Path, "C:\\Windows\\system32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\")) and not (istartswith(Process.Path, "C:\\ProgramData\\Microsoft\\Windows Defender\\") and (iendswith(Process.Path, "\\MpCopyAccelerator.exe") or iendswith(Process.Path, "\\MsMpEng.exe")) or iendswith(Process.Path, "\\thor.exe") or iendswith(Process.Path, "\\thor64.exe"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects a CodePage modification using the "mode.com" utility.
# This behavior has been used by threat actors behind Dharma ransomware.
# Author: Nasreddine Bencherchali (Nextron Systems), Joseliyo Sanchez, @Joseliyo_Jstnk
RuleId = d48c5ffa-3b02-4c0f-9a9e-3c275650dd0e
RuleName = CodePage Modification Via MODE.COM
EventType = Process.Start
Tag = proc-start-codepage-modification-via-mode.com
RiskScore = 25
Annotation = {"mitre_attack": ["T1036"], "author": "Nasreddine Bencherchali (Nextron Systems), Joseliyo Sanchez, @Joseliyo_Jstnk"}
Query = (iendswith(Process.Path, "\\mode.com") or Process.Name == "MODE.COM") and icontains(Process.CommandLine, " con ") and icontains(Process.CommandLine, " cp ") and icontains(Process.CommandLine, " select=")


[ThreatDetectionRule platform=Windows]
# Detects the usage of the "net.exe" command to start a service using the "start" flag
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = 2a072a96-a086-49fa-bcb5-15cc5a619093
RuleName = Start Windows Service Via Net.EXE
EventType = Process.Start
Tag = proc-start-start-windows-service-via-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1569.002"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and icontains(Process.CommandLine, " start ")


[ThreatDetectionRule platform=Windows]
# Detects the execution of Notepad to open a file that has the string "password" which may indicate unauthorized access to credentials or suspicious activity.
# Author: The DFIR Report
RuleId = 3b4e950b-a3ea-44d3-877e-432071990709
RuleName = Notepad Password Files Discovery
EventType = Process.Start
Tag = proc-start-notepad-password-files-discovery
RiskScore = 25
Annotation = {"mitre_attack": ["T1083"], "author": "The DFIR Report"}
Query = iendswith(Parent.Path, "\\explorer.exe") and iendswith(Process.Path, "\\notepad.exe") and (Process.CommandLine like r"%password%.txt" or Process.CommandLine like r"%password%.csv" or Process.CommandLine like r"%password%.doc" or Process.CommandLine like r"%password%.xls")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the deletion of the TeamViewer log files which may indicate an attempt to destroy forensic evidence
# Author: frack113
RuleId = b1decb61-ed83-4339-8e95-53ea51901720
RuleName = TeamViewer Log File Deleted
EventType = File.Delete
Tag = teamviewer-log-file-deleted
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.004"], "author": "frack113"}
Query = icontains(File.Path, "\\TeamViewer\_") and iendswith(File.Path, ".log") and not Process.Path == "C:\\Windows\\system32\\svchost.exe"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects potential suspicious execution of a GUID like folder name located in a suspicious location such as %TEMP% as seen being used in IcedID attacks.
# Use this rule to hunt for potentially suspicious activity stemming from uncommon folders.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 90b63c33-2b97-4631-a011-ceb0f47b77c3
RuleName = Potential Suspicious Execution From GUID Like Folder Names
EventType = Process.Start
Tag = proc-start-potential-suspicious-execution-from-guid-like-folder-names
RiskScore = 25
Annotation = {"mitre_attack": ["T1027"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "\\AppData\\Roaming\\") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\")) and icontains(Process.CommandLine, "\\{") and icontains(Process.CommandLine, "}\\") and not (icontains(Process.Path, "\\{") and icontains(Process.Path, "}\\") or isnull(Process.Path) or Process.Path == "C:\\Windows\\System32\\drvinst.exe" or Process.Path in ["C:\\Windows\\System32\\msiexec.exe", "C:\\Windows\\SysWOW64\\msiexec.exe"])


[ThreatDetectionRule platform=Windows]
# Detects abusing Azure Browser SSO by requesting OAuth 2.0 refresh tokens for an Azure-AD-authenticated Windows user (i.e. the machine is joined to Azure AD and a user logs in with their Azure AD account) wanting to perform SSO authentication in the browser.
# An attacker can use this to authenticate to Azure AD in a browser as that user.
# Author: Den Iuzvyk
RuleId = 50f852e6-af22-4c78-9ede-42ef36aa3453
RuleName = Potential Azure Browser SSO Abuse
EventType = Image.Load
Tag = potential-azure-browser-sso-abuse
RiskScore = 25
Annotation = {"mitre_attack": ["T1574.001"], "author": "Den Iuzvyk"}
Query = Image.Path == "C:\\Windows\\System32\\MicrosoftAccountTokenProvider.dll" and not ((istartswith(Process.Path, "C:\\Windows\\System32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\")) and iendswith(Process.Path, "\\BackgroundTaskHost.exe")) and not ((istartswith(Process.Path, "C:\\Program Files\\Microsoft Visual Studio\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft Visual Studio\\")) and iendswith(Process.Path, "\\IDE\\devenv.exe") or Process.Path in ["C:\\Program Files (x86)\\Internet Explorer\\iexplore.exe", "C:\\Program Files\\Internet Explorer\\iexplore.exe"] or istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeWebView\\Application\\") or iendswith(Process.Path, "\\WindowsApps\\MicrosoftEdge.exe") or Process.Path in ["C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe", "C:\\Program Files\\Microsoft\\Edge\\Application\\msedge.exe"] or (istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeCore\\") or istartswith(Process.Path, "C:\\Program Files\\Microsoft\\EdgeCore\\")) and (iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\msedgewebview2.exe")) or iendswith(Process.Path, "\\AppData\\Local\\Microsoft\\OneDrive\\OneDrive.exe") or isnull(Process.Path))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Adversaries may look for details about the network configuration and settings of systems they access or through information discovery of remote systems
# Author: frack113, Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'
RuleId = 0e4164da-94bc-450d-a7be-a4b176179f1f
RuleName = Firewall Configuration Discovery Via Netsh.EXE
EventType = Process.Start
Tag = proc-start-firewall-configuration-discovery-via-netsh.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1016"], "author": "frack113, Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'"}
Query = (iendswith(Process.Path, "\\netsh.exe") or Process.Name == "netsh.exe") and icontains(Process.CommandLine, "netsh") and icontains(Process.CommandLine, "show ") and icontains(Process.CommandLine, "firewall ") and (icontains(Process.CommandLine, "config ") or icontains(Process.CommandLine, "state ") or icontains(Process.CommandLine, "rule ") or icontains(Process.CommandLine, "name=all"))


[ThreatDetectionRule platform=Windows]
# Detects the registration of a new ODBC driver.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 3390fbef-c98d-4bdd-a863-d65ed7c610dd
RuleName = New ODBC Driver Registered
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = new-odbc-driver-registered
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\ODBC\\ODBCINST.INI\\") and iendswith(Reg.TargetObject, "\\Driver") and not (icontains(Reg.TargetObject, "\\SQL Server\\") and Reg.Value.Data == "\%WINDIR\%\\System32\\SQLSRV32.dll") and not (icontains(Reg.TargetObject, "\\Microsoft Access ") and istartswith(Reg.Value.Data, "C:\\Progra") and iendswith(Reg.Value.Data, "\\ACEODBC.DLL") or icontains(Reg.TargetObject, "\\Microsoft Excel Driver") and istartswith(Reg.Value.Data, "C:\\Progra") and iendswith(Reg.Value.Data, "\\ACEODBC.DLL"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects processes loading "System.Drawing.ni.dll". This could be an indicator of potential Screen Capture.
# Author: Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)
RuleId = 666ecfc7-229d-42b8-821e-1a8f8cb7057c
RuleName = System Drawing DLL Load
EventType = Image.Load
Tag = system-drawing-dll-load
