[ThreatDetectionRule platform=Windows]
# Detects the creation of a new PowerShell module ".psm1", ".psd1", ".dll", ".ps1", etc.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = e36941d0-c0f0-443f-bc6f-cb2952eb69ea
RuleName = PowerShell Module File Created
EventType = File.Create
Tag = powershell-module-file-created
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and (icontains(File.Path, "\\WindowsPowerShell\\Modules\\") or icontains(File.Path, "\\PowerShell\\7\\Modules\\"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects nltest commands that can be used for information discovery
# Author: Arun Chauhan
RuleId = 903076ff-f442-475a-b667-4f246bcc203b
RuleName = Nltest.EXE Execution
EventType = Process.Start
Tag = proc-start-nltest.exe-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1016", "T1018", "T1482"], "author": "Arun Chauhan"}
Query = iendswith(Process.Path, "\\nltest.exe") or Process.Name == "nltestrk.exe"


[ThreatDetectionRule platform=Windows]
# Detects the execution of the "jsc.exe" (JScript Compiler).
# Attacker might abuse this in order to compile JScript files on the fly and bypassing application whitelisting.
# Author: frack113
RuleId = 52788a70-f1da-40dd-8fbd-73b5865d6568
RuleName = JScript Compiler Execution
EventType = Process.Start
Tag = proc-start-jscript-compiler-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1127"], "author": "frack113"}
Query = iendswith(Process.Path, "\\jsc.exe") or Process.Name == "jsc.exe"


[ThreatDetectionRule platform=Windows]
# Detects the stopping of a Windows service via the PowerShell Cmdlet "Stop-Service"
# Author: Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)
RuleId = c49c5062-0966-4170-9efd-9968c913a6cf
RuleName = Stop Windows Service Via PowerShell Stop-Service
EventType = Process.Start
Tag = proc-start-stop-windows-service-via-powershell-stop-service
RiskScore = 25
Annotation = {"mitre_attack": ["T1489"], "author": "Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)"}
Query = (Process.Name in ["PowerShell.EXE", "pwsh.dll"] or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and icontains(Process.CommandLine, "Stop-Service ")


[ThreatDetectionRule platform=Windows]
# Detects DNS server discovery via LDAP query requests from uncommon applications
# Author: frack113
RuleId = a21bcd7e-38ec-49ad-b69a-9ea17e69509e
RuleName = DNS Server Discovery Via LDAP Query
EventType = Dns.Query
Tag = dns-server-discovery-via-ldap-query
RiskScore = 25
Annotation = {"mitre_attack": ["T1482"], "author": "frack113"}
Query = istartswith(Dns.QueryRequest, "\_ldap.") and not (icontains(Process.Path, ":\\Program Files\\") or icontains(Process.Path, ":\\Program Files (x86)\\") or icontains(Process.Path, ":\\Windows\\") or icontains(Process.Path, ":\\ProgramData\\Microsoft\\Windows Defender\\Platform\\") and iendswith(Process.Path, "\\MsMpEng.exe") or Process.Path == "<unknown process>" or isnull(Process.Path)) and not (istartswith(Process.Path, "C:\\WindowsAzure\\GuestAgent") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\firefox.exe") or iendswith(Process.Path, "\\opera.exe"))
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new service using powershell.
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = c02e96b7-c63a-4c47-bd83-4a9f74afcfb2
RuleName = New Service Creation Using PowerShell
EventType = Process.Start
Tag = proc-start-new-service-creation-using-powershell
RiskScore = 25
Annotation = {"mitre_attack": ["T1543.003"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = icontains(Process.CommandLine, "New-Service") and icontains(Process.CommandLine, "-BinaryPathName")


[ThreatDetectionRule platform=Windows]
# Detects attempts to query system information directly from the Windows Registry.
# Author: lazarg
RuleId = 0022869c-49f7-4ff2-ba03-85ac42ddac58
RuleName = System Information Discovery via Registry Queries
EventType = Process.Start
Tag = proc-start-system-information-discovery-via-registry-queries
RiskScore = 25
Annotation = {"mitre_attack": ["T1082"], "author": "lazarg"}
Query = (iendswith(Process.Path, "\\reg.exe") and icontains(Process.CommandLine, "query") and (icontains(Process.CommandLine, "-v") or icontains(Process.CommandLine, "/v") or icontains(Process.CommandLine, "–v") or icontains(Process.CommandLine, "—v") or icontains(Process.CommandLine, "―v")) or (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and (icontains(Process.CommandLine, "Get-ItemPropertyValue") or icontains(Process.CommandLine, "gpv"))) and (icontains(Process.CommandLine, "\\SOFTWARE\\Microsoft\\Windows Defender") or icontains(Process.CommandLine, "\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion") or icontains(Process.CommandLine, "\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Uninstall") or icontains(Process.CommandLine, "\\SYSTEM\\CurrentControlSet\\Control\\TimeZoneInformation") or icontains(Process.CommandLine, "\\SYSTEM\\CurrentControlSet\\Services"))


[ThreatDetectionRule platform=Windows]
# Detects modification of the registry settings used for Internet Explorer and other Windows components that use these settings. An attacker can abuse this registry key to add a domain to the trusted sites Zone or insert JavaScript for persistence
# Author: frack113
RuleId = d88d0ab2-e696-4d40-a2ed-9790064e66b3
RuleName = Modification of IE Registry Settings
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = modification-of-ie-registry-settings
RiskScore = 25
Annotation = {"mitre_attack": ["T1112"], "author": "frack113"}
Query = icontains(Reg.TargetObject, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Internet Settings") and not (istartswith(Reg.Value.Data, "DWORD") or isnull(Reg.Value.Data) or Reg.Value.Data in ["Cookie:", "Visited:", "(Empty)"] or icontains(Reg.TargetObject, "\\Cache") or icontains(Reg.TargetObject, "\\ZoneMap") or icontains(Reg.TargetObject, "\\WpadDecision") or Reg.Value.Data == "Binary Data") and not icontains(Reg.TargetObject, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\Accepted Documents")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detect indirect command execution via Program Compatibility Assistant pcwrun.exe
# Author: A. Sungurov , oscd.community
RuleId = b97cd4b1-30b8-4a9d-bd72-6293928d52bc
RuleName = Indirect Command Execution By Program Compatibility Wizard
EventType = Process.Start
Tag = proc-start-indirect-command-execution-by-program-compatibility-wizard
RiskScore = 25
Annotation = {"mitre_attack": ["T1218"], "author": "A. Sungurov , oscd.community"}
Query = iendswith(Parent.Path, "\\pcwrun.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of "tar.exe" in order to extract compressed file.
# Adversaries may abuse various utilities in order to decompress data to avoid detection.
# Author: AdmU3
RuleId = bf361876-6620-407a-812f-bfe11e51e924
RuleName = Compressed File Extraction Via Tar.EXE
EventType = Process.Start
Tag = proc-start-compressed-file-extraction-via-tar.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1560", "T1560.001"], "author": "AdmU3"}
Query = (iendswith(Process.Path, "\\tar.exe") or Process.Name == "bsdtar") and icontains(Process.CommandLine, "-x")


[ThreatDetectionRule platform=Windows]
# Detects file association changes using the builtin "assoc" command.
# When a file is opened, the default program used to open the file (also called the file association or handler) is checked. File association selections are stored in the Windows Registry and can be edited by users, administrators, or programs that have Registry access or by administrators using the built-in assoc utility. Applications can modify the file association for a given file extension to call an arbitrary program when a file with the given extension is opened.
# Author: Timur Zinniatullin, oscd.community
RuleId = 3d3aa6cd-6272-44d6-8afc-7e88dfef7061
RuleName = Change Default File Association Via Assoc
EventType = Process.Start
Tag = proc-start-change-default-file-association-via-assoc
RiskScore = 25
Annotation = {"mitre_attack": ["T1546.001"], "author": "Timur Zinniatullin, oscd.community"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and icontains(Process.CommandLine, "assoc")


[ThreatDetectionRule platform=Windows]
# Detects non-interactive PowerShell activity by looking at the "powershell" process with a non-user GUI process such as "explorer.exe" as a parent.
# Author: Roberto Rodriguez @Cyb3rWard0g (rule), oscd.community (improvements)
RuleId = f4bbd493-b796-416e-bbf2-121235348529
RuleName = Non Interactive PowerShell Process Spawned
EventType = Process.Start
Tag = proc-start-non-interactive-powershell-process-spawned
RiskScore = 25
Annotation = {"mitre_attack": ["T1059.001"], "author": "Roberto Rodriguez @Cyb3rWard0g (rule), oscd.community (improvements)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and not (iendswith(Parent.Path, ":\\Windows\\explorer.exe") or iendswith(Parent.Path, ":\\Windows\\System32\\CompatTelRunner.exe") or iendswith(Parent.Path, ":\\Windows\\SysWOW64\\explorer.exe") or Parent.Path == ":\\$WINDOWS.~BT\\Sources\\SetupHost.exe") and not (iendswith(Parent.Path, "\\AppData\\Local\\Programs\\Microsoft VS Code\\Code.exe") and icontains(Parent.CommandLine, " --ms-enable-electron-run-as-node ") or icontains(Parent.Path, ":\\Program Files\\WindowsApps\\Microsoft.WindowsTerminal\_") and iendswith(Parent.Path, "\\WindowsTerminal.exe") or iendswith(Parent.Path, ":\\Program Files\\Windows Defender Advanced Threat Protection\\SenseIR.exe"))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects abusing Azure Browser SSO by requesting OAuth 2.0 refresh tokens for an Azure-AD-authenticated Windows user (i.e. the machine is joined to Azure AD and a user logs in with their Azure AD account) wanting to perform SSO authentication in the browser.
# An attacker can use this to authenticate to Azure AD in a browser as that user.
# Author: Den Iuzvyk
RuleId = 50f852e6-af22-4c78-9ede-42ef36aa3453
RuleName = Potential Azure Browser SSO Abuse
EventType = Image.Load
Tag = potential-azure-browser-sso-abuse
RiskScore = 25
Annotation = {"mitre_attack": ["T1574.001"], "author": "Den Iuzvyk"}
Query = Image.Path == "C:\\Windows\\System32\\MicrosoftAccountTokenProvider.dll" and not ((istartswith(Process.Path, "C:\\Windows\\System32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\")) and iendswith(Process.Path, "\\BackgroundTaskHost.exe")) and not ((istartswith(Process.Path, "C:\\Program Files\\Microsoft Visual Studio\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft Visual Studio\\")) and iendswith(Process.Path, "\\IDE\\devenv.exe") or Process.Path in ["C:\\Program Files (x86)\\Internet Explorer\\iexplore.exe", "C:\\Program Files\\Internet Explorer\\iexplore.exe"] or istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeWebView\\Application\\") or iendswith(Process.Path, "\\WindowsApps\\MicrosoftEdge.exe") or Process.Path in ["C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe", "C:\\Program Files\\Microsoft\\Edge\\Application\\msedge.exe"] or (istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeCore\\") or istartswith(Process.Path, "C:\\Program Files\\Microsoft\\EdgeCore\\")) and (iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\msedgewebview2.exe")) or iendswith(Process.Path, "\\AppData\\Local\\Microsoft\\OneDrive\\OneDrive.exe") or isnull(Process.Path))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# This tool enables enumeration and exporting of all DNS records in the zone for recon purposes of internal networks Python 3 and python.exe must be installed,
# Usee to Query/modify DNS records for Active Directory integrated DNS via LDAP
# Author: frack113
RuleId = 26d3f0a2-f514-4a3f-a8a7-e7e48a8d9160
RuleName = PUA - Adidnsdump Execution
EventType = Process.Start
Tag = proc-start-pua-adidnsdump-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1018"], "author": "frack113"}
Query = iendswith(Process.Path, "\\python.exe") and icontains(Process.CommandLine, "adidnsdump")

