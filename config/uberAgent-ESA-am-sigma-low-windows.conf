cess.Path, "\\AVAST Software\\") or icontains(Process.Path, "\\Kinza\\") or icontains(Process.Path, "\\Mozilla\\") or icontains(Process.Path, "\\8pecxstudios\\") or icontains(Process.Path, "\\FlashPeak\\") or icontains(Process.Path, "\\Moonchild Productions\\") or Process.Path == "System" and Parent.Path == "Idle" or istartswith(Process.Path, "C:\\Program Files\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\") or istartswith(Process.Path, "C:\\Windows\\System32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\")) and not (icontains(Process.Path, "\\Microsoft\\Windows Defender\\") and (iendswith(Process.Path, "\\MpCopyAccelerator.exe") or iendswith(Process.Path, "\\MsMpEng.exe")) or iendswith(Process.Path, "\\thor.exe") or iendswith(Process.Path, "\\thor64.exe") or Parent.Path == "C:\\Windows\\System32\\msiexec.exe" or iendswith(Process.Path, "\\everything.exe"))
