RuleName = Interesting Service Enumeration Via Sc.EXE
EventType = Process.Start
Tag = proc-start-interesting-service-enumeration-via-sc.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1003"], "author": "Swachchhanda Shrawan Poudel"}
Query = (iendswith(Process.Path, "\\sc.exe") or Process.Name == "sc.exe") and icontains(Process.CommandLine, "query") and icontains(Process.CommandLine, "termservice")


[ThreatDetectionRule platform=Windows]
# Detects the execution of Microsoft Quick Assist tool "QuickAssist.exe". This utility can be used by attackers to gain remote access.
# Author: Muhammad Faisal (@faisalusuf)
RuleId = e20b5b14-ce93-4230-88af-981983ef6e74
RuleName = QuickAssist Execution
EventType = Process.Start
Tag = proc-start-quickassist-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1219.002"], "author": "Muhammad Faisal (@faisalusuf)"}
Query = iendswith(Process.Path, "\\QuickAssist.exe")


[ThreatDetectionRule platform=Windows]
# Detects the execution of clip.exe in order to copy data to the clipboard. Adversaries may collect data stored in the clipboard from users copying information within or between applications.
# Author: frack113
RuleId = ddeff553-5233-4ae9-bbab-d64d2bd634be
RuleName = Data Copied To Clipboard Via Clip.EXE
EventType = Process.Start
Tag = proc-start-data-copied-to-clipboard-via-clip.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1115"], "author": "frack113"}
Query = iendswith(Process.Path, "\\clip.exe") or Process.Name == "clip.exe"


[ThreatDetectionRule platform=Windows]
# Use of reg to get MachineGuid information
# Author: frack113
RuleId = f5240972-3938-4e56-8e4b-e33893176c1f
RuleName = Suspicious Query of MachineGUID
EventType = Process.Start
Tag = proc-start-suspicious-query-of-machineguid
RiskScore = 25
Annotation = {"mitre_attack": ["T1082"], "author": "frack113"}
Query = iendswith(Process.Path, "\\reg.exe") and icontains(Process.CommandLine, "SOFTWARE\\Microsoft\\Cryptography") and icontains(Process.CommandLine, "/v ") and icontains(Process.CommandLine, "MachineGuid")


[ThreatDetectionRule platform=Windows]
# Detects execution of "tar.exe" in order to create a compressed file.
# Adversaries may abuse various utilities to compress or encrypt data before exfiltration.
# Author: Nasreddine Bencherchali (Nextron Systems), AdmU3
RuleId = 418a3163-3247-4b7b-9933-dcfcb7c52ea9
RuleName = Compressed File Creation Via Tar.EXE
EventType = Process.Start
Tag = proc-start-compressed-file-creation-via-tar.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1560", "T1560.001"], "author": "Nasreddine Bencherchali (Nextron Systems), AdmU3"}
Query = (iendswith(Process.Path, "\\tar.exe") or Process.Name == "bsdtar") and (icontains(Process.CommandLine, "-c") or icontains(Process.CommandLine, "-r") or icontains(Process.CommandLine, "-u"))


[ThreatDetectionRule platform=Windows]
# Detects the creation of a process via the Windows task manager. This might be an attempt to bypass UAC
# Author: Florian Roth (Nextron Systems)
RuleId = 3d7679bd-0c00-440c-97b0-3f204273e6c7
RuleName = New Process Created Via Taskmgr.EXE
EventType = Process.Start
Tag = proc-start-new-process-created-via-taskmgr.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1036"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\taskmgr.exe") and not (iendswith(Process.Path, ":\\Windows\\System32\\mmc.exe") or iendswith(Process.Path, ":\\Windows\\System32\\resmon.exe") or iendswith(Process.Path, ":\\Windows\\System32\\Taskmgr.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new office macro files on the systems
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 91174a41-dc8f-401b-be89-7bfc140612a0
RuleName = Office Macro File Creation
EventType = File.Create
Tag = office-macro-file-creation
RiskScore = 25
Annotation = {"mitre_attack": ["T1566.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(File.Path, ".docm") or iendswith(File.Path, ".dotm") or iendswith(File.Path, ".xlsm") or iendswith(File.Path, ".xltm") or iendswith(File.Path, ".potm") or iendswith(File.Path, ".pptm")) and not ((istartswith(Process.Path, "C:\\Program Files\\Microsoft Office\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft Office\\")) and (iendswith(Process.Path, "\\WINWORD.EXE") or iendswith(Process.Path, "\\EXCEL.EXE") or iendswith(Process.Path, "\\POWERPNT.EXE")) and icontains(File.Path, "\\~$"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the deletion of the TeamViewer log files which may indicate an attempt to destroy forensic evidence
# Author: frack113
RuleId = b1decb61-ed83-4339-8e95-53ea51901720
RuleName = TeamViewer Log File Deleted
EventType = File.Delete
Tag = teamviewer-log-file-deleted
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.004"], "author": "frack113"}
Query = icontains(File.Path, "\\TeamViewer\_") and iendswith(File.Path, ".log") and not Process.Path == "C:\\Windows\\system32\\svchost.exe"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# When C# is compiled dynamically, a .cmdline file will be created as a part of the process.
# Certain processes are not typically observed compiling C# code, but can do so without touching disk.
# This can be used to unpack a payload for execution
# Author: frack113
RuleId = e4a74e34-ecde-4aab-b2fb-9112dd01aed0
RuleName = Dynamic CSharp Compile Artefact
EventType = File.Create
Tag = dynamic-csharp-compile-artefact
RiskScore = 25
Annotation = {"mitre_attack": ["T1027.004"], "author": "frack113"}
Query = iendswith(File.Path, ".cmdline")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new office macro files on the system via an application (browser, mail client).
# This can help identify potential malicious activity, such as the download of macro-enabled documents that could be used for exploitation.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 0e29e3a7-1ad8-40aa-b691-9f82ecd33d66
RuleName = Office Macro File Download
EventType = File.Create
Tag = office-macro-file-download
RiskScore = 25
Annotation = {"mitre_attack": ["T1566.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\RuntimeBroker.exe") or iendswith(Process.Path, "\\outlook.exe") or iendswith(Process.Path, "\\thunderbird.exe") or iendswith(Process.Path, "\\brave.exe") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\firefox.exe") or iendswith(Process.Path, "\\iexplore.exe") or iendswith(Process.Path, "\\maxthon.exe") or iendswith(Process.Path, "\\MicrosoftEdge.exe") or iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\msedgewebview2.exe") or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\safari.exe") or iendswith(Process.Path, "\\seamonkey.exe") or iendswith(Process.Path, "\\vivaldi.exe") or iendswith(Process.Path, "\\whale.exe")) and (iendswith(File.Path, ".docm") or iendswith(File.Path, ".dotm") or iendswith(File.Path, ".xlsm") or iendswith(File.Path, ".xltm") or iendswith(File.Path, ".potm") or iendswith(File.Path, ".pptm") or icontains(File.Path, ".docm:Zone") or icontains(File.Path, ".dotm:Zone") or icontains(File.Path, ".xlsm:Zone") or icontains(File.Path, ".xltm:Zone") or icontains(File.Path, ".potm:Zone") or icontains(File.Path, ".pptm:Zone"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of the "dir" command part of Windows CMD with the "/S" command line flag in order to enumerate files in a specified directory and all subdirectories.
# Author: frack113
RuleId = 7c9340a9-e2ee-4e43-94c5-c54ebbea1006
RuleName = File And SubFolder Enumeration Via Dir Command
EventType = Process.Start
Tag = proc-start-file-and-subfolder-enumeration-via-dir-command
RiskScore = 25
Annotation = {"mitre_attack": ["T1217"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and (Process.CommandLine like r"%dir%-s%" or Process.CommandLine like r"%dir%/s%" or Process.CommandLine like r"%dir%–s%" or Process.CommandLine like r"%dir%—s%" or Process.CommandLine like r"%dir%―s%")


[ThreatDetectionRule platform=Windows]
# Detect the usage of "DirLister.exe" a utility for quickly listing folder or drive contents. It was seen used by BlackCat ransomware to create a list of accessible directories and files.
# Author: frack113
RuleId = b4dc61f5-6cce-468e-a608-b48b469feaa2
RuleName = DirLister Execution
EventType = Process.Start
Tag = proc-start-dirlister-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1083"], "author": "frack113"}
Query = Process.Name == "DirLister.exe" or iendswith(Process.Path, "\\DirLister.exe")


[ThreatDetectionRule platform=Windows]
# Detects DNS queries to "ufile.io", which was seen abused by malware and threat actors as a method for data exfiltration
# Author: yatinwad, TheDFIRReport
RuleId = 1cbbeaaf-3c8c-4e4c-9d72-49485b6a176b
RuleName = DNS Query To Ufile.io
EventType = Dns.Query
Tag = dns-query-to-ufile.io
RiskScore = 25
Annotation = {"mitre_attack": ["T1567.002"], "author": "yatinwad, TheDFIRReport"}
Query = icontains(Dns.QueryRequest, "ufile.io")
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects changes to the "TracingDisabled" key in order to disable ETW logging for services.exe (SCM)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 4f281b83-0200-4b34-bf35-d24687ea57c2
RuleName = ETW Logging Disabled For SCM
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = etw-logging-disabled-for-scm
RiskScore = 25
Annotation = {"mitre_attack": ["T1112", "T1685"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "Software\\Microsoft\\Windows NT\\CurrentVersion\\Tracing\\SCM\\Regular\\TracingDisabled") and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the usage of the "net.exe" command to start a service using the "start" flag
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = 2a072a96-a086-49fa-bcb5-15cc5a619093
RuleName = Start Windows Service Via Net.EXE
EventType = Process.Start
Tag = proc-start-start-windows-service-via-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1569.002"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and icontains(Process.CommandLine, " start ")


[ThreatDetectionRule platform=Windows]
# Attackers may leverage fsutil to enumerated connected drives.
# Author: Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'
RuleId = 63de06b9-a385-40b5-8b32-73f2b9ef84b6
RuleName = Fsutil Drive Enumeration
EventType = Process.Start
Tag = proc-start-fsutil-drive-enumeration
RiskScore = 25
Annotation = {"mitre_attack": ["T1120"], "author": "Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'"}
Query = (iendswith(Process.Path, "\\fsutil.exe") or Process.Name == "fsutil.exe") and icontains(Process.CommandLine, "drives")


[ThreatDetectionRule platform=Windows]
# Detects default PsExec service filename which indicates PsExec service installation and execution
# Author: Thomas Patzke
RuleId = 259e5a6a-b8d2-4c38-86e2-26c5e651361d
RuleName = PsExec Service File Creation
EventType = File.Create
Tag = psexec-service-file-creation
RiskScore = 25
Annotation = {"mitre_attack": ["T1569.002"], "author": "Thomas Patzke"}
Query = iendswith(File.Path, "\\PSEXESVC.exe")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects attempts to enumerate file shares, printer shares and sessions using "net.exe" with the "view" flag.
# Author: Endgame, JHasenbusch (ported for oscd.community)
RuleId = 62510e69-616b-4078-b371-847da438cc03
RuleName = Share And Session Enumeration Using Net.EXE
EventType = Process.Start
Tag = proc-start-share-and-session-enumeration-using-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1018"], "author": "Endgame, JHasenbusch (ported for oscd.community)"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and icontains(Process.CommandLine, "view") and not icontains(Process.CommandLine, "\\\\")


[ThreatDetectionRule platform=Windows]
# Detects the stopping of a Windows service via the "net" utility.
# Author: Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)
RuleId = 88872991-7445-4a22-90b2-a3adadb0e827
RuleName = Stop Windows Service Via Net.EXE
EventType = Process.Start
Tag = proc-start-stop-windows-service-via-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1489"], "author": "Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)"}
Query = (Process.Name in ["net.exe", "net1.exe"] or iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, " stop ")


[ThreatDetectionRule platform=Windows]
# Detects changes to the "ExtErrorInformation" key in order to disable ETW logging for rpcrt4.dll
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 90f342e1-1aaa-4e43-b092-39fda57ed11e
RuleName = ETW Logging Disabled For rpcrt4.dll
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = etw-logging-disabled-for-rpcrt4.dll
RiskScore = 25
Annotation = {"mitre_attack": ["T1112", "T1685"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\Microsoft\\Windows NT\\Rpc\\ExtErrorInformation") and (Reg.Value.Data in ["DWORD (0x00000000)", "DWORD (0x00000002)"])
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the export of the target Registry key to a file.
# Author: Oddvar Moe, Sander Wiebing, oscd.community
RuleId = f0e53e89-8d22-46ea-9db5-9d4796ee2f8a
RuleName = Exports Registry Key To a File
EventType = Process.Start
Tag = proc-start-exports-registry-key-to-a-file
RiskScore = 25
Annotation = {"mitre_attack": ["T1012"], "author": "Oddvar Moe, Sander Wiebing, oscd.community"}
Query = (iendswith(Process.Path, "\\regedit.exe") or Process.Name == "REGEDIT.EXE") and (icontains(Process.CommandLine, " -E ") or icontains(Process.CommandLine, " /E ") or icontains(Process.CommandLine, " –E ") or icontains(Process.CommandLine, " —E ") or icontains(Process.CommandLine, " ―E ")) and not ((icontains(Process.CommandLine, "hklm") or icontains(Process.CommandLine, "hkey\_local\_machine")) and (iendswith(Process.CommandLine, "\\system") or iendswith(Process.CommandLine, "\\sam") or iendswith(Process.CommandLine, "\\security")))


[ThreatDetectionRule platform=Windows]
# Detects the execution of "wmic" with the "group" flag.
# Adversaries may attempt to find local system groups and permission settings.
# The knowledge of local system permission groups can help adversaries determine which groups exist and which users belong to a particular group.
# Adversaries may use this information to determine which users have elevated permissions, such as the users found within the local administrators group.
# Author: frack113
RuleId = 164eda96-11b2-430b-85ff-6a265c15bf32
RuleName = Local Groups Reconnaissance Via Wmic.EXE
EventType = Process.Start
Tag = proc-start-local-groups-reconnaissance-via-wmic.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1069.001"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\wmic.exe") or Process.Name == "wmic.exe") and icontains(Process.CommandLine, " group")


[ThreatDetectionRule platform=Windows]
# Adversaries may attempt to get a listing of network connections to or from the compromised system they are currently accessing or from remote systems by querying for information over the network.
# Author: frack113
RuleId = 1c67a717-32ba-409b-a45d-0fb704a73a81
RuleName = System Network Connections Discovery Via Net.EXE
EventType = Process.Start
Tag = proc-start-system-network-connections-discovery-via-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1049"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and (iendswith(Process.CommandLine, " use") or iendswith(Process.CommandLine, " sessions") or icontains(Process.CommandLine, " use ") or icontains(Process.CommandLine, " sessions "))


[ThreatDetectionRule platform=Windows]
# Detects the execution of Notepad to open a file that has the string "password" which may indicate unauthorized access to credentials or suspicious activity.
# Author: The DFIR Report
RuleId = 3b4e950b-a3ea-44d3-877e-432071990709
RuleName = Notepad Password Files Discovery
EventType = Process.Start
Tag = proc-start-notepad-password-files-discovery
RiskScore = 25
Annotation = {"mitre_attack": ["T1083"], "author": "The DFIR Report"}
Query = iendswith(Parent.Path, "\\explorer.exe") and iendswith(Process.Path, "\\notepad.exe") and (Process.CommandLine like r"%password%.txt" or Process.CommandLine like r"%password%.csv" or Process.CommandLine like r"%password%.doc" or Process.CommandLine like r"%password%.xls")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new service using the "sc.exe" utility.
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = 85ff530b-261d-48c6-a441-facaa2e81e48
RuleName = New Service Creation Using Sc.EXE
EventType = Process.Start
Tag = proc-start-new-service-creation-using-sc.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1543.003"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = iendswith(Process.Path, "\\sc.exe") and icontains(Process.CommandLine, "create") and icontains(Process.CommandLine, "binPath") and not ((istartswith(Parent.Path, "C:\\Program Files (x86)\\Dropbox\\Client\\") or istartswith(Parent.Path, "C:\\Program Files\\Dropbox\\Client\\")) and iendswith(Parent.Path, "\\Dropbox.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects specific combinations of encoding methods in PowerShell via the commandline
# Author: Teymur Kheirkhabarov (idea), Vasiliy Burov (rule), oscd.community, Tim Shelton
RuleId = cdf05894-89e7-4ead-b2b0-0a5f97a90f2f
RuleName = Potential Encoded PowerShell Patterns In CommandLine
EventType = Process.Start
Tag = proc-start-potential-encoded-powershell-patterns-in-commandline
RiskScore = 25
Annotation = {"mitre_attack": ["T1027", "T1059.001"], "author": "Teymur Kheirkhabarov (idea), Vasiliy Burov (rule), oscd.community, Tim Shelton"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and ((icontains(Process.CommandLine, "ToInt") or icontains(Process.CommandLine, "ToDecimal") or icontains(Process.CommandLine, "ToByte") or icontains(Process.CommandLine, "ToUint") or icontains(Process.CommandLine, "ToSingle") or icontains(Process.CommandLine, "ToSByte")) and (icontains(Process.CommandLine, "ToChar") or icontains(Process.CommandLine, "ToString") or icontains(Process.CommandLine, "String")) or icontains(Process.CommandLine, "char") and icontains(Process.CommandLine, "join") or icontains(Process.CommandLine, "split") and icontains(Process.CommandLine, "join"))


[ThreatDetectionRule platform=Windows]
# Detects execution of findstr with the "s" and "i" flags for a "subfolder" and "insensitive" search respectively. Attackers sometimes leverage this built-in utility to search the system for interesting files or filter through results of commands.
# Author: Furkan CALISKAN, @caliskanfurkan_, @oscd_initiative, Nasreddine Bencherchali (Nextron Systems)
RuleId = 04936b66-3915-43ad-a8e5-809eadfd1141
RuleName = Insensitive Subfolder Search Via Findstr.EXE
EventType = Process.Start
Tag = proc-start-insensitive-subfolder-search-via-findstr.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1218", "T1564.004", "T1552.001", "T1105"], "author": "Furkan CALISKAN, @caliskanfurkan_, @oscd_initiative, Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "findstr") or iendswith(Process.Path, "findstr.exe") or Process.Name == "FINDSTR.EXE") and (icontains(Process.CommandLine, " -s ") or icontains(Process.CommandLine, " /s ") or icontains(Process.CommandLine, " –s ") or icontains(Process.CommandLine, " —s ") or icontains(Process.CommandLine, " ―s ")) and (icontains(Process.CommandLine, " -i ") or icontains(Process.CommandLine, " /i ") or icontains(Process.CommandLine, " –i ") or icontains(Process.CommandLine, " —i ") or icontains(Process.CommandLine, " ―i "))


[ThreatDetectionRule platform=Windows]
# Use of hostname to get information
# Author: frack113
RuleId = 7be5fb68-f9ef-476d-8b51-0256ebece19e
RuleName = Suspicious Execution of Hostname
EventType = Process.Start
Tag = proc-start-suspicious-execution-of-hostname
RiskScore = 25
Annotation = {"mitre_attack": ["T1082"], "author": "frack113"}
Query = iendswith(Process.Path, "\\HOSTNAME.EXE")


[ThreatDetectionRule platform=Windows]
# Adversaries may enumerate browser bookmarks to learn more about compromised hosts.
# Browser bookmarks may reveal personal information about users (ex: banking sites, interests, social media, etc.) as well as details about
# internal network resources such as servers, tools/dashboards, or other related infrastructure.
# Author: frack113, Nasreddine Bencherchali (Nextron Systems)
RuleId = 725a9768-0f5e-4cb3-aec2-bc5719c6831a
RuleName = Suspicious Where Execution
EventType = Process.Start
Tag = proc-start-suspicious-where-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1217"], "author": "frack113, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\where.exe") or Process.Name == "where.exe") and (icontains(Process.CommandLine, "places.sqlite") or icontains(Process.CommandLine, "cookies.sqlite") or icontains(Process.CommandLine, "formhistory.sqlite") or icontains(Process.CommandLine, "logins.json") or icontains(Process.CommandLine, "key4.db") or icontains(Process.CommandLine, "key3.db") or icontains(Process.CommandLine, "sessionstore.jsonlz4") or icontains(Process.CommandLine, "History") or icontains(Process.CommandLine, "Bookmarks") or icontains(Process.CommandLine, "Cookies") or icontains(Process.CommandLine, "Login Data"))


[ThreatDetectionRule platform=Windows]
# Detects execution of the builtin "del"/"erase" commands in order to delete files.
# Adversaries may delete files left behind by the actions of their intrusion activity.
# Malware, tools, or other non-native files dropped or created on a system by an adversary may leave traces to indicate to what was done within a network and how.
# Removal of these files can occur during an intrusion, or as part of a post-intrusion process to minimize the adversary's footprint.
# Author: frack113
RuleId = 379fa130-190e-4c3f-b7bc-6c8e834485f3
RuleName = File Deletion Via Del
EventType = Process.Start
Tag = proc-start-file-deletion-via-del
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.004"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and (icontains(Process.CommandLine, "del ") or icontains(Process.CommandLine, "erase ")) and (icontains(Process.CommandLine, " -f") or icontains(Process.CommandLine, " /f") or icontains(Process.CommandLine, " –f") or icontains(Process.CommandLine, " —f") or icontains(Process.CommandLine, " ―f") or icontains(Process.CommandLine, " -s") or icontains(Process.CommandLine, " /s") or icontains(Process.CommandLine, " –s") or icontains(Process.CommandLine, " —s") or icontains(Process.CommandLine, " ―s") or icontains(Process.CommandLine, " -q") or icontains(Process.CommandLine, " /q") or icontains(Process.CommandLine, " –q") or icontains(Process.CommandLine, " —q") or icontains(Process.CommandLine, " ―q"))


[ThreatDetectionRule platform=Windows]
# Detects the enabling of the PowerShell script execution policy. Once enabled, this policy allows scripts to be executed.
# Author: Nasreddine Bencherchali (Nextron Systems), Thurein Oo
RuleId = 8218c875-90b9-42e2-b60d-0b0069816d10
RuleName = PowerShell Script Execution Policy Enabled
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = powershell-script-execution-policy-enabled
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems), Thurein Oo"}
Query = iendswith(Reg.TargetObject, "\\Policies\\Microsoft\\Windows\\PowerShell\\EnableScripts") and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the execution of "BitLockerToGo.EXE".
# BitLocker To Go is BitLocker Drive Encryption on removable data drives. This feature includes the encryption of, USB flash drives, SD cards, External hard disk drives, Other drives that are formatted by using the NTFS, FAT16, FAT32, or exFAT file system.
# This is a rarely used application and usage of it at all is worth investigating.
# Malware such as Lumma stealer has been seen using this process as a target for process hollowing.
# Author: Josh Nickels, mttaggart
RuleId = 7f2376f9-42ee-4dfc-9360-fecff9a88fc8
RuleName = BitLockerTogo.EXE Execution
EventType = Process.Start
Tag = proc-start-bitlockertogo.exe-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1218"], "author": "Josh Nickels, mttaggart"}
Query = iendswith(Process.Path, "\\BitLockerToGo.exe")


[ThreatDetectionRule platform=Windows]
# Detects the registration of a new ODBC driver.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 3390fbef-c98d-4bdd-a863-d65ed7c610dd
RuleName = New ODBC Driver Registered
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = new-odbc-driver-registered
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\ODBC\\ODBCINST.INI\\") and iendswith(Reg.TargetObject, "\\Driver") and not (icontains(Reg.TargetObject, "\\SQL Server\\") and Reg.Value.Data == "\%WINDIR\%\\System32\\SQLSRV32.dll") and not (icontains(Reg.TargetObject, "\\Microsoft Access ") and istartswith(Reg.Value.Data, "C:\\Progra") and iendswith(Reg.Value.Data, "\\ACEODBC.DLL") or icontains(Reg.TargetObject, "\\Microsoft Excel Driver") and istartswith(Reg.Value.Data, "C:\\Progra") and iendswith(Reg.Value.Data, "\\ACEODBC.DLL"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the creation of files in a specific location by ScreenConnect RMM.
# ScreenConnect has feature to remotely execute binaries on a target machine. These binaries will be dropped to ":\Users\<username>\Documents\ConnectWiseControl\Temp\" before execution.
# Author: Ali Alwashali
RuleId = 0afecb6e-6223-4a82-99fb-bf5b981e92a5
RuleName = Remote Access Tool - ScreenConnect Temporary File
EventType = File.Create
Tag = remote-access-tool-screenconnect-temporary-file
RiskScore = 25
Annotation = {"mitre_attack": ["T1059.003"], "author": "Ali Alwashali"}
Query = iendswith(Process.Path, "\\ScreenConnect.WindowsClient.exe") and icontains(File.Path, "\\Documents\\ConnectWiseControl\\Temp\\")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Identifies use of various commands to query a systems time. This technique may be used before executing a scheduled task or to discover the time zone of a target system.
# Author: E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community
RuleId = b243b280-65fe-48df-ba07-6ddea7646427
RuleName = Discovery of a System Time
EventType = Process.Start
Tag = proc-start-discovery-of-a-system-time
RiskScore = 25
Annotation = {"mitre_attack": ["T1124"], "author": "E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, "time") or iendswith(Process.Path, "\\w32tm.exe") and icontains(Process.CommandLine, "tz")


[ThreatDetectionRule platform=Windows]
# Detects the stopping of a Windows service via the "sc.exe" utility
# Author: Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)
RuleId = 81bcb81b-5b1f-474b-b373-52c871aaa7b1
RuleName = Stop Windows Service Via Sc.EXE
EventType = Process.Start
Tag = proc-start-stop-windows-service-via-sc.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1489"], "author": "Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)"}
Query = (Process.Name == "sc.exe" or iendswith(Process.Path, "\\sc.exe")) and icontains(Process.CommandLine, " stop ")


[ThreatDetectionRule platform=Windows]
# Detects the execution of "RegAsm.exe" without a commandline flag or file, which might indicate potential process injection activity.
# Usually "RegAsm.exe" should point to a dedicated DLL file or call the help with the "/?" flag.
# Author: frack113
RuleId = 651f87f7-12db-47f9-84c5-f27b081b94b6
RuleName = RegAsm.EXE Execution Without CommandLine Flags or Files
EventType = Process.Start
Tag = proc-start-regasm.exe-execution-without-commandline-flags-or-files
RiskScore = 25
Annotation = {"mitre_attack": ["T1218.009"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\RegAsm.exe") or Process.Name == "RegAsm.exe") and (iendswith(Process.CommandLine, "RegAsm") or iendswith(Process.CommandLine, "RegAsm.exe") or iendswith(Process.CommandLine, "RegAsm.exe\"") or iendswith(Process.CommandLine, "RegAsm.exe'"))


[ThreatDetectionRule platform=Windows]
# Detects usage of the "systeminfo" command to retrieve information
# Author: frack113
RuleId = 0ef56343-059e-4cb6-adc1-4c3c967c5e46
RuleName = Suspicious Execution of Systeminfo
EventType = Process.Start
Tag = proc-start-suspicious-execution-of-systeminfo
RiskScore = 25
Annotation = {"mitre_attack": ["T1082"], "author": "frack113"}
Query = iendswith(Process.Path, "\\systeminfo.exe") or Process.Name == "sysinfo.exe"


[ThreatDetectionRule platform=Windows]
# Detects execution of Advanced Installer MSIX Package Support Framework (PSF) components, specifically AI_STUBS executables with original filename 'popupwrapper.exe'.
# This activity may indicate malicious MSIX packages build with Advanced Installer leveraging the Package Support Framework to bypass application control restrictions.
# Author: Michael Haag, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = af5732ed-764e-489d-826d-0447c8b36242
RuleName = Windows MSIX Package Support Framework AI_STUBS Execution
EventType = Process.Start
Tag = proc-start-windows-msix-package-support-framework-ai_stubs-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1218", "T1553.005", "T1204.002"], "author": "Michael Haag, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\AI\_STUBS\\AiStubX64Elevated.exe") or iendswith(Process.Path, "\\AI\_STUBS\\AiStubX86Elevated.exe") or iendswith(Process.Path, "\\AI\_STUBS\\AiStubX64.exe") or iendswith(Process.Path, "\\AI\_STUBS\\AiStubX86.exe")) and Process.Name == "popupwrapper.exe"


[ThreatDetectionRule platform=Windows]
# Detects changes to the AppInstaller (winget) admin settings. Such as enabling local manifest installations or disabling installer hash checks
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 6db5eaf9-88f7-4ed9-af7d-9ef2ad12f236
RuleName = Winget Admin Settings Modification
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = winget-admin-settings-modification
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\winget.exe") and istartswith(Reg.TargetObject, "\\REGISTRY\\A\\") and iendswith(Reg.TargetObject, "\\LocalState\\admin\_settings")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects changes to the "MaxMpxCt" registry value.
# MaxMpxCt specifies the maximum outstanding network requests for the server per client, which is used when negotiating a Server Message Block (SMB) connection with a client. Note if the value is set beyond 125 older Windows 9x clients will fail to negotiate.
# Ransomware threat actors and operators (specifically BlackCat) were seen increasing this value in order to handle a higher volume of traffic.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 0e6a9e62-627e-496c-aef5-bfa39da29b5e
RuleName = MaxMpxCt Registry Value Changed
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = maxmpxct-registry-value-changed
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.005"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\Services\\LanmanServer\\Parameters\\MaxMpxCt")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects the execution of regini.exe which can be used to modify registry keys, the changes are imported from one or more text files.
# Author: Eli Salem, Sander Wiebing, oscd.community
RuleId = 5f60740a-f57b-4e76-82a1-15b6ff2cb134
RuleName = Registry Modification Via Regini.EXE
EventType = Process.Start
Tag = proc-start-registry-modification-via-regini.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1112"], "author": "Eli Salem, Sander Wiebing, oscd.community"}
Query = (iendswith(Process.Path, "\\regini.exe") or Process.Name == "REGINI.EXE") and not Process.CommandLine regex ":[^ \\\\]"


[ThreatDetectionRule platform=Windows]
# Detects the execution of a Sysinternals Tool via the creation of the "accepteula" registry key
# Author: Markus Neis
RuleId = 25ffa65d-76d8-4da5-a832-3f2b0136e133
RuleName = PUA - Sysinternal Tool Execution - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = pua-sysinternal-tool-execution-registry
RiskScore = 25
Annotation = {"mitre_attack": ["T1588.002"], "author": "Markus Neis"}
Query = iendswith(Reg.TargetObject, "\\EulaAccepted")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects when when a mounted share is removed. Adversaries may remove share connections that are no longer useful in order to clean up traces of their operation
# Author: oscd.community, @redcanary, Zach Stanford @svch0st
RuleId = cb7c4a03-2871-43c0-9bbb-18bbdb079896
RuleName = Unmount Share Via Net.EXE
EventType = Process.Start
Tag = proc-start-unmount-share-via-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.005"], "author": "oscd.community, @redcanary, Zach Stanford @svch0st"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and icontains(Process.CommandLine, "share") and icontains(Process.CommandLine, "/delete")


[ThreatDetectionRule platform=Windows]
# Detects execution of Chromium based browser in headless mode
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = ef9dcfed-690c-4c5d-a9d1-482cd422225c
RuleName = Browser Execution In Headless Mode
EventType = Process.Start
Tag = proc-start-browser-execution-in-headless-mode
RiskScore = 25
Annotation = {"mitre_attack": ["T1105", "T1564.003"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\brave.exe") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\vivaldi.exe")) and icontains(Process.CommandLine, "--headless")


[ThreatDetectionRule platform=Windows]
# Adversaries may look for details about the network configuration and settings of systems they access or through information discovery of remote systems
# Author: frack113, Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'
RuleId = 0e4164da-94bc-450d-a7be-a4b176179f1f
RuleName = Firewall Configuration Discovery Via Netsh.EXE
EventType = Process.Start
Tag = proc-start-firewall-configuration-discovery-via-netsh.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1016"], "author": "frack113, Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'"}
Query = (iendswith(Process.Path, "\\netsh.exe") or Process.Name == "netsh.exe") and icontains(Process.CommandLine, "netsh") and icontains(Process.CommandLine, "show ") and icontains(Process.CommandLine, "firewall ") and (icontains(Process.CommandLine, "config ") or icontains(Process.CommandLine, "state ") or icontains(Process.CommandLine, "rule ") or icontains(Process.CommandLine, "name=all"))


[ThreatDetectionRule platform=Windows]
# Detects DNS query requests to "update.onelaunch.com". This domain is associated with the OneLaunch adware application.
# When the OneLaunch application is installed it will attempt to get updates from this domain.
# Author: Josh Nickels
RuleId = df68f791-ad95-447f-a271-640a0dab9cf8
RuleName = DNS Query Request To OneLaunch Update Service
EventType = Dns.Query
Tag = dns-query-request-to-onelaunch-update-service
RiskScore = 25
Annotation = {"mitre_attack": ["T1056"], "author": "Josh Nickels"}
Query = Dns.QueryRequest == "update.onelaunch.com" and iendswith(Process.Path, "\\OneLaunch.exe")
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects a non-browser process communicating with the Notion API. This could indicate potential use of a covert C2 channel such as "OffensiveNotion C2"
# Author: Gavin Knapp
RuleId = 7e9cf7b6-e827-11ed-a05b-15959c120003
RuleName = Potentially Suspicious Network Connection To Notion API
EventType = Net.Any
Tag = potentially-suspicious-network-connection-to-notion-api
RiskScore = 25
Annotation = {"mitre_attack": ["T1102"], "author": "Gavin Knapp"}
Query = icontains(Net.Target.Name, "api.notion.com") and not (iendswith(Process.Path, "\\AppData\\Local\\Programs\\Notion\\Notion.exe") or iendswith(Process.Path, "\\brave.exe") or Process.Path in ["C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe", "C:\\Program Files (x86)\\Google\\Chrome\\Application\\chrome.exe"] or Process.Path in ["C:\\Program Files\\Mozilla Firefox\\firefox.exe", "C:\\Program Files (x86)\\Mozilla Firefox\\firefox.exe"] or Process.Path in ["C:\\Program Files (x86)\\Internet Explorer\\iexplore.exe", "C:\\Program Files\\Internet Explorer\\iexplore.exe"] or iendswith(Process.Path, "\\maxthon.exe") or istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeWebView\\Application\\") or iendswith(Process.Path, "\\WindowsApps\\MicrosoftEdge.exe") or Process.Path in ["C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe", "C:\\Program Files\\Microsoft\\Edge\\Application\\msedge.exe"] or (istartswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeCore\\") or istartswith(Process.Path, "C:\\Program Files\\Microsoft\\EdgeCore\\")) and (iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\msedgewebview2.exe")) or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\safari.exe") or iendswith(Process.Path, "\\seamonkey.exe") or iendswith(Process.Path, "\\vivaldi.exe") or iendswith(Process.Path, "\\whale.exe"))
GenericProperty1 = Net.Target.Name


[ThreatDetectionRule platform=Windows]
# Detect suspicious parent processes of well-known Windows processes
# Author: vburov
RuleId = 96036718-71cc-4027-a538-d1587e0006a7
RuleName = Windows Processes Suspicious Parent Directory
EventType = Process.Start
Tag = proc-start-windows-processes-suspicious-parent-directory
RiskScore = 25
Annotation = {"mitre_attack": ["T1036.003", "T1036.005"], "author": "vburov"}
Query = (iendswith(Process.Path, "\\svchost.exe") or iendswith(Process.Path, "\\taskhost.exe") or iendswith(Process.Path, "\\lsm.exe") or iendswith(Process.Path, "\\lsass.exe") or iendswith(Process.Path, "\\services.exe") or iendswith(Process.Path, "\\lsaiso.exe") or iendswith(Process.Path, "\\csrss.exe") or iendswith(Process.Path, "\\wininit.exe") or iendswith(Process.Path, "\\winlogon.exe")) and not (iendswith(Parent.Path, "\\SavService.exe") or iendswith(Parent.Path, "\\ngen.exe") or icontains(Parent.Path, "\\System32\\") or icontains(Parent.Path, "\\SysWOW64\\") or (icontains(Parent.Path, "\\Windows Defender\\") or icontains(Parent.Path, "\\Microsoft Security Client\\")) and iendswith(Parent.Path, "\\MsMpEng.exe") or isnull(Parent.Path) or Parent.Path in ["", "-"])
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the load of RstrtMgr DLL (Restart Manager) by an uncommon process.
# This library has been used during ransomware campaigns to kill processes that would prevent file encryption by locking them (e.g. Conti ransomware, Cactus ransomware). It has also recently been seen used by the BiBi wiper for Windows.
# It could also be used for anti-analysis purposes by shut downing specific processes.
# Author: Luc Génaux
RuleId = 3669afd2-9891-4534-a626-e5cf03810a61
RuleName = Load Of RstrtMgr.DLL By An Uncommon Process
EventType = Image.Load
Tag = load-of-rstrtmgr.dll-by-an-uncommon-process
RiskScore = 25
Annotation = {"mitre_attack": ["T1486", "T1685"], "author": "Luc G\u00e9naux"}
Query = (iendswith(Image.Path, "\\RstrtMgr.dll") or Process.Name == "RstrtMgr.dll") and not (istartswith(Process.Path, "C:\\$WINDOWS.~BT\\'") or istartswith(Process.Path, "C:\\$WinREAgent\\'") or istartswith(Process.Path, "C:\\Program Files (x86)\\'") or istartswith(Process.Path, "C:\\Program Files\\'") or istartswith(Process.Path, "C:\\ProgramData\\'") or istartswith(Process.Path, "C:\\Windows\\explorer.exe'") or istartswith(Process.Path, "C:\\Windows\\SoftwareDistribution\\'") or istartswith(Process.Path, "C:\\Windows\\SysNative\\'") or istartswith(Process.Path, "C:\\Windows\\System32\\'") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\'") or istartswith(Process.Path, "C:\\Windows\\WinSxS\\'") or istartswith(Process.Path, "C:\\WUDownloadCache\\'") or istartswith(Process.Path, "C:\\Users\\'") and icontains(Process.Path, "\\AppData\\Local\\Temp\\is-") and icontains(Process.Path, ".tmp\\") and iendswith(Process.Path, ".tmp") or istartswith(Process.Path, "C:\\Windows\\Temp\\'")) and not (istartswith(Process.Path, "C:\\Users\\") and iendswith(Process.Path, "\\AppData\\Local\\Microsoft\\OneDrive\\OneDriveStandaloneUpdater.exe"))
