[ThreatDetectionRule platform=Windows]
# Detects the creation of scheduled tasks by user accounts via the "schtasks" utility.
# Author: Florian Roth (Nextron Systems)
RuleId = 92626ddd-662c-49e3-ac59-f6535f12d189
RuleName = Scheduled Task Creation Via Schtasks.EXE
EventType = Process.Start
Tag = proc-start-scheduled-task-creation-via-schtasks.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1053.005"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\schtasks.exe") and icontains(Process.CommandLine, " /create ") and not (icontains(Process.User, "AUTHORI") or icontains(Process.User, "AUTORI")) and not ((Parent.Path in ["C:\\Program Files\\Microsoft Office\\root\\integration\\integrator.exe", "C:\\Program Files (x86)\\Microsoft Office\\root\\integration\\integrator.exe"]) and (Process.Path in ["C:\\Windows\\System32\\schtasks.exe", "C:\\Windows\\SysWOW64\\schtasks.exe"]) and icontains(Process.CommandLine, "Microsoft\\Office\\Office Performance Monitor"))
GenericProperty1 = Parent.Path
GenericProperty2 = Process.User


[ThreatDetectionRule platform=Windows]
# Adversaries may look for details about the network configuration and settings of systems they access or through information discovery of remote systems
# Author: frack113, Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'
RuleId = a29c1813-ab1f-4dde-b489-330b952e91ae
RuleName = Suspicious Network Command
EventType = Process.Start
Tag = proc-start-suspicious-network-command
RiskScore = 25
Annotation = {"mitre_attack": ["T1016"], "author": "frack113, Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'"}
Query = Process.CommandLine regex "ipconfig\\s+/all" or Process.CommandLine regex "netsh\\s+interface show interface" or Process.CommandLine regex "arp\\s+-a" or Process.CommandLine regex "nbtstat\\s+-n" or Process.CommandLine regex "net\\s+config" or Process.CommandLine regex "route\\s+print"


[ThreatDetectionRule platform=Windows]
# Detects command lines that contain the 'accepteula' flag which could be a sign of execution of one of the Sysinternals tools
# Author: Markus Neis
RuleId = 7cccd811-7ae9-4ebe-9afd-cb5c406b824b
RuleName = Potential Execution of Sysinternals Tools
EventType = Process.Start
Tag = proc-start-potential-execution-of-sysinternals-tools
RiskScore = 25
Annotation = {"mitre_attack": ["T1588.002"], "author": "Markus Neis"}
Query = icontains(Process.CommandLine, " -accepteula") or icontains(Process.CommandLine, " /accepteula") or icontains(Process.CommandLine, " –accepteula") or icontains(Process.CommandLine, " —accepteula") or icontains(Process.CommandLine, " ―accepteula")


[ThreatDetectionRule platform=Windows]
# Detects potential RDP connection via Mstsc using a local ".rdp" file
# Author: Nasreddine Bencherchali (Nextron Systems), Christopher Peacock @securepeacock
RuleId = 5fdce3ac-e7f9-4ecd-a3aa-a4d78ebbf0af
RuleName = Mstsc.EXE Execution With Local RDP File
EventType = Process.Start
Tag = proc-start-mstsc.exe-execution-with-local-rdp-file
RiskScore = 25
Annotation = {"mitre_attack": ["T1219.002"], "author": "Nasreddine Bencherchali (Nextron Systems), Christopher Peacock @securepeacock"}
Query = (iendswith(Process.Path, "\\mstsc.exe") or Process.Name == "mstsc.exe") and (iendswith(Process.CommandLine, ".rdp") or iendswith(Process.CommandLine, ".rdp\"")) and not (Parent.Path == "C:\\Windows\\System32\\lxss\\wslhost.exe" and icontains(Process.CommandLine, "C:\\ProgramData\\Microsoft\\WSL\\wslg.rdp"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects Deno writing a file from a direct HTTP(s) call and writing to the appdata folder or bringing it's own malicious DLL.
# This behavior may indicate an attempt to execute remotely hosted, potentially malicious files through deno.
# Author: Josh Nickels, Michael Taggart
RuleId = 6c0ce3b6-85e2-49d4-9c3f-6e008ce9796e
RuleName = Suspicious Deno File Written from Remote Source
EventType = File.Create
Tag = suspicious-deno-file-written-from-remote-source
RiskScore = 25
Annotation = {"mitre_attack": ["T1204", "T1059.007", "T1105"], "author": "Josh Nickels, Michael Taggart"}
Query = (icontains(File.Path, "\\deno\\gen\\") or icontains(File.Path, "\\deno\\remote\\https\\")) and icontains(File.Path, ":\\Users\\") and icontains(File.Path, "\\AppData\\")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Adversaries can carry out malicious operations using a virtual instance to avoid detection. This rule is built to detect the registration of the Virtualbox driver or start of a Virtualbox VM.
# Author: Janantha Marasinghe
RuleId = bab049ca-7471-4828-9024-38279a4c04da
RuleName = Virtualbox Driver Installation or Starting of VMs
EventType = Process.Start
Tag = proc-start-virtualbox-driver-installation-or-starting-of-vms
RiskScore = 25
Annotation = {"mitre_attack": ["T1564.006", "T1564"], "author": "Janantha Marasinghe"}
Query = icontains(Process.CommandLine, "VBoxRT.dll,RTR3Init") or icontains(Process.CommandLine, "VBoxC.dll") or icontains(Process.CommandLine, "VBoxDrv.sys") or icontains(Process.CommandLine, "startvm") or icontains(Process.CommandLine, "controlvm")


[ThreatDetectionRule platform=Windows]
# Detects the execution of a system command via the ScreenConnect RMM service.
# Author: Ali Alwashali
RuleId = b1f73849-6329-4069-bc8f-78a604bb8b23
RuleName = Remote Access Tool - ScreenConnect Remote Command Execution
EventType = Process.Start
Tag = proc-start-remote-access-tool-screenconnect-remote-command-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1059.003"], "author": "Ali Alwashali"}
Query = iendswith(Parent.Path, "\\ScreenConnect.ClientService.exe") and (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and icontains(Process.CommandLine, "\\TEMP\\ScreenConnect\\")
GenericProperty1 = Parent.Path


