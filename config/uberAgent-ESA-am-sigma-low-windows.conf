[ThreatDetectionRule platform=Windows]
# Local accounts, System Owner/User discovery using operating systems utilities
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = 502b42de-4306-40b4-9596-6f590c81f073
RuleName = Local Accounts Discovery
EventType = Process.Start
Tag = proc-start-local-accounts-discovery
RiskScore = 25
Annotation = {"mitre_attack": ["T1033", "T1087.001"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = iendswith(Process.Path, "\\cmd.exe") and icontains(Process.CommandLine, " /c") and icontains(Process.CommandLine, "dir ") and icontains(Process.CommandLine, "\\Users\\") and not icontains(Process.CommandLine, " rmdir ") or (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, "user") and not (icontains(Process.CommandLine, "/domain") or icontains(Process.CommandLine, "/add") or icontains(Process.CommandLine, "/delete") or icontains(Process.CommandLine, "/active") or icontains(Process.CommandLine, "/expires") or icontains(Process.CommandLine, "/passwordreq") or icontains(Process.CommandLine, "/scriptpath") or icontains(Process.CommandLine, "/times") or icontains(Process.CommandLine, "/workstations")) or iendswith(Process.Path, "\\whoami.exe") or iendswith(Process.Path, "\\quser.exe") or iendswith(Process.Path, "\\qwinsta.exe") or Process.Name in ["whoami.exe", "quser.exe", "qwinsta.exe"] or iendswith(Process.Path, "\\wmic.exe") and icontains(Process.CommandLine, "useraccount") and icontains(Process.CommandLine, "get") or iendswith(Process.Path, "\\cmdkey.exe") and icontains(Process.CommandLine, " /l")


[ThreatDetectionRule platform=Windows]
# Detects PowerShell creating a PowerShell file (.ps1). While often times this behavior is benign, sometimes it can be a sign of a dropper script trying to achieve persistence.
# Author: frack113
RuleId = 576426ad-0131-4001-ae01-be175da0c108
RuleName = PowerShell Script Dropped Via PowerShell.EXE
EventType = File.Create
Tag = powershell-script-dropped-via-powershell.exe
RiskScore = 25
Annotation = {"author": "frack113"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and iendswith(File.Path, ".ps1") and not (icontains(File.Path, "\_\_PSScriptPolicyTest\_") or istartswith(File.Path, "C:\\Users\\") and icontains(File.Path, "\\AppData\\Local\\Temp\\") or istartswith(File.Path, "C:\\Windows\\Temp\\"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of "hh.exe" to open ".chm" files.
# Author: E.M. Anhaus (originally from Atomic Blue Detections, Dan Beavin), oscd.community
RuleId = 68c8acb4-1b60-4890-8e82-3ddf7a6dba84
RuleName = HH.EXE Execution
EventType = Process.Start
Tag = proc-start-hh.exe-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1218.001"], "author": "E.M. Anhaus (originally from Atomic Blue Detections, Dan Beavin), oscd.community"}
Query = (Process.Name == "HH.exe" or iendswith(Process.Path, "\\hh.exe")) and icontains(Process.CommandLine, ".chm")


[ThreatDetectionRule platform=Windows]
# Detects file access to browser credential storage paths by non-browser processes, which may indicate credential access attempts.
# Adversaries may attempt to access browser credential storage to extract sensitive information such as usernames and passwords or cookies.
# This behavior is often commonly observed in credential stealing malware.
# Author: frack113, X__Junior (Nextron Systems), Swachchhanda Shrawan Poudel (Nextron Systems), Parth-FourCore
