[ThreatDetectionRule platform=Windows]
# Use of reg to get MachineGuid information
# Author: frack113
RuleId = f5240972-3938-4e56-8e4b-e33893176c1f
RuleName = Suspicious Query of MachineGUID
EventType = Process.Start
Tag = proc-start-suspicious-query-of-machineguid
RiskScore = 25
Annotation = {"mitre_attack": ["T1082"], "author": "frack113"}
Query = iendswith(Process.Path, "\\reg.exe") and icontains(Process.CommandLine, "SOFTWARE\\Microsoft\\Cryptography") and icontains(Process.CommandLine, "/v ") and icontains(Process.CommandLine, "MachineGuid")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new service using the "sc.exe" utility.
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = 85ff530b-261d-48c6-a441-facaa2e81e48
RuleName = New Service Creation Using Sc.EXE
EventType = Process.Start
Tag = proc-start-new-service-creation-using-sc.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1543.003"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = iendswith(Process.Path, "\\sc.exe") and icontains(Process.CommandLine, "create") and icontains(Process.CommandLine, "binPath") and not ((istartswith(Parent.Path, "C:\\Program Files (x86)\\Dropbox\\Client\\") or istartswith(Parent.Path, "C:\\Program Files\\Dropbox\\Client\\")) and iendswith(Parent.Path, "\\Dropbox.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Attackers may leverage fsutil to enumerated connected drives.
# Author: Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'
RuleId = 63de06b9-a385-40b5-8b32-73f2b9ef84b6
RuleName = Fsutil Drive Enumeration
EventType = Process.Start
Tag = proc-start-fsutil-drive-enumeration
RiskScore = 25
Annotation = {"mitre_attack": ["T1120"], "author": "Christopher Peacock '@securepeacock', SCYTHE '@scythe_io'"}
Query = (iendswith(Process.Path, "\\fsutil.exe") or Process.Name == "fsutil.exe") and icontains(Process.CommandLine, "drives")


[ThreatDetectionRule platform=Windows]
# Detects execution of "tar.exe" in order to create a compressed file.
# Adversaries may abuse various utilities to compress or encrypt data before exfiltration.
# Author: Nasreddine Bencherchali (Nextron Systems), AdmU3
RuleId = 418a3163-3247-4b7b-9933-dcfcb7c52ea9
RuleName = Compressed File Creation Via Tar.EXE
EventType = Process.Start
Tag = proc-start-compressed-file-creation-via-tar.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1560", "T1560.001"], "author": "Nasreddine Bencherchali (Nextron Systems), AdmU3"}
Query = (iendswith(Process.Path, "\\tar.exe") or Process.Name == "bsdtar") and (icontains(Process.CommandLine, "-c") or icontains(Process.CommandLine, "-r") or icontains(Process.CommandLine, "-u"))


[ThreatDetectionRule platform=Windows]
# Detects web browser process opening an HTML file from a user's Downloads folder.
# This behavior is could be associated with phishing attacks where threat actors send HTML attachments to users.
# When a user opens such an attachment, it can lead to the execution of malicious scripts or the download of malware.
# During investigation, analyze the HTML file for embedded scripts or links, check for any subsequent downloads or process executions, and investigate the source of the email or message containing the attachment.
# Author: Joseph Kamau
RuleId = 538c5851-8c03-4724-8ec4-623bc7aadaea
RuleName = HTML File Opened From Download Folder
EventType = Process.Start
Tag = proc-start-html-file-opened-from-download-folder
RiskScore = 25
Annotation = {"mitre_attack": ["T1598.002", "T1566.001"], "author": "Joseph Kamau"}
Query = (iendswith(Process.Path, "\\brave.exe") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\firefox.exe") or iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\vivaldi.exe")) and icontains(Process.CommandLine, ":\\users\\") and icontains(Process.CommandLine, "\\Downloads\\") and icontains(Process.CommandLine, ".htm")


[ThreatDetectionRule platform=Windows]
# Detects the creation of an executable by another executable.
# Author: frack113
RuleId = 297afac9-5d02-4138-8c58-b977bac60556
RuleName = Creation of an Executable by an Executable
EventType = File.Create
Tag = creation-of-an-executable-by-an-executable
RiskScore = 25
Annotation = {"mitre_attack": ["T1587.001"], "author": "frack113"}
Query = iendswith(Process.Path, ".exe") and iendswith(File.Path, ".exe") and not (iendswith(Process.Path, ":\\Windows\\System32\\msiexec.exe") or iendswith(Process.Path, ":\\Windows\\system32\\cleanmgr.exe") or iendswith(Process.Path, ":\\Windows\\explorer.exe") or iendswith(Process.Path, ":\\WINDOWS\\system32\\dxgiadaptercache.exe") or iendswith(Process.Path, ":\\WINDOWS\\system32\\Dism.exe") or iendswith(Process.Path, ":\\Windows\\System32\\wuauclt.exe") or iendswith(Process.Path, ":\\WINDOWS\\system32\\svchost.exe") and icontains(File.Path, ":\\Windows\\SoftwareDistribution\\Download\\") or iendswith(Process.Path, ":\\Windows\\system32\\svchost.exe") and icontains(File.Path, ":\\WUDownloadCache\\") and icontains(File.Path, "\\WindowsUpdateBox.exe") or icontains(Process.Path, ":\\WINDOWS\\SoftwareDistribution\\Download\\") and iendswith(Process.Path, "\\WindowsUpdateBox.Exe") and icontains(File.Path, ":\\$WINDOWS.~BT\\Sources\\") or icontains(Process.Path, ":\\Windows\\WinSxS\\") and iendswith(Process.Path, "\\TiWorker.exe") or icontains(Process.Path, ":\\Program Files\\") or icontains(Process.Path, ":\\Program Files (x86)\\") or icontains(File.Path, ":\\Program Files\\") or icontains(File.Path, ":\\Program Files (x86)\\") or icontains(Process.Path, ":\\ProgramData\\Microsoft\\Windows Defender\\") or icontains(Process.Path, ":\\Program Files\\Windows Defender\\") or icontains(File.Path, "\\AppData\\Local\\Microsoft\\WindowsApps\\") or iendswith(Process.Path, "\\AppData\\Local\\Microsoft\\Teams\\Update.exe") and (iendswith(File.Path, "\\AppData\\Local\\Microsoft\\Teams\\stage\\Teams.exe") or iendswith(File.Path, "\\AppData\\Local\\Microsoft\\Teams\\stage\\Squirrel.exe") or iendswith(File.Path, "\\AppData\\Local\\Microsoft\\SquirrelTemp\\tempb\\")) or (icontains(Process.Path, ":\\Windows\\Microsoft.NET\\Framework\\") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\Framework64\\") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\FrameworkArm\\") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\FrameworkArm64\\")) and iendswith(Process.Path, "\\mscorsvw.exe") and icontains(File.Path, ":\\Windows\\assembly\\NativeImages\_") or icontains(Process.Path, "\\AppData\\Local\\") and iendswith(Process.Path, "\\Microsoft VS Code\\Code.exe") and icontains(File.Path, "\\.vscode\\extensions\\") or iendswith(Process.Path, "\\AppData\\Local\\GitHubDesktop\\Update.exe") and icontains(File.Path, "\\AppData\\Local\\SquirrelTemp\\") or icontains(Process.Path, ":\\WINDOWS\\TEMP\\") or icontains(File.Path, ":\\WINDOWS\\TEMP\\") or icontains(Process.Path, "\\AppData\\Local\\Temp\\") or icontains(File.Path, "\\AppData\\Local\\Temp\\") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\Framework") and iendswith(Process.Path, "\\mscorsvw.exe") and icontains(File.Path, ":\\Windows\\assembly")) and not (icontains(Process.Path, "\\Python27\\python.exe") and (icontains(File.Path, "\\Python27\\Lib\\site-packages\\") or icontains(File.Path, "\\Python27\\Scripts\\") or icontains(File.Path, "\\AppData\\Local\\Temp\\")) or icontains(Process.Path, "\\AppData\\Local\\SquirrelTemp\\Update.exe") and icontains(File.Path, "\\AppData\\Local") or iendswith(Process.Path, "\\ChromeSetup.exe") and icontains(File.Path, "\\Google"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of "taskkill.exe" in order to stop a service or a process. Look for suspicious parents executing this command in order to hunt for potential malicious activity.
# Attackers might leverage this in order to conduct data destruction or data encrypted for impact on the data stores of services like Exchange and SQL Server.
# Author: frack113, MalGamy (Nextron Systems), Nasreddine Bencherchali
RuleId = 86085955-ea48-42a2-9dd3-85d4c36b167d
RuleName = Process Terminated Via Taskkill
EventType = Process.Start
Tag = proc-start-process-terminated-via-taskkill
RiskScore = 25
Annotation = {"mitre_attack": ["T1489"], "author": "frack113, MalGamy (Nextron Systems), Nasreddine Bencherchali"}
Query = (iendswith(Process.Path, "\\taskkill.exe") or Process.Name == "taskkill.exe") and (icontains(Process.CommandLine, " -f ") or icontains(Process.CommandLine, " /f ") or icontains(Process.CommandLine, " –f ") or icontains(Process.CommandLine, " —f ") or icontains(Process.CommandLine, " ―f ") or iendswith(Process.CommandLine, " -f") or iendswith(Process.CommandLine, " /f") or iendswith(Process.CommandLine, " –f") or iendswith(Process.CommandLine, " —f") or iendswith(Process.CommandLine, " ―f")) and (icontains(Process.CommandLine, " -im ") or icontains(Process.CommandLine, " /im ") or icontains(Process.CommandLine, " –im ") or icontains(Process.CommandLine, " —im ") or icontains(Process.CommandLine, " ―im ") or icontains(Process.CommandLine, " -pid ") or icontains(Process.CommandLine, " /pid ") or icontains(Process.CommandLine, " –pid ") or icontains(Process.CommandLine, " —pid ") or icontains(Process.CommandLine, " ―pid ")) and not ((icontains(Parent.Path, "\\AppData\\Local\\Temp\\") or icontains(Parent.Path, ":\\Windows\\Temp")) and iendswith(Parent.Path, ".tmp"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects when when a mounted share is removed. Adversaries may remove share connections that are no longer useful in order to clean up traces of their operation
# Author: oscd.community, @redcanary, Zach Stanford @svch0st
RuleId = cb7c4a03-2871-43c0-9bbb-18bbdb079896
RuleName = Unmount Share Via Net.EXE
EventType = Process.Start
Tag = proc-start-unmount-share-via-net.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.005"], "author": "oscd.community, @redcanary, Zach Stanford @svch0st"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and icontains(Process.CommandLine, "share") and icontains(Process.CommandLine, "/delete")


[ThreatDetectionRule platform=Windows]
# Detects an uncommon process loading the "BitsProxy.dll". This DLL is used when the BITS COM instance or API is used.
