RuleName = Suspicious File Access to Browser Credential Storage
EventType = File.Read
Tag = suspicious-file-access-to-browser-credential-storage
RiskScore = 25
Annotation = {"mitre_attack": ["T1555.003", "T1217"], "author": "frack113, X__Junior (Nextron Systems), Swachchhanda Shrawan Poudel (Nextron Systems), Parth-FourCore"}
