[ThreatDetectionRule platform=Windows]
# Detects WMI modules being loaded by an uncommon process
# Author: Roberto Rodriguez @Cyb3rWard0g
RuleId = 671bb7e3-a020-4824-a00e-2ee5b55f385e
RuleName = WMI Module Loaded By Uncommon Process
EventType = Image.Load
Tag = wmi-module-loaded-by-uncommon-process
RiskScore = 25
Annotation = {"mitre_attack": ["T1047"], "author": "Roberto Rodriguez @Cyb3rWard0g"}
Query = (iendswith(Image.Path, "\\fastprox.dll") or iendswith(Image.Path, "\\wbemcomn.dll") or iendswith(Image.Path, "\\wbemprox.dll") or iendswith(Image.Path, "\\wbemsvc.dll") or iendswith(Image.Path, "\\WmiApRpl.dll") or iendswith(Image.Path, "\\wmiclnt.dll") or iendswith(Image.Path, "\\WMINet\_Utils.dll") or iendswith(Image.Path, "\\wmiprov.dll") or iendswith(Image.Path, "\\wmiutils.dll")) and not (icontains(Process.Path, ":\\Program Files (x86)\\") or icontains(Process.Path, ":\\Program Files\\") or icontains(Process.Path, ":\\Windows\\explorer.exe") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\Framework\\") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\FrameworkArm\\") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\FrameworkArm64\\") or icontains(Process.Path, ":\\Windows\\Microsoft.NET\\Framework64\\") or icontains(Process.Path, ":\\Windows\\System32\\") or icontains(Process.Path, ":\\Windows\\SysWOW64\\")) and not (iendswith(Process.Path, "\\WindowsAzureGuestAgent.exe") or iendswith(Process.Path, "\\WaAppAgent.exe") or iendswith(Process.Path, "\\thor.exe") or iendswith(Process.Path, "\\thor64.exe") or iendswith(Process.Path, "\\MsMpEng.exe") or icontains(Process.Path, "\\Microsoft\\Teams\\current\\Teams.exe") or icontains(Process.Path, "\\Microsoft\\Teams\\Update.exe") or iendswith(Process.Path, ":\\Windows\\Sysmon.exe") or iendswith(Process.Path, ":\\Windows\\Sysmon64.exe"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of "attrib" with the "+s" flag to mark files as system files
# Author: frack113
RuleId = bb19e94c-59ae-4c15-8c12-c563d23fe52b
RuleName = Set Files as System Files Using Attrib.EXE
EventType = Process.Start
Tag = proc-start-set-files-as-system-files-using-attrib.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1564.001"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\attrib.exe") or Process.Name == "ATTRIB.EXE") and icontains(Process.CommandLine, " +s ")


[ThreatDetectionRule platform=Windows]
# Detects execution of Chromium based browser in headless mode
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = ef9dcfed-690c-4c5d-a9d1-482cd422225c
RuleName = Browser Execution In Headless Mode
EventType = Process.Start
Tag = proc-start-browser-execution-in-headless-mode
RiskScore = 25
Annotation = {"mitre_attack": ["T1105", "T1564.003"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\brave.exe") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\vivaldi.exe")) and icontains(Process.CommandLine, "--headless")


[ThreatDetectionRule platform=Windows]
# Detects command lines that contain the 'accepteula' flag which could be a sign of execution of one of the Sysinternals tools
# Author: Markus Neis
RuleId = 7cccd811-7ae9-4ebe-9afd-cb5c406b824b
RuleName = Potential Execution of Sysinternals Tools
EventType = Process.Start
Tag = proc-start-potential-execution-of-sysinternals-tools
RiskScore = 25
Annotation = {"mitre_attack": ["T1588.002"], "author": "Markus Neis"}
Query = icontains(Process.CommandLine, " -accepteula") or icontains(Process.CommandLine, " /accepteula") or icontains(Process.CommandLine, " –accepteula") or icontains(Process.CommandLine, " —accepteula") or icontains(Process.CommandLine, " ―accepteula")


[ThreatDetectionRule platform=Windows]
# Detects usage of the "Import-Module" cmdlet in order to add new Cmdlets to the current PowerShell session
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 4ad74d01-f48c-42d0-b88c-b31efa4d2262
RuleName = Import New Module Via PowerShell CommandLine
EventType = Process.Start
Tag = proc-start-import-new-module-via-powershell-commandline
RiskScore = 25
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and (icontains(Process.CommandLine, "Import-Module ") or icontains(Process.CommandLine, "ipmo ")) and not ((icontains(Parent.Path, ":\\Program Files\\WindowsApps\\Microsoft.WindowsTerminal\_") or icontains(Parent.Path, ":\\Windows\\System32\\cmd.exe")) and icontains(Process.CommandLine, ":\\Program Files\\Microsoft Visual Studio\\") and icontains(Process.CommandLine, "Tools\\Microsoft.VisualStudio.DevShell.dll"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the stopping of a Windows service via the PowerShell Cmdlet "Stop-Service"
# Author: Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)
RuleId = c49c5062-0966-4170-9efd-9968c913a6cf
RuleName = Stop Windows Service Via PowerShell Stop-Service
EventType = Process.Start
Tag = proc-start-stop-windows-service-via-powershell-stop-service
RiskScore = 25
Annotation = {"mitre_attack": ["T1489"], "author": "Jakob Weinzettl, oscd.community, Nasreddine Bencherchali (Nextron Systems)"}
Query = (Process.Name in ["PowerShell.EXE", "pwsh.dll"] or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and icontains(Process.CommandLine, "Stop-Service ")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a new service using powershell.
# Author: Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community
RuleId = c02e96b7-c63a-4c47-bd83-4a9f74afcfb2
RuleName = New Service Creation Using PowerShell
EventType = Process.Start
Tag = proc-start-new-service-creation-using-powershell
RiskScore = 25
Annotation = {"mitre_attack": ["T1543.003"], "author": "Timur Zinniatullin, Daniil Yugoslavskiy, oscd.community"}
Query = icontains(Process.CommandLine, "New-Service") and icontains(Process.CommandLine, "-BinaryPathName")


[ThreatDetectionRule platform=Windows]
# Detects execution of processes with image paths starting with WebDAV shares (\\), which might indicate malicious file execution from remote web shares.
# Execution of processes from WebDAV shares can be a sign of lateral movement or exploitation attempts, especially if the process is not a known legitimate application.
# Exploitation Attempt of vulnerabilities like CVE-2025-33053 also involves executing processes from WebDAV paths.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = f8de9dd5-7a63-4cfd-9d0c-ae124878b5a9
RuleName = Process Execution From WebDAV Share
EventType = Process.Start
Tag = proc-start-process-execution-from-webdav-share
RiskScore = 25
Annotation = {"mitre_attack": ["T1105"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = istartswith(Process.Path, "\\\\") and icontains(Process.Path, "\\DavWWWRoot\\")


[ThreatDetectionRule platform=Windows]
# Detects the load of RstrtMgr DLL (Restart Manager) by an uncommon process.
# This library has been used during ransomware campaigns to kill processes that would prevent file encryption by locking them (e.g. Conti ransomware, Cactus ransomware). It has also recently been seen used by the BiBi wiper for Windows.
# It could also be used for anti-analysis purposes by shut downing specific processes.
# Author: Luc Génaux
RuleId = 3669afd2-9891-4534-a626-e5cf03810a61
RuleName = Load Of RstrtMgr.DLL By An Uncommon Process
EventType = Image.Load
Tag = load-of-rstrtmgr.dll-by-an-uncommon-process
RiskScore = 25
Annotation = {"mitre_attack": ["T1486", "T1562.001"], "author": "Luc G\u00e9naux"}
Query = (iendswith(Image.Path, "\\RstrtMgr.dll") or Process.Name == "RstrtMgr.dll") and not (istartswith(Process.Path, "C:\\$WINDOWS.~BT\\'") or istartswith(Process.Path, "C:\\$WinREAgent\\'") or istartswith(Process.Path, "C:\\Program Files (x86)\\'") or istartswith(Process.Path, "C:\\Program Files\\'") or istartswith(Process.Path, "C:\\ProgramData\\'") or istartswith(Process.Path, "C:\\Windows\\explorer.exe'") or istartswith(Process.Path, "C:\\Windows\\SoftwareDistribution\\'") or istartswith(Process.Path, "C:\\Windows\\SysNative\\'") or istartswith(Process.Path, "C:\\Windows\\System32\\'") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\'") or istartswith(Process.Path, "C:\\Windows\\WinSxS\\'") or istartswith(Process.Path, "C:\\WUDownloadCache\\'") or istartswith(Process.Path, "C:\\Users\\'") and icontains(Process.Path, "\\AppData\\Local\\Temp\\is-") and icontains(Process.Path, ".tmp\\") and iendswith(Process.Path, ".tmp") or istartswith(Process.Path, "C:\\Windows\\Temp\\'")) and not (istartswith(Process.Path, "C:\\Users\\") and iendswith(Process.Path, "\\AppData\\Local\\Microsoft\\OneDrive\\OneDriveStandaloneUpdater.exe"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of the "jsc.exe" (JScript Compiler).
# Attacker might abuse this in order to compile JScript files on the fly and bypassing application whitelisting.
# Author: frack113
RuleId = 52788a70-f1da-40dd-8fbd-73b5865d6568
RuleName = JScript Compiler Execution
EventType = Process.Start
Tag = proc-start-jscript-compiler-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1127"], "author": "frack113"}
Query = iendswith(Process.Path, "\\jsc.exe") or Process.Name == "jsc.exe"


[ThreatDetectionRule platform=Windows]
# Detects execution of Advanced Installer MSIX Package Support Framework (PSF) components, specifically AI_STUBS executables with original filename 'popupwrapper.exe'.
# This activity may indicate malicious MSIX packages build with Advanced Installer leveraging the Package Support Framework to bypass application control restrictions.
# Author: Michael Haag, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = af5732ed-764e-489d-826d-0447c8b36242
RuleName = Windows MSIX Package Support Framework AI_STUBS Execution
EventType = Process.Start
Tag = proc-start-windows-msix-package-support-framework-ai_stubs-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1218", "T1553.005", "T1204.002"], "author": "Michael Haag, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\AI\_STUBS\\AiStubX64Elevated.exe") or iendswith(Process.Path, "\\AI\_STUBS\\AiStubX86Elevated.exe") or iendswith(Process.Path, "\\AI\_STUBS\\AiStubX64.exe") or iendswith(Process.Path, "\\AI\_STUBS\\AiStubX86.exe")) and Process.Name == "popupwrapper.exe"


[ThreatDetectionRule platform=Windows]
# Detect the usage of "DirLister.exe" a utility for quickly listing folder or drive contents. It was seen used by BlackCat ransomware to create a list of accessible directories and files.
# Author: frack113
RuleId = b4dc61f5-6cce-468e-a608-b48b469feaa2
RuleName = DirLister Execution
EventType = Process.Start
Tag = proc-start-dirlister-execution
RiskScore = 25
Annotation = {"mitre_attack": ["T1083"], "author": "frack113"}
Query = Process.Name == "DirLister.exe" or iendswith(Process.Path, "\\DirLister.exe")


[ThreatDetectionRule platform=Windows]
# Detects execution of "tar.exe" in order to extract compressed file.
# Adversaries may abuse various utilities in order to decompress data to avoid detection.
# Author: AdmU3
RuleId = bf361876-6620-407a-812f-bfe11e51e924
RuleName = Compressed File Extraction Via Tar.EXE
EventType = Process.Start
Tag = proc-start-compressed-file-extraction-via-tar.exe
RiskScore = 25
Annotation = {"mitre_attack": ["T1560", "T1560.001"], "author": "AdmU3"}
Query = (iendswith(Process.Path, "\\tar.exe") or Process.Name == "bsdtar") and icontains(Process.CommandLine, "-x")


[ThreatDetectionRule platform=Windows]
# Detects creation of a file named "ntds.dit" (Active Directory Database)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 0b8baa3f-575c-46ee-8715-d6f28cc7d33c
RuleName = NTDS.DIT Created
EventType = File.Create
Tag = ntds.dit-created
RiskScore = 25
Annotation = {"mitre_attack": ["T1003.003"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(File.Path, "ntds.dit")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Use of hostname to get information
# Author: frack113
RuleId = 7be5fb68-f9ef-476d-8b51-0256ebece19e
RuleName = Suspicious Execution of Hostname
EventType = Process.Start
Tag = proc-start-suspicious-execution-of-hostname
RiskScore = 25
Annotation = {"mitre_attack": ["T1082"], "author": "frack113"}
Query = iendswith(Process.Path, "\\HOSTNAME.EXE")


[ThreatDetectionRule platform=Windows]
# Detects execution of the builtin "del"/"erase" commands in order to delete files.
# Adversaries may delete files left behind by the actions of their intrusion activity.
# Malware, tools, or other non-native files dropped or created on a system by an adversary may leave traces to indicate to what was done within a network and how.
# Removal of these files can occur during an intrusion, or as part of a post-intrusion process to minimize the adversary's footprint.
# Author: frack113
RuleId = 379fa130-190e-4c3f-b7bc-6c8e834485f3
RuleName = File Deletion Via Del
EventType = Process.Start
Tag = proc-start-file-deletion-via-del
RiskScore = 25
Annotation = {"mitre_attack": ["T1070.004"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and (icontains(Process.CommandLine, "del ") or icontains(Process.CommandLine, "erase ")) and (icontains(Process.CommandLine, " -f") or icontains(Process.CommandLine, " /f") or icontains(Process.CommandLine, " –f") or icontains(Process.CommandLine, " —f") or icontains(Process.CommandLine, " ―f") or icontains(Process.CommandLine, " -s") or icontains(Process.CommandLine, " /s") or icontains(Process.CommandLine, " –s") or icontains(Process.CommandLine, " —s") or icontains(Process.CommandLine, " ―s") or icontains(Process.CommandLine, " -q") or icontains(Process.CommandLine, " /q") or icontains(Process.CommandLine, " –q") or icontains(Process.CommandLine, " —q") or icontains(Process.CommandLine, " ―q"))

