RuleName = BITS Client BitsProxy DLL Loaded By Uncommon Process
EventType = Image.Load
Tag = bits-client-bitsproxy-dll-loaded-by-uncommon-process
RiskScore = 25
Annotation = {"mitre_attack": ["T1197"], "author": "UnicornOfHunt"}
Query = iendswith(Image.Path, "\\BitsProxy.dll") and not (Process.Path in ["C:\\Windows\\System32\\aitstatic.exe", "C:\\Windows\\System32\\bitsadmin.exe", "C:\\Windows\\System32\\desktopimgdownldr.exe", "C:\\Windows\\System32\\DeviceEnroller.exe", "C:\\Windows\\System32\\MDMAppInstaller.exe", "C:\\Windows\\System32\\ofdeploy.exe", "C:\\Windows\\System32\\RecoveryDrive.exe", "C:\\Windows\\System32\\Speech\_OneCore\\common\\SpeechModelDownload.exe", "C:\\Windows\\SysWOW64\\bitsadmin.exe", "C:\\Windows\\SysWOW64\\OneDriveSetup.exe", "C:\\Windows\\SysWOW64\\Speech\_OneCore\\Common\\SpeechModelDownload.exe"]) and not Process.Path == "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
GenericProperty1 = Image.Path


