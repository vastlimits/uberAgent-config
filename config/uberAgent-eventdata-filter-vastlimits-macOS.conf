##############################################################
#
# DnsQuery exclusions by originating process
#
##############################################################

[EventDataFilter]
# Deny any DNS event caused by browsers.
Action = deny
Sourcetype = Process:DnsQuery
Query = ProcName in ["Google Chrome", "Google Chrome Helper", "Microsoft Edge", "Microsoft Edge Helper", "Safari", "com.apple.Safari.SafeBrowsing.Service", "com.apple.WebKit.Networking", "com.apple.Safari.SearchHelper", "firefox"]

[EventDataFilter]
# Deny any DNS event caused by uberAgent because it performs reverse lookups to assign IP addresses to hostnames.
Action = deny
Sourcetype = Process:DnsQuery
Query = ProcName == "uberAgent"

##############################################################
#
# ProcessStartup and ProcessStop exclusions
#
##############################################################

[EventDataFilter]
# Exclude short-lived system utility processes that run frequently
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["awk", "basename", "bc", "bzip2", "cat", "chmod", "cmp", "cp", "cut", "date", "df", "dirname", "du", "echo", "egrep", "env", "expr", "file", "find", "grep", "groups", "head", "hostname", "id", "jq-universal", "killall", "ln", "locale", "ls", "lsof", "mkdir", "mktemp", "mv", "od", "printenv", "ps", "pwd", "readlink", "rm", "sed", "seq", "sleep", "sort", "stat", "stty", "sw_vers", "tail", "test", "touch", "tput", "tr", "uname", "vm_stat", "wc", "which", "who", "whoami", "xargs", "xmllint", "xxd"]

[EventDataFilter]
# Exclude macOS system utilities and management tools
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["aslmanager", "dirhelper", "logd_helper", "logd_reporter", "path_helper"]

[EventDataFilter]
# Exclude shell processes spawned by non-interactive parents (system services, scripts, daemons).
# Shells from interactive sources (sshd-session, su, sudo) are preserved for UXM troubleshooting.
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["bash", "sh", "zsh"] AND ProcParentName in ["bash", "cmake", "jamf", "JamfDaemon", "launchd", "make", "networksetup", "ninja", "perl", "periodic-wrapper", "Python", "sh", "splunk", "splunkd", "uberAgent", "uberAgentScriptHelper", "zsh"]

[EventDataFilter]
# Exclude xpcproxy and launchd helper processes
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["xpcproxy", "AppleQEMUGuestAgent", "mdworker_shared"]

[EventDataFilter]
# Exclude Apple XPC services (internal system services)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName regex r"^com\.apple\."

[EventDataFilter]
# Exclude XProtect remediation processes (malware scanning)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName regex r"^XProtectRemediator"

[EventDataFilter]
# Exclude macOS system management XPC services (launched by launchd)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName regex r"(Subscriber|Service|Helper|Extension|Worker)$" AND ProcParentName == "launchd"

[EventDataFilter]
# Exclude Rosetta translation daemon (x86 emulation)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName == "oahd"

[EventDataFilter]
# Exclude high-volume macOS system daemons (background services)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["accessoryupdaterd", "applessdstatistics", "automount", "contactsd", "corecaptured", "gssd", "helpd", "logkextloadsd", "mc_notifier", "NANDTaskScheduler", "newsyslog", "parsec-fbf", "signpost_reporter", "trustevaluationagent"]

[EventDataFilter]
# Exclude macOS administrative commands (frequently automated via Jamf/MDM or scripts)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["defaults", "diskutil", "dscl", "dsconfigad", "fdesetup", "launchctl", "MCXCompositor", "mcxalr", "networksetup", "pkgutil", "profiles", "pwpolicy", "spctl", "system_profiler", "xprotect"]

[EventDataFilter]
# Exclude network and system probing utilities (diagnostic commands run by scripts)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["csrutil", "ifconfig", "kinit", "mount", "networkQuality", "route", "scutil", "sysctl"]

##############################################################
#
# ProcessDetail and ProcessStatistics exclusions
#
##############################################################

[EventDataFilter]
# Exclude short-lived system utilities (rarely captured by default timer intervals)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["awk", "basename", "bc", "bzip2", "cat", "chmod", "cmp", "cp", "cut", "date", "df", "dirname", "du", "echo", "egrep", "env", "expr", "file", "find", "grep", "groups", "head", "hostname", "id", "jq-universal", "killall", "ln", "locale", "ls", "lsof", "mkdir", "mktemp", "mv", "od", "printenv", "ps", "pwd", "readlink", "rm", "sed", "seq", "sleep", "sort", "stat", "stty", "sw_vers", "tail", "test", "touch", "tput", "tr", "uname", "vm_stat", "wc", "which", "who", "whoami", "xargs", "xmllint", "xxd"]

[EventDataFilter]
# Exclude shell processes (typically non-interactive script execution wrappers)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["bash", "sh", "zsh"]

[EventDataFilter]
# Exclude short-lived macOS system maintenance utilities
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["aslmanager", "dirhelper", "logd_helper", "logd_reporter", "path_helper"]

[EventDataFilter]
# Exclude macOS administrative commands unlikely to persist across polling intervals
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["defaults", "diskutil", "dscl", "dsconfigad", "fdesetup", "networksetup", "profiles", "spctl", "system_profiler"]

##############################################################
#
# Exclude uberAgent process from all TDE events
#
##############################################################

[EventDataFilter]
Action = deny
Sourcetype = ActivityMonitoring:ProcessTagging
Query = ProcName == "uberAgent" OR ProcParentName == "uberAgent"
