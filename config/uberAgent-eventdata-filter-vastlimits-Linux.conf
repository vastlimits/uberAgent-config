##############################################################
#
# ProcessStartup and ProcessStop exclusions
#
##############################################################

[EventDataFilter]
# Exclude short-lived system utility processes that run frequently
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["base64", "basename", "bc", "cat", "chmod", "cmp", "comm", "cp", "cut", "date", "dirname", "du", "echo", "env", "expr", "file", "find", "flock", "gawk", "getent", "getopt", "grep", "groups", "gzip", "head", "hostname", "id", "ln", "locale", "logger", "ls", "mkdir", "mktemp", "mv", "od", "pidof", "readlink", "rm", "sed", "sleep", "sort", "stat", "stty", "tail", "test", "timeout", "touch", "tput", "tr", "tty", "uname", "wc", "which", "who", "whoami", "xargs"]

[EventDataFilter]
# Exclude systemd internal processes
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName regex r"^systemd-.*"

[EventDataFilter]
# Exclude APT/dpkg package management processes
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["apt-config", "apt-extracttemplates", "apt-helper", "dpkg", "dpkg-deb", "dpkg-query", "dpkg-split", "dpkg-trigger", "ischroot"]

[EventDataFilter]
# Exclude shell processes spawned by non-interactive parents (system services, scripts, daemons).
# Shells from interactive sources (sshd, sshd-session, su, sudo, crontab, systemd) are preserved for UXM troubleshooting.
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["dash", "bash", "sh"] AND ProcParentName in ["anacron", "apt-get", "bash", "cron", "crond", "ctxaudio", "ctxclipboard", "ctxmonitord", "ctxwcamsd", "dash", "dpkg", "gpgv", "less", "logrotate", "nm-dispatcher", "perl", "platform-python3.6", "python3.10", "python3.12", "python3.9", "run-parts", "sh", "tar", "timeout", "uberAgent", "udevadm", "wdavdaemon", "Xorg"]

[EventDataFilter]
# Exclude GPG/crypto helper processes (package signature verification, key management)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["gpg", "gpg-agent", "gpg-connect-agent", "gpgconf", "gpgsm", "gpgv", "scdaemon"]

[EventDataFilter]
# Exclude udev hardware probing helpers
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["cdrom_id", "dmi_memory_id", "probe-bcache", "scsi_id", "sg_inq", "v4l_id"]

[EventDataFilter]
# Exclude high-volume infrastructure processes (kernel helpers, firewall, library cache)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["cifs.upcall", "key.dns_resolver", "ldconfig", "ldconfig.real", "run-parts", "xtables-nft-multi"]

[EventDataFilter]
# Exclude SSSD/authentication subsystem processes
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["gpo_child", "krb5_child", "ldap_child", "nsupdate", "sssd_be", "sssd_check_socket_activated_responders", "sssd_pac", "unix_chkpwd"]

[EventDataFilter]
# Exclude system maintenance and indexing processes
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["appstreamcli", "mandb", "plocate", "sadc", "updatedb", "updatedb.plocate"]

[EventDataFilter]
# Exclude snap packaging infrastructure (not user-facing snap/snapd)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["snap-device-helper", "snap-seccomp", "snap-update-ns", "snapd-env-generator", "snapd-generator"]

[EventDataFilter]
# Exclude request-key (kernel keyring helper)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName == "request-key"

##############################################################
#
# ProcessDetail and ProcessStatistics exclusions
#
##############################################################

[EventDataFilter]
# Exclude short-lived system utilities (rarely captured by default timer intervals)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["base64", "basename", "bc", "cat", "chmod", "cmp", "comm", "cp", "cut", "date", "dirname", "du", "echo", "env", "expr", "file", "find", "flock", "gawk", "getent", "getopt", "grep", "groups", "gzip", "head", "hostname", "id", "ln", "locale", "logger", "ls", "mkdir", "mktemp", "mv", "od", "pidof", "readlink", "rm", "sed", "sleep", "sort", "stat", "stty", "tail", "test", "timeout", "touch", "tput", "tr", "tty", "uname", "wc", "which", "who", "whoami", "xargs"]

[EventDataFilter]
# Exclude shell processes (typically non-interactive script execution wrappers)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["dash", "bash", "sh"]

[EventDataFilter]
# Exclude package management and GPG helper utilities
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["apt-config", "apt-helper", "dpkg", "dpkg-deb", "dpkg-query", "gpg", "gpg-agent", "gpg-connect-agent", "gpgconf", "gpgv"]

[EventDataFilter]
# Exclude high-volume infrastructure processes unlikely to persist across polling intervals
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["cifs.upcall", "key.dns_resolver", "run-parts", "sg_inq", "unix_chkpwd", "xtables-nft-multi"]

[EventDataFilter]
# Exclude request-key (short-lived kernel keyring helper)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName == "request-key"

##############################################################
#
# Exclude uberAgent process from all TDE events
#
##############################################################

[EventDataFilter]
Action = deny
Sourcetype = ActivityMonitoring:ProcessTagging
Query = ProcName == "uberAgent" OR ProcParentName == "uberAgent"
