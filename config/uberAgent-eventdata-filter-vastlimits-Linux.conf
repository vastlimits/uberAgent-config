##############################################################
#
# DnsQuery exclusions by originating process
#
##############################################################

[EventDataFilter]
# Ignore DNS queries from browsers.
Action = deny
Sourcetype = Process:DnsQuery
Query = ProcName in ["chrome", "chromium", "firefox", "opera"]

[EventDataFilter]
# Ignore DNS queries from uberAgent because it performs reverse lookups to assign IP addresses to hostnames.
Action = deny
Sourcetype = Process:DnsQuery
Query = ProcName == "uberAgent"

##############################################################
#
# ProcessStartup and ProcessStop exclusions
#
##############################################################

[EventDataFilter]
# Exclude short-lived system utility processes that run frequently
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["basename", "cat", "chmod", "cmp", "cp", "cut", "date", "dirname", "echo", "env", "expr", "head", "id", "ln", "ls", "mkdir", "mktemp", "mv", "readlink", "rm", "sed", "sleep", "sort", "stat", "tail", "test", "touch", "tr", "tty", "uname", "wc", "which"]

[EventDataFilter]
# Exclude systemd internal processes
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName regex r"^systemd-.*"

[EventDataFilter]
# Exclude APT/package management helper processes
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["apt-config", "apt-helper", "dpkg-query", "dpkg-trigger"]

[EventDataFilter]
# Exclude common shell utilities with high frequency
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName in ["dash", "bash", "sh"] AND ProcParentName in ["dash", "bash", "sh", "cron", "anacron", "run-parts"]

[EventDataFilter]
# Exclude request-key (kernel keyring helper)
Action = deny
Sourcetype = Process:ProcessStartup
Sourcetype = Process:ProcessStop
Query = ProcName == "request-key"

##############################################################
#
# ProcessDetail and ProcessStatistics exclusions
#
##############################################################

[EventDataFilter]
# Exclude short-lived system utilities (rarely captured by 30-second polling)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["basename", "cat", "chmod", "cp", "cut", "date", "dirname", "echo", "grep", "head", "id", "ln", "ls", "mkdir", "mktemp", "mv", "readlink", "rm", "sed", "sleep", "sort", "stat", "tail", "test", "touch", "tr", "tty", "uname", "wc"]

[EventDataFilter]
# Exclude shells when they are non-interactive (script execution wrappers)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["dash", "bash", "sh"] AND ProcParentName in ["cron", "anacron", "systemd", "run-parts"]

[EventDataFilter]
# Exclude short-lived package management helper utilities
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName in ["apt-config", "apt-helper", "dpkg-query", "gpgconf", "gpg-connect-agent"]

[EventDataFilter]
# Exclude request-key (short-lived kernel keyring helper)
Action = deny
Sourcetype = Process:ProcessDetail
Sourcetype = Process:ProcessStatistics
Query = ProcName == "request-key"

##############################################################
#
# Exclude uberAgent process from all TDE events
#
##############################################################

[EventDataFilter]
Action = deny
Sourcetype = ActivityMonitoring:ProcessTagging
Query = ProcName == "uberAgent" OR ProcParentName == "uberAgent"
