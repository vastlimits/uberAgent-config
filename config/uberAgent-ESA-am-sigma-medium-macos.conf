[ThreatDetectionRule platform=MacOS]
# Detects creation of a Python path configuration file (.pth) in Python library folders, which can be maliciously abused for code execution and persistence.
# Modules referenced by these files are run at every Python startup (v3.5+), regardless of whether the module is imported by the calling script.
# Default paths are '\lib\site-packages\*.pth' (Windows) and '/lib/pythonX.Y/site-packages/*.pth' (Unix and macOS).
# Author: Andreas Braathen (mnemonic.io)
RuleId = 4f394635-13ef-4599-b677-3353e0f84f55
RuleName = Python Path Configuration File Creation - MacOS
EventType = File.Create
Tag = python-path-configuration-file-creation-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1059.006"], "author": "Andreas Braathen (mnemonic.io)"}
Query = File.Path regex "(?i)/lib/python3\\.([5-9]|[0-9]{2})/site-packages/" and iendswith(File.Path, ".pth")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=MacOS]
# Detects usage of system utilities (only grep for now) to discover security software discovery
# Author: Daniil Yugoslavskiy, oscd.community
RuleId = 0ed75b9c-c73b-424d-9e7d-496cd565fbe0
RuleName = Security Software Discovery - MacOs
EventType = Process.Start
Tag = proc-start-security-software-discovery-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1518.001"], "author": "Daniil Yugoslavskiy, oscd.community"}
Query = Process.Path == "/usr/bin/grep" and (icontains(Process.CommandLine, "nessusd") or icontains(Process.CommandLine, "santad") or icontains(Process.CommandLine, "CbDefense") or icontains(Process.CommandLine, "falcond") or icontains(Process.CommandLine, "td-agent") or icontains(Process.CommandLine, "packetbeat") or icontains(Process.CommandLine, "filebeat") or icontains(Process.CommandLine, "auditbeat") or icontains(Process.CommandLine, "osqueryd") or icontains(Process.CommandLine, "BlockBlock") or icontains(Process.CommandLine, "LuLu") or icontains(Process.CommandLine, "Little") and icontains(Process.CommandLine, "Snitch"))


[ThreatDetectionRule platform=MacOS]
# Detects disabling security tools
# Author: Daniil Yugoslavskiy, oscd.community
RuleId = ff39f1a6-84ac-476f-a1af-37fcdf53d7c0
RuleName = Disable Security Tools
EventType = Process.Start
Tag = proc-start-disable-security-tools
RiskScore = 50
Annotation = {"mitre_attack": ["T1562.001"], "author": "Daniil Yugoslavskiy, oscd.community"}
Query = Process.Path == "/bin/launchctl" and icontains(Process.CommandLine, "unload") and (icontains(Process.CommandLine, "com.objective-see.lulu.plist") or icontains(Process.CommandLine, "com.objective-see.blockblock.plist") or icontains(Process.CommandLine, "com.google.santad.plist") or icontains(Process.CommandLine, "com.carbonblack.defense.daemon.plist") or icontains(Process.CommandLine, "com.carbonblack.daemon.plist") or icontains(Process.CommandLine, "at.obdev.littlesnitchd.plist") or icontains(Process.CommandLine, "com.tenablesecurity.nessusagent.plist") or icontains(Process.CommandLine, "com.opendns.osx.RoamingClientConfigUpdater.plist") or icontains(Process.CommandLine, "com.crowdstrike.falcond.plist") or icontains(Process.CommandLine, "com.crowdstrike.userdaemon.plist") or icontains(Process.CommandLine, "osquery") or icontains(Process.CommandLine, "filebeat") or icontains(Process.CommandLine, "auditbeat") or icontains(Process.CommandLine, "packetbeat") or icontains(Process.CommandLine, "td-agent")) or Process.Path == "/usr/sbin/spctl" and icontains(Process.CommandLine, "disable")


[ThreatDetectionRule platform=MacOS]
# Detects creation of a hidden user account on macOS (UserID < 500) or with IsHidden option
# Author: Daniil Yugoslavskiy, oscd.community
RuleId = b22a5b36-2431-493a-8be1-0bae56c28ef3
RuleName = Hidden User Creation
EventType = Process.Start
Tag = proc-start-hidden-user-creation
RiskScore = 50
Annotation = {"mitre_attack": ["T1564.002"], "author": "Daniil Yugoslavskiy, oscd.community"}
Query = iendswith(Process.Path, "/dscl") and icontains(Process.CommandLine, "create") and icontains(Process.CommandLine, "UniqueID") and Process.CommandLine regex "([0-9]|[1-9][0-9]|[1-4][0-9]{2})" or iendswith(Process.Path, "/dscl") and icontains(Process.CommandLine, "create") and icontains(Process.CommandLine, "IsHidden") and (icontains(Process.CommandLine, "true") or icontains(Process.CommandLine, "yes") or icontains(Process.CommandLine, "1"))


[ThreatDetectionRule platform=MacOS]
# Detect file time attribute change to hide new or changes to existing files
# Author: Igor Fits, Mikhail Larin, oscd.community
RuleId = 88c0f9d8-30a8-4120-bb6b-ebb54abcf2a0
RuleName = File Time Attribute Change
EventType = Process.Start
Tag = proc-start-file-time-attribute-change
RiskScore = 50
Annotation = {"mitre_attack": ["T1070.006"], "author": "Igor Fits, Mikhail Larin, oscd.community"}
Query = iendswith(Process.Path, "/touch") and (icontains(Process.CommandLine, "-t") or icontains(Process.CommandLine, "-acmr") or icontains(Process.CommandLine, "-d") or icontains(Process.CommandLine, "-r"))


[ThreatDetectionRule platform=MacOS]
# Detects potential suspicious child processes of "jamf". Could be a sign of potential abuse of Jamf as a C2 server as seen by Typhon MythicAgent.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 2316929c-01aa-438c-970f-099145ab1ee6
RuleName = JAMF MDM Potential Suspicious Child Process
EventType = Process.Start
Tag = proc-start-jamf-mdm-potential-suspicious-child-process
RiskScore = 50
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Parent.Path, "/jamf") and (iendswith(Process.Path, "/bash") or iendswith(Process.Path, "/sh"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=MacOS]
# Detects attempts to create and/or add an account to the admin group, thus granting admin privileges.
# Author: Sohan G (D4rkCiph3r)
RuleId = 5d0fdb62-f225-42fb-8402-3dfe64da468a
RuleName = User Added To Admin Group Via DseditGroup
EventType = Process.Start
Tag = proc-start-user-added-to-admin-group-via-dseditgroup
RiskScore = 50
Annotation = {"mitre_attack": ["T1078.003"], "author": "Sohan G (D4rkCiph3r)"}
Query = iendswith(Process.Path, "/dseditgroup") and icontains(Process.CommandLine, " -o edit ") and icontains(Process.CommandLine, " -a ") and icontains(Process.CommandLine, " -t user") and icontains(Process.CommandLine, "admin")


[ThreatDetectionRule platform=MacOS]
# Identifies the execution traces of the XCSSET malware. XCSSET is a macOS trojan that primarily spreads via Xcode projects and maliciously modifies applications. Infected users are also vulnerable to having their credentials, accounts, and other vital data stolen.
# Author: Tim Rauch (rule), Elastic (idea)
RuleId = 47d65ac0-c06f-4ba2-a2e3-d263139d0f51
RuleName = Potential XCSSET Malware Infection
EventType = Process.Start
Tag = proc-start-potential-xcsset-malware-infection
RiskScore = 50
Annotation = {"author": "Tim Rauch (rule), Elastic (idea)"}
Query = iendswith(Parent.Path, "/bash") and iendswith(Process.Path, "/curl") and (icontains(Process.CommandLine, "/sys/log.php") or icontains(Process.CommandLine, "/sys/prepod.php") or icontains(Process.CommandLine, "/sys/bin/Pods")) and icontains(Process.CommandLine, "https://") or iendswith(Parent.Path, "/bash") and iendswith(Process.Path, "/osacompile") and icontains(Process.CommandLine, "/Users/") and icontains(Process.CommandLine, "/Library/Group Containers/") or iendswith(Parent.Path, "/bash") and iendswith(Process.Path, "/plutil") and icontains(Process.CommandLine, "LSUIElement") and icontains(Process.CommandLine, "/Users/") and icontains(Process.CommandLine, "/Library/Group Containers/") or iendswith(Process.Path, "/zip") and icontains(Process.CommandLine, "-r") and icontains(Process.CommandLine, "/Users/") and icontains(Process.CommandLine, "/Library/Group Containers/")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=MacOS]
# Detects potential in-memory downloading and compiling of applets using curl and osacompile as seen used by XCSSET malware
# Author: Sohan G (D4rkCiph3r), Red Canary (idea)
RuleId = 13db8d2e-7723-4c2c-93c1-a4d36994f7ef
RuleName = Potential In-Memory Download And Compile Of Payloads
EventType = Process.Start
Tag = proc-start-potential-in-memory-download-and-compile-of-payloads
RiskScore = 50
Annotation = {"mitre_attack": ["T1059.007", "T1105"], "author": "Sohan G (D4rkCiph3r), Red Canary (idea)"}
Query = icontains(Process.CommandLine, "osacompile") and icontains(Process.CommandLine, "curl")


[ThreatDetectionRule platform=MacOS]
# Detects attempts to create and add an account to the admin group via "dscl"
# Author: Sohan G (D4rkCiph3r)
RuleId = b743623c-2776-40e0-87b1-682b975d0ca5
RuleName = User Added To Admin Group Via Dscl
EventType = Process.Start
Tag = proc-start-user-added-to-admin-group-via-dscl
RiskScore = 50
Annotation = {"mitre_attack": ["T1078.003"], "author": "Sohan G (D4rkCiph3r)"}
Query = iendswith(Process.Path, "/dscl") and icontains(Process.CommandLine, " -append ") and icontains(Process.CommandLine, " /Groups/admin ") and icontains(Process.CommandLine, " GroupMembership ")


[ThreatDetectionRule platform=MacOS]
# Detects the execution of the hdiutil utility in order to mount disk images.
# Author: Omar Khaled (@beacon_exe)
RuleId = bf241472-f014-4f01-a869-96f99330ca8c
RuleName = Disk Image Mounting Via Hdiutil - MacOS
EventType = Process.Start
Tag = proc-start-disk-image-mounting-via-hdiutil-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1566.001", "T1560.001"], "author": "Omar Khaled (@beacon_exe)"}
Query = iendswith(Process.Path, "/hdiutil") and (icontains(Process.CommandLine, "attach ") or icontains(Process.CommandLine, "mount "))


[ThreatDetectionRule platform=MacOS]
# Detects the execution of the hdiutil utility in order to create a disk image.
# Author: Omar Khaled (@beacon_exe)
RuleId = 1cf98dc2-fcb0-47c9-8aea-654c9284d1ae
RuleName = Disk Image Creation Via Hdiutil - MacOS
EventType = Process.Start
Tag = proc-start-disk-image-creation-via-hdiutil-macos
RiskScore = 50
Annotation = {"author": "Omar Khaled (@beacon_exe)"}
Query = iendswith(Process.Path, "/hdiutil") and icontains(Process.CommandLine, "create")


[ThreatDetectionRule platform=MacOS]
# Detects the execution of programs as Launch Agents or Launch Daemons using launchctl on macOS.
# Author: Pratinav Chandra
RuleId = ae9d710f-dcd1-4f75-a0a5-93a73b5dda0e
RuleName = Launch Agent/Daemon Execution Via Launchctl
EventType = Process.Start
Tag = proc-start-launch-agent/daemon-execution-via-launchctl
RiskScore = 50
Annotation = {"mitre_attack": ["T1569.001", "T1543.001", "T1543.004"], "author": "Pratinav Chandra"}
Query = iendswith(Process.Path, "/launchctl") and (icontains(Process.CommandLine, "submit") or icontains(Process.CommandLine, "load") or icontains(Process.CommandLine, "start"))


[ThreatDetectionRule platform=MacOS]
# Detects the use of "sw_vers" for system information discovery
# Author: Joseliyo Sanchez, @Joseliyo_Jstnk
RuleId = 5de06a6f-673a-4fc0-8d48-bcfe3837b033
RuleName = System Information Discovery Using sw_vers
EventType = Process.Start
Tag = proc-start-system-information-discovery-using-sw_vers
RiskScore = 50
Annotation = {"mitre_attack": ["T1082"], "author": "Joseliyo Sanchez, @Joseliyo_Jstnk"}
Query = iendswith(Process.Path, "/sw\_vers") and (icontains(Process.CommandLine, "-buildVersion") or icontains(Process.CommandLine, "-productName") or icontains(Process.CommandLine, "-productVersion"))


[ThreatDetectionRule platform=MacOS]
# Detects attempts to create and add an account to the admin group via "sysadminctl"
# Author: Sohan G (D4rkCiph3r)
RuleId = 652c098d-dc11-4ba6-8566-c20e89042f2b
RuleName = User Added To Admin Group Via Sysadminctl
EventType = Process.Start
Tag = proc-start-user-added-to-admin-group-via-sysadminctl
RiskScore = 50
Annotation = {"mitre_attack": ["T1078.003"], "author": "Sohan G (D4rkCiph3r)"}
Query = iendswith(Process.Path, "/sysadminctl") and icontains(Process.CommandLine, " -addUser ") and icontains(Process.CommandLine, " -admin ")


[ThreatDetectionRule platform=MacOS]
# Detects the execution of suspicious child processes from macOS installer package parent process. This includes osascript, JXA, curl and wget amongst other interpreters
# Author: Sohan G (D4rkCiph3r)
RuleId = e0cfaecd-602d-41af-988d-f6ccebb2af26
RuleName = Suspicious Installer Package Child Process
EventType = Process.Start
Tag = proc-start-suspicious-installer-package-child-process
RiskScore = 50
Annotation = {"mitre_attack": ["T1059", "T1059.007", "T1071", "T1071.001"], "author": "Sohan G (D4rkCiph3r)"}
Query = (iendswith(Parent.Path, "/package\_script\_service") or iendswith(Parent.Path, "/installer")) and (iendswith(Process.Path, "/sh") or iendswith(Process.Path, "/bash") or iendswith(Process.Path, "/dash") or iendswith(Process.Path, "/python") or iendswith(Process.Path, "/ruby") or iendswith(Process.Path, "/perl") or iendswith(Process.Path, "/php") or iendswith(Process.Path, "/javascript") or iendswith(Process.Path, "/osascript") or iendswith(Process.Path, "/tclsh") or iendswith(Process.Path, "/curl") or iendswith(Process.Path, "/wget")) and (icontains(Process.CommandLine, "preinstall") or icontains(Process.CommandLine, "postinstall"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=MacOS]
# Detects when a built-in utility is used to decode and decrypt a payload after a macOS disk image (DMG) is executed. Malware authors may attempt to evade detection and trick users into executing malicious code by encoding and encrypting their payload and placing it in a disk image file. This behavior is consistent with adware or malware families such as Bundlore and Shlayer.
# Author: Tim Rauch (rule), Elastic (idea)
RuleId = 234dc5df-40b5-49d1-bf53-0d44ce778eca
RuleName = Payload Decoded and Decrypted via Built-in Utilities
EventType = Process.Start
Tag = proc-start-payload-decoded-and-decrypted-via-built-in-utilities
RiskScore = 50
Annotation = {"mitre_attack": ["T1059", "T1204", "T1140"], "author": "Tim Rauch (rule), Elastic (idea)"}
Query = iendswith(Process.Path, "/openssl") and icontains(Process.CommandLine, "/Volumes/") and icontains(Process.CommandLine, "enc") and icontains(Process.CommandLine, "-base64") and icontains(Process.CommandLine, " -d ")


[ThreatDetectionRule platform=MacOS]
# Detects disabling of Time Machine (Apple's automated backup utility software) via the native macOS backup utility "tmutil".
# An attacker can use this to prevent backups from occurring.
# Author: Pratinav Chandra
RuleId = 2c95fa8a-8b8d-4787-afce-7117ceb8e3da
RuleName = Time Machine Backup Disabled Via Tmutil - MacOS
EventType = Process.Start
Tag = proc-start-time-machine-backup-disabled-via-tmutil-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1490"], "author": "Pratinav Chandra"}
Query = (iendswith(Process.Path, "/tmutil") or icontains(Process.CommandLine, "tmutil")) and icontains(Process.CommandLine, "disable")


[ThreatDetectionRule platform=MacOS]
# Detects execution of the "pbpaste" utility, which retrieves the contents of the clipboard (a.k.a. pasteboard) and writes them to the standard output (stdout).
# The utility is often used for creating new files with the clipboard content or for piping clipboard contents to other commands.
# It can also be used in shell scripts that may require clipboard content as input.
# Attackers can abuse this utility in order to collect data from the user clipboard, which may contain passwords or sensitive information.
# Use this rule to hunt for potential abuse of the utility by looking at the parent process and any potentially suspicious command line content.
# Author: Daniel Cortez
RuleId = d8af0da1-2959-40f9-a3e4-37a6aa1228b7
RuleName = Clipboard Data Collection Via Pbpaste
EventType = Process.Start
Tag = proc-start-clipboard-data-collection-via-pbpaste
RiskScore = 50
Annotation = {"mitre_attack": ["T1115"], "author": "Daniel Cortez"}
Query = iendswith(Process.Path, "/pbpaste")


[ThreatDetectionRule platform=MacOS]
# Detects the use of "ioreg" which will show I/O Kit registry information.
# This process is used for system information discovery.
# It has been observed in-the-wild by calling this process directly or using bash and grep to look for specific strings.
# Author: Joseliyo Sanchez, @Joseliyo_Jstnk
RuleId = 2d5e7a8b-f484-4a24-945d-7f0efd52eab0
RuleName = System Information Discovery Using Ioreg
EventType = Process.Start
Tag = proc-start-system-information-discovery-using-ioreg
RiskScore = 50
Annotation = {"mitre_attack": ["T1082"], "author": "Joseliyo Sanchez, @Joseliyo_Jstnk"}
Query = (iendswith(Process.Path, "/ioreg") or icontains(Process.CommandLine, "ioreg")) and (icontains(Process.CommandLine, "-l") or icontains(Process.CommandLine, "-c")) and (icontains(Process.CommandLine, "AppleAHCIDiskDriver") or icontains(Process.CommandLine, "IOPlatformExpertDevice") or icontains(Process.CommandLine, "Oracle") or icontains(Process.CommandLine, "Parallels") or icontains(Process.CommandLine, "USB Vendor Name") or icontains(Process.CommandLine, "VirtualBox") or icontains(Process.CommandLine, "VMware"))


[ThreatDetectionRule platform=MacOS]
# Detects potential suspicious applet or osascript executing "osacompile".
# Author: Sohan G (D4rkCiph3r), Red Canary (Idea)
RuleId = a753a6af-3126-426d-8bd0-26ebbcb92254
RuleName = Osacompile Execution By Potentially Suspicious Applet/Osascript
EventType = Process.Start
Tag = proc-start-osacompile-execution-by-potentially-suspicious-applet/osascript
RiskScore = 50
Annotation = {"mitre_attack": ["T1059.002"], "author": "Sohan G (D4rkCiph3r), Red Canary (Idea)"}
Query = (iendswith(Parent.Path, "/applet") or iendswith(Parent.Path, "/osascript")) and icontains(Process.CommandLine, "osacompile")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=MacOS]
# Detects the execution of the nscurl utility in order to download files.
# Author: Daniel Cortez
RuleId = 6d8a7cf1-8085-423b-b87d-7e880faabbdf
RuleName = File Download Via Nscurl - MacOS
EventType = Process.Start
Tag = proc-start-file-download-via-nscurl-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1105"], "author": "Daniel Cortez"}
Query = iendswith(Process.Path, "/nscurl") and (icontains(Process.CommandLine, "--download ") or icontains(Process.CommandLine, "--download-directory ") or icontains(Process.CommandLine, "--output ") or icontains(Process.CommandLine, "-dir ") or icontains(Process.CommandLine, "-dl ") or icontains(Process.CommandLine, "-ld") or icontains(Process.CommandLine, "-o "))


[ThreatDetectionRule platform=MacOS]
# Detects the execution of "system_profiler" with specific "Data Types" that have been seen being used by threat actors and malware. It provides system hardware and software configuration information.
# This process is primarily used for system information discovery. However, "system_profiler" can also be used to determine if virtualization software is being run for defense evasion purposes.
# Author: Stephen Lincoln `@slincoln_aiq` (AttackIQ)
RuleId = 4809c683-059b-4935-879d-36835986f8cf
RuleName = System Information Discovery Using System_Profiler
EventType = Process.Start
Tag = proc-start-system-information-discovery-using-system_profiler
RiskScore = 50
Annotation = {"mitre_attack": ["T1082", "T1497.001"], "author": "Stephen Lincoln `@slincoln_aiq` (AttackIQ)"}
Query = (iendswith(Process.Path, "/system\_profiler") or icontains(Process.CommandLine, "system\_profiler")) and (icontains(Process.CommandLine, "SPApplicationsDataType") or icontains(Process.CommandLine, "SPHardwareDataType") or icontains(Process.CommandLine, "SPNetworkDataType") or icontains(Process.CommandLine, "SPUSBDataType"))


[ThreatDetectionRule platform=MacOS]
# Detects deletion attempts of MacOS Time Machine backups via the native backup utility "tmutil".
# An adversary may perform this action before launching a ransonware attack to prevent the victim from restoring their files.
# Author: Pratinav Chandra
RuleId = 452df256-da78-427a-866f-49fa04417d74
RuleName = Time Machine Backup Deletion Attempt Via Tmutil - MacOS
EventType = Process.Start
Tag = proc-start-time-machine-backup-deletion-attempt-via-tmutil-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1490"], "author": "Pratinav Chandra"}
Query = (iendswith(Process.Path, "/tmutil") or icontains(Process.CommandLine, "tmutil")) and icontains(Process.CommandLine, "delete")


[ThreatDetectionRule platform=MacOS]
# Detects the addition of a new file or path exclusion to MacOS Time Machine via the "tmutil" utility.
# An adversary could exclude a path from Time Machine backups to prevent certain files from being backed up.
# Author: Pratinav Chandra
RuleId = 9acf45ed-3a26-4062-bf08-56857613eb52
RuleName = New File Exclusion Added To Time Machine Via Tmutil - MacOS
EventType = Process.Start
Tag = proc-start-new-file-exclusion-added-to-time-machine-via-tmutil-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1490"], "author": "Pratinav Chandra"}
Query = (iendswith(Process.Path, "/tmutil") or icontains(Process.CommandLine, "tmutil")) and icontains(Process.CommandLine, "addexclusion")


[ThreatDetectionRule platform=MacOS]
# Detects abuse of the cron utility to perform task scheduling for initial or recurring execution of malicious code. Detection will focus on crontab jobs uploaded from the tmp folder.
# Author: Alejandro Ortuno, oscd.community
RuleId = 7c3b43d8-d794-47d2-800a-d277715aa460
RuleName = Scheduled Cron Task/Job - MacOs
EventType = Process.Start
Tag = proc-start-scheduled-cron-task/job-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1053.003"], "author": "Alejandro Ortuno, oscd.community"}
Query = iendswith(Process.Path, "/crontab") and icontains(Process.CommandLine, "/tmp/")


[ThreatDetectionRule platform=MacOS]
# Detects suspicious child processes spawned from browsers. This could be a result of a potential web browser exploitation.
# Author: Sohan G (D4rkCiph3r)
RuleId = 0250638a-2b28-4541-86fc-ea4c558fa0c6
RuleName = Suspicious Browser Child Process - MacOS
EventType = Process.Start
Tag = proc-start-suspicious-browser-child-process-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1189", "T1203", "T1059"], "author": "Sohan G (D4rkCiph3r)"}
Query = (icontains(Parent.Path, "com.apple.WebKit.WebContent") or icontains(Parent.Path, "firefox") or icontains(Parent.Path, "Google Chrome Helper") or icontains(Parent.Path, "Google Chrome") or icontains(Parent.Path, "Microsoft Edge") or icontains(Parent.Path, "Opera") or icontains(Parent.Path, "Safari") or icontains(Parent.Path, "Tor Browser")) and (iendswith(Process.Path, "/bash") or iendswith(Process.Path, "/curl") or iendswith(Process.Path, "/dash") or iendswith(Process.Path, "/ksh") or iendswith(Process.Path, "/osascript") or iendswith(Process.Path, "/perl") or iendswith(Process.Path, "/php") or iendswith(Process.Path, "/pwsh") or iendswith(Process.Path, "/python") or iendswith(Process.Path, "/sh") or iendswith(Process.Path, "/tcsh") or iendswith(Process.Path, "/wget") or iendswith(Process.Path, "/zsh")) and not (icontains(Process.CommandLine, "--defaults-torrc") or Process.CommandLine like r"%/Library/Application Support/Microsoft/MAU%/Microsoft AutoUpdate.app/Contents/MacOS/msupdate%" or (icontains(Parent.Path, "Google Chrome Helper") or icontains(Parent.Path, "Google Chrome")) and (Process.CommandLine like r"%/Volumes/Google Chrome/Google Chrome.app/Contents/Frameworks/%/Resources/install.sh%" or Process.CommandLine like r"%/Applications/Google Chrome.app/Contents/Frameworks/Google Chrome Framework.framework/%/Resources/keystone\_promote\_preflight.sh%" or Process.CommandLine like r"%/Applications/Google Chrome.app/Contents/Frameworks/Google Chrome Framework.framework/%/Resources/keystone\_promote\_postflight.sh%") or icontains(Parent.Path, "Microsoft Edge") and (icontains(Process.CommandLine, "IOPlatformExpertDevice") or icontains(Process.CommandLine, "hw.model")) or (icontains(Parent.Path, "Google Chrome Helper") or icontains(Parent.Path, "Google Chrome")) and icontains(Process.CommandLine, "/Users/") and icontains(Process.CommandLine, "/Library/Application Support/Google/Chrome/recovery/") and icontains(Process.CommandLine, "/ChromeRecovery")) and not (isnull(Process.CommandLine) or Process.CommandLine == "")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=MacOS]
# Detects when a user manipulates with Firmward Password on MacOS. NOTE - this command has been disabled on silicon-based apple computers.
# Author: Austin Songer @austinsonger
RuleId = 7ed2c9f7-c59d-4c82-a7e2-f859aa676099
RuleName = Suspicious MacOS Firmware Activity
EventType = Process.Start
Tag = proc-start-suspicious-macos-firmware-activity
RiskScore = 50
Annotation = {"author": "Austin Songer @austinsonger"}
Query = Process.Path == "/usr/sbin/firmwarepasswd" and (icontains(Process.CommandLine, "setpasswd") or icontains(Process.CommandLine, "full") or icontains(Process.CommandLine, "delete") or icontains(Process.CommandLine, "check"))


[ThreatDetectionRule platform=MacOS]
# Detects commandline operations on shell history files
# Author: Mikhail Larin, oscd.community
RuleId = 508a9374-ad52-4789-b568-fc358def2c65
RuleName = Suspicious History File Operations
EventType = Process.Start
Tag = proc-start-suspicious-history-file-operations
RiskScore = 50
Annotation = {"mitre_attack": ["T1552.003"], "author": "Mikhail Larin, oscd.community"}
Query = icontains(Process.CommandLine, ".bash\_history") or icontains(Process.CommandLine, ".zsh\_history") or icontains(Process.CommandLine, ".zhistory") or icontains(Process.CommandLine, ".history") or icontains(Process.CommandLine, ".sh\_history") or icontains(Process.CommandLine, "fish\_history")


[ThreatDetectionRule platform=MacOS]
# Detects deletion of local audit logs
# Author: remotephone, oscd.community
RuleId = acf61bd8-d814-4272-81f0-a7a269aa69aa
RuleName = Indicator Removal on Host - Clear Mac System Logs
EventType = Process.Start
Tag = proc-start-indicator-removal-on-host-clear-mac-system-logs
RiskScore = 50
Annotation = {"mitre_attack": ["T1070.002"], "author": "remotephone, oscd.community"}
Query = (iendswith(Process.Path, "/rm") or iendswith(Process.Path, "/unlink") or iendswith(Process.Path, "/shred")) and (icontains(Process.CommandLine, "/var/log") or icontains(Process.CommandLine, "/Users/") and icontains(Process.CommandLine, "/Library/Logs/"))


[ThreatDetectionRule platform=MacOS]
# Detects potential execution of MeshAgent which is a tool used for remote access.
# Historical data shows that threat actors rename MeshAgent binary to evade detection.
# Matching command lines with the '--meshServiceName' argument can indicate that the MeshAgent is being used for remote access.
# Author: Norbert Jaśniewicz (AlphaSOC)
RuleId = 22c45af6-f590-4d44-bab3-b5b2d2a2b6d9
RuleName = Remote Access Tool - Potential MeshAgent Execution - MacOS
EventType = Process.Start
Tag = proc-start-remote-access-tool-potential-meshagent-execution-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1219.002"], "author": "Norbert Ja\u015bniewicz (AlphaSOC)"}
Query = icontains(Process.CommandLine, "--meshServiceName")


[ThreatDetectionRule platform=MacOS]
# Detects passwords dumps from Keychain
# Author: Tim Ismilyaev, oscd.community, Florian Roth (Nextron Systems)
RuleId = b120b587-a4c2-4b94-875d-99c9807d6955
RuleName = Credentials from Password Stores - Keychain
EventType = Process.Start
Tag = proc-start-credentials-from-password-stores-keychain
RiskScore = 50
Annotation = {"mitre_attack": ["T1555.001"], "author": "Tim Ismilyaev, oscd.community, Florian Roth (Nextron Systems)"}
Query = Process.Path == "/usr/bin/security" and (icontains(Process.CommandLine, "find-certificate") or icontains(Process.CommandLine, " export ")) or icontains(Process.CommandLine, " dump-keychain ") or icontains(Process.CommandLine, " login-keychain ")


[ThreatDetectionRule platform=MacOS]
# Detects the use of csrutil to disable the Configure System Integrity Protection (SIP). This technique is used in post-exploit scenarios.
# Author: Joseliyo Sanchez, @Joseliyo_Jstnk
RuleId = 3603f18a-ec15-43a1-9af2-d196c8a7fec6
RuleName = System Integrity Protection (SIP) Disabled
EventType = Process.Start
Tag = proc-start-system-integrity-protection-(sip)-disabled
RiskScore = 50
Annotation = {"mitre_attack": ["T1518.001"], "author": "Joseliyo Sanchez, @Joseliyo_Jstnk"}
Query = iendswith(Process.Path, "/csrutil") and icontains(Process.CommandLine, "disable")


[ThreatDetectionRule platform=MacOS]
# Detects usage of "find" binary in a suspicious manner to perform discovery
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 85de3a19-b675-4a51-bfc6-b11a5186c971
RuleName = Potential Discovery Activity Using Find - MacOS
EventType = Process.Start
Tag = proc-start-potential-discovery-activity-using-find-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1083"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "/find") and (icontains(Process.CommandLine, "-perm -4000") or icontains(Process.CommandLine, "-perm -2000") or icontains(Process.CommandLine, "-perm 0777") or icontains(Process.CommandLine, "-perm -222") or icontains(Process.CommandLine, "-perm -o w") or icontains(Process.CommandLine, "-perm -o x") or icontains(Process.CommandLine, "-perm -u=s") or icontains(Process.CommandLine, "-perm -g=s"))


[ThreatDetectionRule platform=MacOS]
# Detects the execution of "sysctl" with specific arguments that have been used by threat actors and malware. It provides system hardware information.
# This process is primarily used to detect and avoid virtualization and analysis environments.
# Author: Pratinav Chandra
RuleId = 6ff08e55-ea53-4f27-94a1-eff92e6d9d5c
RuleName = System Information Discovery Via Sysctl - MacOS
EventType = Process.Start
Tag = proc-start-system-information-discovery-via-sysctl-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1497.001", "T1082"], "author": "Pratinav Chandra"}
Query = (iendswith(Process.Path, "/sysctl") or icontains(Process.CommandLine, "sysctl")) and (icontains(Process.CommandLine, "hw.") or icontains(Process.CommandLine, "kern.") or icontains(Process.CommandLine, "machdep."))


[ThreatDetectionRule platform=MacOS]
# Detects additions to the Emond Launch Daemon that adversaries may use to gain persistence and elevate privileges.
# Author: Alejandro Ortuno, oscd.community
RuleId = 23c43900-e732-45a4-8354-63e4a6c187ce
RuleName = MacOS Emond Launch Daemon
EventType = File.Create
Tag = macos-emond-launch-daemon
RiskScore = 50
Annotation = {"mitre_attack": ["T1546.014"], "author": "Alejandro Ortuno, oscd.community"}
Query = icontains(File.Path, "/etc/emond.d/rules/") and iendswith(File.Path, ".plist") or icontains(File.Path, "/private/var/db/emondClients/")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=MacOS]
# Detects the execution of the "chflags" utility with the "hidden" flag, in order to hide files on MacOS.
# When a file or directory has this hidden flag set, it becomes invisible to the default file listing commands and in graphical file browsers.
# Author: Omar Khaled (@beacon_exe)
RuleId = 3b2c1059-ae5f-40b6-b5d4-6106d3ac20fe
RuleName = Hidden Flag Set On File/Directory Via Chflags - MacOS
EventType = Process.Start
Tag = proc-start-hidden-flag-set-on-file/directory-via-chflags-macos
RiskScore = 50
Annotation = {"mitre_attack": ["T1218", "T1564.004", "T1552.001", "T1105"], "author": "Omar Khaled (@beacon_exe)"}
Query = iendswith(Process.Path, "/chflags") and icontains(Process.CommandLine, "hidden ")


[ThreatDetectionRule platform=MacOS]
# Detects when the macOS Script Editor utility spawns an unusual child process.
# Author: Tim Rauch (rule), Elastic (idea)
RuleId = 6e4dcdd1-e48b-42f7-b2d8-3b413fc58cb4
RuleName = Suspicious Execution via macOS Script Editor
EventType = Process.Start
Tag = proc-start-suspicious-execution-via-macos-script-editor
RiskScore = 50
Annotation = {"mitre_attack": ["T1566", "T1566.002", "T1059", "T1059.002", "T1204", "T1204.001", "T1553"], "author": "Tim Rauch (rule), Elastic (idea)"}
Query = iendswith(Parent.Path, "/Script Editor") and (iendswith(Process.Path, "/curl") or iendswith(Process.Path, "/bash") or iendswith(Process.Path, "/sh") or iendswith(Process.Path, "/zsh") or iendswith(Process.Path, "/dash") or iendswith(Process.Path, "/fish") or iendswith(Process.Path, "/osascript") or iendswith(Process.Path, "/mktemp") or iendswith(Process.Path, "/chmod") or iendswith(Process.Path, "/php") or iendswith(Process.Path, "/nohup") or iendswith(Process.Path, "/openssl") or iendswith(Process.Path, "/plutil") or iendswith(Process.Path, "/PlistBuddy") or iendswith(Process.Path, "/xattr") or iendswith(Process.Path, "/sqlite") or iendswith(Process.Path, "/funzip") or iendswith(Process.Path, "/popen") or icontains(Process.Path, "python") or icontains(Process.Path, "perl"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=MacOS]
# Detects attempts to enable the root account via "dsenableroot"
# Author: Sohan G (D4rkCiph3r)
RuleId = 821bcf4d-46c7-4b87-bc57-9509d3ba7c11
RuleName = Root Account Enable Via Dsenableroot
EventType = Process.Start
Tag = proc-start-root-account-enable-via-dsenableroot
RiskScore = 50
Annotation = {"mitre_attack": ["T1078", "T1078.001", "T1078.003"], "author": "Sohan G (D4rkCiph3r)"}
Query = iendswith(Process.Path, "/dsenableroot") and not icontains(Process.CommandLine, " -d ")


[ThreatDetectionRule platform=MacOS]
# Detects execution of AppleScript of the macOS scripting language AppleScript.
# Author: Alejandro Ortuno, oscd.community
RuleId = 1bc2e6c5-0885-472b-bed6-be5ea8eace55
RuleName = MacOS Scripting Interpreter AppleScript
EventType = Process.Start
Tag = proc-start-macos-scripting-interpreter-applescript
RiskScore = 50
Annotation = {"mitre_attack": ["T1059.002"], "author": "Alejandro Ortuno, oscd.community"}
Query = iendswith(Process.Path, "/osascript") and (icontains(Process.CommandLine, " -e ") or icontains(Process.CommandLine, ".scpt") or icontains(Process.CommandLine, ".js"))

