EventType = File.Create
Tag = potential-sharepoint-toolshell-cve-2025-53770-exploitation-file-create
RiskScore = 100
Annotation = {"mitre_attack": ["T1190"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (istartswith(File.Path, "C:\\Program Files\\Common Files\\Microsoft Shared\\Web Server Extensions\\") or istartswith(File.Path, "C:\\Program Files (x86)\\Common Files\\Microsoft Shared\\Web Server Extensions\\")) and (icontains(File.Path, "\\15\\TEMPLATE\\LAYOUTS\\") or icontains(File.Path, "\\16\\TEMPLATE\\LAYOUTS\\")) and (iendswith(File.Path, "\\spinstall.aspx") or File.Path like r"%\\spinstall_.aspx" or iendswith(File.Path, "\\debug\_dev.js"))
