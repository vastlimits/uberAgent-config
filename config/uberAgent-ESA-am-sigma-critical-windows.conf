[ThreatDetectionRule platform=Windows]
# Detects activity observed by different researchers to be HAFNIUM group activity (or related) on Exchange servers
# Author: Florian Roth (Nextron Systems)
RuleId = bbb2dedd-a0e3-46ab-ba6c-6c82ae7a9aa7
RuleName = HAFNIUM Exchange Exploitation Activity
EventType = Process.Start
Tag = proc-start-hafnium-exchange-exploitation-activity
RiskScore = 100
Annotation = {"mitre_attack": ["T1546", "T1053"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "attrib") and icontains(Process.CommandLine, " +h ") and icontains(Process.CommandLine, " +s ") and icontains(Process.CommandLine, " +r ") and icontains(Process.CommandLine, ".aspx") or icontains(Process.Path, "\\ProgramData\\VSPerfMon\\") or icontains(Process.CommandLine, "schtasks") and icontains(Process.CommandLine, "VSPerfMon") or iendswith(Process.Path, "Opera\_browser.exe") and (iendswith(Parent.Path, "\\services.exe") or iendswith(Parent.Path, "\\svchost.exe")) or iendswith(Process.Path, "Users\\Public\\opera\\Opera\_browser.exe") or icontains(Process.CommandLine, "vssadmin list shadows") and icontains(Process.CommandLine, "Temp\\\_\_output") or iendswith(Process.Path, "\\makecab.exe") and icontains(Process.CommandLine, "inetpub\\wwwroot\\") and icontains(Process.CommandLine, ".dmp.zip") or iendswith(Process.Path, "\\makecab.exe") and (icontains(Process.CommandLine, "Microsoft\\Exchange Server\\") or icontains(Process.CommandLine, "compressionmemory") or icontains(Process.CommandLine, ".gif")) or icontains(Process.CommandLine, " -t7z ") and icontains(Process.CommandLine, "C:\\Programdata\\pst") and icontains(Process.CommandLine, "\\it.zip") or icontains(Process.CommandLine, "\\comsvcs.dll") and icontains(Process.CommandLine, "Minidump") and icontains(Process.CommandLine, "full ") and icontains(Process.CommandLine, "\\inetpub\\wwwroot") or icontains(Process.CommandLine, "Windows\\Temp\\xx.bat") or icontains(Process.CommandLine, "Windows\\WwanSvcdcs") or icontains(Process.CommandLine, "Windows\\Temp\\cw.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the use of the filename DumpStack.log to evade Microsoft Defender
# Author: Florian Roth (Nextron Systems)
RuleId = 4f647cfa-b598-4e12-ad69-c68dd16caef8
RuleName = DumpStack.log Defender Evasion
EventType = Process.Start
Tag = proc-start-dumpstack.log-defender-evasion
RiskScore = 100
Annotation = {"author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\DumpStack.log") or icontains(Process.CommandLine, " -o DumpStack.log")


[ThreatDetectionRule platform=Windows]
# Detects usage of the powerShell New-MailboxExportRequest Cmdlet to exports a mailbox to a remote or local share, as used in ProxyShell exploitations
# Author: Florian Roth (Nextron Systems)
RuleId = 889719ef-dd62-43df-86c3-768fb08dc7c0
RuleName = Suspicious PowerShell Mailbox Export to Share
EventType = Process.Start
Tag = proc-start-suspicious-powershell-mailbox-export-to-share
RiskScore = 100
Annotation = {"author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "New-MailboxExportRequest") and icontains(Process.CommandLine, " -Mailbox ") and icontains(Process.CommandLine, " -FilePath \\\\")


[ThreatDetectionRule platform=Windows]
# Detects exploits that use CVE-2017-11882 to start EQNEDT32.EXE and other sub processes like mshta.exe
# Author: Florian Roth (Nextron Systems)
