[ThreatDetectionRule platform=Windows]
# Detects potential Dridex acitvity via specific process patterns
# Author: Florian Roth (Nextron Systems), oscd.community, Nasreddine Bencherchali (Nextron Systems)
RuleId = e6eb5a96-9e6f-4a18-9cdd-642cfda21c8e
RuleName = Potential Dridex Activity
EventType = Process.Start
Tag = proc-start-potential-dridex-activity
RiskScore = 100
Annotation = {"mitre_attack": ["T1055", "T1135", "T1033"], "author": "Florian Roth (Nextron Systems), oscd.community, Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\svchost.exe") and icontains(Process.CommandLine, "C:\\Users\\") and icontains(Process.CommandLine, "\\Desktop\\") and not istartswith(Parent.Path, "C:\\Windows\\System32\\") or iendswith(Parent.Path, "\\excel.exe") and iendswith(Process.Path, "\\regsvr32.exe") and (icontains(Process.CommandLine, " -s ") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\")) and not icontains(Process.CommandLine, ".dll") or iendswith(Parent.Path, "\\svchost.exe") and (iendswith(Process.Path, "\\whoami.exe") and icontains(Process.CommandLine, " /all") or (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, " view"))
