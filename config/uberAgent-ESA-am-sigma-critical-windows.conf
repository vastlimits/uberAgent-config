[ThreatDetectionRule platform=Windows]
# Detects different process execution behaviors as described in various threat reports on Lazarus group activity
# Author: Florian Roth (Nextron Systems), wagga
RuleId = 24c4d154-05a4-4b99-b57d-9b977472443a
RuleName = Lazarus Group Activity
EventType = Process.Start
Tag = proc-start-lazarus-group-activity
RiskScore = 100
Annotation = {"mitre_attack": ["T1059"], "author": "Florian Roth (Nextron Systems), wagga"}
Query = icontains(Process.CommandLine, "reg.exe save hklm\\sam \%temp\%\\~reg\_sam.save") or icontains(Process.CommandLine, "1q2w3e4r@#$@#$@#$") or icontains(Process.CommandLine, " -hp1q2w3e4 ") or icontains(Process.CommandLine, ".dat data03 10000 -p ") or icontains(Process.CommandLine, "netstat -aon | find ") and icontains(Process.CommandLine, "ESTA") and icontains(Process.CommandLine, " > \%temp\%\\~") or icontains(Process.CommandLine, ".255 10 C:\\ProgramData\\IBM\\") and icontains(Process.CommandLine, ".DAT") or icontains(Process.CommandLine, " /c ") and icontains(Process.CommandLine, " -p 0x") and (icontains(Process.CommandLine, "C:\\ProgramData\\") or icontains(Process.CommandLine, "C:\\RECYCLER\\")) or icontains(Process.CommandLine, "rundll32 ") and icontains(Process.CommandLine, "C:\\ProgramData\\") and (icontains(Process.CommandLine, ".bin,") or icontains(Process.CommandLine, ".tmp,") or icontains(Process.CommandLine, ".dat,") or icontains(Process.CommandLine, ".io,") or icontains(Process.CommandLine, ".ini,") or icontains(Process.CommandLine, ".db,"))


[ThreatDetectionRule platform=Windows]
# Detects tools and process executions used by Greenbug in their May 2020 campaign as reported by Symantec
# Author: Florian Roth (Nextron Systems)
RuleId = 3711eee4-a808-4849-8a14-faf733da3612
RuleName = Greenbug Espionage Group Indicators
EventType = Process.Start
Tag = proc-start-greenbug-espionage-group-indicators
RiskScore = 100
Annotation = {"mitre_attack": ["T1059.001", "T1105", "T1036.005"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, ":\\ProgramData\\adobe\\Adobe.exe") or iendswith(Process.Path, ":\\ProgramData\\oracle\\local.exe") or iendswith(Process.Path, "\\revshell.exe") or iendswith(Process.Path, "\\infopagesbackup\\ncat.exe") or iendswith(Process.Path, ":\\ProgramData\\comms\\comms.exe") or icontains(Process.CommandLine, "-ExecutionPolicy Bypass -File") and icontains(Process.CommandLine, "\\msf.ps1") or icontains(Process.CommandLine, "infopagesbackup") and icontains(Process.CommandLine, "\\ncat") and icontains(Process.CommandLine, "-e cmd.exe") or icontains(Process.CommandLine, "system.Data.SqlClient.SqlDataAdapter($cmd); [void]$da.fill") or icontains(Process.CommandLine, "-nop -w hidden -c $k=new-object") or icontains(Process.CommandLine, "[Net.CredentialCache]::DefaultCredentials;IEX ") or icontains(Process.CommandLine, " -nop -w hidden -c $m=new-object net.webclient;$m") or icontains(Process.CommandLine, "-noninteractive -executionpolicy bypass whoami") or icontains(Process.CommandLine, "-noninteractive -executionpolicy bypass netstat -a") or icontains(Process.CommandLine, "L3NlcnZlcj1")


