Tag = suspicious-cobalt-strike-dns-beaconing-sysmon
RiskScore = 100
Annotation = {"mitre_attack": ["T1071.004"], "author": "Florian Roth (Nextron Systems)"}
Query = istartswith(Dns.QueryRequest, "aaa.stage.") or istartswith(Dns.QueryRequest, "post.1") or icontains(Dns.QueryRequest, ".stage.123456.")
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detecting Emotet DLL loading by looking for rundll32.exe processes with command lines ending in ,RunDLL or ,Control_RunDLL
# Author: FPT.EagleEye
RuleId = 54e57ce3-0672-46eb-a402-2c0948d5e3e9
RuleName = Potential Emotet Rundll32 Execution
EventType = Process.Start
Tag = proc-start-potential-emotet-rundll32-execution
RiskScore = 100
Annotation = {"mitre_attack": ["T1218.011"], "author": "FPT.EagleEye"}
Query = (iendswith(Process.Path, "\\rundll32.exe") or Process.Name == "RUNDLL32.EXE") and (iendswith(Process.CommandLine, ",RunDLL") or iendswith(Process.CommandLine, ",Control\_RunDLL")) and not (iendswith(Process.CommandLine, ".dll,Control\_RunDLL") or iendswith(Process.CommandLine, ".dll\",Control\_RunDLL") or iendswith(Process.CommandLine, ".dll',Control\_RunDLL") or iendswith(Parent.Path, "\\tracker.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
