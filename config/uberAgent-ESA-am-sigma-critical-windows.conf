RiskScore = 100
Annotation = {"mitre_attack": ["T1574.001"], "author": "Florian Roth (Nextron Systems), Markus Neis"}
Query = (icontains(Parent.Path, "C:\\Windows\\Temp") or icontains(Parent.Path, "\\hpqhvind.exe")) and istartswith(Process.Path, "C:\\ProgramData\\DRM") or istartswith(Parent.Path, "C:\\ProgramData\\DRM") and iendswith(Process.Path, "\\wmplayer.exe") or iendswith(Parent.Path, "\\Test.exe") and iendswith(Process.Path, "\\wmplayer.exe") or Process.Path == "C:\\ProgramData\\DRM\\CLR\\CLR.exe" or istartswith(Parent.Path, "C:\\ProgramData\\DRM\\Windows") and iendswith(Process.Path, "\\SearchFilterHost.exe")
GenericProperty1 = Parent.Path


