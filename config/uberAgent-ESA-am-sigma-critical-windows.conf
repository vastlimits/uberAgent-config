[ThreatDetectionRule platform=Windows]
# Detects suspicious execution from AsperaFaspex as seen used by Mint Sandstorm
# Author: Nasreddine Bencherchali (Nextron Systems), MSTIC (idea)
RuleId = 91048c0d-5b81-4b85-a099-c9ee4fb87979
RuleName = Mint Sandstorm - AsperaFaspex Suspicious Process Execution
EventType = Process.Start
Tag = proc-start-mint-sandstorm-asperafaspex-suspicious-process-execution
RiskScore = 100
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems), MSTIC (idea)"}
Query = icontains(Parent.Path, "aspera") and icontains(Parent.Path, "\\ruby") and ((iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\powershell\_ise.exe")) and (icontains(Process.CommandLine, " echo ") or icontains(Process.CommandLine, "-dumpmode") or icontains(Process.CommandLine, "-ssh") or icontains(Process.CommandLine, ".dmp") or icontains(Process.CommandLine, "add-MpPreference") or icontains(Process.CommandLine, "adscredentials") or icontains(Process.CommandLine, "bitsadmin") or icontains(Process.CommandLine, "certutil") or icontains(Process.CommandLine, "csvhost.exe") or icontains(Process.CommandLine, "DownloadFile") or icontains(Process.CommandLine, "DownloadString") or icontains(Process.CommandLine, "dsquery") or icontains(Process.CommandLine, "ekern.exe") or icontains(Process.CommandLine, "FromBase64String") or icontains(Process.CommandLine, "iex ") or icontains(Process.CommandLine, "iex(") or icontains(Process.CommandLine, "Invoke-Expression") or icontains(Process.CommandLine, "Invoke-WebRequest") or icontains(Process.CommandLine, "localgroup administrators") or icontains(Process.CommandLine, "o365accountconfiguration") or icontains(Process.CommandLine, "samaccountname=") or icontains(Process.CommandLine, "set-MpPreference") or icontains(Process.CommandLine, "svhost.exe") or icontains(Process.CommandLine, "System.IO.Compression") or icontains(Process.CommandLine, "System.IO.MemoryStream") or icontains(Process.CommandLine, "usoprivate") or icontains(Process.CommandLine, "usoshared") or icontains(Process.CommandLine, "whoami") or Process.CommandLine regex "[-/–][Ee^]{1,2}[ncodema^]*\\s[A-Za-z0-9+/=]{15,}" or Process.CommandLine regex "net\\s+user" or Process.CommandLine regex "net\\s+group" or Process.CommandLine regex "query\\s+session") or icontains(Process.CommandLine, "lsass") and (icontains(Process.CommandLine, "procdump") or icontains(Process.CommandLine, "tasklist") or icontains(Process.CommandLine, "findstr")) or iendswith(Process.Path, "\\wget.exe") and icontains(Process.CommandLine, "http") or iendswith(Process.Path, "\\curl.exe") and icontains(Process.CommandLine, "http") or icontains(Process.CommandLine, "E:jscript") or icontains(Process.CommandLine, "e:vbscript") or icontains(Process.CommandLine, "localgroup Administrators") and icontains(Process.CommandLine, "/add") or icontains(Process.CommandLine, "net") and icontains(Process.CommandLine, "user") and icontains(Process.CommandLine, "/add") or icontains(Process.CommandLine, "reg add") and icontains(Process.CommandLine, "DisableAntiSpyware") and icontains(Process.CommandLine, "\\Microsoft\\Windows Defender") or icontains(Process.CommandLine, "reg add") and icontains(Process.CommandLine, "DisableRestrictedAdmin") and icontains(Process.CommandLine, "CurrentControlSet\\Control\\Lsa") or icontains(Process.CommandLine, "wmic") and icontains(Process.CommandLine, "process call create") or icontains(Process.CommandLine, "wmic") and icontains(Process.CommandLine, "delete") and icontains(Process.CommandLine, "shadowcopy") or icontains(Process.CommandLine, "vssadmin") and icontains(Process.CommandLine, "delete") and icontains(Process.CommandLine, "shadows") or icontains(Process.CommandLine, "wbadmin") and icontains(Process.CommandLine, "delete") and icontains(Process.CommandLine, "catalog"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of file such as spinstall0.aspx which may indicate successful exploitation of CVE-2025-53770.
