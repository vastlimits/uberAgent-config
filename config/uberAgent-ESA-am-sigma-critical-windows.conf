[ThreatDetectionRule platform=Windows]
# Detects specific process tree behavior of a "rundll32" execution with exports linked with Qakbot activity.
# Author: X__Junior (Nextron Systems)
RuleId = 339ed3d6-5490-46d0-96a7-8abe33078f58
RuleName = Qakbot Rundll32 Exports Execution
EventType = Process.Start
Tag = proc-start-qakbot-rundll32-exports-execution
RiskScore = 100
Annotation = {"author": "X__Junior (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\cscript.exe") or iendswith(Parent.Path, "\\curl.exe") or iendswith(Parent.Path, "\\mshta.exe") or iendswith(Parent.Path, "\\powershell.exe") or iendswith(Parent.Path, "\\pwsh.exe") or iendswith(Parent.Path, "\\wscript.exe")) and iendswith(Process.Path, "\\rundll32.exe") and (icontains(Process.CommandLine, ":\\ProgramData\\") or icontains(Process.CommandLine, ":\\Users\\Public\\") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\") or icontains(Process.CommandLine, "\\AppData\\Roaming\\")) and (iendswith(Process.CommandLine, "aslr") or iendswith(Process.CommandLine, "bind") or iendswith(Process.CommandLine, "DrawThemeIcon") or iendswith(Process.CommandLine, "GG10") or iendswith(Process.CommandLine, "GL70") or iendswith(Process.CommandLine, "jhbvygftr") or iendswith(Process.CommandLine, "kjhbhkjvydrt") or iendswith(Process.CommandLine, "LS88") or iendswith(Process.CommandLine, "Motd") or iendswith(Process.CommandLine, "N115") or iendswith(Process.CommandLine, "next") or iendswith(Process.CommandLine, "Nikn") or iendswith(Process.CommandLine, "print") or iendswith(Process.CommandLine, "qqqb") or iendswith(Process.CommandLine, "qqqq") or iendswith(Process.CommandLine, "RS32") or iendswith(Process.CommandLine, "Test") or iendswith(Process.CommandLine, "Time") or iendswith(Process.CommandLine, "Updt") or iendswith(Process.CommandLine, "vips") or iendswith(Process.CommandLine, "Wind") or iendswith(Process.CommandLine, "WW50") or iendswith(Process.CommandLine, "X555") or iendswith(Process.CommandLine, "XL55") or iendswith(Process.CommandLine, "xlAutoOpen") or iendswith(Process.CommandLine, "XS88"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of SecurityXploded Tools
# Author: Florian Roth (Nextron Systems)
RuleId = 7679d464-4f74-45e2-9e01-ac66c5eb041a
RuleName = HackTool - SecurityXploded Execution
EventType = Process.Start
