Query = (icontains(Process.Path, "PetitPotam") or icontains(Process.Path, "RottenPotato") or icontains(Process.Path, "HotPotato") or icontains(Process.Path, "JuicyPotato") or icontains(Process.Path, "\\just\_dce\_") or icontains(Process.Path, "Juicy Potato") or icontains(Process.Path, "\\temp\\rot.exe") or icontains(Process.Path, "\\Potato.exe") or icontains(Process.Path, "\\SpoolSample.exe") or icontains(Process.Path, "\\Responder.exe") or icontains(Process.Path, "\\smbrelayx") or icontains(Process.Path, "\\ntlmrelayx") or icontains(Process.Path, "\\LocalPotato") or icontains(Process.CommandLine, "Invoke-Tater") or icontains(Process.CommandLine, " smbrelay") or icontains(Process.CommandLine, " ntlmrelay") or icontains(Process.CommandLine, "cme smb ") or icontains(Process.CommandLine, " /ntlm:NTLMhash ") or icontains(Process.CommandLine, "Invoke-PetitPotam") or Process.CommandLine like r"%.exe -t % -p %" or icontains(Process.CommandLine, ".exe -c \"{") and iendswith(Process.CommandLine, "}\" -z")) and not (icontains(Process.Path, "HotPotatoes6") or icontains(Process.Path, "HotPotatoes7") or icontains(Process.Path, "HotPotatoes "))


