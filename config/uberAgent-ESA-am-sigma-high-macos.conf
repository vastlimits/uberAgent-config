[ThreatDetectionRule platform=MacOS]
# Detects the execution traces of the WizardUpdate malware. WizardUpdate is a macOS trojan that attempts to infiltrate macOS machines to steal data and it is associated with other types of malicious payloads, increasing the chances of multiple infections on a device.
# Author: Tim Rauch (rule), Elastic (idea)
RuleId = f68c4a4f-19ef-4817-952c-50dce331f4b0
RuleName = Potential WizardUpdate Malware Infection
EventType = Process.Start
Tag = proc-start-potential-wizardupdate-malware-infection
RiskScore = 75
Annotation = {"author": "Tim Rauch (rule), Elastic (idea)"}
Query = iendswith(Process.Path, "/sh") and icontains(Process.CommandLine, "=$(curl ") and icontains(Process.CommandLine, "eval") or iendswith(Process.Path, "/curl") and icontains(Process.CommandLine, "\_intermediate\_agent\_")


[ThreatDetectionRule platform=MacOS]
# Detects possible malicious execution of JXA in-memory via OSAScript
# Author: Sohan G (D4rkCiph3r)
RuleId = f1408a58-0e94-4165-b80a-da9f96cf6fc3
RuleName = JXA In-memory Execution Via OSAScript
EventType = Process.Start
Tag = proc-start-jxa-in-memory-execution-via-osascript
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.002", "T1059.007"], "author": "Sohan G (D4rkCiph3r)"}
Query = icontains(Process.CommandLine, "osascript") and icontains(Process.CommandLine, " -e ") and icontains(Process.CommandLine, "eval") and icontains(Process.CommandLine, "NSData.dataWithContentsOfURL") and (icontains(Process.CommandLine, " -l ") and icontains(Process.CommandLine, "JavaScript") or icontains(Process.CommandLine, ".js"))


[ThreatDetectionRule platform=MacOS]
# Detects possible collection of data from the clipboard via execution of the osascript binary
# Author: Sohan G (D4rkCiph3r)
RuleId = 7794fa3c-edea-4cff-bec7-267dd4770fd7
RuleName = Clipboard Data Collection Via OSAScript
EventType = Process.Start
Tag = proc-start-clipboard-data-collection-via-osascript
RiskScore = 75
Annotation = {"mitre_attack": ["T1115", "T1059.002"], "author": "Sohan G (D4rkCiph3r)"}
Query = icontains(Process.CommandLine, "osascript") and icontains(Process.CommandLine, " -e ") and icontains(Process.CommandLine, "clipboard")


[ThreatDetectionRule platform=MacOS]
# Detects suspicious child processes spawning from microsoft office suite applications such as word or excel. This could indicates malicious macro execution
# Author: Sohan G (D4rkCiph3r)
RuleId = 69483748-1525-4a6c-95ca-90dc8d431b68
RuleName = Suspicious Microsoft Office Child Process - MacOS
EventType = Process.Start
Tag = proc-start-suspicious-microsoft-office-child-process-macos
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.002", "T1137.002", "T1204.002"], "author": "Sohan G (D4rkCiph3r)"}
Query = (icontains(Parent.Path, "Microsoft Word") or icontains(Parent.Path, "Microsoft Excel") or icontains(Parent.Path, "Microsoft PowerPoint") or icontains(Parent.Path, "Microsoft OneNote")) and (iendswith(Process.Path, "/bash") or iendswith(Process.Path, "/curl") or iendswith(Process.Path, "/dash") or iendswith(Process.Path, "/fish") or iendswith(Process.Path, "/osacompile") or iendswith(Process.Path, "/osascript") or iendswith(Process.Path, "/sh") or iendswith(Process.Path, "/zsh") or iendswith(Process.Path, "/python") or iendswith(Process.Path, "/python3") or iendswith(Process.Path, "/wget"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=MacOS]
# Detects creation of persistence artifacts placed by Atomic MacOS Stealer in macOS systems. Recent Atomic MacOS Stealer variants have been observed dropping these to maintain persistent access after compromise.
# Author: Jason Phang Vern - Onn, Robbin Ooi Zhen Heng (Gen Digital)
RuleId = e710a880-1f18-4417-b6a0-b5afdf7e3023
RuleName = Atomic MacOS Stealer - Persistence Indicators
EventType = File.Create
Tag = atomic-macos-stealer-persistence-indicators
RiskScore = 75
Annotation = {"mitre_attack": ["T1564.001", "T1543.004"], "author": "Jason Phang Vern - Onn, Robbin Ooi Zhen Heng (Gen Digital)"}
Query = iendswith(Process.Path, "/curl") and istartswith(File.Path, "/Users/") and iendswith(File.Path, ".helper") or File.Path == "/Library/LaunchDaemons/com.finder.helper.plist"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=MacOS]
# Detects potential suspicious run-only executions compiled using OSACompile
# Author: Sohan G (D4rkCiph3r)
RuleId = b9d9b652-d8ed-4697-89a2-a1186ee680ac
RuleName = OSACompile Run-Only Execution
EventType = Process.Start
Tag = proc-start-osacompile-run-only-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.002"], "author": "Sohan G (D4rkCiph3r)"}
Query = icontains(Process.CommandLine, "osacompile") and icontains(Process.CommandLine, " -x ") and icontains(Process.CommandLine, " -e ")


[ThreatDetectionRule platform=MacOS]
# Detects the use of tail to extract bytes at an offset from an image and then decode the base64 value to create a new file with the decoded content. The detected execution is a bash one-liner.
# Author: Joseliyo Sanchez, @Joseliyo_Jstnk
RuleId = 09a910bf-f71f-4737-9c40-88880ba5913d
RuleName = Potential Base64 Decoded From Images
EventType = Process.Start
Tag = proc-start-potential-base64-decoded-from-images
RiskScore = 75
Annotation = {"mitre_attack": ["T1140"], "author": "Joseliyo Sanchez, @Joseliyo_Jstnk"}
Query = iendswith(Process.Path, "/bash") and icontains(Process.CommandLine, "tail") and icontains(Process.CommandLine, "-c") and icontains(Process.CommandLine, "base64") and icontains(Process.CommandLine, "-d") and icontains(Process.CommandLine, ">") and (icontains(Process.CommandLine, ".avif") or icontains(Process.CommandLine, ".gif") or icontains(Process.CommandLine, ".jfif") or icontains(Process.CommandLine, ".jpeg") or icontains(Process.CommandLine, ".jpg") or icontains(Process.CommandLine, ".pjp") or icontains(Process.CommandLine, ".pjpeg") or icontains(Process.CommandLine, ".png") or icontains(Process.CommandLine, ".svg") or icontains(Process.CommandLine, ".webp"))


[ThreatDetectionRule platform=MacOS]
# Detects suspicious activity associated with Atomic MacOS Stealer (Amos) campaigns, including execution of FileGrabber and curl-based POST requests used for data exfiltration. The rule identifies either the execution of FileGrabber targeting /tmp or the use of curl to POST sensitive user data (including files such as /tmp/out.zip) to remote servers, which are key indicators of Amos infostealer activity.
# Author: Jason Phang Vern - Onn, Robbin Ooi Zhen Heng (Gen Digital)
RuleId = e710a880-1f18-4417-b6a0-b5afdf7e33da
RuleName = Atomic MacOS Stealer - FileGrabber Activity
EventType = Process.Start
Tag = proc-start-atomic-macos-stealer-filegrabber-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.002"], "author": "Jason Phang Vern - Onn, Robbin Ooi Zhen Heng (Gen Digital)"}
Query = icontains(Process.CommandLine, "curl") and icontains(Process.CommandLine, "POST") and icontains(Process.CommandLine, "user:") and icontains(Process.CommandLine, "-H ") and icontains(Process.CommandLine, "BuildID") and icontains(Process.CommandLine, "file=@/tmp/out.zip") and icontains(Process.CommandLine, "cl: 0") or icontains(Process.CommandLine, "FileGrabber") and icontains(Process.CommandLine, "/tmp")


[ThreatDetectionRule platform=MacOS]
# Adversaries may use binary padding to add junk data and change the on-disk representation of malware. This rule detect using dd and truncate to add a junk data to file.
# Author: Igor Fits, Mikhail Larin, oscd.community
RuleId = 95361ce5-c891-4b0a-87ca-e24607884a96
RuleName = Binary Padding - MacOS
EventType = Process.Start
Tag = proc-start-binary-padding-macos
RiskScore = 75
Annotation = {"mitre_attack": ["T1027.001"], "author": "Igor Fits, Mikhail Larin, oscd.community"}
Query = iendswith(Process.Path, "/truncate") and icontains(Process.CommandLine, "-s +") or iendswith(Process.Path, "/dd") and (icontains(Process.CommandLine, "if=/dev/zero") or icontains(Process.CommandLine, "if=/dev/random") or icontains(Process.CommandLine, "if=/dev/urandom"))


[ThreatDetectionRule platform=MacOS]
# Detecting attempts to extract passwords with grep and laZagne
# Author: Igor Fits, Mikhail Larin, oscd.community
RuleId = 53b1b378-9b06-4992-b972-dde6e423d2b4
RuleName = Credentials In Files
EventType = Process.Start
Tag = proc-start-credentials-in-files
RiskScore = 75
Annotation = {"mitre_attack": ["T1552.001"], "author": "Igor Fits, Mikhail Larin, oscd.community"}
Query = iendswith(Process.Path, "/grep") and icontains(Process.CommandLine, "password") or icontains(Process.CommandLine, "laZagne")


[ThreatDetectionRule platform=MacOS]
# Detects potential persistence activity using LaunchAgents or LaunchDaemons via the PlistBuddy utility
# Author: Sohan G (D4rkCiph3r)
RuleId = 65d506d3-fcfe-4071-b4b2-bcefe721bbbb
RuleName = Potential Persistence Via PlistBuddy
EventType = Process.Start
Tag = proc-start-potential-persistence-via-plistbuddy
RiskScore = 75
Annotation = {"mitre_attack": ["T1543.001", "T1543.004"], "author": "Sohan G (D4rkCiph3r)"}
Query = iendswith(Process.Path, "/PlistBuddy") and icontains(Process.CommandLine, "RunAtLoad") and icontains(Process.CommandLine, "true") and (icontains(Process.CommandLine, "LaunchAgents") or icontains(Process.CommandLine, "LaunchDaemons"))


[ThreatDetectionRule platform=MacOS]
# Detects the execution of a renamed instance of the Remote Monitoring and Management (RMM) tool, MeshAgent.
# RMM tools such as MeshAgent are commonly utilized by IT administrators for legitimate remote support and system management.
# However, malicious actors may exploit these tools by renaming them to bypass detection mechanisms, enabling unauthorized access and control over compromised systems.
# Author: Norbert Jaśniewicz (AlphaSOC)
RuleId = bd3b5eaa-439d-4a42-8f35-a49f5c8a2582
RuleName = Remote Access Tool - Renamed MeshAgent Execution - MacOS
EventType = Process.Start
Tag = proc-start-remote-access-tool-renamed-meshagent-execution-macos
RiskScore = 75
Annotation = {"mitre_attack": ["T1219.002", "T1036.003"], "author": "Norbert Ja\u015bniewicz (AlphaSOC)"}
Query = (icontains(Process.CommandLine, "--meshServiceName") or icontains(Process.Name, "meshagent")) and not (iendswith(Process.Path, "/meshagent") or iendswith(Process.Path, "/meshagent\_osx64"))


[ThreatDetectionRule platform=MacOS]
# Detects file creation events linked to the Axios NPM supply chain compromise on macOS devices. Axios is a popular JavaScript HTTP client.
# On March 30, 2026, malicious versions (1.14.1, 0.30.4) were published to npm, injecting a dependency (plain-crypto-js@4.2.1) that executed a postinstall script as a cross-platform RAT dropper.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 2db0458c-05c9-4069-a26f-77becd9c8c13
RuleName = Axios NPM Compromise File Creation Indicators - MacOS
EventType = File.Create
Tag = axios-npm-compromise-file-creation-indicators-macos
RiskScore = 75
Annotation = {"mitre_attack": ["T1195.002", "T1105"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Process.Path, "/curl") and File.Path == "/Library/Caches/com.apple.act.mond" or iendswith(Process.Path, "/node") and File.Path == "/tmp/6202033"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=MacOS]
# Detects the macOS-specific execution chain of the plain-crypto-js malicious npm dependency in Axios NPM Package, including AppleScript execution via osascript, payload download, permission modification, execution, and cleanup.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = a09ee860-31b3-4586-8a68-0ebd74ce0e5f
RuleName = Axios NPM Compromise Indicators - macOS
EventType = Process.Start
Tag = proc-start-axios-npm-compromise-indicators-macos
RiskScore = 75
Annotation = {"mitre_attack": ["T1195.002", "T1059.002", "T1059.004", "T1105"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(Process.CommandLine, "nohup ") and icontains(Process.CommandLine, "osascript ") and icontains(Process.CommandLine, "/tmp/6202033") or icontains(Process.CommandLine, "curl ") and icontains(Process.CommandLine, "packages.npm.org/product") and icontains(Process.CommandLine, "/Library/Caches/com.apple.act.mond") or icontains(Process.CommandLine, "rm ") and icontains(Process.CommandLine, "-rf ") and icontains(Process.CommandLine, "/tmp/6202033")

