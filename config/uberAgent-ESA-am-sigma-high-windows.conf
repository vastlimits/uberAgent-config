[ThreatDetectionRule platform=Windows]
# Detects attempts to add, modify, or delete Windows Credential Guard related registry keys or values via command line tools such as Reg.exe or PowerShell.
# Credential Guard uses virtualization-based security to isolate secrets so that only privileged system software can access them.
# Adversaries may disable Credential Guard to gain access to sensitive credentials stored in the system, such as NTLM hashes and Kerberos tickets, which can be used for lateral movement and privilege escalation.
# The rule matches suspicious command lines that target DeviceGuard or LSA registry paths and manipulate keys like EnableVirtualizationBasedSecurity, RequirePlatformSecurityFeatures, or LsaCfgFlags.
# Such activity may indicate an attempt to disable or tamper with Credential Guard, potentially exposing sensitive credentials for misuse.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = c17d47b7-dcd6-4109-87eb-d1817bd4cbc9
RuleName = Windows Credential Guard Registry Tampering Via CommandLine
EventType = Process.Start
Tag = proc-start-windows-credential-guard-registry-tampering-via-commandline
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\reg.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll", "reg.exe"]) and (icontains(Process.CommandLine, "add ") or icontains(Process.CommandLine, "New-ItemProperty ") or icontains(Process.CommandLine, "Set-ItemProperty ") or icontains(Process.CommandLine, "si ") or icontains(Process.CommandLine, "delete ") or icontains(Process.CommandLine, "del ") or icontains(Process.CommandLine, "Remove-ItemProperty ") or icontains(Process.CommandLine, "rp ")) and (icontains(Process.CommandLine, "\\Control\\DeviceGuard") or icontains(Process.CommandLine, "\\Control\\LSA") or icontains(Process.CommandLine, "Software\\Policies\\Microsoft\\Windows\\DeviceGuard")) and (icontains(Process.CommandLine, "EnableVirtualizationBasedSecurity") or icontains(Process.CommandLine, "RequirePlatformSecurityFeatures") or icontains(Process.CommandLine, "LsaCfgFlags"))


[ThreatDetectionRule platform=Windows]
# Detects MMC20.Application Lateral Movement; specifically looks for the spawning of the parent MMC.exe with a command line of "-Embedding" as a child of svchost.exe
# Author: @2xxeformyshirt (Security Risk Advisors) - rule; Teymur Kheirkhabarov (idea)
RuleId = f1f3bf22-deb2-418d-8cce-e1a45e46a5bd
RuleName = MMC20 Lateral Movement
EventType = Process.Start
Tag = proc-start-mmc20-lateral-movement
RiskScore = 75
Annotation = {"mitre_attack": ["T1021.003"], "author": "@2xxeformyshirt (Security Risk Advisors) - rule; Teymur Kheirkhabarov (idea)"}
Query = iendswith(Parent.Path, "\\svchost.exe") and iendswith(Process.Path, "\\mmc.exe") and icontains(Process.CommandLine, "-Embedding")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects attempts to disable AMSI (Anti-Malware Scan Interface) by modifying the AmsiEnable registry value.
# Anti-Malware Scan Interface (AMSI) is a security feature in Windows that allows applications and services to integrate with anti-malware products for enhanced protection against malicious content.
# Adversaries may attempt to disable AMSI to evade detection by security software, allowing them to execute malicious scripts or code without being scanned.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = aa37cbb0-da36-42cb-a90f-fdf216fc7467
RuleName = AMSI Disabled via Registry Modification
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = amsi-disabled-via-registry-modification
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\Software\\Microsoft\\Windows Script\\Settings\\AmsiEnable") and Reg.Value.Data == "DWORD (0x00000000)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the use of reg.exe or PowerShell to delete the Windows Defender context menu handler registry keys.
# This action removes the "Scan with Microsoft Defender" option from the right-click menu for files, directories, and drives.
# Attackers may use this technique to hinder manual, on-demand scans and reduce the visibility of the security product.
# Author: Matt Anderson (Huntress)
RuleId = b9e8c7d6-a5f4-4e3d-8b1a-9f0c8d7e6a5b
RuleName = Windows Defender Context Menu Removed
EventType = Process.Start
Tag = proc-start-windows-defender-context-menu-removed
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Matt Anderson (Huntress)"}
Query = (iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\reg.exe") or Process.Name in ["powershell\_ise.EXE", "PowerShell.EXE", "pwsh.dll", "reg.exe"]) and (icontains(Process.CommandLine, "del") or icontains(Process.CommandLine, "Remove-Item") or icontains(Process.CommandLine, "ri ")) and icontains(Process.CommandLine, "\\shellex\\ContextMenuHandlers\\EPP")


