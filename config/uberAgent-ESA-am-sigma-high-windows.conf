RuleName = UAC Bypass Using .NET Code Profiler on MMC
EventType = File.Create
Tag = uac-bypass-using-.net-code-profiler-on-mmc
RiskScore = 75
Annotation = {"mitre_attack": ["T1548.002"], "author": "Christian Burkard (Nextron Systems)"}
Query = istartswith(File.Path, "C:\\Users\\") and iendswith(File.Path, "\\AppData\\Local\\Temp\\pe386.dll")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects process execution patterns found in intrusions related to the Hermetic Wiper malware attacks against Ukraine in February 2022
# Author: Florian Roth (Nextron Systems)
RuleId = 2f974656-6d83-4059-bbdf-68ac5403422f
RuleName = Hermetic Wiper TG Process Patterns
EventType = Process.Start
Tag = proc-start-hermetic-wiper-tg-process-patterns
RiskScore = 75
Annotation = {"mitre_attack": ["T1021.001"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\policydefinitions\\postgresql.exe") or icontains(Process.CommandLine, "CSIDL\_SYSTEM\_DRIVE\\temp\\sys.tmp") or icontains(Process.CommandLine, " 1> \\\\127.0.0.1\\ADMIN$\\\_\_16") or icontains(Process.CommandLine, "powershell -c ") and icontains(Process.CommandLine, "\\comsvcs.dll MiniDump ") and icontains(Process.CommandLine, "\\winupd.log full")


[ThreatDetectionRule platform=Windows]
# Detects a method often used by ransomware. Which combines the "ping" to wait a couple of seconds and then "del" to delete the file in question. Its used to hide the file responsible for the initial infection for example
# Author: Ilya Krestinichev
RuleId = 54786ddc-5b8a-11ed-9b6a-0242ac120002
RuleName = Suspicious Ping/Del Command Combination
EventType = Process.Start
Tag = proc-start-suspicious-ping/del-command-combination
RiskScore = 75
Annotation = {"mitre_attack": ["T1070.004"], "author": "Ilya Krestinichev"}
Query = (icontains(Process.CommandLine, " -n ") or icontains(Process.CommandLine, " /n ") or icontains(Process.CommandLine, " –n ") or icontains(Process.CommandLine, " —n ") or icontains(Process.CommandLine, " ―n ")) and icontains(Process.CommandLine, "Nul") and (icontains(Process.CommandLine, " -f ") or icontains(Process.CommandLine, " /f ") or icontains(Process.CommandLine, " –f ") or icontains(Process.CommandLine, " —f ") or icontains(Process.CommandLine, " ―f ") or icontains(Process.CommandLine, " -q ") or icontains(Process.CommandLine, " /q ") or icontains(Process.CommandLine, " –q ") or icontains(Process.CommandLine, " —q ") or icontains(Process.CommandLine, " ―q ")) and icontains(Process.CommandLine, "ping") and icontains(Process.CommandLine, "del ")


[ThreatDetectionRule platform=Windows]
# Detects changes to Internet Explorer's (IE / Windows Internet properties) ZoneMap configuration of the "HTTP" and "HTTPS" protocols to point to the "My Computer" zone. This allows downloaded files from the Internet to be granted the same level of trust as files stored locally.
# Author: Nasreddine Bencherchali (Nextron Systems), Michael Haag (idea)
RuleId = 3fd4c8d7-8362-4557-a8e6-83b29cc0d724
RuleName = IE ZoneMap Setting Downgraded To MyComputer Zone For HTTP Protocols
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = ie-zonemap-setting-downgraded-to-mycomputer-zone-for-http-protocols
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems), Michael Haag (idea)"}
Query = icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\ZoneMap\\ProtocolDefaults") and (iendswith(Reg.TargetObject, "\\http") or iendswith(Reg.TargetObject, "\\https")) and icontains(Reg.Value.Data, "DWORD (0x00000000)")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects files dropped by Winnti as described in RedMimicry Winnti playbook
# Author: Alexander Rausch
RuleId = 130c9e58-28ac-4f83-8574-0a4cc913b97e
RuleName = Potential Winnti Dropper Activity
EventType = File.Create
Tag = potential-winnti-dropper-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1027"], "author": "Alexander Rausch"}
Query = iendswith(File.Path, "\\gthread-3.6.dll") or iendswith(File.Path, "\\sigcmm-2.4.dll") or iendswith(File.Path, "\\Windows\\Temp\\tmp.bat")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects creation of a file with an ".rdp" extension by an application that doesn't commonly create such files.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = fccfb43e-09a7-4bd2-8b37-a5a7df33386d
RuleName = .RDP File Created By Uncommon Application
EventType = File.Create
Tag = .rdp-file-created-by-uncommon-application
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(File.Path, ".rdp") and (iendswith(Process.Path, "\\brave.exe") or iendswith(Process.Path, "\\CCleaner Browser\\Application\\CCleanerBrowser.exe") or iendswith(Process.Path, "\\chromium.exe") or iendswith(Process.Path, "\\firefox.exe") or iendswith(Process.Path, "\\Google\\Chrome\\Application\\chrome.exe") or iendswith(Process.Path, "\\iexplore.exe") or iendswith(Process.Path, "\\microsoftedge.exe") or iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\Opera.exe") or iendswith(Process.Path, "\\Vivaldi.exe") or iendswith(Process.Path, "\\Whale.exe") or iendswith(Process.Path, "\\olk.exe") or iendswith(Process.Path, "\\Outlook.exe") or iendswith(Process.Path, "\\RuntimeBroker.exe") or iendswith(Process.Path, "\\Thunderbird.exe") or iendswith(Process.Path, "\\Discord.exe") or iendswith(Process.Path, "\\Keybase.exe") or iendswith(Process.Path, "\\msteams.exe") or iendswith(Process.Path, "\\Slack.exe") or iendswith(Process.Path, "\\teams.exe"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects AnyDesk Remote Desktop silent installation. Which can be used by attackers to gain remote access.
# Author: Ján Trenčanský
RuleId = 114e7f1c-f137-48c8-8f54-3088c24ce4b9
RuleName = Remote Access Tool - AnyDesk Silent Installation
EventType = Process.Start
Tag = proc-start-remote-access-tool-anydesk-silent-installation
RiskScore = 75
Annotation = {"mitre_attack": ["T1219.002"], "author": "J\u00e1n Tren\u010dansk\u00fd"}
