Query = iendswith(Process.Path, "\\SharpDPAPI.exe") or Process.Name == "SharpDPAPI.exe" or (icontains(Process.CommandLine, " backupkey ") or icontains(Process.CommandLine, " blob ") or icontains(Process.CommandLine, " certificates ") or icontains(Process.CommandLine, " credentials ") or icontains(Process.CommandLine, " keepass ") or icontains(Process.CommandLine, " masterkeys ") or icontains(Process.CommandLine, " rdg ") or icontains(Process.CommandLine, " vaults ")) and (icontains(Process.CommandLine, " {") and icontains(Process.CommandLine, "}:") or icontains(Process.CommandLine, " /file:") or icontains(Process.CommandLine, " /machine") or icontains(Process.CommandLine, " /mkfile:") or icontains(Process.CommandLine, " /password:") or icontains(Process.CommandLine, " /pvk:") or icontains(Process.CommandLine, " /server:") or icontains(Process.CommandLine, " /target:") or icontains(Process.CommandLine, " /unprotect"))


[ThreatDetectionRule platform=Windows]
# Detects execution of rundll32 where the DLL being called is stored in an Alternate Data Stream (ADS).
# Author: Harjot Singh, '@cyb3rjy0t'
RuleId = 9248c7e1-2bf3-4661-a22c-600a8040b446
RuleName = Potential Rundll32 Execution With DLL Stored In ADS
EventType = Process.Start
Tag = proc-start-potential-rundll32-execution-with-dll-stored-in-ads
RiskScore = 75
Annotation = {"mitre_attack": ["T1564.004"], "author": "Harjot Singh, '@cyb3rjy0t'"}
Query = (iendswith(Process.Path, "\\rundll32.exe") or Process.Name == "RUNDLL32.EXE") and Process.CommandLine regex "[Rr][Uu][Nn][Dd][Ll][Ll]32(?:\\.[Ee][Xx][Ee])? \\S+?\\w:\\S+?:"


[ThreatDetectionRule platform=Windows]
# Detect commandline usage of Microsoft Connection Manager Profile Installer (cmstp.exe) to install specially formatted local .INF files
# Author: E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community
