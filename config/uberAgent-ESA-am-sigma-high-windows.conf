[ThreatDetectionRule platform=Windows]
# Detects changes to the AMSI come server registry key in order disable AMSI scanning functionalities. When AMSI attempts to starts its COM component, it will query its registered CLSID and return a non-existent COM server. This causes a load failure and prevents any scanning methods from being accessed, ultimately rendering AMSI useless
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 160d2780-31f7-4922-8b3a-efce30e63e96
RuleName = Potential AMSI COM Server Hijacking
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-amsi-com-server-hijacking
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\CLSID\\{fdb00e52-a214-4aa1-8fba-4357bb0072ec}\\InProcServer32\\(Default)") and not Reg.Value.Data == "\%windir\%\\system32\\amsi.dll"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects potential exploitation of remote code execution vulnerability CVE-2025-33053
# by monitoring suspicious image loads from WebDAV paths. The exploit involves malicious executables from
# attacker-controlled WebDAV servers loading the Windows system DLLs like gdi32.dll, netapi32.dll, etc.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 04fc4b22-91a6-495a-879d-0144fec5ec03
RuleName = Potential Exploitation of RCE Vulnerability CVE-2025-33053 - Image Load
EventType = Image.Load
Tag = potential-exploitation-of-rce-vulnerability-cve-2025-33053-image-load
RiskScore = 75
Annotation = {"mitre_attack": ["T1218", "T1105"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = istartswith(Process.Path, "\\\\") and icontains(Process.Path, "\\DavWWWRoot\\") and (iendswith(Process.Path, "\\route.exe") or iendswith(Process.Path, "\\netsh.exe") or iendswith(Process.Path, "\\makecab.exe") or iendswith(Process.Path, "\\dxdiag.exe") or iendswith(Process.Path, "\\ipconfig.exe") or iendswith(Process.Path, "\\explorer.exe"))


[ThreatDetectionRule platform=Windows]
# Detects a DNS query initiated from a "wscript" process for domains matching a specific pattern that was seen being used by SocGholish for its Command and Control traffic
# Author: Dusty Miller
RuleId = 70761fe8-6aa2-4f80-98c1-a57049c08e66
RuleName = Potential SocGholish Second Stage C2 DNS Query
EventType = Dns.Query
Tag = potential-socgholish-second-stage-c2-dns-query
RiskScore = 75
Annotation = {"mitre_attack": ["T1219.002"], "author": "Dusty Miller"}
Query = iendswith(Process.Path, "\\wscript.exe") and Dns.QueryRequest regex "[a-f0-9]{4,8}\\.(?:[a-z0-9\\-]+\\.){2}[a-z0-9\\-]+"
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects the use of Kali Linux through Windows Subsystem for Linux
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 6f1a11aa-4b8a-4b7f-9e13-4d3e4ff0e0d4
RuleName = WSL Kali-Linux Usage
EventType = Process.Start
Tag = proc-start-wsl-kali-linux-usage
RiskScore = 75
Annotation = {"mitre_attack": ["T1202"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(Process.Path, ":\\Users\\") and icontains(Process.Path, "\\AppData\\Local\\packages\\KaliLinux") or icontains(Process.Path, ":\\Users\\") and icontains(Process.Path, "\\AppData\\Local\\Microsoft\\WindowsApps\\kali.exe") or icontains(Process.Path, ":\\Program Files\\WindowsApps\\KaliLinux.") and iendswith(Process.Path, "\\kali.exe") or (iendswith(Parent.Path, "\\wsl.exe") or iendswith(Parent.Path, "\\wslhost.exe")) and (icontains(Process.Path, "\\kali.exe") or icontains(Process.Path, "\\KaliLinux") or icontains(Process.CommandLine, "Kali.exe") or icontains(Process.CommandLine, "Kali-linux") or icontains(Process.CommandLine, "kalilinux")) and not (icontains(Process.CommandLine, " -i ") or icontains(Process.CommandLine, " --install ") or icontains(Process.CommandLine, " --unregister "))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects a "Get-Process" cmdlet and it's aliases on lsass process, which is in almost all cases a sign of malicious activity
# Author: Florian Roth (Nextron Systems)
RuleId = b2815d0d-7481-4bf0-9b6c-a4c48a94b349
RuleName = PowerShell Get-Process LSASS
EventType = Process.Start
Tag = proc-start-powershell-get-process-lsass
RiskScore = 75
Annotation = {"mitre_attack": ["T1552.004"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "Get-Process lsas") or icontains(Process.CommandLine, "ps lsas") or icontains(Process.CommandLine, "gps lsas")


[ThreatDetectionRule platform=Windows]
# Detects changes to the "DisableHypervisorEnforcedPagingTranslation" registry value. Where the it is set to "1" in order to disable the Hypervisor Enforced Paging Translation feature.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 7f2954d2-99c2-4d42-a065-ca36740f187b
RuleName = Hypervisor Enforced Paging Translation Disabled
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = hypervisor-enforced-paging-translation-disabled
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\DisableHypervisorEnforcedPagingTranslation") and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the use of TruffleSnout.exe an iterative AD discovery toolkit for offensive operators, situational awareness and targeted low noise enumeration.
# Author: frack113
RuleId = 69ca006d-b9a9-47f5-80ff-ecd4d25d481a
RuleName = HackTool - TruffleSnout Execution
EventType = Process.Start
Tag = proc-start-hacktool-trufflesnout-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1482"], "author": "frack113"}
Query = Process.Name == "TruffleSnout.exe" or iendswith(Process.Path, "\\TruffleSnout.exe")


[ThreatDetectionRule platform=Windows]
# Detects default filenames output from the execution of CrackMapExec and Impacket-secretsdump against an endpoint.
# Author: SecurityAura
RuleId = 6e2a900a-ced9-4e4a-a9c2-13e706f9518a
RuleName = HackTool - Potential Remote Credential Dumping Activity Via CrackMapExec Or Impacket-Secretsdump
EventType = File.Create
Tag = hacktool-potential-remote-credential-dumping-activity-via-crackmapexec-or-impacket-secretsdump
RiskScore = 75
Annotation = {"mitre_attack": ["T1003"], "author": "SecurityAura"}
Query = iendswith(Process.Path, "\\svchost.exe") and File.Path regex "\\\\Windows\\\\System32\\\\[a-zA-Z0-9]{8}\\.tmp$"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects creation of local users via the net.exe command with the name of "DarkGate"
# Author: X__Junior (Nextron Systems)
RuleId = bf906d7b-7070-4642-8383-e404cf26eba5
RuleName = DarkGate - User Created Via Net.EXE
EventType = Process.Start
Tag = proc-start-darkgate-user-created-via-net.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1136.001"], "author": "X__Junior (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, "user") and icontains(Process.CommandLine, "add") and icontains(Process.CommandLine, "DarkGate") and icontains(Process.CommandLine, "SafeMode")


[ThreatDetectionRule platform=Windows]
# Detects the dump of highly sensitive files such as "NTDS.DIT" and "SECURITY" hive.
# Attackers can leverage the "wbadmin" utility in order to dump sensitive files that might contain credential or sensitive information.
# Author: Nasreddine Bencherchali (Nextron Systems), frack113
RuleId = 8b93a509-1cb8-42e1-97aa-ee24224cdc15
RuleName = Sensitive File Dump Via Wbadmin.EXE
EventType = Process.Start
Tag = proc-start-sensitive-file-dump-via-wbadmin.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.003"], "author": "Nasreddine Bencherchali (Nextron Systems), frack113"}
Query = (iendswith(Process.Path, "\\wbadmin.exe") or Process.Name == "WBADMIN.EXE") and (icontains(Process.CommandLine, "start") or icontains(Process.CommandLine, "backup")) and (icontains(Process.CommandLine, "\\config\\SAM") or icontains(Process.CommandLine, "\\config\\SECURITY") or icontains(Process.CommandLine, "\\config\\SYSTEM") or icontains(Process.CommandLine, "\\Windows\\NTDS\\NTDS.dit"))


[ThreatDetectionRule platform=Windows]
# Detects execution of mshta.exe with file types that looks like they do not typically represent HTA (HTML Application) content,
# such as .png, .jpg, .zip, .pdf, and others, which are often polyglots. MSHTA is a legitimate Windows utility for executing HTML Applications
# containing VBScript or JScript. Threat actors often abuse this lolbin utility to download and
# execute malicious scripts disguised as benign files or hosted under misleading extensions to evade detection.
# Author: Diego Perez (@darkquassar), Markus Neis, Swisscom (Improve Rule), Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = cc7abbd0-762b-41e3-8a26-57ad50d2eea3
RuleName = MSHTA Execution with Suspicious File Extensions
EventType = Process.Start
Tag = proc-start-mshta-execution-with-suspicious-file-extensions
RiskScore = 75
Annotation = {"mitre_attack": ["T1140", "T1218.005", "T1059.007"], "author": "Diego Perez (@darkquassar), Markus Neis, Swisscom (Improve Rule), Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\mshta.exe") or Process.Name == "mshta.exe") and (icontains(Process.CommandLine, ".7z") or icontains(Process.CommandLine, ".avi") or icontains(Process.CommandLine, ".bat") or icontains(Process.CommandLine, ".bmp") or icontains(Process.CommandLine, ".conf") or icontains(Process.CommandLine, ".csv") or icontains(Process.CommandLine, ".dll") or icontains(Process.CommandLine, ".doc") or icontains(Process.CommandLine, ".gif") or icontains(Process.CommandLine, ".gz") or icontains(Process.CommandLine, ".ini") or icontains(Process.CommandLine, ".jpe") or icontains(Process.CommandLine, ".jpg") or icontains(Process.CommandLine, ".json") or icontains(Process.CommandLine, ".lnk") or icontains(Process.CommandLine, ".log") or icontains(Process.CommandLine, ".mkv") or icontains(Process.CommandLine, ".mp3") or icontains(Process.CommandLine, ".mp4") or icontains(Process.CommandLine, ".pdf") or icontains(Process.CommandLine, ".png") or icontains(Process.CommandLine, ".ppt") or icontains(Process.CommandLine, ".rar") or icontains(Process.CommandLine, ".rtf") or icontains(Process.CommandLine, ".svg") or icontains(Process.CommandLine, ".tar") or icontains(Process.CommandLine, ".tmp") or icontains(Process.CommandLine, ".txt") or icontains(Process.CommandLine, ".xls") or icontains(Process.CommandLine, ".xml") or icontains(Process.CommandLine, ".yaml") or icontains(Process.CommandLine, ".yml") or icontains(Process.CommandLine, ".zip") or icontains(Process.CommandLine, "vbscript"))


