RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "Win32\_NTEventlogFile") and (icontains(Process.CommandLine, ".BackupEventlog(") or icontains(Process.CommandLine, ".ChangeSecurityPermissions(") or icontains(Process.CommandLine, ".ChangeSecurityPermissionsEx(") or icontains(Process.CommandLine, ".ClearEventLog(") or icontains(Process.CommandLine, ".Delete(") or icontains(Process.CommandLine, ".DeleteEx(") or icontains(Process.CommandLine, ".Rename(") or icontains(Process.CommandLine, ".TakeOwnerShip(") or icontains(Process.CommandLine, ".TakeOwnerShipEx("))


[ThreatDetectionRule platform=Windows]
# Detects suspicious powershell process starts with base64 encoded commands (e.g. Emotet)
# Author: Florian Roth (Nextron Systems), Markus Neis, Jonhnathan Ribeiro, Daniil Yugoslavskiy, Anton Kutepov, oscd.community
RuleId = ca2092a1-c273-4878-9b4b-0d60115bf5ea
RuleName = Suspicious Encoded PowerShell Command Line
EventType = Process.Start
Tag = proc-start-suspicious-encoded-powershell-command-line
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Florian Roth (Nextron Systems), Markus Neis, Jonhnathan Ribeiro, Daniil Yugoslavskiy, Anton Kutepov, oscd.community"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and (icontains(Process.CommandLine, " -e") and (icontains(Process.CommandLine, " JAB") or icontains(Process.CommandLine, " SUVYI") or icontains(Process.CommandLine, " SQBFAFgA") or icontains(Process.CommandLine, " aQBlAHgA") or icontains(Process.CommandLine, " aWV4I") or icontains(Process.CommandLine, " IAA") or icontains(Process.CommandLine, " IAB") or icontains(Process.CommandLine, " UwB") or icontains(Process.CommandLine, " cwB")) or icontains(Process.CommandLine, ".exe -ENCOD ") or icontains(Process.CommandLine, " BA^J e-")) and not icontains(Process.CommandLine, " -ExecutionPolicy remotesigned ")


[ThreatDetectionRule platform=Windows]
# Detects file creation events with filename patterns used by CrackMapExec.
# Author: Nasreddine Bencherchali (Nextron Systems)
