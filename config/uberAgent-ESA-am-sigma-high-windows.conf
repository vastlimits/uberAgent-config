[ThreatDetectionRule platform=Windows]
# Detects suspicious child processes started by Node.js server processes on Windows, which may indicate exploitation of vulnerabilities like CVE-2025-55182 (React2Shell).
# Attackers can abuse the Node.js 'child_process' module to run system commands or scripts using methods such as spawn(), exec(), execFile(), fork(), or execSync().
# If execSync() or exec() is used in the exploit, the command line often shows a shell (e.g., cmd.exe /d /s /c ...) running a suspicious command unless other shells are explicitly invoked.
# For other methods, the spawned process appears directly in the Image field unless a shell is explicitly used.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems), Nasreddine Bencherchali
RuleId = 271de298-cc0e-4842-acd8-079a0a99ea65
RuleName = Windows Suspicious Child Process from Node.js - React2Shell
EventType = Process.Start
Tag = proc-start-windows-suspicious-child-process-from-node.js-react2shell
RiskScore = 75
Annotation = {"mitre_attack": ["T1059", "T1190"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems), Nasreddine Bencherchali"}
Query = iendswith(Parent.Path, "\\node.exe") and (icontains(Parent.CommandLine, "--experimental-https") or icontains(Parent.CommandLine, "--experimental-next-config-strip-types") or icontains(Parent.CommandLine, "\\node\_modules\\next") or icontains(Parent.CommandLine, "next dev") or icontains(Parent.CommandLine, "next start") or icontains(Parent.CommandLine, "next\" start") or icontains(Parent.CommandLine, "node\_modules\\.bin\\\\..\\next") or icontains(Parent.CommandLine, "react-scripts start") or icontains(Parent.CommandLine, "start-server.js")) and (iendswith(Process.Path, "\\bash.exe") or iendswith(Process.Path, "\\bitsadmin.exe") or iendswith(Process.Path, "\\certutil.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\curl.exe") or iendswith(Process.Path, "\\ipconfig.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or iendswith(Process.Path, "\\netsh.exe") or iendswith(Process.Path, "\\nslookup.exe") or iendswith(Process.Path, "\\OpenConsole.exe") or iendswith(Process.Path, "\\perl.exe") or iendswith(Process.Path, "\\ping.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\py.exe") or iendswith(Process.Path, "\\python.exe") or iendswith(Process.Path, "\\pythonw.exe") or iendswith(Process.Path, "\\pyw.exe") or iendswith(Process.Path, "\\reg.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\sc.exe") or iendswith(Process.Path, "\\sh.exe") or iendswith(Process.Path, "\\systeminfo.exe") or iendswith(Process.Path, "\\wget.exe") or iendswith(Process.Path, "\\whoami.exe") or iendswith(Process.Path, "\\wmic.exe") or iendswith(Process.Path, "\\wscript.exe") or iendswith(Process.Path, "\\wt.exe") or icontains(Process.Path, "\\python") or icontains(Process.CommandLine, "\\net") or icontains(Process.CommandLine, "bitsadmin") or icontains(Process.CommandLine, "certutil ") or icontains(Process.CommandLine, "conhost --headless") or icontains(Process.CommandLine, "cscript ") or icontains(Process.CommandLine, "curl") or icontains(Process.CommandLine, "ipconfig") or icontains(Process.CommandLine, "java") or icontains(Process.CommandLine, "lua") or icontains(Process.CommandLine, "mshta") or icontains(Process.CommandLine, "netsh") or icontains(Process.CommandLine, "nslookup ") or icontains(Process.CommandLine, "perl") or icontains(Process.CommandLine, "ping ") or icontains(Process.CommandLine, "powershell") or icontains(Process.CommandLine, "pwsh") or icontains(Process.CommandLine, "python") or icontains(Process.CommandLine, "reg ") or icontains(Process.CommandLine, "reg.exe") or icontains(Process.CommandLine, "regsvr32") or icontains(Process.CommandLine, "ruby") or icontains(Process.CommandLine, "rundll32") or icontains(Process.CommandLine, "sc.exe") or icontains(Process.CommandLine, "systeminfo") or icontains(Process.CommandLine, "wget") or icontains(Process.CommandLine, "whoami") or icontains(Process.CommandLine, "wmic") or icontains(Process.CommandLine, "wscript") or iendswith(Process.Path, "\\cmd.exe") and not icontains(Process.CommandLine, "/d /s /c ") or iendswith(Process.Path, "\\cmd.exe") and icontains(Process.CommandLine, "/d /s /c ") and not (icontains(Process.CommandLine, "git config --local --get remote.origin.url") or icontains(Process.CommandLine, "netstat -ano | findstr /C:") and icontains(Process.CommandLine, " | findstr LISTENING") or icontains(Process.CommandLine, "\\mkcert\\") and icontains(Process.CommandLine, " -install ") or icontains(Process.CommandLine, "\\mkcert\\") and icontains(Process.CommandLine, " -CAROOT")))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


