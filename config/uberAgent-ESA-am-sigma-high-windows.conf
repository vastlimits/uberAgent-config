Query = iendswith(Process.Path, "\\schtasks.exe") and icontains(Process.CommandLine, "/Create ") and ((icontains(Process.CommandLine, "/sc minute ") or icontains(Process.CommandLine, "/ru system ")) and (icontains(Process.CommandLine, "cmd /c") or icontains(Process.CommandLine, "cmd /k") or icontains(Process.CommandLine, "cmd /r") or icontains(Process.CommandLine, "cmd.exe /c ") or icontains(Process.CommandLine, "cmd.exe /k ") or icontains(Process.CommandLine, "cmd.exe /r ")) or icontains(Process.CommandLine, " -decode ") or icontains(Process.CommandLine, " -enc ") or icontains(Process.CommandLine, " -w hidden ") or icontains(Process.CommandLine, " bypass ") or icontains(Process.CommandLine, " IEX") or icontains(Process.CommandLine, ".DownloadData") or icontains(Process.CommandLine, ".DownloadFile") or icontains(Process.CommandLine, ".DownloadString") or icontains(Process.CommandLine, "/c start /min ") or icontains(Process.CommandLine, "FromBase64String") or icontains(Process.CommandLine, "mshta http") or icontains(Process.CommandLine, "mshta.exe http") or (icontains(Process.CommandLine, ":\\ProgramData\\") or icontains(Process.CommandLine, ":\\Temp\\") or icontains(Process.CommandLine, ":\\Tmp\\") or icontains(Process.CommandLine, ":\\Users\\Public\\") or icontains(Process.CommandLine, ":\\Windows\\Temp\\") or icontains(Process.CommandLine, "\\AppData\\") or icontains(Process.CommandLine, "\%AppData\%") or icontains(Process.CommandLine, "\%Temp\%") or icontains(Process.CommandLine, "\%tmp\%")) and (icontains(Process.CommandLine, "cscript") or icontains(Process.CommandLine, "curl") or icontains(Process.CommandLine, "wscript")))


[ThreatDetectionRule platform=Windows]
