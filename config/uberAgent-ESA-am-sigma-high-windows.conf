RiskScore = 75
Annotation = {"mitre_attack": ["T1027", "T1059.001"], "author": "Jonathan Cheong, oscd.community"}
Query = Process.CommandLine regex "cmd.{0,5}(?:/c|/r)(?:\\s|)\\\"set\\s[a-zA-Z]{3,6}.*(?:\\{\\d\\}){1,}\\\\\\\"\\s+?\\-f(?:.*\\)){1,}.*\\\""


[ThreatDetectionRule platform=Windows]
# Detects the creation of a file named "wermgr.exe" being created in an uncommon directory. This could be a sign of potential exploitation of CVE-2023-36874.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = ad0960eb-0015-4d16-be13-b3d9f18f1342
RuleName = Potential CVE-2023-36874 Exploitation - Fake Wermgr.Exe Creation
