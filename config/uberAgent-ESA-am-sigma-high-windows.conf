[ThreatDetectionRule platform=Windows]
# Detects registry event related to the creation of a scheduled task used by Diamond Sleet APT during exploitation of Team City CVE-2023-42793 vulnerability
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 9f9f92ba-5300-43a4-b435-87d1ee571688
RuleName = Diamond Sleet APT Scheduled Task Creation - Registry
EventType = Reg.Key.Create
EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = diamond-sleet-apt-scheduled-task-creation-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\TaskCache\\Tree\\") and icontains(Reg.TargetObject, "Windows TeamCity Settings User Interface")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects suspicious UTF16 and base64 encoded and often obfuscated PowerShell code often used in command lines
# Author: Florian Roth (Nextron Systems)
RuleId = 8d01b53f-456f-48ee-90f6-bc28e67d4e35
RuleName = Suspicious Obfuscated PowerShell Code
EventType = Process.Start
Tag = proc-start-suspicious-obfuscated-powershell-code
RiskScore = 75
Annotation = {"author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "IAAtAGIAeABvAHIAIAAwAHgA") or icontains(Process.CommandLine, "AALQBiAHgAbwByACAAMAB4A") or icontains(Process.CommandLine, "gAC0AYgB4AG8AcgAgADAAeA") or icontains(Process.CommandLine, "AC4ASQBuAHYAbwBrAGUAKAApACAAfAAg") or icontains(Process.CommandLine, "AuAEkAbgB2AG8AawBlACgAKQAgAHwAI") or icontains(Process.CommandLine, "ALgBJAG4AdgBvAGsAZQAoACkAIAB8AC") or icontains(Process.CommandLine, "AHsAMQB9AHsAMAB9ACIAIAAtAGYAI") or icontains(Process.CommandLine, "B7ADEAfQB7ADAAfQAiACAALQBmAC") or icontains(Process.CommandLine, "AewAxAH0AewAwAH0AIgAgAC0AZgAg") or icontains(Process.CommandLine, "AHsAMAB9AHsAMwB9ACIAIAAtAGYAI") or icontains(Process.CommandLine, "B7ADAAfQB7ADMAfQAiACAALQBmAC") or icontains(Process.CommandLine, "AewAwAH0AewAzAH0AIgAgAC0AZgAg") or icontains(Process.CommandLine, "AHsAMgB9AHsAMAB9ACIAIAAtAGYAI") or icontains(Process.CommandLine, "B7ADIAfQB7ADAAfQAiACAALQBmAC") or icontains(Process.CommandLine, "AewAyAH0AewAwAH0AIgAgAC0AZgAg") or icontains(Process.CommandLine, "AHsAMQB9AHsAMAB9ACcAIAAtAGYAI") or icontains(Process.CommandLine, "B7ADEAfQB7ADAAfQAnACAALQBmAC") or icontains(Process.CommandLine, "AewAxAH0AewAwAH0AJwAgAC0AZgAg") or icontains(Process.CommandLine, "AHsAMAB9AHsAMwB9ACcAIAAtAGYAI") or icontains(Process.CommandLine, "B7ADAAfQB7ADMAfQAnACAALQBmAC") or icontains(Process.CommandLine, "AewAwAH0AewAzAH0AJwAgAC0AZgAg") or icontains(Process.CommandLine, "AHsAMgB9AHsAMAB9ACcAIAAtAGYAI") or icontains(Process.CommandLine, "B7ADIAfQB7ADAAfQAnACAALQBmAC") or icontains(Process.CommandLine, "AewAyAH0AewAwAH0AJwAgAC0AZgAg")


[ThreatDetectionRule platform=Windows]
# Detects Ryuk ransomware activity
# Author: Florian Roth (Nextron Systems), Vasiliy Burov, Nasreddine Bencherchali (Nextron Systems)
RuleId = c37510b8-2107-4b78-aa32-72f251e7a844
RuleName = Potential Ryuk Ransomware Activity
EventType = Process.Start
Tag = proc-start-potential-ryuk-ransomware-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "Florian Roth (Nextron Systems), Vasiliy Burov, Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "Microsoft\\Windows\\CurrentVersion\\Run") and icontains(Process.CommandLine, "C:\\users\\Public\\") or icontains(Process.CommandLine, "del /s /f /q c:\\") and icontains(Process.CommandLine, "*.bac") and icontains(Process.CommandLine, "*.bak") and icontains(Process.CommandLine, "*.bkf") or (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, " stop ") and icontains(Process.CommandLine, " /y") and (icontains(Process.CommandLine, "samss") or icontains(Process.CommandLine, "audioendpointbuilder") or icontains(Process.CommandLine, "unistoresvc\_") or icontains(Process.CommandLine, "AcrSch2Svc"))


[ThreatDetectionRule platform=Windows]
# Detects renamed vmnat.exe or portable version that can be used for DLL side-loading
# Author: elhoim
RuleId = 7b4f794b-590a-4ad4-ba18-7964a2832205
RuleName = Renamed Vmnat.exe Execution
EventType = Process.Start
Tag = proc-start-renamed-vmnat.exe-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001"], "author": "elhoim"}
Query = Process.Name == "vmnat.exe" and not iendswith(Process.Path, "vmnat.exe")


[ThreatDetectionRule platform=Windows]
# Detects the use of the bcdedit command to tamper with the boot configuration data. This technique is often times used by malware or attackers as a destructive way before launching ransomware.
# Author: E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community
RuleId = 1444443e-6757-43e4-9ea4-c8fc705f79a2
RuleName = Boot Configuration Tampering Via Bcdedit.EXE
EventType = Process.Start
Tag = proc-start-boot-configuration-tampering-via-bcdedit.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1490"], "author": "E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community"}
Query = (iendswith(Process.Path, "\\bcdedit.exe") or Process.Name == "bcdedit.exe") and icontains(Process.CommandLine, "set") and (icontains(Process.CommandLine, "bootstatuspolicy") and icontains(Process.CommandLine, "ignoreallfailures") or icontains(Process.CommandLine, "recoveryenabled") and icontains(Process.CommandLine, "no"))


[ThreatDetectionRule platform=Windows]
# Detects command line parameters used by Hydra password guessing hack tool
# Author: Vasiliy Burov
RuleId = aaafa146-074c-11eb-adc1-0242ac120002
RuleName = HackTool - Hydra Password Bruteforce Execution
EventType = Process.Start
Tag = proc-start-hacktool-hydra-password-bruteforce-execution
