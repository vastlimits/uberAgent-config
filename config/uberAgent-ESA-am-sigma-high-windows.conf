[ThreatDetectionRule platform=Windows]
# Detects the execution of netsh to configure a port forwarding of port 3389 (RDP) rule
# Author: Florian Roth (Nextron Systems), oscd.community
RuleId = 782d6f3e-4c5d-4b8c-92a3-1d05fed72e63
RuleName = RDP Port Forwarding Rule Added Via Netsh.EXE
EventType = Process.Start
Tag = proc-start-rdp-port-forwarding-rule-added-via-netsh.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1090"], "author": "Florian Roth (Nextron Systems), oscd.community"}
Query = (iendswith(Process.Path, "\\netsh.exe") or Process.Name == "netsh.exe") and icontains(Process.CommandLine, " i") and icontains(Process.CommandLine, " p") and icontains(Process.CommandLine, "=3389") and icontains(Process.CommandLine, " c")


[ThreatDetectionRule platform=Windows]
# Detects the presence of an LSASS dump file in the "CrashDumps" folder. This could be a sign of LSASS credential dumping. Techniques such as the LSASS Shtinkering have been seen abusing the Windows Error Reporting to dump said process.
# Author: @pbssubhash
RuleId = 6902955a-01b7-432c-b32a-6f5f81d8f625
RuleName = LSASS Process Dump Artefact In CrashDumps Folder
EventType = File.Create
Tag = lsass-process-dump-artefact-in-crashdumps-folder
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.001"], "author": "@pbssubhash"}
Query = istartswith(File.Path, "C:\\Windows\\System32\\config\\systemprofile\\AppData\\Local\\CrashDumps\\") and icontains(File.Path, "lsass.exe.") and iendswith(File.Path, ".dmp")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of a file with a suspicious extension in the public folder, which could indicate potential malicious activity.
# Author: The DFIR Report
RuleId = b447f7de-1e53-4cbf-bfb4-f1f6d0b04e4e
RuleName = Suspicious Binaries and Scripts in Public Folder
EventType = File.Create
Tag = suspicious-binaries-and-scripts-in-public-folder
RiskScore = 75
Annotation = {"mitre_attack": ["T1204"], "author": "The DFIR Report"}
Query = icontains(File.Path, ":\\Users\\Public\\") and (iendswith(File.Path, ".bat") or iendswith(File.Path, ".dll") or iendswith(File.Path, ".exe") or iendswith(File.Path, ".hta") or iendswith(File.Path, ".js") or iendswith(File.Path, ".ps1") or iendswith(File.Path, ".vbe") or iendswith(File.Path, ".vbs"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the initial execution of "cmd.exe" which spawns "explorer.exe" with the appropriate command line arguments for opening the "My Computer" folder.
# Author: @Kostastsale
RuleId = c3d76afc-93df-461e-8e67-9b2bad3f2ac4
RuleName = File Explorer Folder Opened Using Explorer Folder Shortcut Via Shell
EventType = Process.Start
Tag = proc-start-file-explorer-folder-opened-using-explorer-folder-shortcut-via-shell
RiskScore = 75
Annotation = {"mitre_attack": ["T1135"], "author": "@Kostastsale"}
Query = (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\powershell.exe") or iendswith(Parent.Path, "\\pwsh.exe")) and iendswith(Process.Path, "\\explorer.exe") and icontains(Process.CommandLine, "shell:mycomputerfolder")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects cmstp loading "dll" or "ocx" files from suspicious locations
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 75e508f7-932d-4ebc-af77-269237a84ce1
RuleName = DLL Loaded From Suspicious Location Via Cmspt.EXE
EventType = Image.Load
Tag = dll-loaded-from-suspicious-location-via-cmspt.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.003"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\cmstp.exe") and (icontains(Image.Path, "\\PerfLogs\\") or icontains(Image.Path, "\\ProgramData\\") or icontains(Image.Path, "\\Users\\") or icontains(Image.Path, "\\Windows\\Temp\\") or icontains(Image.Path, "C:\\Temp\\")) and (iendswith(Image.Path, ".dll") or iendswith(Image.Path, ".ocx"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects suspicious process patterns found in logs when CrackMapExec is used
# Author: Florian Roth (Nextron Systems)
RuleId = f26307d8-14cd-47e3-a26b-4b4769f24af6
RuleName = HackTool - CrackMapExec Process Patterns
EventType = Process.Start
Tag = proc-start-hacktool-crackmapexec-process-patterns
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.001"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "tasklist /fi ") and icontains(Process.CommandLine, "Imagename eq lsass.exe") and (icontains(Process.CommandLine, "cmd.exe /c ") or icontains(Process.CommandLine, "cmd.exe /r ") or icontains(Process.CommandLine, "cmd.exe /k ") or icontains(Process.CommandLine, "cmd /c ") or icontains(Process.CommandLine, "cmd /r ") or icontains(Process.CommandLine, "cmd /k ")) and (icontains(Process.User, "AUTHORI") or icontains(Process.User, "AUTORI")) or icontains(Process.CommandLine, "do rundll32.exe C:\\windows\\System32\\comsvcs.dll, MiniDump") and icontains(Process.CommandLine, "\\Windows\\Temp\\") and icontains(Process.CommandLine, " full") and icontains(Process.CommandLine, "\%\%B") or icontains(Process.CommandLine, "tasklist /v /fo csv") and icontains(Process.CommandLine, "findstr /i \"lsass\"")
GenericProperty1 = Process.User


[ThreatDetectionRule platform=Windows]
# Detects when the Windows Vulnerable Driver Blocklist is set to disabled. This setting is crucial for preventing the loading of known vulnerable drivers,
# and its modification may indicate an attempt to bypass security controls. It is often targeted by threat actors to facilitate the installation of malicious or vulnerable drivers,
# particularly in scenarios involving Endpoint Detection and Response (EDR) bypass techniques.
# This rule applies to systems that support the Vulnerable Driver Blocklist feature, including Windows 10 version 1903 and later, and Windows Server 2022 and later.
# Note that this change will require a reboot to take effect, and this rule only detects the registry modification action.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = d526c60a-e236-4011-b165-831ffa52ab70
RuleName = Windows Vulnerable Driver Blocklist Disabled
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = windows-vulnerable-driver-blocklist-disabled
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\Control\\CI\\Config\\VulnerableDriverBlocklistEnable") and Reg.Value.Data == "DWORD (0x00000000)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the execution of a renamed "PingCastle" binary based on the PE metadata fields.
# Author: Nasreddine Bencherchali (Nextron Systems), X__Junior (Nextron Systems)
RuleId = 2433a154-bb3d-42e4-86c3-a26bdac91c45
RuleName = Renamed PingCastle Binary Execution
EventType = Process.Start
Tag = proc-start-renamed-pingcastle-binary-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1059", "T1202"], "author": "Nasreddine Bencherchali (Nextron Systems), X__Junior (Nextron Systems)"}
Query = (Process.Name in ["PingCastleReporting.exe", "PingCastleCloud.exe", "PingCastle.exe"] or icontains(Process.CommandLine, "--scanner aclcheck") or icontains(Process.CommandLine, "--scanner antivirus") or icontains(Process.CommandLine, "--scanner computerversion") or icontains(Process.CommandLine, "--scanner foreignusers") or icontains(Process.CommandLine, "--scanner laps\_bitlocker") or icontains(Process.CommandLine, "--scanner localadmin") or icontains(Process.CommandLine, "--scanner nullsession") or icontains(Process.CommandLine, "--scanner nullsession-trust") or icontains(Process.CommandLine, "--scanner oxidbindings") or icontains(Process.CommandLine, "--scanner remote") or icontains(Process.CommandLine, "--scanner share") or icontains(Process.CommandLine, "--scanner smb") or icontains(Process.CommandLine, "--scanner smb3querynetwork") or icontains(Process.CommandLine, "--scanner spooler") or icontains(Process.CommandLine, "--scanner startup") or icontains(Process.CommandLine, "--scanner zerologon") or icontains(Process.CommandLine, "--no-enum-limit") or icontains(Process.CommandLine, "--healthcheck") and icontains(Process.CommandLine, "--level Full") or icontains(Process.CommandLine, "--healthcheck") and icontains(Process.CommandLine, "--server ")) and not (iendswith(Process.Path, "\\PingCastleReporting.exe") or iendswith(Process.Path, "\\PingCastleCloud.exe") or iendswith(Process.Path, "\\PingCastle.exe"))


[ThreatDetectionRule platform=Windows]
# Detects the use of the RunXCmd tool to execute commands with System or TrustedInstaller accounts
# Author: Florian Roth (Nextron Systems)
RuleId = 93199800-b52a-4dec-b762-75212c196542
RuleName = PUA - RunXCmd Execution
EventType = Process.Start
Tag = proc-start-pua-runxcmd-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1569.002"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.CommandLine, " /account=system ") or icontains(Process.CommandLine, " /account=ti ")) and icontains(Process.CommandLine, "/exec=")


[ThreatDetectionRule platform=Windows]
# Detects the execution of a Chromium based browser process with the "headless" flag and a URL pointing to the mockbin.org service (which can be used to exfiltrate data).
# Author: X__Junior (Nextron Systems)
RuleId = 1c526788-0abe-4713-862f-b520da5e5316
RuleName = Chromium Browser Headless Execution To Mockbin Like Site
EventType = Process.Start
Tag = proc-start-chromium-browser-headless-execution-to-mockbin-like-site
RiskScore = 75
Annotation = {"author": "X__Junior (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\brave.exe") or iendswith(Process.Path, "\\chrome.exe") or iendswith(Process.Path, "\\msedge.exe") or iendswith(Process.Path, "\\opera.exe") or iendswith(Process.Path, "\\vivaldi.exe")) and icontains(Process.CommandLine, "--headless") and (icontains(Process.CommandLine, "://run.mocky") or icontains(Process.CommandLine, "://mockbin"))


[ThreatDetectionRule platform=Windows]
# Detects the execution of "forfiles" from a non-default location, in order to potentially spawn a custom "cmd.exe" from the current working directory.
# Author: Nasreddine Bencherchali (Nextron Systems), Anish Bogati
RuleId = f53714ec-5077-420e-ad20-907ff9bb2958
RuleName = Forfiles.EXE Child Process Masquerading
EventType = Process.Start
Tag = proc-start-forfiles.exe-child-process-masquerading
RiskScore = 75
Annotation = {"mitre_attack": ["T1036"], "author": "Nasreddine Bencherchali (Nextron Systems), Anish Bogati"}
Query = (iendswith(Parent.CommandLine, ".exe") or iendswith(Parent.CommandLine, ".exe\"")) and iendswith(Process.Path, "\\cmd.exe") and istartswith(Process.CommandLine, "/c echo \"") and not ((icontains(Parent.Path, ":\\Windows\\System32\\") or icontains(Parent.Path, ":\\Windows\\SysWOW64\\")) and iendswith(Parent.Path, "\\forfiles.exe") and (icontains(Process.Path, ":\\Windows\\System32\\") or icontains(Process.Path, ":\\Windows\\SysWOW64\\")) and iendswith(Process.Path, "\\cmd.exe"))
