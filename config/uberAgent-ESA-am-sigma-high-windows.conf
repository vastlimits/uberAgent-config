[ThreatDetectionRule platform=Windows]
# Detects when 'DllRegisterServer' is called in the commandline and the image is not rundll32. This could mean that the 'rundll32' utility has been renamed in order to avoid detection
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 2569ed8c-1147-498a-9b8c-2ad3656b10ed
RuleName = Potential Renamed Rundll32 Execution
EventType = Process.Start
Tag = proc-start-potential-renamed-rundll32-execution
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "DllRegisterServer") and not iendswith(Process.Path, "\\rundll32.exe")


[ThreatDetectionRule platform=Windows]
# Detects DLL sideloading activity seen used by Diamond Sleet APT
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = d1b65d98-37d7-4ff6-b139-2d87c1af3042
RuleName = Diamond Sleet APT DLL Sideloading Indicators
EventType = Image.Load
Tag = diamond-sleet-apt-dll-sideloading-indicators
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, ":\\ProgramData\\clip.exe") and iendswith(Image.Path, ":\\ProgramData\\Version.dll") or iendswith(Process.Path, ":\\ProgramData\\wsmprovhost.exe") and iendswith(Image.Path, ":\\ProgramData\\DSROLE.dll")
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the pattern of UAC Bypass using a path parsing issue in winsat.exe (UACMe 52)
# Author: Christian Burkard (Nextron Systems)
RuleId = 155dbf56-e0a4-4dd0-8905-8a98705045e8
RuleName = UAC Bypass Abusing Winsat Path Parsing - File
EventType = File.Create
Tag = uac-bypass-abusing-winsat-path-parsing-file
RiskScore = 75
Annotation = {"mitre_attack": ["T1548.002"], "author": "Christian Burkard (Nextron Systems)"}
Query = istartswith(File.Path, "C:\\Users\\") and (iendswith(File.Path, "\\AppData\\Local\\Temp\\system32\\winsat.exe") or iendswith(File.Path, "\\AppData\\Local\\Temp\\system32\\winmm.dll"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of a base64 encoded "IEX" cmdlet in a process command line
# Author: Florian Roth (Nextron Systems)
RuleId = 88f680b8-070e-402c-ae11-d2914f2257f1
RuleName = PowerShell Base64 Encoded IEX Cmdlet
