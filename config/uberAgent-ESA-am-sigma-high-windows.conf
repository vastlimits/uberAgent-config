Annotation = {"mitre_attack": ["T1036.005"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\msiexec.exe") or Process.Name == "\\msiexec.exe") and not (istartswith(Process.Path, "C:\\Windows\\System32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\") or istartswith(Process.Path, "C:\\Windows\\WinSxS\\"))


[ThreatDetectionRule platform=Windows]
# Detects potential psexec command that initiate execution on a remote systems via common commandline flags used by the utility
# Author: Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = ea011323-7045-460b-b2d7-0f7442ea6b38
RuleName = Potential PsExec Remote Execution
EventType = Process.Start
Tag = proc-start-potential-psexec-remote-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1587.001"], "author": "Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "accepteula") and icontains(Process.CommandLine, " -u ") and icontains(Process.CommandLine, " -p ") and icontains(Process.CommandLine, " \\\\") and not (icontains(Process.CommandLine, "\\\\localhost") or icontains(Process.CommandLine, "\\\\127."))


[ThreatDetectionRule platform=Windows]
# Detects a method to load DLL via LSASS process using an undocumented Registry key
# Author: Florian Roth (Nextron Systems)
RuleId = b3503044-60ce-4bf4-bbcb-e3db98788823
RuleName = DLL Load via LSASS
EventType = Reg.Key.Create
EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = dll-load-via-lsass
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.008"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Reg.TargetObject, "\\CurrentControlSet\\Services\\NTDS\\DirectoryServiceExtPt") or icontains(Reg.TargetObject, "\\CurrentControlSet\\Services\\NTDS\\LsaDbExtPt")) and not (Process.Path == "C:\\Windows\\system32\\lsass.exe" and (Reg.Value.Data in ["\%\%systemroot\%\%\\system32\\ntdsa.dll", "\%\%systemroot\%\%\\system32\\lsadb.dll"]))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects malicious indicators seen used by the Goofy Guineapig malware
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = f0bafe60-1240-4798-9e60-4364b97e6bad
