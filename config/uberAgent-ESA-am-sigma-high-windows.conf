[ThreatDetectionRule platform=Windows]
# Detects potential ClickFix malware execution patterns by monitoring registry modifications in RunMRU keys containing HTTP/HTTPS links.
# ClickFix is known to be distributed through phishing campaigns and uses techniques like clipboard hijacking and fake CAPTCHA pages.
# Through the fakecaptcha pages, the adversary tricks users into opening the Run dialog box and pasting clipboard-hijacked content,
# such as one-liners that execute remotely hosted malicious files or scripts.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = f5fe36cf-f1ec-4c23-903d-09a3110f6bbb
RuleName = Potential ClickFix Execution Pattern - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-clickfix-execution-pattern-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.001"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\RunMRU\\") and (icontains(Reg.Value.Data, "http://") or icontains(Reg.Value.Data, "https://")) and (icontains(Reg.Value.Data, "account") or icontains(Reg.Value.Data, "anti-bot") or icontains(Reg.Value.Data, "botcheck") or icontains(Reg.Value.Data, "captcha") or icontains(Reg.Value.Data, "challenge") or icontains(Reg.Value.Data, "confirmation") or icontains(Reg.Value.Data, "fraud") or icontains(Reg.Value.Data, "human") or icontains(Reg.Value.Data, "identification") or icontains(Reg.Value.Data, "identificator") or icontains(Reg.Value.Data, "identity") or icontains(Reg.Value.Data, "robot") or icontains(Reg.Value.Data, "validation") or icontains(Reg.Value.Data, "verification") or icontains(Reg.Value.Data, "verify") or icontains(Reg.Value.Data, "\%comspec\%") or icontains(Reg.Value.Data, "bitsadmin") or icontains(Reg.Value.Data, "certutil") or icontains(Reg.Value.Data, "cmd") or icontains(Reg.Value.Data, "cscript") or icontains(Reg.Value.Data, "curl") or icontains(Reg.Value.Data, "finger") or icontains(Reg.Value.Data, "mshta") or icontains(Reg.Value.Data, "powershell") or icontains(Reg.Value.Data, "pwsh") or icontains(Reg.Value.Data, "regsvr32") or icontains(Reg.Value.Data, "rundll32") or icontains(Reg.Value.Data, "schtasks") or icontains(Reg.Value.Data, "wget") or icontains(Reg.Value.Data, "wscript"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


