GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the setting of a custom protocol handler with the name "rogue".
# Seen being created by Forest Blizzard APT as reported by MSFT.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 5cdeb555-65de-4767-99fe-e26807465148
RuleName = Forest Blizzard APT - Custom Protocol Handler Creation
