[ThreatDetectionRule platform=Windows]
# Detects attackers using tooling with bad opsec defaults.
# E.g. spawning a sacrificial process to inject a capability into the process without taking into account how the process is normally run.
# One trivial example of this is using rundll32.exe without arguments as a sacrificial process (default in CS, now highlighted by c2lint), running WerFault without arguments (Kraken - credit am0nsec), and other examples.
# Author: Oleg Kolesnikov @securonix invrep_de, oscd.community, Florian Roth (Nextron Systems), Christian Burkard (Nextron Systems)
RuleId = a7c3d773-caef-227e-a7e7-c2f13c622329
RuleName = Bad Opsec Defaults Sacrificial Processes With Improper Arguments
EventType = Process.Start
Tag = proc-start-bad-opsec-defaults-sacrificial-processes-with-improper-arguments
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.011"], "author": "Oleg Kolesnikov @securonix invrep_de, oscd.community, Florian Roth (Nextron Systems), Christian Burkard (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\WerFault.exe") and iendswith(Process.CommandLine, "WerFault.exe") or iendswith(Process.Path, "\\rundll32.exe") and iendswith(Process.CommandLine, "rundll32.exe") or iendswith(Process.Path, "\\regsvcs.exe") and iendswith(Process.CommandLine, "regsvcs.exe") or iendswith(Process.Path, "\\regasm.exe") and iendswith(Process.CommandLine, "regasm.exe") or iendswith(Process.Path, "\\regsvr32.exe") and iendswith(Process.CommandLine, "regsvr32.exe")) and not (icontains(Parent.Path, "\\AppData\\Local\\Microsoft\\EdgeUpdate\\Install\\{") and iendswith(Process.Path, "\\rundll32.exe") and iendswith(Process.CommandLine, "rundll32.exe") or (icontains(Parent.Path, "\\AppData\\Local\\BraveSoftware\\Brave-Browser\\Application\\") or icontains(Parent.Path, "\\AppData\\Local\\Google\\Chrome\\Application\\")) and iendswith(Parent.Path, "\\Installer\\setup.exe") and icontains(Parent.CommandLine, "--uninstall ") and iendswith(Process.Path, "\\rundll32.exe") and iendswith(Process.CommandLine, "rundll32.exe"))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects the usage of attrib with the "+s" option to set scripts or executables located in suspicious locations as system files to hide them from users and make them unable to be deleted with simple rights. The rule limits the search to specific extensions and directories to avoid FPs
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = efec536f-72e8-4656-8960-5e85d091345b
RuleName = Set Suspicious Files as System Files Using Attrib.EXE
EventType = Process.Start
Tag = proc-start-set-suspicious-files-as-system-files-using-attrib.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1564.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\attrib.exe") or Process.Name == "ATTRIB.EXE") and icontains(Process.CommandLine, " +s") and (icontains(Process.CommandLine, " \%") or icontains(Process.CommandLine, "\\Users\\Public\\") or icontains(Process.CommandLine, "\\AppData\\Local\\") or icontains(Process.CommandLine, "\\ProgramData\\") or icontains(Process.CommandLine, "\\Downloads\\") or icontains(Process.CommandLine, "\\Windows\\Temp\\")) and (icontains(Process.CommandLine, ".bat") or icontains(Process.CommandLine, ".dll") or icontains(Process.CommandLine, ".exe") or icontains(Process.CommandLine, ".hta") or icontains(Process.CommandLine, ".ps1") or icontains(Process.CommandLine, ".vbe") or icontains(Process.CommandLine, ".vbs")) and not (icontains(Process.CommandLine, "\\Windows\\TEMP\\") and icontains(Process.CommandLine, ".exe"))


[ThreatDetectionRule platform=Windows]
# Detects potential process patterns related to Cobalt Strike beacon activity
# Author: Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = f35c5d71-b489-4e22-a115-f003df287317
RuleName = Potential CobaltStrike Process Patterns
