[ThreatDetectionRule platform=Windows]
# Detects the creation of user-specific or system-wide environment variables via the registry. Which contains suspicious commands and strings
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 966315ef-c5e1-4767-ba25-fce9c8de3660
RuleName = Suspicious Environment Variable Has Been Registered
