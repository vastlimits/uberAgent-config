[ThreatDetectionRule platform=Windows]
# Detects NetNTLM downgrade attack
# Author: Florian Roth (Nextron Systems), wagga, Nasreddine Bencherchali (Splunk STRT)
RuleId = d67572a0-e2ec-45d6-b8db-c100d14b8ef2
RuleName = NetNTLM Downgrade Attack - Registry
EventType = Reg.Key.Create
EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = netntlm-downgrade-attack-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1685", "T1112"], "author": "Florian Roth (Nextron Systems), wagga, Nasreddine Bencherchali (Splunk STRT)"}
