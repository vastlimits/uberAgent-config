[ThreatDetectionRule platform=Windows]
# Detects changes to the registry value "PythonFunctionWarnings" that would prevent any warnings or alerts from showing when Python functions are about to be executed.
# Threat actors could run malicious code through the new Microsoft Excel feature that allows Python to run within the spreadsheet.
# Author: Nasreddine Bencherchali (Nextron Systems), @Kostastsale
RuleId = 17e53739-a1fc-4a62-b1b9-87711c2d5e44
RuleName = Python Function Execution Security Warning Disabled In Excel - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = python-function-execution-security-warning-disabled-in-excel-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Nasreddine Bencherchali (Nextron Systems), @Kostastsale"}
Query = icontains(Reg.TargetObject, "\\Microsoft\\Office\\") and iendswith(Reg.TargetObject, "\\Excel\\Security\\PythonFunctionWarnings") and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
