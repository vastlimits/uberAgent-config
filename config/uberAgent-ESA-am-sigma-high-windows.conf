utinelyTakingAction") or icontains(Process.CommandLine, "DisableScanOnRealtimeEnable") or icontains(Process.CommandLine, "DisableScriptScanning") or icontains(Process.CommandLine, "DisableSecurityCenter") or icontains(Process.CommandLine, "Notification\_Suppress") or icontains(Process.CommandLine, "SignatureDisableUpdateOnStartupWithoutEngine")))


[ThreatDetectionRule platform=Windows]
