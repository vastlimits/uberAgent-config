[ThreatDetectionRule platform=Windows]
# Detects changes to the "Ports" registry key with data that includes a Windows path or a file with a suspicious extension.
# This could be an attempt to exploit CVE-2020-1048 - a Windows Print Spooler elevation of privilege vulnerability.
# Author: EagleEye Team, Florian Roth (Nextron Systems), NVISO
RuleId = 7ec912f2-5175-4868-b811-ec13ad0f8567
RuleName = CVE-2020-1048 Exploitation Attempt - Suspicious New Printer Ports - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = cve-2020-1048-exploitation-attempt-suspicious-new-printer-ports-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "EagleEye Team, Florian Roth (Nextron Systems), NVISO"}
Query = icontains(Reg.TargetObject, "\\Microsoft\\Windows NT\\CurrentVersion\\Ports") and (icontains(Reg.Value.Data, ".bat") or icontains(Reg.Value.Data, ".com") or icontains(Reg.Value.Data, ".dll") or icontains(Reg.Value.Data, ".exe") or icontains(Reg.Value.Data, ".ps1") or icontains(Reg.Value.Data, ".vbe") or icontains(Reg.Value.Data, ".vbs") or icontains(Reg.Value.Data, "C:"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects when the Notepad++ updater (gup.exe) creates files in suspicious or uncommon locations.
# This could indicate potential exploitation of the updater component to deliver unwanted malware or unwarranted files.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 3b8f4c92-6a51-4d7e-9c3a-8e2d1f5a7b09
RuleName = Uncommon File Created by Notepad++ Updater Gup.EXE
EventType = File.Create
Tag = uncommon-file-created-by-notepad++-updater-gup.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1195.002", "T1557"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Process.Path, "\\gup.exe") and not (istartswith(File.Path, "C:\\Program Files\\Notepad++\\") or istartswith(File.Path, "C:\\Program Files (x86)\\Notepad++\\") or istartswith(File.Path, "C:\\Users\\") and icontains(File.Path, "\\AppData\\Local\\Temp\\") and icontains(File.Path, "npp.") and icontains(File.Path, ".Installer.") and icontains(File.Path, ".exe") or istartswith(File.Path, "C:\\Users\\") and icontains(File.Path, "\\AppData\\Local\\Temp\\") and icontains(File.Path, ".zip") or istartswith(File.Path, "C:\\$Recycle.Bin\\S-1-5-21") or icontains(File.Path, "\\plugins\\JsonTools\\testfiles\\") or icontains(File.Path, "\\Notepad++\\plugins\\ComparePlugin\\") or icontains(File.Path, "npp.") and icontains(File.Path, ".portable.") and icontains(File.Path, "\\plugins\\"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects suspicious and uncommon child processes of WmiPrvSE
# Author: Vadim Khrykov (ThreatIntel), Cyb3rEng, Florian Roth (Nextron Systems)
RuleId = 8a582fe2-0882-4b89-a82a-da6b2dc32937
RuleName = Suspicious WmiPrvSE Child Process
