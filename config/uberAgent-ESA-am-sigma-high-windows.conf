[ThreatDetectionRule platform=Windows]
# Detects usage of bitsadmin downloading a file from a suspicious domain
# Author: Florian Roth (Nextron Systems)
RuleId = 8518ed3d-f7c9-4601-a26c-f361a4256a0c
RuleName = Suspicious Download From File-Sharing Website Via Bitsadmin
EventType = Process.Start
Tag = proc-start-suspicious-download-from-file-sharing-website-via-bitsadmin
RiskScore = 75
Annotation = {"mitre_attack": ["T1197", "T1036.003", "T1105"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\bitsadmin.exe") or Process.Name == "bitsadmin.exe") and (icontains(Process.CommandLine, " /transfer ") or icontains(Process.CommandLine, " /create ") or icontains(Process.CommandLine, " /addfile ")) and (icontains(Process.CommandLine, ".githubusercontent.com") or icontains(Process.CommandLine, "anonfiles.com") or icontains(Process.CommandLine, "cdn.discordapp.com") or icontains(Process.CommandLine, "ddns.net") or icontains(Process.CommandLine, "dl.dropboxusercontent.com") or icontains(Process.CommandLine, "ghostbin.co") or icontains(Process.CommandLine, "github.com") or icontains(Process.CommandLine, "glitch.me") or icontains(Process.CommandLine, "gofile.io") or icontains(Process.CommandLine, "hastebin.com") or icontains(Process.CommandLine, "mediafire.com") or icontains(Process.CommandLine, "mega.nz") or icontains(Process.CommandLine, "onrender.com") or icontains(Process.CommandLine, "pages.dev") or icontains(Process.CommandLine, "paste.ee") or icontains(Process.CommandLine, "pastebin.com") or icontains(Process.CommandLine, "pastebin.pl") or icontains(Process.CommandLine, "pastetext.net") or icontains(Process.CommandLine, "privatlab.com") or icontains(Process.CommandLine, "privatlab.net") or icontains(Process.CommandLine, "send.exploit.in") or icontains(Process.CommandLine, "sendspace.com") or icontains(Process.CommandLine, "storage.googleapis.com") or icontains(Process.CommandLine, "storjshare.io") or icontains(Process.CommandLine, "supabase.co") or icontains(Process.CommandLine, "temp.sh") or icontains(Process.CommandLine, "transfer.sh") or icontains(Process.CommandLine, "trycloudflare.com") or icontains(Process.CommandLine, "ufile.io") or icontains(Process.CommandLine, "w3spaces.com") or icontains(Process.CommandLine, "workers.dev"))


[ThreatDetectionRule platform=Windows]
# Detects the creation of a office macro file from a a suspicious process
# Author: frack113, Nasreddine Bencherchali (Nextron Systems)
RuleId = b1c50487-1967-4315-a026-6491686d860e
RuleName = Office Macro File Creation From Suspicious Process
EventType = File.Create
Tag = office-macro-file-creation-from-suspicious-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1566.001"], "author": "frack113, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\wscript.exe") or iendswith(Parent.Path, "\\cscript.exe") or iendswith(Parent.Path, "\\mshta.exe") or iendswith(Parent.Path, "\\regsvr32.exe") or iendswith(Parent.Path, "\\rundll32.exe") or iendswith(Parent.Path, "\\wscript.exe")) and (iendswith(File.Path, ".docm") or iendswith(File.Path, ".dotm") or iendswith(File.Path, ".xlsm") or iendswith(File.Path, ".xltm") or iendswith(File.Path, ".potm") or iendswith(File.Path, ".pptm"))
GenericProperty1 = Parent.Path
GenericProperty2 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects suspicious child processes related to Windows Shell utilities spawned by `conhost.exe`, which could indicate malicious activity using trusted system components.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = dfa03a09-8b92-4d83-8e74-f72839b1c407
RuleName = Potentially Suspicious Child Processes Spawned by ConHost
EventType = Process.Start
Tag = proc-start-potentially-suspicious-child-processes-spawned-by-conhost
RiskScore = 75
Annotation = {"mitre_attack": ["T1202", "T1218"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\conhost.exe") and (iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\wscript.exe") or Process.Name in ["cmd.exe", "cscript.exe", "mshta.exe", "powershell\_ise.exe", "powershell.exe", "pwsh.dll", "regsvr32.exe", "wscript.exe"])
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects execution and usage of the DSInternals PowerShell module. Which can be used to perform what might be considered as suspicious activity such as dumping DPAPI backup keys or manipulating NTDS.DIT files.
# The DSInternals PowerShell Module exposes several internal features of Active Directory and Azure Active Directory. These include FIDO2 and NGC key auditing, offline ntds.dit file manipulation, password auditing, DC recovery from IFM backups and password hash calculation.
# Author: Nasreddine Bencherchali (Nextron Systems), Nounou Mbeiri
RuleId = 43d91656-a9b2-4541-b7e2-6a9bd3a13f4e
RuleName = DSInternals Suspicious PowerShell Cmdlets
EventType = Process.Start
Tag = proc-start-dsinternals-suspicious-powershell-cmdlets
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Nasreddine Bencherchali (Nextron Systems), Nounou Mbeiri"}
Query = icontains(Process.CommandLine, "Add-ADDBSidHistory") or icontains(Process.CommandLine, "Add-ADNgcKey") or icontains(Process.CommandLine, "Add-ADReplNgcKey") or icontains(Process.CommandLine, "ConvertFrom-ADManagedPasswordBlob") or icontains(Process.CommandLine, "ConvertFrom-GPPrefPassword") or icontains(Process.CommandLine, "ConvertFrom-ManagedPasswordBlob") or icontains(Process.CommandLine, "ConvertFrom-UnattendXmlPassword") or icontains(Process.CommandLine, "ConvertFrom-UnicodePassword") or icontains(Process.CommandLine, "ConvertTo-AADHash") or icontains(Process.CommandLine, "ConvertTo-GPPrefPassword") or icontains(Process.CommandLine, "ConvertTo-KerberosKey") or icontains(Process.CommandLine, "ConvertTo-LMHash") or icontains(Process.CommandLine, "ConvertTo-MsoPasswordHash") or icontains(Process.CommandLine, "ConvertTo-NTHash") or icontains(Process.CommandLine, "ConvertTo-OrgIdHash") or icontains(Process.CommandLine, "ConvertTo-UnicodePassword") or icontains(Process.CommandLine, "Disable-ADDBAccount") or icontains(Process.CommandLine, "Enable-ADDBAccount") or icontains(Process.CommandLine, "Get-ADDBAccount") or icontains(Process.CommandLine, "Get-ADDBBackupKey") or icontains(Process.CommandLine, "Get-ADDBDomainController") or icontains(Process.CommandLine, "Get-ADDBGroupManagedServiceAccount") or icontains(Process.CommandLine, "Get-ADDBKdsRootKey") or icontains(Process.CommandLine, "Get-ADDBSchemaAttribute") or icontains(Process.CommandLine, "Get-ADDBServiceAccount") or icontains(Process.CommandLine, "Get-ADDefaultPasswordPolicy") or icontains(Process.CommandLine, "Get-ADKeyCredential") or icontains(Process.CommandLine, "Get-ADPasswordPolicy") or icontains(Process.CommandLine, "Get-ADReplAccount") or icontains(Process.CommandLine, "Get-ADReplBackupKey") or icontains(Process.CommandLine, "Get-ADReplicationAccount") or icontains(Process.CommandLine, "Get-ADSIAccount") or icontains(Process.CommandLine, "Get-AzureADUserEx") or icontains(Process.CommandLine, "Get-BootKey") or icontains(Process.CommandLine, "Get-KeyCredential") or icontains(Process.CommandLine, "Get-LsaBackupKey") or icontains(Process.CommandLine, "Get-LsaPolicy") or icontains(Process.CommandLine, "Get-SamPasswordPolicy") or icontains(Process.CommandLine, "Get-SysKey") or icontains(Process.CommandLine, "Get-SystemKey") or icontains(Process.CommandLine, "New-ADDBRestoreFromMediaScript") or icontains(Process.CommandLine, "New-ADKeyCredential") or icontains(Process.CommandLine, "New-ADNgcKey") or icontains(Process.CommandLine, "New-NTHashSet") or icontains(Process.CommandLine, "Remove-ADDBObject") or icontains(Process.CommandLine, "Save-DPAPIBlob") or icontains(Process.CommandLine, "Set-ADAccountPasswordHash") or icontains(Process.CommandLine, "Set-ADDBAccountPassword") or icontains(Process.CommandLine, "Set-ADDBBootKey") or icontains(Process.CommandLine, "Set-ADDBDomainController") or icontains(Process.CommandLine, "Set-ADDBPrimaryGroup") or icontains(Process.CommandLine, "Set-ADDBSysKey") or icontains(Process.CommandLine, "Set-AzureADUserEx") or icontains(Process.CommandLine, "Set-LsaPolicy") or icontains(Process.CommandLine, "Set-SamAccountPasswordHash") or icontains(Process.CommandLine, "Set-WinUserPasswordHash") or icontains(Process.CommandLine, "Test-ADDBPasswordQuality") or icontains(Process.CommandLine, "Test-ADPasswordQuality") or icontains(Process.CommandLine, "Test-ADReplPasswordQuality") or icontains(Process.CommandLine, "Test-PasswordQuality") or icontains(Process.CommandLine, "Unlock-ADDBAccount") or icontains(Process.CommandLine, "Write-ADNgcKey") or icontains(Process.CommandLine, "Write-ADReplNgcKey")


[ThreatDetectionRule platform=Windows]
# Detects script interpreters, command-line tools, and similar suspicious child processes of ArcSOC.exe.
# ArcSOC.exe is the process name which hosts ArcGIS Server REST services. If an attacker compromises an ArcGIS
# Server system and uploads a malicious Server Object Extension (SOE), they can send crafted requests to the corresponding
# service endpoint and remotely execute code from the ArcSOC.exe process.
# Author: Micah Babinski
RuleId = 8e95e73e-ba02-4a87-b4d7-0929b8053038
RuleName = Suspicious ArcSOC.exe Child Process
EventType = Process.Start
Tag = proc-start-suspicious-arcsoc.exe-child-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1059", "T1203"], "author": "Micah Babinski"}
Query = iendswith(Parent.Path, "\\ArcSOC.exe") and (iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\wmic.exe") or iendswith(Process.Path, "\\wscript.exe")) and not (iendswith(Process.Path, "\\cmd.exe") and Process.CommandLine == "cmd.exe /c \"ver\"")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects a specific command line of "regsvr32" where the "calc" keyword is used in conjunction with the "/s" flag. This behavior is often seen used by Qakbot
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 0033cf83-fb87-446d-9cac-43d63ad4d5a9
RuleName = Qakbot Regsvr32 Calc Pattern
EventType = Process.Start
Tag = proc-start-qakbot-regsvr32-calc-pattern
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\regsvr32.exe") and (icontains(Process.CommandLine, " -s") or icontains(Process.CommandLine, " /s") or icontains(Process.CommandLine, " –s") or icontains(Process.CommandLine, " —s") or icontains(Process.CommandLine, " ―s")) and iendswith(Process.CommandLine, " calc")


[ThreatDetectionRule platform=Windows]
# Detects Windows command lines that miss a space before or after the /c flag when running a command using the cmd.exe.
# This could be a sign of obfuscation of a fat finger problem (typo by the developer).
# Author: Florian Roth (Nextron Systems)
RuleId = a16980c2-0c56-4de0-9a79-17971979efdd
RuleName = Cmd.EXE Missing Space Characters Execution Anomaly
EventType = Process.Start
Tag = proc-start-cmd.exe-missing-space-characters-execution-anomaly
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Florian Roth (Nextron Systems)"}
