RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001", "T1114"], "author": "FPT.EagleEye, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and icontains(Process.CommandLine, "Add-PSSnapin") and (icontains(Process.CommandLine, "Microsoft.Exchange.Powershell.Snapin") or icontains(Process.CommandLine, "Microsoft.Exchange.Management.PowerShell.SnapIn")) and not (Parent.Path == "C:\\Windows\\System32\\msiexec.exe" and icontains(Process.CommandLine, "$exserver=Get-ExchangeServer ([Environment]::MachineName) -ErrorVariable exerr 2> $null"))
