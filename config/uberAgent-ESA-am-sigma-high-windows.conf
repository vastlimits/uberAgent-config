[ThreatDetectionRule platform=Windows]
# Detects Request to "amsiInitFailed" that can be used to disable AMSI Scanning
# Author: Markus Neis, @Kostastsale
RuleId = 30edb182-aa75-42c0-b0a9-e998bb29067c
RuleName = Potential AMSI Bypass Via .NET Reflection
EventType = Process.Start
Tag = proc-start-potential-amsi-bypass-via-.net-reflection
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Markus Neis, @Kostastsale"}
Query = icontains(Process.CommandLine, "System.Management.Automation.AmsiUtils") and icontains(Process.CommandLine, "amsiInitFailed") or icontains(Process.CommandLine, "[Ref].Assembly.GetType") and icontains(Process.CommandLine, "SetValue($null,$true)") and icontains(Process.CommandLine, "NonPublic,Static")


[ThreatDetectionRule platform=Windows]
# Detects command line patterns used by BlackByte ransomware in different operations
# Author: Florian Roth (Nextron Systems)
RuleId = 999e8307-a775-4d5f-addc-4855632335be
RuleName = Potential BlackByte Ransomware Activity
EventType = Process.Start
Tag = proc-start-potential-blackbyte-ransomware-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1485", "T1498", "T1059.001", "T1140"], "author": "Florian Roth (Nextron Systems)"}
Query = istartswith(Process.Path, "C:\\Users\\Public\\") and icontains(Process.CommandLine, " -single ") or icontains(Process.CommandLine, "del C:\\Windows\\System32\\Taskmgr.exe") or icontains(Process.CommandLine, ";Set-Service -StartupType Disabled $") or icontains(Process.CommandLine, "powershell -command \"$x =[System.Text.Encoding]::Unicode.GetString([System.Convert]::FromBase64String(") or icontains(Process.CommandLine, " do start wordpad.exe /p ")


[ThreatDetectionRule platform=Windows]
# Detects Netsh command execution that whitelists a program located in a suspicious location in the Windows Firewall
# Author: Sander Wiebing, Jonhnathan Ribeiro, Daniil Yugoslavskiy, oscd.community
RuleId = a35f5a72-f347-4e36-8895-9869b0d5fc6d
RuleName = Suspicious Program Location Whitelisted In Firewall Via Netsh.EXE
EventType = Process.Start
Tag = proc-start-suspicious-program-location-whitelisted-in-firewall-via-netsh.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1686.003"], "author": "Sander Wiebing, Jonhnathan Ribeiro, Daniil Yugoslavskiy, oscd.community"}
Query = (iendswith(Process.Path, "\\netsh.exe") or Process.Name == "netsh.exe") and (icontains(Process.CommandLine, "firewall") and icontains(Process.CommandLine, "add") and icontains(Process.CommandLine, "allowedprogram") or icontains(Process.CommandLine, "advfirewall") and icontains(Process.CommandLine, "firewall") and icontains(Process.CommandLine, "add") and icontains(Process.CommandLine, "rule") and icontains(Process.CommandLine, "action=allow") and icontains(Process.CommandLine, "program=")) and (icontains(Process.CommandLine, ":\\$Recycle.bin\\") or icontains(Process.CommandLine, ":\\RECYCLER.BIN\\") or icontains(Process.CommandLine, ":\\RECYCLERS.BIN\\") or icontains(Process.CommandLine, ":\\SystemVolumeInformation\\") or icontains(Process.CommandLine, ":\\Temp\\") or icontains(Process.CommandLine, ":\\Users\\Default\\") or icontains(Process.CommandLine, ":\\Users\\Desktop\\") or icontains(Process.CommandLine, ":\\Users\\Public\\") or icontains(Process.CommandLine, ":\\Windows\\addins\\") or icontains(Process.CommandLine, ":\\Windows\\cursors\\") or icontains(Process.CommandLine, ":\\Windows\\debug\\") or icontains(Process.CommandLine, ":\\Windows\\drivers\\") or icontains(Process.CommandLine, ":\\Windows\\fonts\\") or icontains(Process.CommandLine, ":\\Windows\\help\\") or icontains(Process.CommandLine, ":\\Windows\\system32\\tasks\\") or icontains(Process.CommandLine, ":\\Windows\\Tasks\\") or icontains(Process.CommandLine, ":\\Windows\\Temp\\") or icontains(Process.CommandLine, "\\Downloads\\") or icontains(Process.CommandLine, "\\Local Settings\\Temporary Internet Files\\") or icontains(Process.CommandLine, "\\Temporary Internet Files\\Content.Outlook\\") or icontains(Process.CommandLine, "\%Public\%\\") or icontains(Process.CommandLine, "\%TEMP\%") or icontains(Process.CommandLine, "\%TMP\%"))


[ThreatDetectionRule platform=Windows]
# Detects execution of javascript code using "mshta.exe".
# Author: E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community
RuleId = 67f113fa-e23d-4271-befa-30113b3e08b1
RuleName = Suspicious JavaScript Execution Via Mshta.EXE
EventType = Process.Start
Tag = proc-start-suspicious-javascript-execution-via-mshta.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.005"], "author": "E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community"}
Query = (iendswith(Process.Path, "\\mshta.exe") or Process.Name == "MSHTA.EXE") and icontains(Process.CommandLine, "javascript")


[ThreatDetectionRule platform=Windows]
# Detects a specific binary name seen used by SNAKE malware during its installation as described by CISA in their report
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = d91ff53f-fd0c-419d-a6b8-ae038d5c3733
RuleName = Potential SNAKE Malware Installation Binary Indicator
EventType = Process.Start
Tag = proc-start-potential-snake-malware-installation-binary-indicator
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\jpsetup.exe") or iendswith(Process.Path, "\\jpinst.exe")) and not (Process.CommandLine in ["jpinst.exe", "jpinst", "jpsetup.exe", "jpsetup"] or Process.CommandLine == "" or isnull(Process.CommandLine))


[ThreatDetectionRule platform=Windows]
# Detects the execution of the "net use" command to mount a WebDAV server and then immediately execute some content in it. As seen being used in malicious LNK files
# Author: pH-T (Nextron Systems)
RuleId = f0507c0f-a3a2-40f5-acc6-7f543c334993
RuleName = Suspicious File Execution From Internet Hosted WebDav Share
EventType = Process.Start
Tag = proc-start-suspicious-file-execution-from-internet-hosted-webdav-share
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "pH-T (Nextron Systems)"}
Query = (icontains(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.EXE") and icontains(Process.CommandLine, " net use http") and icontains(Process.CommandLine, "& start /b ") and icontains(Process.CommandLine, "\\DavWWWRoot\\") and (icontains(Process.CommandLine, ".exe ") or icontains(Process.CommandLine, ".dll ") or icontains(Process.CommandLine, ".bat ") or icontains(Process.CommandLine, ".vbs ") or icontains(Process.CommandLine, ".ps1 "))


[ThreatDetectionRule platform=Windows]
# Detects changes to the Windows EventLog channel permission values. It focuses on changes to the Security Descriptor Definition Language (SDDL) string, as modifications to these values can restrict access to specific users or groups, potentially aiding in defense evasion by controlling who can view or modify a event log channel. Upon execution, the user shouldn't be able to access the event log channel via the event viewer or via utilities such as "Get-EventLog" or "wevtutil".
# Author: X__Junior
RuleId = ba226dcf-d390-4642-b9af-b534872f1156
RuleName = Windows Event Log Access Tampering Via Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = windows-event-log-access-tampering-via-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001", "T1112"], "author": "X__Junior"}
Query = (icontains(Reg.TargetObject, "\\SYSTEM\\CurrentControlSet\\Services\\EventLog\\") and iendswith(Reg.TargetObject, "\\CustomSD") or (icontains(Reg.TargetObject, "\\Policies\\Microsoft\\Windows\\EventLog\\") or icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels")) and iendswith(Reg.TargetObject, "\\ChannelAccess")) and (icontains(Reg.Value.Data, "D:(D;") or icontains(Reg.Value.Data, "D:(") and icontains(Reg.Value.Data, ")(D;")) and not (Process.Path == "C:\\Windows\\servicing\\TrustedInstaller.exe" or istartswith(Process.Path, "C:\\Windows\\WinSxS\\") and iendswith(Process.Path, "\\TiWorker.exe")) and not (Process.Path == "" or isnull(Process.Path))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the execution of an Office application that points to a document that is located in a trusted location. Attackers often used this to avoid macro security and execute their malicious code.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = f99abdf0-6283-4e71-bd2b-b5c048a94743
RuleName = Potentially Suspicious Office Document Executed From Trusted Location
EventType = Process.Start
Tag = proc-start-potentially-suspicious-office-document-executed-from-trusted-location
RiskScore = 75
Annotation = {"mitre_attack": ["T1202"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\explorer.exe") or iendswith(Parent.Path, "\\dopus.exe")) and (iendswith(Process.Path, "\\EXCEL.EXE") or iendswith(Process.Path, "\\POWERPNT.EXE") or iendswith(Process.Path, "\\WINWORD.exe") or Process.Name in ["Excel.exe", "POWERPNT.EXE", "WinWord.exe"]) and (icontains(Process.CommandLine, "\\AppData\\Roaming\\Microsoft\\Templates") or icontains(Process.CommandLine, "\\AppData\\Roaming\\Microsoft\\Word\\Startup\\") or icontains(Process.CommandLine, "\\Microsoft Office\\root\\Templates\\") or icontains(Process.CommandLine, "\\Microsoft Office\\Templates\\")) and not (iendswith(Process.CommandLine, ".dotx") or iendswith(Process.CommandLine, ".xltx") or iendswith(Process.CommandLine, ".potx"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of "msiexec.exe" in the "bin" directory of the ManageEngine SupportCenter Plus (Related to CVE-2021-44077) and public POC available (See references section)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 7b501acf-fa98-4272-aa39-194f82edc8a3
RuleName = CVE-2021-44077 POC Default Dropped File
EventType = File.Create
Tag = cve-2021-44077-poc-default-dropped-file
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(File.Path, "\\ManageEngine\\SupportCenterPlus\\bin\\msiexec.exe")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of the Grixba reconnaissance tool based on suspicious command-line parameter combinations.
# This tool is used by the Play ransomware group for network enumeration, data gathering, and event log clearing.
# Author: yxinmiracle, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = af688c76-4ce4-4309-bfdd-e896f01acf27
RuleName = Grixba Malware Reconnaissance Activity
EventType = Process.Start
Tag = proc-start-grixba-malware-reconnaissance-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1595.001", "T1046"], "author": "yxinmiracle, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "-m ") or icontains(Process.CommandLine, "-mode ") or icontains(Process.CommandLine, "-m:") or icontains(Process.CommandLine, "-mode:")) and (icontains(Process.CommandLine, "-i ") or icontains(Process.CommandLine, "-input ") or icontains(Process.CommandLine, "-i:") or icontains(Process.CommandLine, "-input:")) and (icontains(Process.CommandLine, "scan ") or icontains(Process.CommandLine, "scanall ")) and (icontains(Process.CommandLine, ":f ") or icontains(Process.CommandLine, ":r ") or icontains(Process.CommandLine, ":s ") or icontains(Process.CommandLine, " f ") or icontains(Process.CommandLine, " r ") or icontains(Process.CommandLine, " s "))


[ThreatDetectionRule platform=Windows]
# Detects changes to the PSFactory COM InProcServer32 registry. This technique was used by RomCom to create persistence storing a malicious DLL.
# Author: BlackBerry Threat Research and Intelligence Team - @Joseliyo_Jstnk
RuleId = 243380fa-11eb-4141-af92-e14925e77c1b
RuleName = Potential PSFactoryBuffer COM Hijacking
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-psfactorybuffer-com-hijacking
RiskScore = 75
Annotation = {"mitre_attack": ["T1546.015"], "author": "BlackBerry Threat Research and Intelligence Team - @Joseliyo_Jstnk"}
Query = iendswith(Reg.TargetObject, "\\CLSID\\{c90250f3-4d7d-4991-9b69-a5c5bc1c2ae6}\\InProcServer32\\(Default)") and not (Reg.Value.Data in ["\%windir\%\\System32\\ActXPrxy.dll", "C:\\Windows\\System32\\ActXPrxy.dll"])
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects modifications to User Shell Folders registry values via reg.exe or PowerShell, which could indicate persistence attempts.
# Attackers may modify User Shell Folders registry values to point to malicious executables or scripts that will be executed during startup.
# This technique is often used to maintain persistence on a compromised system by ensuring that malicious payloads are executed automatically.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 8f3ab69a-aa22-4943-aa58-e0a52fdf6818
RuleName = User Shell Folders Registry Modification via CommandLine
EventType = Process.Start
Tag = proc-start-user-shell-folders-registry-modification-via-commandline
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001", "T1112"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\reg.exe") or Process.Name in ["powershell.exe", "pwsh.dll", "reg.exe"]) and (icontains(Process.CommandLine, " add ") or icontains(Process.CommandLine, "New-ItemProperty") or icontains(Process.CommandLine, "Set-ItemProperty") or icontains(Process.CommandLine, "si ")) and (icontains(Process.CommandLine, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Shell Folders") or icontains(Process.CommandLine, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\User Shell Folders")) and icontains(Process.CommandLine, "Startup")


[ThreatDetectionRule platform=Windows]
# Detects the use of the Microsoft Windows Resource Leak Diagnostic tool "rdrleakdiag.exe" to dump process memory
# Author: Cedric MAURUGEON, Florian Roth (Nextron Systems), Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)
RuleId = edadb1e5-5919-4e4c-8462-a9e643b02c4b
RuleName = Process Memory Dump via RdrLeakDiag.EXE
EventType = Process.Start
Tag = proc-start-process-memory-dump-via-rdrleakdiag.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.001"], "author": "Cedric MAURUGEON, Florian Roth (Nextron Systems), Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\rdrleakdiag.exe") or Process.Name == "RdrLeakDiag.exe") and (icontains(Process.CommandLine, "-memdmp") or icontains(Process.CommandLine, "/memdmp") or icontains(Process.CommandLine, "–memdmp") or icontains(Process.CommandLine, "—memdmp") or icontains(Process.CommandLine, "―memdmp") or icontains(Process.CommandLine, "fullmemdmp")) and (icontains(Process.CommandLine, " -o ") or icontains(Process.CommandLine, " /o ") or icontains(Process.CommandLine, " –o ") or icontains(Process.CommandLine, " —o ") or icontains(Process.CommandLine, " ―o ") or icontains(Process.CommandLine, " -p ") or icontains(Process.CommandLine, " /p ") or icontains(Process.CommandLine, " –p ") or icontains(Process.CommandLine, " —p ") or icontains(Process.CommandLine, " ―p "))


[ThreatDetectionRule platform=Windows]
# Detects the creation of suspicious files and folders inside the user's AppData folder but not inside any of the common and well known directories (Local, Romaing, LocalLow). This method could be used as a method to bypass detection who exclude the AppData folder in fear of FPs
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = d7b50671-d1ad-4871-aa60-5aa5b331fe04
RuleName = Suspicious File Creation In Uncommon AppData Folder
EventType = File.Create
Tag = suspicious-file-creation-in-uncommon-appdata-folder
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = istartswith(File.Path, "C:\\Users\\") and icontains(File.Path, "\\AppData\\") and (iendswith(File.Path, ".bat") or iendswith(File.Path, ".cmd") or iendswith(File.Path, ".cpl") or iendswith(File.Path, ".dll") or iendswith(File.Path, ".exe") or iendswith(File.Path, ".hta") or iendswith(File.Path, ".iso") or iendswith(File.Path, ".lnk") or iendswith(File.Path, ".msi") or iendswith(File.Path, ".ps1") or iendswith(File.Path, ".psm1") or iendswith(File.Path, ".scr") or iendswith(File.Path, ".vbe") or iendswith(File.Path, ".vbs")) and not (istartswith(File.Path, "C:\\Users\\") and (icontains(File.Path, "\\AppData\\Local\\") or icontains(File.Path, "\\AppData\\LocalLow\\") or icontains(File.Path, "\\AppData\\Roaming\\")))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects command line parameters used by ADCSPwn, a tool to escalate privileges in an active directory network by coercing authenticate from machine accounts and relaying to the certificate service
# Author: Florian Roth (Nextron Systems)
RuleId = cd8c163e-a19b-402e-bdd5-419ff5859f12
RuleName = HackTool - ADCSPwn Execution
EventType = Process.Start
Tag = proc-start-hacktool-adcspwn-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1557.001"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, " --adcs ") and icontains(Process.CommandLine, " --port ")


[ThreatDetectionRule platform=Windows]
# Detects the shell open key manipulation (exefile and ms-settings) used for persistence and the pattern of UAC Bypass using fodhelper.exe, computerdefaults.exe, slui.exe via registry keys (e.g. UACMe 33 or 62)
# Author: Christian Burkard (Nextron Systems)
RuleId = 152f3630-77c1-4284-bcc0-4cc68ab2f6e7
RuleName = Shell Open Registry Keys Manipulation
EventType = Reg.Key.Create
EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = shell-open-registry-keys-manipulation
RiskScore = 75
Annotation = {"mitre_attack": ["T1548.002", "T1546.001"], "author": "Christian Burkard (Nextron Systems)"}
Query = Reg.EventType == "SetValue" and iendswith(Reg.TargetObject, "Classes\\ms-settings\\shell\\open\\command\\SymbolicLinkValue") and icontains(Reg.Value.Data, "\\Software\\Classes\\{") or iendswith(Reg.TargetObject, "Classes\\ms-settings\\shell\\open\\command\\DelegateExecute") or Reg.EventType == "SetValue" and (iendswith(Reg.TargetObject, "Classes\\ms-settings\\shell\\open\\command\\(Default)") or iendswith(Reg.TargetObject, "Classes\\exefile\\shell\\open\\command\\(Default)")) and not Reg.Value.Data == "(Empty)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data
GenericProperty3 = Reg.EventType


[ThreatDetectionRule platform=Windows]
# Detects .NET CLR DLLs being loaded by scripting applications such as wscript or cscript. This could be an indication of potential suspicious execution.
# Author: omkar72, oscd.community
RuleId = 4508a70e-97ef-4300-b62b-ff27992990ea
RuleName = DotNet CLR DLL Loaded By Scripting Applications
EventType = Image.Load
Tag = dotnet-clr-dll-loaded-by-scripting-applications
RiskScore = 75
Annotation = {"mitre_attack": ["T1055"], "author": "omkar72, oscd.community"}
Query = (iendswith(Process.Path, "\\cmstp.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\msxsl.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\wmic.exe") or iendswith(Process.Path, "\\wscript.exe")) and (iendswith(Image.Path, "\\clr.dll") or iendswith(Image.Path, "\\mscoree.dll") or iendswith(Image.Path, "\\mscorlib.dll"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
