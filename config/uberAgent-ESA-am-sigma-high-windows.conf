Annotation = {"mitre_attack": ["T1059.001"], "author": "John Lambert (rule)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and icontains(Process.CommandLine, " hidden ") and (icontains(Process.CommandLine, "AGkAdABzAGEAZABtAGkAbgAgAC8AdAByAGEAbgBzAGYAZQByA") or icontains(Process.CommandLine, "aXRzYWRtaW4gL3RyYW5zZmVy") or icontains(Process.CommandLine, "IAaQB0AHMAYQBkAG0AaQBuACAALwB0AHIAYQBuAHMAZgBlAHIA") or icontains(Process.CommandLine, "JpdHNhZG1pbiAvdHJhbnNmZX") or icontains(Process.CommandLine, "YgBpAHQAcwBhAGQAbQBpAG4AIAAvAHQAcgBhAG4AcwBmAGUAcg") or icontains(Process.CommandLine, "Yml0c2FkbWluIC90cmFuc2Zlc") or icontains(Process.CommandLine, "AGMAaAB1AG4AawBfAHMAaQB6AGUA") or icontains(Process.CommandLine, "JABjAGgAdQBuAGsAXwBzAGkAegBlA") or icontains(Process.CommandLine, "JGNodW5rX3Npem") or icontains(Process.CommandLine, "QAYwBoAHUAbgBrAF8AcwBpAHoAZQ") or icontains(Process.CommandLine, "RjaHVua19zaXpl") or icontains(Process.CommandLine, "Y2h1bmtfc2l6Z") or icontains(Process.CommandLine, "AE8ALgBDAG8AbQBwAHIAZQBzAHMAaQBvAG4A") or icontains(Process.CommandLine, "kATwAuAEMAbwBtAHAAcgBlAHMAcwBpAG8Abg") or icontains(Process.CommandLine, "lPLkNvbXByZXNzaW9u") or icontains(Process.CommandLine, "SQBPAC4AQwBvAG0AcAByAGUAcwBzAGkAbwBuA") or icontains(Process.CommandLine, "SU8uQ29tcHJlc3Npb2") or icontains(Process.CommandLine, "Ty5Db21wcmVzc2lvb") or icontains(Process.CommandLine, "AE8ALgBNAGUAbQBvAHIAeQBTAHQAcgBlAGEAbQ") or icontains(Process.CommandLine, "kATwAuAE0AZQBtAG8AcgB5AFMAdAByAGUAYQBtA") or icontains(Process.CommandLine, "lPLk1lbW9yeVN0cmVhb") or icontains(Process.CommandLine, "SQBPAC4ATQBlAG0AbwByAHkAUwB0AHIAZQBhAG0A") or icontains(Process.CommandLine, "SU8uTWVtb3J5U3RyZWFt") or icontains(Process.CommandLine, "Ty5NZW1vcnlTdHJlYW") or icontains(Process.CommandLine, "4ARwBlAHQAQwBoAHUAbgBrA") or icontains(Process.CommandLine, "5HZXRDaHVua") or icontains(Process.CommandLine, "AEcAZQB0AEMAaAB1AG4Aaw") or icontains(Process.CommandLine, "LgBHA