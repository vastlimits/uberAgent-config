RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(File.Path, "\\wermgr.exe") and not (icontains(File.Path, ":\\$WINDOWS.~BT\\NewOS\\") or icontains(File.Path, ":\\$WinREAgent\\") or icontains(File.Path, ":\\Windows\\servicing\\LCU\\") or icontains(File.Path, ":\\Windows\\System32\\") or icontains(File.Path, ":\\Windows\\SysWOW64\\") or icontains(File.Path, ":\\Windows\\WinSxS\\") or icontains(File.Path, ":\\WUDownloadCache\\") or icontains(File.Path, ":\\Windows\\SoftwareDistribution\\Download\\"))
