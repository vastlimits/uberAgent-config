[ThreatDetectionRule platform=Windows]
# Detects BitLocker Access Agent Update Utility (baaupdate.exe) loading DLLs from suspicious locations that are publicly writable which could indicate an attempt to lateral movement via BitLocker DCOM & COM Hijacking.
# This technique abuses COM Classes configured as INTERACTIVE USER to spawn processes in the context of the logged-on user's session. Specifically, it targets the BDEUILauncher Class (CLSID ab93b6f1-be76-4185-a488-a9001b105b94)
# which can launch BaaUpdate.exe, which is vulnerable to COM Hijacking when started with input parameters. This allows attackers to execute code in the user's context without needing to steal credentials or use additional techniques to compromise the account.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 6e8fe0a8-ba0b-4a93-8f9e-82657e7a5984
RuleName = BaaUpdate.exe Suspicious DLL Load
EventType = Image.Load
Tag = baaupdate.exe-suspicious-dll-load
RiskScore = 75
Annotation = {"mitre_attack": ["T1218", "T1021.003"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Process.Path, "\\BaaUpdate.exe") and iendswith(Image.Path, ".dll") and (icontains(Image.Path, ":\\Perflogs\\") or icontains(Image.Path, ":\\Users\\Default\\") or icontains(Image.Path, ":\\Users\\Public\\") or icontains(Image.Path, ":\\Windows\\Temp\\") or icontains(Image.Path, "\\AppData\\Local\\Temp\\") or icontains(Image.Path, "\\AppData\\Roaming\\") or icontains(Image.Path, "\\Contacts\\") or icontains(Image.Path, "\\Favorites\\") or icontains(Image.Path, "\\Favourites\\") or icontains(Image.Path, "\\Links\\") or icontains(Image.Path, "\\Music\\") or icontains(Image.Path, "\\Pictures\\") or icontains(Image.Path, "\\ProgramData\\") or icontains(Image.Path, "\\Temporary Internet") or icontains(Image.Path, "\\Videos\\"))
GenericProperty1 = Image.Path


