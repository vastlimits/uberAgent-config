[ThreatDetectionRule platform=Windows]
# Detects a suspicious execution of a Microsoft HTML Help (HH.exe)
# Author: Maxim Pavlunin
RuleId = e8a95b5e-c891-46e2-b33a-93937d3abc31
RuleName = Suspicious HH.EXE Execution
EventType = Process.Start
Tag = proc-start-suspicious-hh.exe-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1047", "T1059.001", "T1059.003", "T1059.005", "T1059.007", "T1218", "T1218.001", "T1218.010", "T1218.011", "T1566", "T1566.001"], "author": "Maxim Pavlunin"}
Query = (Process.Name == "HH.exe" or iendswith(Process.Path, "\\hh.exe")) and (icontains(Process.CommandLine, ".application") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\") or icontains(Process.CommandLine, "\\Content.Outlook\\") or icontains(Process.CommandLine, "\\Downloads\\") or icontains(Process.CommandLine, "\\Users\\Public\\") or icontains(Process.CommandLine, "\\Windows\\Temp\\"))


[ThreatDetectionRule platform=Windows]
# Detects suspicious start of rundll32.exe without any parameters as found in CobaltStrike beacon activity
# Author: Florian Roth (Nextron Systems)
RuleId = 1775e15e-b61b-4d14-a1a3-80981298085a
RuleName = Rundll32 Execution Without CommandLine Parameters
EventType = Process.Start
Tag = proc-start-rundll32-execution-without-commandline-parameters
RiskScore = 75
Annotation = {"mitre_attack": ["T1202"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.CommandLine, "\\rundll32.exe") or iendswith(Process.CommandLine, "\\rundll32.exe\"") or iendswith(Process.CommandLine, "\\rundll32")) and not (icontains(Parent.Path, "\\AppData\\Local\\") or icontains(Parent.Path, "\\Microsoft\\Edge\\"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects specific command line execution used by Lace Tempest to download Cobalt Strike as reported by SysAid Team
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = aa5b0a40-ed88-46aa-9fdc-0337b379ca9d
RuleName = Lace Tempest Cobalt Strike Download
EventType = Process.Start
Tag = proc-start-lace-tempest-cobalt-strike-download
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "-nop -w hidden -c IEX ((new-object net.webclient).downloadstring(") and icontains(Process.CommandLine, "/a')")


[ThreatDetectionRule platform=Windows]
# Detects indicators of exploitation by threat actors during exploitation of the "SlashAndGrab" vulnerability related to ScreenConnect as reported Team Huntress
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 05164d17-8e11-4d7d-973e-9e4962436b87
RuleName = ScreenConnect - SlashAndGrab Exploitation Indicators
EventType = File.Create
Tag = screenconnect-slashandgrab-exploitation-indicators
