# Detects the installation of a DNS plugin DLL via ServerLevelPluginDll parameter in registry, which can be used to execute code in context of the DNS server (restart required)
# Author: Florian Roth (Nextron Systems)
RuleId = e61e8a88-59a9-451c-874e-70fcc9740d67
RuleName = New DNS ServerLevelPluginDll Installed
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = new-dns-serverlevelplugindll-installed
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001", "T1112"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\services\\DNS\\Parameters\\ServerLevelPluginDll")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects the creation of taskmgr.exe process in context of LOCAL_SYSTEM
# Author: Florian Roth (Nextron Systems)
RuleId = 9fff585c-c33e-4a86-b3cd-39312079a65f
RuleName = Taskmgr as LOCAL_SYSTEM
EventType = Process.Start
Tag = proc-start-taskmgr-as-local_system
RiskScore = 75
Annotation = {"mitre_attack": ["T1036"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.User, "AUTHORI") or icontains(Process.User, "AUTORI")) and iendswith(Process.Path, "\\taskmgr.exe")
GenericProperty1 = Process.User


[ThreatDetectionRule platform=Windows]
# Potential adversaries stopping ETW providers recording loaded .NET assemblies.
# Author: Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)
RuleId = bf4fc428-dcc3-4bbd-99fe-2422aeee2544
RuleName = ETW Logging Disabled In .NET Processes - Sysmon Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = etw-logging-disabled-in-.net-processes-sysmon-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1112", "T1685"], "author": "Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)"}
Query = iendswith(Reg.TargetObject, "SOFTWARE\\Microsoft\\.NETFramework\\ETWEnabled") and Reg.Value.Data == "DWORD (0x00000000)" or (iendswith(Reg.TargetObject, "\\COMPlus\_ETWEnabled") or iendswith(Reg.TargetObject, "\\COMPlus\_ETWFlags")) and (Reg.Value.Data in [0, "DWORD (0x00000000)"])
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects RunDLL32.exe executing a single digit DLL named "1.dll" with the export function "DllRegisterServer". This behaviour was often seen used by malware and especially IcedID
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 2bd8e100-5b3b-4b6a-bbb5-b129d3ddddc5
RuleName = IcedID Malware Suspicious Single Digit DLL Execution Via Rundll32
EventType = Process.Start
Tag = proc-start-icedid-malware-suspicious-single-digit-dll-execution-via-rundll32
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.011"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\rundll32.exe") and (iendswith(Process.CommandLine, "\\1.dll, DllRegisterServer") or iendswith(Process.CommandLine, " 1.dll, DllRegisterServer"))


[ThreatDetectionRule platform=Windows]
# Detects a possible persistence mechanism using RUN key for Windows Explorer and pointing to a suspicious folder
# Author: Florian Roth (Nextron Systems), oscd.community
RuleId = b7916c2a-fa2f-4795-9477-32b731f70f11
RuleName = Registry Persistence via Explorer Run Key
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = registry-persistence-via-explorer-run-key
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "Florian Roth (Nextron Systems), oscd.community"}
Query = iendswith(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer\\Run") and (icontains(Reg.Value.Data, ":\\$Recycle.bin\\") or icontains(Reg.Value.Data, ":\\ProgramData\\") or icontains(Reg.Value.Data, ":\\Temp\\") or icontains(Reg.Value.Data, ":\\Users\\Default\\") or icontains(Reg.Value.Data, ":\\Users\\Public\\") or icontains(Reg.Value.Data, ":\\Windows\\Temp\\") or icontains(Reg.Value.Data, "\\AppData\\Local\\Temp\\"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects a suspicious process command line that uses whoami as first parameter (as e.g. used by EfsPotato)
# Author: Florian Roth (Nextron Systems)
RuleId = e9142d84-fbe0-401d-ac50-3e519fb00c89
RuleName = WhoAmI as Parameter
EventType = Process.Start
Tag = proc-start-whoami-as-parameter
RiskScore = 75
Annotation = {"mitre_attack": ["T1033"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, ".exe whoami")


[ThreatDetectionRule platform=Windows]
# Detects a service binary running in a suspicious directory
# Author: Florian Roth (Nextron Systems)
RuleId = 883faa95-175a-4e22-8181-e5761aeb373c
RuleName = Suspicious Service Binary Directory
EventType = Process.Start
Tag = proc-start-suspicious-service-binary-directory
RiskScore = 75
Annotation = {"mitre_attack": ["T1202"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.Path, "\\Users\\Public\\") or icontains(Process.Path, "\\$Recycle.bin") or icontains(Process.Path, "\\Users\\All Users\\") or icontains(Process.Path, "\\Users\\Default\\") or icontains(Process.Path, "\\Users\\Contacts\\") or icontains(Process.Path, "\\Users\\Searches\\") or icontains(Process.Path, "C:\\Perflogs\\") or icontains(Process.Path, "\\config\\systemprofile\\") or icontains(Process.Path, "\\Windows\\Fonts\\") or icontains(Process.Path, "\\Windows\\IME\\") or icontains(Process.Path, "\\Windows\\addins\\")) and (iendswith(Parent.Path, "\\services.exe") or iendswith(Parent.Path, "\\svchost.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the dump of highly sensitive files such as "NTDS.DIT" and "SECURITY" hive.
# Attackers can leverage the "wbadmin" utility in order to dump sensitive files that might contain credential or sensitive information.
# Author: Nasreddine Bencherchali (Nextron Systems), frack113
RuleId = 84972c80-251c-4c3a-9079-4f00aad93938
RuleName = Sensitive File Recovery From Backup Via Wbadmin.EXE
EventType = Process.Start
Tag = proc-start-sensitive-file-recovery-from-backup-via-wbadmin.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.003"], "author": "Nasreddine Bencherchali (Nextron Systems), frack113"}
Query = (iendswith(Process.Path, "\\wbadmin.exe") or Process.Name == "WBADMIN.EXE") and icontains(Process.CommandLine, " recovery") and icontains(Process.CommandLine, "recoveryTarget") and icontains(Process.CommandLine, "itemtype:File") and (icontains(Process.CommandLine, "\\config\\SAM") or icontains(Process.CommandLine, "\\config\\SECURITY") or icontains(Process.CommandLine, "\\config\\SYSTEM") or icontains(Process.CommandLine, "\\Windows\\NTDS\\NTDS.dit"))


[ThreatDetectionRule platform=Windows]
# This rule detects execution of PowerShell scripts located in the "C:\Users\Public" folder
# Author: Max Altgelt (Nextron Systems)
RuleId = fb9d3ff7-7348-46ab-af8c-b55f5fbf39b4
RuleName = Execution of Powershell Script in Public Folder
EventType = Process.Start
Tag = proc-start-execution-of-powershell-script-in-public-folder
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Max Altgelt (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and (icontains(Process.CommandLine, "-f C:\\Users\\Public") or icontains(Process.CommandLine, "-f \"C:\\Users\\Public") or icontains(Process.CommandLine, "-f \%Public\%") or icontains(Process.CommandLine, "-fi C:\\Users\\Public") or icontains(Process.CommandLine, "-fi \"C:\\Users\\Public") or icontains(Process.CommandLine, "-fi \%Public\%") or icontains(Process.CommandLine, "-fil C:\\Users\\Public") or icontains(Process.CommandLine, "-fil \"C:\\Users\\Public") or icontains(Process.CommandLine, "-fil \%Public\%") or icontains(Process.CommandLine, "-file C:\\Users\\Public") or icontains(Process.CommandLine, "-file \"C:\\Users\\Public") or icontains(Process.CommandLine, "-file \%Public\%"))


[ThreatDetectionRule platform=Windows]
# Detects suspicious filenames that contain a right-to-left override character and a potentially spoofed file extensions.
# Author: Jonathan Peters (Nextron Systems), Florian Roth (Nextron Systems), Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 979baf41-ca44-4540-9d0c-4fcef3b5a3a4
RuleName = Potential File Extension Spoofing Using Right-to-Left Override
EventType = File.Create
Tag = potential-file-extension-spoofing-using-right-to-left-override
RiskScore = 75
Annotation = {"mitre_attack": ["T1036.002"], "author": "Jonathan Peters (Nextron Systems), Florian Roth (Nextron Systems), Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (icontains(File.Path, "\\u202e") or icontains(File.Path, "[U+202E]") or icontains(File.Path, "‮")) and (icontains(File.Path, "3pm.") or icontains(File.Path, "4pm.") or icontains(File.Path, "cod.") or icontains(File.Path, "fdp.") or icontains(File.Path, "ftr.") or icontains(File.Path, "gepj.") or icontains(File.Path, "gnp.") or icontains(File.Path, "gpj.") or icontains(File.Path, "ism.") or icontains(File.Path, "lmth.") or icontains(File.Path, "nls.") or icontains(File.Path, "piz.") or icontains(File.Path, "slx.") or icontains(File.Path, "tdo.") or icontains(File.Path, "vsc.") or icontains(File.Path, "vwm.") or icontains(File.Path, "xcod.") or icontains(File.Path, "xslx.") or icontains(File.Path, "xtpp."))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects when the enablement of developer features such as "Developer Mode" or "Application Sideloading". Which allows the user to install untrusted packages.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = b110ebaf-697f-4da1-afd5-b536fa27a2c1
RuleName = Potential Signing Bypass Via Windows Developer Features - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-signing-bypass-via-windows-developer-features-registry
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\AppModelUnlock") or icontains(Reg.TargetObject, "\\Policies\\Microsoft\\Windows\\Appx\\")) and (iendswith(Reg.TargetObject, "\\AllowAllTrustedApps") or iendswith(Reg.TargetObject, "\\AllowDevelopmentWithoutDevLicense")) and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects execution of "odbcconf" where the path of the DLL being registered is located in a potentially suspicious location.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 6b65c28e-11f3-46cb-902a-68f2cafaf474
RuleName = Odbcconf.EXE Suspicious DLL Location
EventType = Process.Start
Tag = proc-start-odbcconf.exe-suspicious-dll-location
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.008"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\odbcconf.exe") or Process.Name == "odbcconf.exe") and (icontains(Process.CommandLine, ":\\PerfLogs\\") or icontains(Process.CommandLine, ":\\ProgramData\\") or icontains(Process.CommandLine, ":\\Temp\\") or icontains(Process.CommandLine, ":\\Users\\Public\\") or icontains(Process.CommandLine, ":\\Windows\\Registration\\CRMLog") or icontains(Process.CommandLine, ":\\Windows\\System32\\com\\dmp\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\FxsTmp\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\Microsoft\\Crypto\\RSA\\MachineKeys\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\spool\\drivers\\color\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\spool\\PRINTERS\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\spool\\SERVERS\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\Tasks\_Migrated\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\Tasks\\Microsoft\\Windows\\SyncCenter\\") or icontains(Process.CommandLine, ":\\Windows\\SysWOW64\\com\\dmp\\") or icontains(Process.CommandLine, ":\\Windows\\SysWOW64\\FxsTmp\\") or icontains(Process.CommandLine, ":\\Windows\\SysWOW64\\Tasks\\Microsoft\\Windows\\PLA\\System\\") or icontains(Process.CommandLine, ":\\Windows\\SysWOW64\\Tasks\\Microsoft\\Windows\\SyncCenter\\") or icontains(Process.CommandLine, ":\\Windows\\Tasks\\") or icontains(Process.CommandLine, ":\\Windows\\Temp\\") or icontains(Process.CommandLine, ":\\Windows\\Tracing\\") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\") or icontains(Process.CommandLine, "\\AppData\\Roaming\\"))


[ThreatDetectionRule platform=Windows]
# Detects WerFault creating a dump file with a name that indicates that the dump file could be an LSASS process memory, which contains user credentials
# Author: Florian Roth (Nextron Systems)
RuleId = c3e76af5-4ce0-4a14-9c9a-25ceb8fda182
RuleName = WerFault LSASS Process Memory Dump
EventType = File.Create
Tag = werfault-lsass-process-memory-dump
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.001"], "author": "Florian Roth (Nextron Systems)"}
Query = Process.Path == "C:\\WINDOWS\\system32\\WerFault.exe" and (icontains(File.Path, "\\lsass") or icontains(File.Path, "lsass.exe"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of Time Travel Debugging Utility. Adversaries can execute malicious processes and dump processes, such as lsass.exe, via tttracer.exe.
# Author: Ensar Şamil, @sblmsrsn, @oscd_initiative
