[ThreatDetectionRule platform=Windows]
# Detects certain parent child patterns found in cases in which a web shell is used to perform certain credential dumping or exfiltration activities on a compromised system
# Author: Florian Roth (Nextron Systems)
RuleId = 4ebc877f-4612-45cb-b3a5-8e3834db36c9
RuleName = Webshell Hacking Activity Patterns
EventType = Process.Start
Tag = proc-start-webshell-hacking-activity-patterns
RiskScore = 75
Annotation = {"mitre_attack": ["T1505.003", "T1018", "T1033", "T1087"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\caddy.exe") or iendswith(Parent.Path, "\\httpd.exe") or iendswith(Parent.Path, "\\nginx.exe") or iendswith(Parent.Path, "\\php-cgi.exe") or iendswith(Parent.Path, "\\w3wp.exe") or iendswith(Parent.Path, "\\ws\_tomcatservice.exe") or (iendswith(Parent.Path, "\\java.exe") or iendswith(Parent.Path, "\\javaw.exe")) and (icontains(Parent.Path, "-tomcat-") or icontains(Parent.Path, "\\tomcat")) or (iendswith(Parent.Path, "\\java.exe") or iendswith(Parent.Path, "\\javaw.exe")) and (icontains(Process.CommandLine, "catalina.jar") or icontains(Process.CommandLine, "CATALINA\_HOME"))) and (icontains(Process.CommandLine, "rundll32") and icontains(Process.CommandLine, "comsvcs") or icontains(Process.CommandLine, " -hp") and icontains(Process.CommandLine, " a ") and icontains(Process.CommandLine, " -m") or icontains(Process.CommandLine, "net") and icontains(Process.CommandLine, " user ") and icontains(Process.CommandLine, " /add") or icontains(Process.CommandLine, "net") and icontains(Process.CommandLine, " localgroup ") and icontains(Process.CommandLine, " administrators ") and icontains(Process.CommandLine, "/add") or iendswith(Process.Path, "\\ntdsutil.exe") or iendswith(Process.Path, "\\ldifde.exe") or iendswith(Process.Path, "\\adfind.exe") or iendswith(Process.Path, "\\procdump.exe") or iendswith(Process.Path, "\\Nanodump.exe") or iendswith(Process.Path, "\\vssadmin.exe") or iendswith(Process.Path, "\\fsutil.exe") or icontains(Process.CommandLine, " -decode ") or icontains(Process.CommandLine, " -NoP ") or icontains(Process.CommandLine, " -W Hidden ") or icontains(Process.CommandLine, " /decode ") or icontains(Process.CommandLine, " /ticket:") or icontains(Process.CommandLine, " sekurlsa") or icontains(Process.CommandLine, ".dmp full") or icontains(Process.CommandLine, ".downloadfile(") or icontains(Process.CommandLine, ".downloadstring(") or icontains(Process.CommandLine, "FromBase64String") or icontains(Process.CommandLine, "process call create") or icontains(Process.CommandLine, "reg save ") or icontains(Process.CommandLine, "whoami /priv"))
GenericProperty1 = Parent.Path


