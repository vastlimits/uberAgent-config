EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = suspicious-path-in-keyboard-layout-ime-file-registry-value
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "X__Junior (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\Control\\Keyboard Layouts\\") and icontains(Reg.TargetObject, "Ime File") and (icontains(Reg.Value.Data, ":\\Perflogs\\") or icontains(Reg.Value.Data, ":\\Users\\Public\\") or icontains(Reg.Value.Data, ":\\Windows\\Temp\\") or icontains(Reg.Value.Data, "\\AppData\\Local\\Temp\\") or icontains(Reg.Value.Data, "\\AppData\\Roaming\\") or icontains(Reg.Value.Data, "\\Temporary Internet") or icontains(Reg.Value.Data, ":\\Users\\") and icontains(Reg.Value.Data, "\\Favorites\\") or icontains(Reg.Value.Data, ":\\Users\\") and icontains(Reg.Value.Data, "\\Favourites\\") or icontains(Reg.Value.Data, ":\\Users\\") and icontains(Reg.Value.Data, "\\Contacts\\"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


