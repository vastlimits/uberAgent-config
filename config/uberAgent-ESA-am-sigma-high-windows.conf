RuleName = File Decoded From Base64/Hex Via Certutil.EXE
EventType = Process.Start
Tag = proc-start-file-decoded-from-base64/hex-via-certutil.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1027"], "author": "Florian Roth (Nextron Systems), Jonhnathan Ribeiro, oscd.community"}
Query = (iendswith(Process.Path, "\\certutil.exe") or Process.Name == "CertUtil.exe") and (icontains(Process.CommandLine, "-decode ") or icontains(Process.CommandLine, "/decode ") or icontains(Process.CommandLine, "–decode ") or icontains(Process.CommandLine, "—decode ") or icontains(Process.CommandLine, "―decode ") or icontains(Process.CommandLine, "-decodehex ") or icontains(Process.CommandLine, "/decodehex ") or icontains(Process.CommandLine, "–decodehex ") or icontains(Process.CommandLine, "—decodehex ") or icontains(Process.CommandLine, "―decodehex "))


