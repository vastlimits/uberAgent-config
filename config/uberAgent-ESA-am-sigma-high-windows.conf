Query = iendswith(Reg.TargetObject, "Software\\Classes\\exefile\\shell\\runas\\command\\isolatedCommand") or iendswith(Reg.TargetObject, "Software\\Classes\\Folder\\shell\\open\\command\\SymbolicLinkValue") and Reg.Value.Data regex "-1[0-9]{3}\\\\Software\\\\Classes\\\\"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
