[ThreatDetectionRule platform=Windows]
# Detects the usage of "reg.exe" in order to dump sensitive registry hives. This includes SAM, SYSTEM and SECURITY hives.
# Author: Teymur Kheirkhabarov, Endgame, JHasenbusch, Daniil Yugoslavskiy, oscd.community, frack113
RuleId = fd877b94-9bb5-4191-bb25-d79cbd93c167
RuleName = Dumping of Sensitive Hives Via Reg.EXE
EventType = Process.Start
Tag = proc-start-dumping-of-sensitive-hives-via-reg.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.002", "T1003.004", "T1003.005"], "author": "Teymur Kheirkhabarov, Endgame, JHasenbusch, Daniil Yugoslavskiy, oscd.community, frack113"}
Query = (iendswith(Process.Path, "\\reg.exe") or Process.Name == "reg.exe") and (icontains(Process.CommandLine, " save ") or icontains(Process.CommandLine, " export ") or icontains(Process.CommandLine, " ˢave ") or icontains(Process.CommandLine, " eˣport ")) and (icontains(Process.CommandLine, "hklm") or icontains(Process.CommandLine, "hk˪m") or icontains(Process.CommandLine, "hkey\_local\_machine") or icontains(Process.CommandLine, "hkey\_˪ocal\_machine") or icontains(Process.CommandLine, "hkey\_loca˪\_machine") or icontains(Process.CommandLine, "hkey\_˪oca˪\_machine")) and (icontains(Process.CommandLine, "\\system") or icontains(Process.CommandLine, "\\sam") or icontains(Process.CommandLine, "\\security") or icontains(Process.CommandLine, "\\ˢystem") or icontains(Process.CommandLine, "\\syˢtem") or icontains(Process.CommandLine, "\\ˢyˢtem") or icontains(Process.CommandLine, "\\ˢam") or icontains(Process.CommandLine, "\\ˢecurity"))


[ThreatDetectionRule platform=Windows]
# Detects the presence of reversed PowerShell commands in the CommandLine. This is often used as a method of obfuscation by attackers
# Author: Teymur Kheirkhabarov (idea), Vasiliy Burov (rule), oscd.community, Tim Shelton
RuleId = b6b49cd1-34d6-4ead-b1bf-176e9edba9a4
RuleName = Potential PowerShell Obfuscation Via Reversed Commands
EventType = Process.Start
Tag = proc-start-potential-powershell-obfuscation-via-reversed-commands
RiskScore = 75
Annotation = {"mitre_attack": ["T1027", "T1059.001"], "author": "Teymur Kheirkhabarov (idea), Vasiliy Burov (rule), oscd.community, Tim Shelton"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and (icontains(Process.CommandLine, "hctac") or icontains(Process.CommandLine, "kaerb") or icontains(Process.CommandLine, "dnammoc") or icontains(Process.CommandLine, "ekovn") or icontains(Process.CommandLine, "eliFd") or icontains(Process.CommandLine, "rahc") or icontains(Process.CommandLine, "etirw") or icontains(Process.CommandLine, "golon") or icontains(Process.CommandLine, "tninon") or icontains(Process.CommandLine, "eddih") or icontains(Process.CommandLine, "tpircS") or icontains(Process.CommandLine, "ssecorp") or icontains(Process.CommandLine, "llehsrewop") or icontains(Process.CommandLine, "esnopser") or icontains(Process.CommandLine, "daolnwod") or icontains(Process.CommandLine, "tneilCbeW") or icontains(Process.CommandLine, "tneilc") or icontains(Process.CommandLine, "ptth") or icontains(Process.CommandLine, "elifotevas") or icontains(Process.CommandLine, "46esab") or icontains(Process.CommandLine, "htaPpmeTteG") or icontains(Process.CommandLine, "tcejbO") or icontains(Process.CommandLine, "maerts") or icontains(Process.CommandLine, "hcaerof") or icontains(Process.CommandLine, "retupmoc")) and not (icontains(Process.CommandLine, " -EncodedCommand ") or icontains(Process.CommandLine, " -enc "))


[ThreatDetectionRule platform=Windows]
# Detects DNS queries made by the finger utility, which can be abused by threat actors to retrieve remote commands for execution on Windows devices.
# In one ClickFix malware campaign, adversaries leveraged the finger protocol to fetch commands from a remote server.
# Since the finger utility is not commonly used in modern Windows environments, its presence already raises suspicion.
# Investigating such DNS queries can also help identify potential malicious infrastructure used by threat actors for command and control (C2) communication.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = c082c2b0-525b-4dbc-9a26-a57dc4692074
RuleName = DNS Query by Finger Utility
EventType = Dns.Query
Tag = dns-query-by-finger-utility
RiskScore = 75
Annotation = {"mitre_attack": ["T1071.004", "T1059.003"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Process.Path, "\\finger.exe")


[ThreatDetectionRule platform=Windows]
# Detects a suspicious program execution in Outlook temp folder
# Author: Florian Roth (Nextron Systems)
RuleId = a018fdc3-46a3-44e5-9afb-2cd4af1d4b39
RuleName = Suspicious Execution From Outlook Temporary Folder
EventType = Process.Start
Tag = proc-start-suspicious-execution-from-outlook-temporary-folder
RiskScore = 75
Annotation = {"mitre_attack": ["T1566.001"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.Path, "\\Temporary Internet Files\\Content.Outlook\\")


[ThreatDetectionRule platform=Windows]
# Detects WMIC executions in which an event consumer gets created. This could be used to establish persistence
# Author: Florian Roth (Nextron Systems)
RuleId = ebef4391-1a81-4761-a40a-1db446c0e625
RuleName = New ActiveScriptEventConsumer Created Via Wmic.EXE
EventType = Process.Start
Tag = proc-start-new-activescripteventconsumer-created-via-wmic.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1546.003"], "author": "Florian Roth (Nextron Systems)"}
