EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = forest-blizzard-apt-custom-protocol-handler-creation
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
