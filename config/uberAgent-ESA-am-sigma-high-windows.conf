[ThreatDetectionRule platform=Windows]
# Detects activity that indicates a user disabling the ability for Antivirus mini filter to inspect a "Dev Drive".
# Author: @kostastsale, Nasreddine Bencherchali (Nextron Systems)
RuleId = 31e124fb-5dc4-42a0-83b3-44a69c77b271
RuleName = Antivirus Filter Driver Disallowed On Dev Drive - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = antivirus-filter-driver-disallowed-on-dev-drive-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "@kostastsale, Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\FilterManager\\FltmgrDevDriveAllowAntivirusFilter") and Reg.Value.Data == "DWORD (0x00000000)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects execution of the "net.exe" command in order to add a group named "ESX Admins".
# This could indicates a potential exploitation attempt of CVE-2024-37085, which allows an attacker to elevate their privileges to full administrative access on an domain-joined ESXi hypervisor.
# VMware ESXi hypervisors joined to an Active Directory domain consider any member of a domain group named "ESX Admins" to have full administrative access by default.
# Author: frack113
RuleId = c408acfe-2870-41df-8d2f-9f4daa4555ed
RuleName = Potential Exploitation of CVE-2024-37085 - Suspicious Creation Of ESX Admins Group
EventType = Process.Start
Tag = proc-start-potential-exploitation-of-cve-2024-37085-suspicious-creation-of-esx-admins-group
RiskScore = 75
Annotation = {"author": "frack113"}
Query = (iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or Process.Name in ["net.exe", "net1.exe"]) and icontains(Process.CommandLine, "/add") and icontains(Process.CommandLine, "/domain") and icontains(Process.CommandLine, "ESX Admins") and icontains(Process.CommandLine, "group") or (iendswith(Process.Path, "\\PowerShell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.exe", "pwsh.dll"]) and icontains(Process.CommandLine, "New-ADGroup") and icontains(Process.CommandLine, "ESX Admins")


[ThreatDetectionRule platform=Windows]
# Detects programs on a Windows system that should not write scripts to disk
# Author: frack113, Florian Roth (Nextron Systems)
RuleId = 7d604714-e071-49ff-8726-edeb95a70679
RuleName = Legitimate Application Dropped Script
EventType = File.Create
