EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = disable-windows-event-logging-via-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001"], "author": "frack113, Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\") and iendswith(Reg.TargetObject, "\\Enabled") and Reg.Value.Data == "DWORD (0x00000000)" and not (Process.Path == "C:\\Windows\\system32\\wevtutil.exe" or istartswith(Process.Path, "C:\\Windows\\winsxs\\") and iendswith(Process.Path, "\\TiWorker.exe") or Process.Path == "C:\\Windows\\System32\\svchost.exe" and (icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\Microsoft-Windows-FileInfoMinifilter") or icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\Microsoft-Windows-ASN1\\") or icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\Microsoft-Windows-Kernel-AppCompat\\") or icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\Microsoft-Windows-Runtime\\Error\\") or icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\Microsoft-Windows-CAPI2/Operational\\")) or Process.Path == "C:\\Windows\\servicing\\TrustedInstaller.exe" and icontains(Reg.TargetObject, "\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\Microsoft-Windows-Compat-Appraiser")) and not (Process.Path == "" or isnull(Process.Path))
