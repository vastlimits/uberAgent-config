EventType = File.Create
Tag = potential-ripzip-attack-on-startup-folder
RiskScore = 75
Annotation = {"mitre_attack": ["T1547"], "author": "Greg (rule)"}
Query = icontains(File.Path, "\\Microsoft\\Windows\\Start Menu\\Programs\\Startup") and icontains(File.Path, ".lnk.{0AFACED1-E828-11D1-9187-B532F1E9575D}") and iendswith(Process.Path, "\\explorer.exe")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the registration of a new ODBC driver where the driver is located in a potentially suspicious location
# Author: Nasreddine Bencherchali (Nextron Systems)
