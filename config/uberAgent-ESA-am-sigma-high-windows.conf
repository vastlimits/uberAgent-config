GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of a symbolic link between "cmd.exe" and the accessibility on-screen keyboard binary (osk.exe) using "mklink". This technique provides an elevated command prompt to the user from the login screen without the need to log in.
# Author: frack113
RuleId = e9b61244-893f-427c-b287-3e708f321c6b
RuleName = Potential Privilege Escalation Using Symlink Between Osk and Cmd
EventType = Process.Start
Tag = proc-start-potential-privilege-escalation-using-symlink-between-osk-and-cmd
RiskScore = 75
Annotation = {"mitre_attack": ["T1546.008"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\cmd.exe") or Process.Name == "Cmd.Exe") and icontains(Process.CommandLine, "mklink") and icontains(Process.CommandLine, "\\osk.exe") and icontains(Process.CommandLine, "\\cmd.exe")


[ThreatDetectionRule platform=Windows]
# This rule detects that the path to the DLL written in the registry is different from the default one. Launched WAB.exe tries to load the DLL from Registry.
# Author: oscd.community, Natalia Shornikova
RuleId = fc014922-5def-4da9-a0fc-28c973f41bfb
RuleName = Execution DLL of Choice Using WAB.EXE
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = execution-dll-of-choice-using-wab.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1218"], "author": "oscd.community, Natalia Shornikova"}
Query = iendswith(Reg.TargetObject, "\\Software\\Microsoft\\WAB\\DLLPath") and not Reg.Value.Data == "\%CommonProgramFiles\%\\System\\wab32.dll"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects potential DLL sideloading activity via the Aruba Networks Virtual Intranet Access "arubanetsvc.exe" process using DLL Search Order Hijacking
# Author: Nasreddine Bencherchali (Nextron Systems)
