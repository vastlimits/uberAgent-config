RiskScore = 75
Annotation = {"mitre_attack": ["T1048", "T1567.002"], "author": "Nounou Mbeiri, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(Process.CommandLine, "--password-file") and icontains(Process.CommandLine, "init") and icontains(Process.CommandLine, " -r ") or icontains(Process.CommandLine, "--use-fs-snapshot") and icontains(Process.CommandLine, "backup") and icontains(Process.CommandLine, " -r ") or (icontains(Process.CommandLine, "sftp:") or icontains(Process.CommandLine, "rest:http") or icontains(Process.CommandLine, "s3:s3.") or icontains(Process.CommandLine, "s3.http") or icontains(Process.CommandLine, "azure:") or icontains(Process.CommandLine, " gs:") or icontains(Process.CommandLine, "rclone:") or icontains(Process.CommandLine, "swift:") or icontains(Process.CommandLine, " b2:")) and icontains(Process.CommandLine, " init ") and icontains(Process.CommandLine, " -r ")


