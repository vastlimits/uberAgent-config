.exe"] or iendswith(Process.Path, "C:\\Program Files (x86)\\Microsoft\\EdgeUpdate\\MicrosoftEdgeUpdate.exe") or iendswith(Process.Path, "C:\\Program Files\\Microsoft\\EdgeUpdate\\MicrosoftEdgeUpdate.exe") or iendswith(Process.Path, "C:\\Program Files (x86)\\Microsoft OneDrive\\OneDrive.exe") or iendswith(Process.Path, "C:\\Program Files\\Microsoft OneDrive\\OneDrive.exe"))
