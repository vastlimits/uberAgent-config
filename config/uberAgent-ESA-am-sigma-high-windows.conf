RiskScore = 75
Annotation = {"mitre_attack": ["T1543.003"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\pwsh.exe") or Process.Name == "pwsh.dll") and (icontains(Process.CommandLine, "-SecurityDescriptorSddl ") or icontains(Process.CommandLine, "-sd ")) and icontains(Process.CommandLine, "Set-Service ") and icontains(Process.CommandLine, "D;;") and (icontains(Process.CommandLine, ";;;IU") or icontains(Process.CommandLine, ";;;SU") or icontains(Process.CommandLine, ";;;BA") or icontains(Process.CommandLine, ";;;SY") or icontains(Process.CommandLine, ";;;WD"))


