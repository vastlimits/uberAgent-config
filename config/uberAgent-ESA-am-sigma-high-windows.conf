[ThreatDetectionRule platform=Windows]
# Get-Variable is a valid PowerShell cmdlet
# WindowsApps is by default in the path where PowerShell is executed.
# So when the Get-Variable command is issued on PowerShell execution, the system first looks for the Get-Variable executable in the path and executes the malicious binary instead of looking for the PowerShell cmdlet.
# Author: frack113
RuleId = 0c3fac91-5627-46e8-a6a8-a0d7b9b8ae1b
RuleName = Suspicious Get-Variable.exe Creation
EventType = File.Create
Tag = suspicious-get-variable.exe-creation
RiskScore = 75
Annotation = {"mitre_attack": ["T1546", "T1027"], "author": "frack113"}
Query = iendswith(File.Path, "Local\\Microsoft\\WindowsApps\\Get-Variable.exe")
GenericProperty1 = File.Path


