[ThreatDetectionRule platform=Windows]
# Detects processes setting a new DLL in DllName in under HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\W32Time\TimeProvider.
# Adversaries may abuse time providers to execute DLLs when the system boots.
# The Windows Time service (W32Time) enables time synchronization across and within domains.
# Author: frack113
RuleId = e88a6ddc-74f7-463b-9b26-f69fc0d2ce85
RuleName = New TimeProviders Registered With Uncommon DLL Name
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = new-timeproviders-registered-with-uncommon-dll-name
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.003"], "author": "frack113"}
Query = icontains(Reg.TargetObject, "\\Services\\W32Time\\TimeProviders") and iendswith(Reg.TargetObject, "\\DllName") and not (Reg.Value.Data in ["\%SystemRoot\%\\System32\\vmictimeprovider.dll", "\%systemroot\%\\system32\\w32time.dll", "C:\\Windows\\SYSTEM32\\w32time.DLL"])
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the execution of "logman" utility in order to disable or delete Windows trace sessions
# Author: Florian Roth (Nextron Systems)
RuleId = cd1f961e-0b96-436b-b7c6-38da4583ec00
RuleName = Suspicious Windows Trace ETW Session Tamper Via Logman.EXE
EventType = Process.Start
Tag = proc-start-suspicious-windows-trace-etw-session-tamper-via-logman.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1685", "T1685.005"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\logman.exe") or Process.Name == "Logman.exe") and (icontains(Process.CommandLine, "stop ") or icontains(Process.CommandLine, "delete ")) and (icontains(Process.CommandLine, "Circular Kernel Context Logger") or icontains(Process.CommandLine, "EventLog-") or icontains(Process.CommandLine, "SYSMON TRACE") or icontains(Process.CommandLine, "SysmonDnsEtwSession"))


[ThreatDetectionRule platform=Windows]
# Detects suspicious activity in which the MSExchangeMailboxReplication process writes .asp and .apsx files to disk, which could be a sign of ProxyShell exploitation
