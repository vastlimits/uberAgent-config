Query = iendswith(Process.Path, "\\regsvr32.exe") and istartswith(Process.CommandLine, "regsvr32 /s") and icontains(Process.CommandLine, "\\contextMenu\\NppShell.dll") and not (Process.Path in ["C:\\Windows\\System32\\regsvr32.exe", "C:\\Windows\\SysWOW64\\regsvr32.exe"])


