GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects tampering with attachment manager settings policies associations to lower the default file type risks (See reference for more information)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = a9b6c011-ab69-4ddb-bc0a-c4f21c80ec47
RuleName = Potential Attachment Manager Settings Associations Tamper
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-attachment-manager-settings-associations-tamper
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\Associations\\") and (iendswith(Reg.TargetObject, "\\DefaultFileTypeRisk") and Reg.Value.Data == "DWORD (0x00006152)" or iendswith(Reg.TargetObject, "\\LowRiskFileTypes") and (icontains(Reg.Value.Data, ".zip;") or icontains(Reg.Value.Data, ".rar;") or icontains(Reg.Value.Data, ".exe;") or icontains(Reg.Value.Data, ".bat;") or icontains(Reg.Value.Data, ".com;") or icontains(Reg.Value.Data, ".cmd;") or icontains(Reg.Value.Data, ".reg;") or icontains(Reg.Value.Data, ".msi;") or icontains(Reg.Value.Data, ".htm;") or icontains(Reg.Value.Data, ".html;")))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the pattern of UAC Bypass using NTFS reparse point and wusa.exe DLL hijacking (UACMe 36)
# Author: Christian Burkard (Nextron Systems)
