Annotation = {"mitre_attack": ["T1027", "T1059.001"], "author": "Nikita Nazarov, oscd.community"}
Query = Process.CommandLine regex "(?i)(?:set).*&&\\s?set.*(?:environment|invoke|\\$\\{?input).*&&.*\""


[ThreatDetectionRule platform=Windows]
# Detects the creation of a process executing as user called "ANONYMOUS" seen used by the "MileStone2016" variant of COLDSTEEL
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = e01b6eb5-1eb4-4465-a165-85d40d874add
RuleName = COLDSTEEL RAT Anonymous User Process Execution
EventType = Process.Start
Tag = proc-start-coldsteel-rat-anonymous-user-process-execution
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(Parent.Path, "\\Windows\\System32\\") or icontains(Parent.Path, "\\AppData\\")) and icontains(Process.User, "ANONYMOUS")
GenericProperty1 = Parent.Path
GenericProperty2 = Process.User


[ThreatDetectionRule platform=Windows]
# Detects command that type the content of ntdll.dll to a different file or a pipe in order to evade AV / EDR detection. As seen being used in the POC NtdllPipe
# Author: Florian Roth (Nextron Systems)
RuleId = bbc865e4-7fcd-45a6-8ff1-95ced28ec5b2
RuleName = NtdllPipe Like Activity Execution
EventType = Process.Start
Tag = proc-start-ntdllpipe-like-activity-execution
RiskScore = 75
Annotation = {"author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "type \%windir\%\\system32\\ntdll.dll") or icontains(Process.CommandLine, "type \%systemroot\%\\system32\\ntdll.dll") or icontains(Process.CommandLine, "type c:\\windows\\system32\\ntdll.dll") or icontains(Process.CommandLine, "\\ntdll.dll > \\\\.\\pipe\\")


[ThreatDetectionRule platform=Windows]
# Detects the creation of files that look like exports of the local SAM (Security Account Manager)
# Author: Florian Roth (Nextron Systems)
RuleId = 4e87b8e2-2ee9-4b2a-a715-4727d297ece0
RuleName = Potential SAM Database Dump
EventType = File.Create
Tag = potential-sam-database-dump
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.002"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(File.Path, "\\Temp\\sam") or iendswith(File.Path, "\\sam.sav") or iendswith(File.Path, "\\Intel\\sam") or iendswith(File.Path, "\\sam.hive") or iendswith(File.Path, "\\Perflogs\\sam") or iendswith(File.Path, "\\ProgramData\\sam") or iendswith(File.Path, "\\Users\\Public\\sam") or iendswith(File.Path, "\\AppData\\Local\\sam") or iendswith(File.Path, "\\AppData\\Roaming\\sam") or iendswith(File.Path, "\_ShadowSteal.zip") or iendswith(File.Path, "\\Documents\\SAM.export") or iendswith(File.Path, ":\\sam") or icontains(File.Path, "\\hive\_sam\_") or icontains(File.Path, "\\sam.save") or icontains(File.Path, "\\sam.export") or icontains(File.Path, "\\~reg\_sam.save") or icontains(File.Path, "\\sam\_backup") or icontains(File.Path, "\\sam.bck") or icontains(File.Path, "\\sam.backup")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Adversaries may disable security tools to avoid possible detection of their tools and activities by removing Windows Defender Definition Files
# Author: frack113
RuleId = 9719a8aa-401c-41af-8108-ced7ec9cd75c
RuleName = Windows Defender Definition Files Removed
EventType = Process.Start
Tag = proc-start-windows-defender-definition-files-removed
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\MpCmdRun.exe") or Process.Name == "MpCmdRun.exe") and icontains(Process.CommandLine, " -RemoveDefinitions") and icontains(Process.CommandLine, " -All")


[ThreatDetectionRule platform=Windows]
# Detects the execution of the "wusa.exe" (Windows Update Standalone Installer) utility to extract ".cab" files using the "/extract" argument from potentially suspicious paths.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = c74c0390-3e20-41fd-a69a-128f0275a5ea
RuleName = Cab File Extraction Via Wusa.EXE From Potentially Suspicious Paths
EventType = Process.Start
Tag = proc-start-cab-file-extraction-via-wusa.exe-from-potentially-suspicious-paths
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\wusa.exe") and icontains(Process.CommandLine, "/extract:") and (icontains(Process.CommandLine, ":\\PerfLogs\\") or icontains(Process.CommandLine, ":\\Users\\Public\\") or icontains(Process.CommandLine, ":\\Windows\\Temp\\") or icontains(Process.CommandLine, "\\Appdata\\Local\\Temp\\"))


[ThreatDetectionRule platform=Windows]
# Detects processes creating temp files related to PCRE.NET package
# Author: Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)
RuleId = 6e90ae7a-7cd3-473f-a035-4ebb72d961da
RuleName = PCRE.NET Package Temp Files
EventType = File.Create
Tag = pcre.net-package-temp-files
RiskScore = 75
Annotation = {"mitre_attack": ["T1059"], "author": "Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)"}
Query = icontains(File.Path, "\\AppData\\Local\\Temp\\ba9ea7344a4a5f591d6e5dc32a13494b\\")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects Trojan loader activity as used by APT28
# Author: Florian Roth (Nextron Systems), Jonhnathan Ribeiro, oscd.community
RuleId = ba778144-5e3d-40cf-8af9-e28fb1df1e20
RuleName = Sofacy Trojan Loader Activity
EventType = Process.Start
Tag = proc-start-sofacy-trojan-loader-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.003", "T1218.011"], "author": "Florian Roth (Nextron Systems), Jonhnathan Ribeiro, oscd.community"}
Query = iendswith(Process.Path, "\\rundll32.exe") and (icontains(Process.CommandLine, "\%LOCALAPPDATA\%") or icontains(Process.CommandLine, "\\AppData\\Local\\")) and (icontains(Process.CommandLine, ".dat\",") or iendswith(Process.CommandLine, ".dll #1") or iendswith(Process.CommandLine, ".dll\" #1") or iendswith(Process.CommandLine, ".dll\",#1")) and not icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\")


[ThreatDetectionRule platform=Windows]
# Execute Hashcat.exe with provided SAM file from registry of Windows and Password list to crack against
# Author: frack113
RuleId = 39b31e81-5f5f-4898-9c0e-2160cfc0f9bf
RuleName = HackTool - Hashcat Password Cracker Execution
EventType = Process.Start
Tag = proc-start-hacktool-hashcat-password-cracker-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1110.002"], "author": "frack113"}
Query = iendswith(Process.Path, "\\hashcat.exe") or icontains(Process.CommandLine, "-a ") and icontains(Process.CommandLine, "-m 1000 ") and icontains(Process.CommandLine, "-r ")


[ThreatDetectionRule platform=Windows]
# Detects when a user installs certificates by using CertOC.exe to load the target DLL file.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 84232095-ecca-4015-b0d7-7726507ee793
RuleName = Suspicious DLL Loaded via CertOC.EXE
EventType = Process.Start
Tag = proc-start-suspicious-dll-loaded-via-certoc.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1218"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\certoc.exe") or Process.Name == "CertOC.exe") and (icontains(Process.CommandLine, " -LoadDLL ") or icontains(Process.CommandLine, " /LoadDLL ") or icontains(Process.CommandLine, " –LoadDLL ") or icontains(Process.CommandLine, " —LoadDLL ") or icontains(Process.CommandLine, " ―LoadDLL ")) and (icontains(Process.CommandLine, "\\Appdata\\Local\\Temp\\") or icontains(Process.CommandLine, "\\Desktop\\") or icontains(Process.CommandLine, "\\Downloads\\") or icontains(Process.CommandLine, "\\Users\\Public\\") or icontains(Process.CommandLine, "C:\\Windows\\Tasks\\") or icontains(Process.CommandLine, "C:\\Windows\\Temp\\"))


[ThreatDetectionRule platform=Windows]
# Detects usage of the "FromBase64String" function in the commandline which is used to decode a base64 encoded string
# Author: Florian Roth (Nextron Systems)
RuleId = e32d4572-9826-4738-b651-95fa63747e8a
RuleName = Base64 Encoded PowerShell Command Detected
EventType = Process.Start
Tag = proc-start-base64-encoded-powershell-command-detected
RiskScore = 75
Annotation = {"mitre_attack": ["T1027", "T1140", "T1059.001"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "::FromBase64String(")


[ThreatDetectionRule platform=Windows]
# Detects PowerShell command line patterns in combincation with encoded commands that often appear in malware infection chains
# Author: Florian Roth (Nextron Systems)
RuleId = b9d9cc83-380b-4ba3-8d8f-60c0e7e2930c
RuleName = Suspicious PowerShell Encoded Command Patterns
EventType = Process.Start
Tag = proc-start-suspicious-powershell-encoded-command-patterns
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.Exe", "pwsh.dll"]) and (icontains(Process.CommandLine, " -e ") or icontains(Process.CommandLine, " -en ") or icontains(Process.CommandLine, " -enc ") or icontains(Process.CommandLine, " -enco")) and (icontains(Process.CommandLine, " JAB") or icontains(Process.CommandLine, " SUVYI") or icontains(Process.CommandLine, " SQBFAFgA") or icontains(Process.CommandLine, " aWV4I") or icontains(Process.CommandLine, " IAB") or icontains(Process.CommandLine, " PAA") or icontains(Process.CommandLine, " aQBlAHgA")) and not (icontains(Parent.Path, "C:\\Packages\\Plugins\\Microsoft.GuestConfiguration.ConfigurationforWindows\\") or icontains(Parent.Path, "\\gc\_worker.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the use of NSudo tool for command execution
# Author: Florian Roth (Nextron Systems), Nasreddine Bencherchali
RuleId = 771d1eb5-9587-4568-95fb-9ec44153a012
RuleName = PUA - NSudo Execution
EventType = Process.Start
Tag = proc-start-pua-nsudo-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1569.002"], "author": "Florian Roth (Nextron Systems), Nasreddine Bencherchali"}
Query = (iendswith(Process.Path, "\\NSudo.exe") or iendswith(Process.Path, "\\NSudoLC.exe") or iendswith(Process.Path, "\\NSudoLG.exe") or Process.Name in ["NSudo.exe", "NSudoLC.exe", "NSudoLG.exe"]) and (icontains(Process.CommandLine, "-U:S ") or icontains(Process.CommandLine, "-U:T ") or icontains(Process.CommandLine, "-U:E ") or icontains(Process.CommandLine, "-P:E ") or icontains(Process.CommandLine, "-M:S ") or icontains(Process.CommandLine, "-M:H ") or icontains(Process.CommandLine, "-U=S ") or icontains(Process.CommandLine, "-U=T ") or icontains(Process.CommandLine, "-U=E ") or icontains(Process.CommandLine, "-P=E ") or icontains(Process.CommandLine, "-M=S ") or icontains(Process.CommandLine, "-M=H ") or icontains(Process.CommandLine, "-ShowWindowMode:Hide"))


[ThreatDetectionRule platform=Windows]
# Detects execution of WSASS, a tool used to dump LSASS memory on Windows systems by leveraging WER's
# (Windows Error Reporting) WerFaultSecure.EXE to bypass PPL (Protected Process Light) protections.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 589ac73f-8e12-409c-964e-31a2f5775ae2
RuleName = HackTool - WSASS Execution
EventType = Process.Start
Tag = proc-start-hacktool-wsass-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.001"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Process.Path, "\\wsass.exe") or icontains(Process.Hashes, "IMPHASH=32F5095C9BBDCACF28FD4060EB4DFC42") or Process.CommandLine regex "(?i)\\.exe[\\\"\\']?\\s+[^\\\"]{0,64}werfaultsecure\\.exe[\\\"\\']?\\s+\\d{2,10}"
GenericProperty1 = Process.Hashes


[ThreatDetectionRule platform=Windows]
# Detects suspicious child processes of the "Manage Engine ServiceDesk Plus" Java web service
# Author: Florian Roth (Nextron Systems)
RuleId = cea2b7ea-792b-405f-95a1-b903ea06458f
RuleName = Suspicious Child Process Of Manage Engine ServiceDesk
EventType = Process.Start
Tag = proc-start-suspicious-child-process-of-manage-engine-servicedesk
RiskScore = 75
Annotation = {"mitre_attack": ["T1102"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Parent.Path, "\\ManageEngine\\ServiceDesk\\") and icontains(Parent.Path, "\\java.exe") and (iendswith(Process.Path, "\\AppVLP.exe") or iendswith(Process.Path, "\\bash.exe") or iendswith(Process.Path, "\\bitsadmin.exe") or iendswith(Process.Path, "\\calc.exe") or iendswith(Process.Path, "\\certutil.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\curl.exe") or iendswith(Process.Path, "\\forfiles.exe") or iendswith(Process.Path, "\\mftrace.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or iendswith(Process.Path, "\\notepad.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\query.exe") or iendswith(Process.Path, "\\reg.exe") or iendswith(Process.Path, "\\schtasks.exe") or iendswith(Process.Path, "\\scrcons.exe") or iendswith(Process.Path, "\\sh.exe") or iendswith(Process.Path, "\\systeminfo.exe") or iendswith(Process.Path, "\\whoami.exe") or iendswith(Process.Path, "\\wmic.exe") or iendswith(Process.Path, "\\wscript.exe")) and not ((iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe")) and icontains(Process.CommandLine, " stop"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects when an attacker adds a new "Debugger" value to the "Hangs" key in order to achieve persistence which will get invoked when an application crashes
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 833ef470-fa01-4631-a79b-6f291c9ac498
RuleName = Add Debugger Entry To Hangs Key For Persistence
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = add-debugger-entry-to-hangs-key-for-persistence
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Windows\\Windows Error Reporting\\Hangs\\Debugger")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects all Emotet like process executions that are not covered by the more generic rules
# Author: Florian Roth (Nextron Systems)
RuleId = d02e8cf5-6099-48cf-9bfc-1eec2d0c7b18
RuleName = Potential Emotet Activity
EventType = Process.Start
Tag = proc-start-potential-emotet-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001", "T1027"], "author": "Florian Roth (Nextron Systems)"}
Query = (Process.CommandLine like r"% -e% PAA%" or icontains(Process.CommandLine, "JABlAG4AdgA6AHUAcwBlAHIAcAByAG8AZgBpAGwAZQ") or icontains(Process.CommandLine, "QAZQBuAHYAOgB1AHMAZQByAHAAcgBvAGYAaQBsAGUA") or icontains(Process.CommandLine, "kAGUAbgB2ADoAdQBzAGUAcgBwAHIAbwBmAGkAbABlA") or icontains(Process.CommandLine, "IgAoACcAKgAnACkAOwAkA") or icontains(Process.CommandLine, "IAKAAnACoAJwApADsAJA") or icontains(Process.CommandLine, "iACgAJwAqACcAKQA7ACQA") or icontains(Process.CommandLine, "JABGAGwAeAByAGgAYwBmAGQ") or icontains(Process.CommandLine, "PQAkAGUAbgB2ADoAdABlAG0AcAArACgA") or icontains(Process.CommandLine, "0AJABlAG4AdgA6AHQAZQBtAHAAKwAoA") or icontains(Process.CommandLine, "9ACQAZQBuAHYAOgB0AGUAbQBwACsAKA")) and not (icontains(Process.CommandLine, "fAAgAEMAbwBuAHYAZQByAHQAVABvAC0ASgBzAG8AbgAgAC0ARQByAHIAbwByAEEAYwB0AGkAbwBuACAAUwBpAGwAZQBuAHQAbAB5AEMAbwBuAHQAaQBuAHUAZQ") or icontains(Process.CommandLine, "wAIABDAG8AbgB2AGUAcgB0AFQAbwAtAEoAcwBvAG4AIAAtAEUAcgByAG8AcgBBAGMAdABpAG8AbgAgAFMAaQBsAGUAbgB0AGwAeQBDAG8AbgB0AGkAbgB1AGUA") or icontains(Process.CommandLine, "8ACAAQwBvAG4AdgBlAHIAdABUAG8ALQBKAHMAbwBuACAALQBFAHIAcgBvAHIAQQBjAHQAaQBvAG4AIABTAGkAbABlAG4AdABsAHkAQwBvAG4AdABpAG4AdQBlA"))


[ThreatDetectionRule platform=Windows]
# Detects when an attacker tries to modify an already existing scheduled tasks to run from a suspicious location
# Attackers can create a simple looking task in order to avoid detection on creation as it's often the most focused on
# Instead they modify the task after creation to include their malicious payload
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 1c0e41cd-21bb-4433-9acc-4a2cd6367b9b
RuleName = Suspicious Modification Of Scheduled Tasks
EventType = Process.Start
Tag = proc-start-suspicious-modification-of-scheduled-tasks
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\schtasks.exe") and icontains(Process.CommandLine, " /Change ") and icontains(Process.CommandLine, " /TN ") and (icontains(Process.CommandLine, "\\AppData\\Local\\Temp") or icontains(Process.CommandLine, "\\AppData\\Roaming\\") or icontains(Process.CommandLine, "\\Users\\Public\\") or icontains(Process.CommandLine, "\\WINDOWS\\Temp\\") or icontains(Process.CommandLine, "\\Desktop\\") or icontains(Process.CommandLine, "\\Downloads\\") or icontains(Process.CommandLine, "\\Temporary Internet") or icontains(Process.CommandLine, "C:\\ProgramData\\") or icontains(Process.CommandLine, "C:\\Perflogs\\") or icontains(Process.CommandLine, "\%ProgramData\%") or icontains(Process.CommandLine, "\%appdata\%") or icontains(Process.CommandLine, "\%comspec\%") or icontains(Process.CommandLine, "\%localappdata\%")) and (icontains(Process.CommandLine, "regsvr32") or icontains(Process.CommandLine, "rundll32") or icontains(Process.CommandLine, "cmd /c ") or icontains(Process.CommandLine, "cmd /k ") or icontains(Process.CommandLine, "cmd /r ") or icontains(Process.CommandLine, "cmd.exe /c ") or icontains(Process.CommandLine, "cmd.exe /k ") or icontains(Process.CommandLine, "cmd.exe /r ") or icontains(Process.CommandLine, "powershell") or icontains(Process.CommandLine, "mshta") or icontains(Process.CommandLine, "wscript") or icontains(Process.CommandLine, "cscript") or icontains(Process.CommandLine, "certutil") or icontains(Process.CommandLine, "bitsadmin") or icontains(Process.CommandLine, "bash.exe") or icontains(Process.CommandLine, "bash ") or icontains(Process.CommandLine, "scrcons") or icontains(Process.CommandLine, "wmic ") or icontains(Process.CommandLine, "wmic.exe") or icontains(Process.CommandLine, "forfiles") or icontains(Process.CommandLine, "scriptrunner") or icontains(Process.CommandLine, "hh.exe") or icontains(Process.CommandLine, "hh "))


[ThreatDetectionRule platform=Windows]
# Threat actors can use an older version of the auditpol binary available inside the NT resource kit to change audit policy configuration to impair detection capability.
# This can be carried out by selectively disabling/removing certain audit policies as well as restoring a custom policy owned by the threat actor.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = c6c56ada-612b-42d1-9a29-adad3c5c2c1e
RuleName = Audit Policy Tampering Via NT Resource Kit Auditpol
EventType = Process.Start
Tag = proc-start-audit-policy-tampering-via-nt-resource-kit-auditpol
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "/logon:none") or icontains(Process.CommandLine, "/system:none") or icontains(Process.CommandLine, "/sam:none") or icontains(Process.CommandLine, "/privilege:none") or icontains(Process.CommandLine, "/object:none") or icontains(Process.CommandLine, "/process:none") or icontains(Process.CommandLine, "/policy:none")


[ThreatDetectionRule platform=Windows]
# Detects execution of a specific binary based on filename and hash used by Lace Tempest to load additional malware as reported by SysAid Team
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 745ea50b-9673-4ba7-9426-cb45cf4a8e6d
RuleName = Lace Tempest Malware Loader Execution
EventType = Process.Start
Tag = proc-start-lace-tempest-malware-loader-execution
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, ":\\Program Files\\SysAidServer\\tomcat\\webapps\\usersfiles\\user.exe") or icontains(Process.Hashes, "SHA256=B5ACF14CDAC40BE590318DEE95425D0746E85B1B7B1CBD14DA66F21F2522BF4D")
GenericProperty1 = Process.Hashes


[ThreatDetectionRule platform=Windows]
# Detects processes loading the non-existent DLL "ShellChromeAPI". One known example is the "DeviceEnroller" binary in combination with the "PhoneDeepLink" flag tries to load this DLL.
# Adversaries can drop their own renamed DLL and execute it via DeviceEnroller.exe using this parameter
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = ee4c5d06-3abc-48cc-8885-77f1c20f4451
RuleName = DLL Sideloading Of ShellChromeAPI.DLL
EventType = Image.Load
Tag = dll-sideloading-of-shellchromeapi.dll
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Image.Path, "\\ShellChromeAPI.dll")
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects a tscon.exe start as LOCAL SYSTEM
# Author: Florian Roth (Nextron Systems)
RuleId = 9847f263-4a81-424f-970c-875dab15b79b
RuleName = Suspicious TSCON Start as SYSTEM
EventType = Process.Start
Tag = proc-start-suspicious-tscon-start-as-system
RiskScore = 75
Annotation = {"mitre_attack": ["T1219.002"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.User, "AUTHORI") or icontains(Process.User, "AUTORI")) and iendswith(Process.Path, "\\tscon.exe")
GenericProperty1 = Process.User


[ThreatDetectionRule platform=Windows]
# Detects PowerShell command line contents that include a suspicious abnormal casing in the Net.Webclient (e.g. nEt.WEbCliEnT) string as used in obfuscation techniques
# Author: Florian Roth (Nextron Systems)
RuleId = c86133ad-4725-4bd0-8170-210788e0a7ba
RuleName = Net WebClient Casing Anomalies
EventType = Process.Start
Tag = proc-start-net-webclient-casing-anomalies
