RiskScore = 75
Annotation = {"mitre_attack": ["T1218"], "author": "frack113, Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\eqnedt32.exe") or iendswith(Process.Path, "\\wordpad.exe") or iendswith(Process.Path, "\\wordview.exe") or iendswith(Process.Path, "\\certutil.exe") or iendswith(Process.Path, "\\certoc.exe") or iendswith(Process.Path, "\\CertReq.exe") or iendswith(Process.Path, "\\Desktopimgdownldr.exe") or iendswith(Process.Path, "\\esentutl.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\AcroRd32.exe") or iendswith(Process.Path, "\\RdrCEF.exe") or iendswith(Process.Path, "\\hh.exe") or iendswith(Process.Path, "\\finger.exe")) and (iendswith(File.Path, ".exe") or iendswith(File.Path, ".dll") or iendswith(File.Path, ".ocx"))
