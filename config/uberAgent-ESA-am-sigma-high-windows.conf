Annotation = {"mitre_attack": ["T1047", "T1204.002", "T1218.010"], "author": "Vadim Khrykov (ThreatIntel), Cyb3rEng, Florian Roth (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\wbem\\WmiPrvSE.exe") and (iendswith(Process.Path, "\\certutil.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\msiexec.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\verclsid.exe") or iendswith(Process.Path, "\\wscript.exe") or iendswith(Process.Path, "\\cmd.exe") and (icontains(Process.CommandLine, "cscript") or icontains(Process.CommandLine, "mshta") or icontains(Process.CommandLine, "powershell") or icontains(Process.CommandLine, "pwsh") or icontains(Process.CommandLine, "regsvr32") or icontains(Process.CommandLine, "rundll32") or icontains(Process.CommandLine, "wscript"))) and not (iendswith(Process.Path, "\\WerFault.exe") or iendswith(Process.Path, "\\WmiPrvSE.exe") or iendswith(Process.Path, "\\msiexec.exe") and icontains(Process.CommandLine, "/i "))
GenericProperty1 = Parent.Path

