[ThreatDetectionRule platform=Windows]
# Adversaries may install a root certificate on a compromised system to avoid warnings when connecting to adversary controlled web servers.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 5f6a601c-2ecb-498b-9c33-660362323afa
RuleName = Root Certificate Installed From Susp Locations
EventType = Process.Start
Tag = proc-start-root-certificate-installed-from-susp-locations
RiskScore = 75
Annotation = {"mitre_attack": ["T1553.004"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "Import-Certificate") and icontains(Process.CommandLine, " -FilePath ") and icontains(Process.CommandLine, "Cert:\\LocalMachine\\Root") and (icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\") or icontains(Process.CommandLine, ":\\Windows\\TEMP\\") or icontains(Process.CommandLine, "\\Desktop\\") or icontains(Process.CommandLine, "\\Downloads\\") or icontains(Process.CommandLine, "\\Perflogs\\") or icontains(Process.CommandLine, ":\\Users\\Public\\"))


[ThreatDetectionRule platform=Windows]
# Detects loading of a DLL by the VMware Xfer utility from the non-default directory which may be an attempt to sideload arbitrary DLL
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 9313dc13-d04c-46d8-af4a-a930cc55d93b
RuleName = Potential DLL Sideloading Via VMware Xfer
EventType = Image.Load
Tag = potential-dll-sideloading-via-vmware-xfer
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\VMwareXferlogs.exe") and iendswith(Image.Path, "\\glib-2.0.dll") and not istartswith(Image.Path, "C:\\Program Files\\VMware\\")
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects unusual parent or children of the wab.exe (Windows Contacts) and Wabmig.exe (Microsoft Address Book Import Tool) processes as seen being used with bumblebee activity
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 63d1ccc0-2a43-4f4b-9289-361b308991ff
RuleName = Wab/Wabmig Unusual Parent Or Child Processes
