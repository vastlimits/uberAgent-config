[ThreatDetectionRule platform=Windows]
# Detects Python one-liners that use base64 decoding functions in command line executions.
# Malicious scripts or attackers often use python one-liners to decode and execute base64-encoded payloads, which is a common technique for obfuscation and evasion.
# Author: Hugh Ryan (HueCodes), Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 50a0aa3d-ab16-4594-a8aa-5145a6e6792b
RuleName = Python One-Liners with Base64 Decoding
EventType = Process.Start
Tag = proc-start-python-one-liners-with-base64-decoding
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.006", "T1027.010"], "author": "Hugh Ryan (HueCodes), Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (icontains(Process.Path, "\\python") or icontains(Process.Name, "python")) and icontains(Process.CommandLine, "import") and icontains(Process.CommandLine, "base64") and icontains(Process.CommandLine, " -c") and (icontains(Process.CommandLine, ".decode") or icontains(Process.CommandLine, "b16decode") or icontains(Process.CommandLine, "b32decode") or icontains(Process.CommandLine, "b32hexdecode") or icontains(Process.CommandLine, "b64decode") or icontains(Process.CommandLine, "b85decode") or icontains(Process.CommandLine, "z85decode"))


[ThreatDetectionRule platform=Windows]
# Detects potential exploitation of CVE-2026-33829, a vulnerability in the Windows Snipping Tool URI handler (ms-screensketch:).
# An attacker can abuse the 'filePath' parameter to supply a UNC path or HTTP URL, causing SnippingTool.exe to initiate a connection to a remote resource.
# When a UNC path is used (e.g. \\attacker.com\share), this triggers an outbound NTLM authentication attempt, allowing the attacker to capture or relay the victim's Net-NTLMv2 hash.
# HTTP-based paths may result in remote file loading or server-side request forgery (SSRF)-style access.
# The URI can be delivered via a malicious hyperlink, phishing email, or web page.
# Author: Samir Bousseaden, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 7c3a5b1d-9e2f-4a8c-b5d7-1e0f3c6a9b2d
RuleName = Potential CVE-2026-33829 Exploitation - Windows Snipping Tool Remote File Path URI
EventType = Process.Start
Tag = proc-start-potential-cve-2026-33829-exploitation-windows-snipping-tool-remote-file-path-uri
RiskScore = 75
Annotation = {"mitre_attack": ["T1187"], "author": "Samir Bousseaden, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Process.Path, "\\SnippingTool.exe") and (Process.CommandLine like r"%ms-screensketch:edit_&filePath=\\\\%" or Process.CommandLine like r"%ms-screensketch:edit_&filePath=\%\%5C%" or Process.CommandLine like r"%ms-screensketch:edit_&filePath=\%5C%" or Process.CommandLine like r"%ms-screensketch:edit_&filePath=http%")


[ThreatDetectionRule platform=Windows]
