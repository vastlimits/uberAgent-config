Tag = proc-start-potential-cobaltstrike-process-patterns
RiskScore = 75
Annotation = {"mitre_attack": ["T1059"], "author": "Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.CommandLine, "cmd.exe /C whoami") and istartswith(Parent.Path, "C:\\Temp\\") or (iendswith(Parent.Path, "\\runonce.exe") or iendswith(Parent.Path, "\\dllhost.exe")) and icontains(Process.CommandLine, "cmd.exe /c echo") and icontains(Process.CommandLine, "> \\\\.\\pipe") or icontains(Parent.CommandLine, "cmd.exe /C echo") and icontains(Parent.CommandLine, " > \\\\.\\pipe") and iendswith(Process.CommandLine, "conhost.exe 0xffffffff -ForceV1") or iendswith(Parent.CommandLine, "/C whoami") and iendswith(Process.CommandLine, "conhost.exe 0xffffffff -ForceV1")
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects the execution of malicious OneNote documents that contain embedded scripts.
