[ThreatDetectionRule platform=Windows]
# Detects AnyDesk writing binary files to disk other than "gcapi.dll".
# According to RedCanary research it is highly abnormal for AnyDesk to write executable files to disk besides gcapi.dll,
# which is a legitimate DLL that is part of the Google Chrome web browser used to interact with the Google Cloud API. (See reference section for more details)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 2d367498-5112-4ae5-a06a-96e7bc33a211
RuleName = Suspicious Binary Writes Via AnyDesk
EventType = File.Create
Tag = suspicious-binary-writes-via-anydesk
RiskScore = 75
Annotation = {"mitre_attack": ["T1219.002"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\AnyDesk.exe") or iendswith(Process.Path, "\\AnyDeskMSI.exe")) and (iendswith(File.Path, ".dll") or iendswith(File.Path, ".exe")) and not iendswith(File.Path, "\\gcapi.dll")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects suspicious use of XORDump process memory dumping utility
# Author: Florian Roth (Nextron Systems)
RuleId = 66e563f9-1cbd-4a22-a957-d8b7c0f44372
RuleName = HackTool - XORDump Execution
EventType = Process.Start
Tag = proc-start-hacktool-xordump-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1036", "T1003.001"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\xordump.exe") or icontains(Process.CommandLine, " -process lsass.exe ") or icontains(Process.CommandLine, " -m comsvcs ") or icontains(Process.CommandLine, " -m dbghelp ") or icontains(Process.CommandLine, " -m dbgcore ")


[ThreatDetectionRule platform=Windows]
# Detects potentially suspicious child processes of "regsvr32.exe".
# Author: elhoim, Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = 6f0947a4-1c5e-4e0d-8ac7-53159b8f23ca
