RuleName = Bypass UAC via CMSTP
EventType = Process.Start
Tag = proc-start-bypass-uac-via-cmstp
RiskScore = 75
Annotation = {"mitre_attack": ["T1548.002", "T1218.003"], "author": "E.M. Anhaus (originally from Atomic Blue Detections, Endgame), oscd.community"}
Query = (iendswith(Process.Path, "\\cmstp.exe") or Process.Name == "CMSTP.EXE") and (icontains(Process.CommandLine, "/s") or icontains(Process.CommandLine, "-s") or icontains(Process.CommandLine, "/au") or icontains(Process.CommandLine, "-au") or icontains(Process.CommandLine, "/ni") or icontains(Process.CommandLine, "-ni"))


[ThreatDetectionRule platform=Windows]
# Detects Obfuscated use of Environment Variables to execute PowerShell
