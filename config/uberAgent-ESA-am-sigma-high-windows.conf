[ThreatDetectionRule platform=Windows]
# Detects processes spawned from web servers (PHP, Tomcat, IIS, etc.) that perform reconnaissance looking for the existence of popular scripting tools (perl, python, wget) on the system via the help commands
# Author: Cian Heasley, Florian Roth (Nextron Systems)
RuleId = f64e5c19-879c-4bae-b471-6d84c8339677
RuleName = Webshell Tool Reconnaissance Activity
EventType = Process.Start
Tag = proc-start-webshell-tool-reconnaissance-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1505.003"], "author": "Cian Heasley, Florian Roth (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\caddy.exe") or iendswith(Parent.Path, "\\httpd.exe") or iendswith(Parent.Path, "\\nginx.exe") or iendswith(Parent.Path, "\\php-cgi.exe") or iendswith(Parent.Path, "\\w3wp.exe") or iendswith(Parent.Path, "\\ws\_tomcatservice.exe") or (iendswith(Parent.Path, "\\java.exe") or iendswith(Parent.Path, "\\javaw.exe")) and (icontains(Parent.Path, "-tomcat-") or icontains(Parent.Path, "\\tomcat")) or (iendswith(Parent.Path, "\\java.exe") or iendswith(Parent.Path, "\\javaw.exe")) and (icontains(Process.CommandLine, "CATALINA\_HOME") or icontains(Process.CommandLine, "catalina.jar"))) and (icontains(Process.CommandLine, "perl --help") or icontains(Process.CommandLine, "perl -h") or icontains(Process.CommandLine, "python --help") or icontains(Process.CommandLine, "python -h") or icontains(Process.CommandLine, "python3 --help") or icontains(Process.CommandLine, "python3 -h") or icontains(Process.CommandLine, "wget --help"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of specific processes and command line combination.
