[ThreatDetectionRule platform=Windows]
# Checks whether the image specified in a process creation event is not a full, absolute path (caused by process ghosting or other unorthodox methods to start a process)
# Author: Max Altgelt (Nextron Systems)
RuleId = 71158e3f-df67-472b-930e-7d287acaa3e1
RuleName = Execution Of Non-Existing File
EventType = Process.Start
Tag = proc-start-execution-of-non-existing-file
RiskScore = 75
Annotation = {"author": "Max Altgelt (Nextron Systems)"}
Query = not icontains(Process.Path, "\\") and not (isnull(Process.Path) or Process.Path in ["-", ""] or Process.Path in ["System", "Registry", "MemCompression", "vmmem"] or Process.CommandLine in ["Registry", "MemCompression", "vmmem"])


[ThreatDetectionRule platform=Windows]
# Detects a specific command line arguments sequence seen used by SNAKE malware during its installation as described by CISA in their report
