Query = (iendswith(Process.Path, "\\mofcomp.exe") or Process.Name == "mofcomp.exe") and (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\powershell.exe") or iendswith(Parent.Path, "\\pwsh.exe") or iendswith(Parent.Path, "\\wsl.exe") or iendswith(Parent.Path, "\\wscript.exe") or iendswith(Parent.Path, "\\cscript.exe") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp") or icontains(Process.CommandLine, "\\Users\\Public\\") or icontains(Process.CommandLine, "\\WINDOWS\\Temp\\") or icontains(Process.CommandLine, "\%temp\%") or icontains(Process.CommandLine, "\%tmp\%") or icontains(Process.CommandLine, "\%appdata\%")) and not (Parent.Path == "C:\\Windows\\System32\\wbem\\WmiPrvSE.exe" and icontains(Process.CommandLine, "C:\\Windows\\TEMP\\") and iendswith(Process.CommandLine, ".mof")) and not (icontains(Process.CommandLine, "C:\\Windows\\TEMP\\") and iendswith(Process.CommandLine, ".mof"))
GenericProperty1 = Parent.Path


