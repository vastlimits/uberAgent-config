xe") or iendswith(Process.Path, "\\wevtutil.exe") or iendswith(Process.Path, "\\whoami.exe") or Process.Name in ["dsquery.exe", "find.exe", "findstr.exe", "ipconfig.exe", "netstat.exe", "nslookup.exe", "pathping.exe", "quser.exe", "schtasks.exe", "sysinfo.exe", "tasklist.exe", "tracert.exe", "ver.exe", "VSSADMIN.EXE", "wevtutil.exe", "whoami.exe"] or icontains(Process.CommandLine, " Test-NetConnection ") or icontains(Process.CommandLine, "dir \\"))
