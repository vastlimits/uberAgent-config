Query = (iendswith(Process.Path, "\\bitsadmin.exe") or Process.Name == "bitsadmin.exe") and (icontains(Process.CommandLine, " /transfer ") or icontains(Process.CommandLine, " /create ") or icontains(Process.CommandLine, " /addfile ")) and (icontains(Process.CommandLine, ":\\Perflogs") or icontains(Process.CommandLine, ":\\ProgramData\\") or icontains(Process.CommandLine, ":\\Temp\\") or icontains(Process.CommandLine, ":\\Users\\Public\\") or icontains(Process.CommandLine, ":\\Windows\\") or icontains(Process.CommandLine, "\\$Recycle.Bin\\") or icontains(Process.CommandLine, "\\AppData\\Local\\") or icontains(Process.CommandLine, "\\AppData\\Roaming\\") or icontains(Process.CommandLine, "\\Contacts\\") or icontains(Process.CommandLine, "\\Desktop\\") or icontains(Process.CommandLine, "\\Favorites\\") or icontains(Process.CommandLine, "\\Favourites\\") or icontains(Process.CommandLine, "\\inetpub\\wwwroot\\") or icontains(Process.CommandLine, "\\Music\\") or icontains(Process.CommandLine, "\\Pictures\\") or icontains(Process.CommandLine, "\\Start Menu\\Programs\\Startup\\") or icontains(Process.CommandLine, "\\Users\\Default\\") or icontains(Process.CommandLine, "\\Videos\\") or icontains(Process.CommandLine, "\%ProgramData\%") or icontains(Process.CommandLine, "\%public\%") or icontains(Process.CommandLine, "\%temp\%") or icontains(Process.CommandLine, "\%tmp\%"))


