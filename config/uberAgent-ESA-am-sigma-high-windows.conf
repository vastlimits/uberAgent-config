[ThreatDetectionRule platform=Windows]
# Detects suspicious process executions in which Sysmon itself is the parent of a process, which could be a sign of exploitation (e.g. CVE-2022-41120)
# Author: Florian Roth (Nextron Systems), Tim Shelton (fp werfault)
RuleId = 6d1058a4-407e-4f3a-a144-1968c11dc5c3
RuleName = Suspicious Sysmon as Execution Parent
EventType = Process.Start
Tag = proc-start-suspicious-sysmon-as-execution-parent
RiskScore = 75
Annotation = {"mitre_attack": ["T1068"], "author": "Florian Roth (Nextron Systems), Tim Shelton (fp werfault)"}
Query = (iendswith(Parent.Path, "\\Sysmon.exe") or iendswith(Parent.Path, "\\Sysmon64.exe")) and not (istartswith(Process.Path, "C:\\Users\\") and icontains(Process.Path, "\\AppData\\Local\\Temp\\") and (iendswith(Process.Path, "\\Sysmon.exe") or iendswith(Process.Path, "\\Sysmon64.exe")) or icontains(Process.Path, ":\\Windows\\Sysmon.exe") or icontains(Process.Path, ":\\Windows\\Sysmon64.exe") or icontains(Process.Path, ":\\Windows\\System32\\conhost.exe") or icontains(Process.Path, ":\\Windows\\System32\\WerFault.exe") or icontains(Process.Path, ":\\Windows\\System32\\WerFaultSecure.exe") or icontains(Process.Path, ":\\Windows\\System32\\wevtutil.exe") or icontains(Process.Path, ":\\Windows\\SysWOW64\\wevtutil.exe") or isnull(Process.Path))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
