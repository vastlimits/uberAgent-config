[ThreatDetectionRule platform=Windows]
# Detects the use of PowerShell to execute the 'Set-MpPreference' cmdlet to configure Windows Defender's threat severity default action to 'Allow' (value '6') or 'NoAction' (value '9').
# This is a highly suspicious configuration change that effectively disables Defender's ability to automatically mitigate threats of a certain severity level.
# An attacker might use this technique via the command line to bypass defenses before executing payloads.
# Author: Matt Anderson (Huntress)
RuleId = 1e8a9b4d-3c2a-4f9b-8d1e-7c6a5b4f3d2e
RuleName = PowerShell Defender Threat Severity Default Action Set to 'Allow' or 'NoAction'
EventType = Process.Start
Tag = proc-start-powershell-defender-threat-severity-default-action-set-to-'allow'-or-'noaction'
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Matt Anderson (Huntress)"}
Query = icontains(Process.CommandLine, "Set-MpPreference") and (icontains(Process.CommandLine, "-LowThreatDefaultAction") or icontains(Process.CommandLine, "-ModerateThreatDefaultAction") or icontains(Process.CommandLine, "-HighThreatDefaultAction") or icontains(Process.CommandLine, "-SevereThreatDefaultAction") or icontains(Process.CommandLine, "-ltdefac ") or icontains(Process.CommandLine, "-mtdefac ") or icontains(Process.CommandLine, "-htdefac ") or icontains(Process.CommandLine, "-stdefac ")) and (icontains(Process.CommandLine, "Allow") or icontains(Process.CommandLine, "6") or icontains(Process.CommandLine, "NoAction") or icontains(Process.CommandLine, "9"))


[ThreatDetectionRule platform=Windows]
# Detects the creation of new scheduled tasks via commandline, using Schtasks.exe. This rule detects tasks creating that call OpenSSH, which may indicate the creation of reverse SSH tunnel to the attacker's server.
# Author: Rory Duncan
RuleId = 2daa93a0-a5fb-41c5-8cd8-3c11294bfd1f
RuleName = Potential SSH Tunnel Persistence Install Using A Scheduled Task
EventType = Process.Start
Tag = proc-start-potential-ssh-tunnel-persistence-install-using-a-scheduled-task
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005"], "author": "Rory Duncan"}
Query = (iendswith(Process.Path, "\\schtasks.exe") or Process.Name == "schtasks.exe") and (icontains(Process.CommandLine, " /create ") and icontains(Process.CommandLine, "sshd.exe") and icontains(Process.CommandLine, "-f") or icontains(Process.CommandLine, " /create ") and icontains(Process.CommandLine, "ssh.exe") and icontains(Process.CommandLine, "-i"))


[ThreatDetectionRule platform=Windows]
# The OpenWith.exe executes other binary
