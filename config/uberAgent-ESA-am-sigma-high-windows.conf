EventType = File.Create
Tag = creation-exe-for-service-with-unquoted-path
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.009"], "author": "frack113"}
Query = File.Path == "C:\\program.exe"
GenericProperty1 = File.Path


