Tag = proc-start-potential-devil-bait-malware-reconnaissance
RiskScore = 75
Annotation = {"mitre_attack": ["T1218"], "author": "Nasreddine Bencherchali (Nextron Systems), NCSC (Idea)"}
Query = iendswith(Parent.Path, "\\wscript.exe") and iendswith(Process.Path, "\\cmd.exe") and icontains(Process.CommandLine, ">>\%APPDATA\%\\Microsoft\\") and (iendswith(Process.CommandLine, ".xml") or iendswith(Process.CommandLine, ".txt")) and (Process.CommandLine regex "ipconfig\\s+/all" or icontains(Process.CommandLine, "dir") or icontains(Process.CommandLine, "systeminfo") or icontains(Process.CommandLine, "tasklist"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects a potentially suspicious execution from an uncommon folder.
# Author: Florian Roth (Nextron Systems), Tim Shelton
RuleId = 3dfd06d2-eaf4-4532-9555-68aca59f57c4
RuleName = Process Execution From A Potentially Suspicious Folder
EventType = Process.Start
Tag = proc-start-process-execution-from-a-potentially-suspicious-folder
RiskScore = 75
Annotation = {"mitre_attack": ["T1036"], "author": "Florian Roth (Nextron Systems), Tim Shelton"}
Query = (icontains(Process.Path, ":\\Perflogs\\") or icontains(Process.Path, ":\\Users\\All Users\\") or icontains(Process.Path, ":\\Users\\Default\\") or icontains(Process.Path, ":\\Users\\NetworkService\\") or icontains(Process.Path, ":\\Windows\\addins\\") or icontains(Process.Path, ":\\Windows\\debug\\") or icontains(Process.Path, ":\\Windows\\Fonts\\") or icontains(Process.Path, ":\\Windows\\Help\\") or icontains(Process.Path, ":\\Windows\\IME\\") or icontains(Process.Path, ":\\Windows\\Media\\") or icontains(Process.Path, ":\\Windows\\repair\\") or icontains(Process.Path, ":\\Windows\\security\\") or icontains(Process.Path, ":\\Windows\\System32\\Tasks\\") or icontains(Process.Path, ":\\Windows\\Tasks\\") or icontains(Process.Path, "$Recycle.bin") or icontains(Process.Path, "\\config\\systemprofile\\") or icontains(Process.Path, "\\Intel\\Logs\\") or icontains(Process.Path, "\\RSA\\MachineKeys\\")) and not (istartswith(Process.Path, "C:\\Users\\Public\\IBM\\ClientSolutions\\Start\_Programs\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\config\\systemprofile\\Citrix\\UpdaterBinaries\\") and iendswith(Process.Path, "\\CitrixReceiverUpdater.exe"))


[ThreatDetectionRule platform=Windows]
# Detects the execution of AdvancedRun utility in the context of the TrustedInstaller, SYSTEM, Local Service or Network Service accounts
# Author: Florian Roth (Nextron Systems)
RuleId = fa00b701-44c6-4679-994d-5a18afa8a707
RuleName = PUA - AdvancedRun Suspicious Execution
EventType = Process.Start
Tag = proc-start-pua-advancedrun-suspicious-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1134.002"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "/EXEFilename") or icontains(Process.CommandLine, "/CommandLine")) and (icontains(Process.CommandLine, " /RunAs 8 ") or icontains(Process.CommandLine, " /RunAs 4 ") or icontains(Process.CommandLine, " /RunAs 10 ") or icontains(Process.CommandLine, " /RunAs 11 ") or iendswith(Process.CommandLine, "/RunAs 8") or iendswith(Process.CommandLine, "/RunAs 4") or iendswith(Process.CommandLine, "/RunAs 10") or iendswith(Process.CommandLine, "/RunAs 11"))


[ThreatDetectionRule platform=Windows]
# Detects suspicious launch of the PSEXESVC service on this system and a sub process run as LOCAL_SYSTEM (-s), which means that someone remotely started a command on this system running it with highest privileges and not only the privileges of the login user account (e.g. the administrator account)
# Author: Florian Roth (Nextron Systems)
RuleId = 7c0dcd3d-acf8-4f71-9570-f448b0034f94
RuleName = PsExec Service Child Process Execution as LOCAL SYSTEM
EventType = Process.Start
Tag = proc-start-psexec-service-child-process-execution-as-local-system
RiskScore = 75
Annotation = {"author": "Florian Roth (Nextron Systems)"}
Query = Parent.Path == "C:\\Windows\\PSEXESVC.exe" and (icontains(Process.User, "AUTHORI") or icontains(Process.User, "AUTORI"))
GenericProperty1 = Parent.Path
GenericProperty2 = Process.User


[ThreatDetectionRule platform=Windows]
# Detects msdt.exe creating files in suspicious directories which could be a sign of exploitation of either Follina or Dogwalk vulnerabilities
# Author: Vadim Varganov, Florian Roth (Nextron Systems)
RuleId = 318557a5-150c-4c8d-b70e-a9910e199857
RuleName = File Creation In Suspicious Directory By Msdt.EXE
EventType = File.Create
Tag = file-creation-in-suspicious-directory-by-msdt.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "Vadim Varganov, Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\msdt.exe") and (icontains(File.Path, "\\Desktop\\") or icontains(File.Path, "\\Start Menu\\Programs\\Startup\\") or icontains(File.Path, "C:\\PerfLogs\\") or icontains(File.Path, "C:\\ProgramData\\") or icontains(File.Path, "C:\\Users\\Public\\"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects malicious behavior where the MMC utility (`mmc.exe`) executes files with reversed extensions caused by Right-to-Left Override (RLO) abuse, disguising them as document formats.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 9cfe4b27-1e56-48b4-b7a8-d46851c91a44
RuleName = MMC Executing Files with Reversed Extensions Using RTLO Abuse
EventType = Process.Start
Tag = proc-start-mmc-executing-files-with-reversed-extensions-using-rtlo-abuse
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.002", "T1218.014", "T1036.002"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\mmc.exe") or Process.Name == "MMC.exe") and (icontains(Process.CommandLine, "cod.msc") or icontains(Process.CommandLine, "fdp.msc") or icontains(Process.CommandLine, "ftr.msc") or icontains(Process.CommandLine, "lmth.msc") or icontains(Process.CommandLine, "slx.msc") or icontains(Process.CommandLine, "tdo.msc") or icontains(Process.CommandLine, "xcod.msc") or icontains(Process.CommandLine, "xslx.msc") or icontains(Process.CommandLine, "xtpp.msc"))


[ThreatDetectionRule platform=Windows]
# Detects scheduled task creations or modification on a suspicious schedule type
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 24c8392b-aa3c-46b7-a545-43f71657fe98
RuleName = Suspicious Schtasks Schedule Types
EventType = Process.Start
Tag = proc-start-suspicious-schtasks-schedule-types
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\schtasks.exe") or Process.Name == "schtasks.exe") and (icontains(Process.CommandLine, " ONLOGON ") or icontains(Process.CommandLine, " ONSTART ") or icontains(Process.CommandLine, " ONCE ") or icontains(Process.CommandLine, " ONIDLE ")) and not (icontains(Process.CommandLine, "NT AUT") or icontains(Process.CommandLine, " SYSTEM") or icontains(Process.CommandLine, "HIGHEST"))


[ThreatDetectionRule platform=Windows]
# Detects unknown program using commandline flags usually used by tools such as PsExec and PAExec to start programs with SYSTEM Privileges
# Author: Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = 207b0396-3689-42d9-8399-4222658efc99
RuleName = Potential Privilege Escalation To LOCAL SYSTEM
EventType = Process.Start
Tag = proc-start-potential-privilege-escalation-to-local-system
