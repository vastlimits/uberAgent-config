[ThreatDetectionRule platform=Windows]
# Detects the execution of REGSVR32.exe with DLL files masquerading as other files
# Author: Florian Roth (Nextron Systems), frack113
RuleId = 089fc3d2-71e8-4763-a8a5-c97fbb0a403e
RuleName = Regsvr32 DLL Execution With Suspicious File Extension
EventType = Process.Start
Tag = proc-start-regsvr32-dll-execution-with-suspicious-file-extension
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.010"], "author": "Florian Roth (Nextron Systems), frack113"}
Query = (iendswith(Process.Path, "\\regsvr32.exe") or Process.Name == "REGSVR32.EXE") and (iendswith(Process.CommandLine, ".bin") or iendswith(Process.CommandLine, ".bmp") or iendswith(Process.CommandLine, ".cr2") or iendswith(Process.CommandLine, ".dat") or iendswith(Process.CommandLine, ".eps") or iendswith(Process.CommandLine, ".gif") or iendswith(Process.CommandLine, ".ico") or iendswith(Process.CommandLine, ".jpeg") or iendswith(Process.CommandLine, ".jpg") or iendswith(Process.CommandLine, ".log") or iendswith(Process.CommandLine, ".nef") or iendswith(Process.CommandLine, ".orf") or iendswith(Process.CommandLine, ".png") or iendswith(Process.CommandLine, ".raw") or iendswith(Process.CommandLine, ".rtf") or iendswith(Process.CommandLine, ".sr2") or iendswith(Process.CommandLine, ".temp") or iendswith(Process.CommandLine, ".tif") or iendswith(Process.CommandLine, ".tiff") or iendswith(Process.CommandLine, ".tmp") or iendswith(Process.CommandLine, ".txt"))


[ThreatDetectionRule platform=Windows]
# Detects suspicious parent processes that should not have any children or should only have a single possible child program
# Author: Florian Roth (Nextron Systems)
RuleId = cbec226f-63d9-4eca-9f52-dfb6652f24df
RuleName = Suspicious Process Parents
EventType = Process.Start
Tag = proc-start-suspicious-process-parents
RiskScore = 75
Annotation = {"mitre_attack": ["T1036"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\minesweeper.exe") or iendswith(Parent.Path, "\\winver.exe") or iendswith(Parent.Path, "\\bitsadmin.exe") or (iendswith(Parent.Path, "\\csrss.exe") or iendswith(Parent.Path, "\\certutil.exe") or iendswith(Parent.Path, "\\eventvwr.exe") or iendswith(Parent.Path, "\\calc.exe") or iendswith(Parent.Path, "\\notepad.exe")) and not (iendswith(Process.Path, "\\WerFault.exe") or iendswith(Process.Path, "\\wermgr.exe") or iendswith(Process.Path, "\\conhost.exe") or iendswith(Process.Path, "\\mmc.exe") or iendswith(Process.Path, "\\win32calc.exe") or iendswith(Process.Path, "\\notepad.exe") or isnull(Process.Path))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects specific process tree behavior linked to "rundll32" executions, wherein the associated DLL lacks a common ".dll" extension, often signaling potential Pikabot activity.
# Author: Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)
RuleId = 1bf0ba65-9a39-42a2-9271-31d31bf2f0bf
RuleName = Pikabot Fake DLL Extension Execution Via Rundll32.EXE
EventType = Process.Start
Tag = proc-start-pikabot-fake-dll-extension-execution-via-rundll32.exe
RiskScore = 75
Annotation = {"author": "Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\cscript.exe") or iendswith(Parent.Path, "\\mshta.exe") or iendswith(Parent.Path, "\\powershell.exe") or iendswith(Parent.Path, "\\pwsh.exe") or iendswith(Parent.Path, "\\regsvr32.exe") or iendswith(Parent.Path, "\\wscript.exe")) and iendswith(Process.Path, "\\rundll32.exe") and (icontains(Process.CommandLine, ":\\ProgramData\\") or icontains(Process.CommandLine, ":\\Users\\Public\\") or icontains(Process.CommandLine, ":\\Windows\\Installer\\") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\") or icontains(Process.CommandLine, "\\AppData\\Roaming\\")) and not (icontains(Process.CommandLine, ".cpl ") or icontains(Process.CommandLine, ".cpl,") or icontains(Process.CommandLine, ".dll ") or icontains(Process.CommandLine, ".dll,") or icontains(Process.CommandLine, ".inf ") or icontains(Process.CommandLine, ".inf,") or iendswith(Process.CommandLine, ".cpl") or iendswith(Process.CommandLine, ".cpl\"") or iendswith(Process.CommandLine, ".dll") or iendswith(Process.CommandLine, ".dll\"") or iendswith(Process.CommandLine, ".inf") or iendswith(Process.CommandLine, ".inf\"") or iendswith(Process.CommandLine, ".cpl'") or iendswith(Process.CommandLine, ".dll'") or iendswith(Process.CommandLine, ".inf'"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
