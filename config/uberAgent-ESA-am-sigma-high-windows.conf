GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects Cobalt Strike module/commands accidentally entered in CMD shell
# Author: _pete_0, TheDFIRReport
RuleId = 4f154fb6-27d1-4813-a759-78b93e0b9c48
RuleName = Operator Bloopers Cobalt Strike Modules
EventType = Process.Start
Tag = proc-start-operator-bloopers-cobalt-strike-modules
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.003"], "author": "_pete_0, TheDFIRReport"}
Query = (Process.Name == "Cmd.Exe" or iendswith(Process.Path, "\\cmd.exe")) and (icontains(Process.CommandLine, "Invoke-UserHunter") or icontains(Process.CommandLine, "Invoke-ShareFinder") or icontains(Process.CommandLine, "Invoke-Kerberoast") or icontains(Process.CommandLine, "Invoke-SMBAutoBrute") or icontains(Process.CommandLine, "Invoke-Nightmare") or icontains(Process.CommandLine, "zerologon") or icontains(Process.CommandLine, "av\_query"))


[ThreatDetectionRule platform=Windows]
# Detects a suspicious printer driver installation with an empty Manufacturer value
# Author: Florian Roth (Nextron Systems)
RuleId = e0813366-0407-449a-9869-a2db1119dc41
RuleName = Suspicious Printer Driver Empty Manufacturer
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = suspicious-printer-driver-empty-manufacturer
RiskScore = 75
Annotation = {"mitre_attack": ["T1574"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\Control\\Print\\Environments\\Windows x64\\Drivers") and icontains(Reg.TargetObject, "\\Manufacturer") and Reg.Value.Data == "(Empty)" and not (icontains(Reg.TargetObject, "\\CutePDF Writer v4.0\\") or icontains(Reg.TargetObject, "\\VNC Printer (PS)\\") or icontains(Reg.TargetObject, "\\VNC Printer (UD)\\") or icontains(Reg.TargetObject, "\\Version-3\\PDF24\\"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects addition of users to highly privileged groups via "Net" or "Add-LocalGroupMember".
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 10fb649c-3600-4d37-b1e6-56ea90bb7e09
RuleName = User Added To Highly Privileged Group
EventType = Process.Start
Tag = proc-start-user-added-to-highly-privileged-group
RiskScore = 75
Annotation = {"mitre_attack": ["T1098"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "localgroup ") and icontains(Process.CommandLine, " /add") or icontains(Process.CommandLine, "Add-LocalGroupMember ") and icontains(Process.CommandLine, " -Group ")) and (icontains(Process.CommandLine, "Group Policy Creator Owners") or icontains(Process.CommandLine, "Schema Admins"))


[ThreatDetectionRule platform=Windows]
# Detects specific process behavior observed with Devil Bait samples
# Author: Nasreddine Bencherchali (Nextron Systems), NCSC (Idea)
RuleId = e8954be4-b2b8-4961-be18-da1a5bda709c
RuleName = Potential Devil Bait Malware Reconnaissance
