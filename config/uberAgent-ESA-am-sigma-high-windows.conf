RiskScore = 75
Annotation = {"author": "X__Junior (Nextron Systems)"}
Query = iendswith(Process.Path, "\\wusa.exe") and (icontains(Parent.Path, ":\\Perflogs\\") or icontains(Parent.Path, ":\\Users\\Public\\") or icontains(Parent.Path, ":\\Windows\\Temp\\") or icontains(Parent.Path, "\\Appdata\\Local\\Temp\\") or icontains(Parent.Path, "\\Temporary Internet") or icontains(Parent.Path, ":\\Users\\") and icontains(Parent.Path, "\\Favorites\\") or icontains(Parent.Path, ":\\Users\\") and icontains(Parent.Path, "\\Favourites\\") or icontains(Parent.Path, ":\\Users\\") and icontains(Parent.Path, "\\Contacts\\") or icontains(Parent.Path, ":\\Users\\") and icontains(Parent.Path, "\\Pictures\\")) and not icontains(Process.CommandLine, ".msu")
