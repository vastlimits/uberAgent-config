[ThreatDetectionRule platform=Windows]
# Detects potentially suspicious processes being spawned by a web server process which could be the result of a successfully placed web shell or exploitation
# Author: Thomas Patzke, Florian Roth (Nextron Systems), Zach Stanford @svch0st, Tim Shelton, Nasreddine Bencherchali (Nextron Systems)
RuleId = 8202070f-edeb-4d31-a010-a26c72ac5600
RuleName = Suspicious Process By Web Server Process
EventType = Process.Start
Tag = proc-start-suspicious-process-by-web-server-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1505.003", "T1190"], "author": "Thomas Patzke, Florian Roth (Nextron Systems), Zach Stanford @svch0st, Tim Shelton, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\caddy.exe") or iendswith(Parent.Path, "\\httpd.exe") or iendswith(Parent.Path, "\\nginx.exe") or iendswith(Parent.Path, "\\php-cgi.exe") or iendswith(Parent.Path, "\\php.exe") or iendswith(Parent.Path, "\\tomcat.exe") or iendswith(Parent.Path, "\\UMWorkerProcess.exe") or iendswith(Parent.Path, "\\w3wp.exe") or iendswith(Parent.Path, "\\ws\_TomcatService.exe") or (iendswith(Parent.Path, "\\java.exe") or iendswith(Parent.Path, "\\javaw.exe")) and (icontains(Parent.Path, "-tomcat-") or icontains(Parent.Path, "\\tomcat")) or (iendswith(Parent.Path, "\\java.exe") or iendswith(Parent.Path, "\\javaw.exe")) and (icontains(Parent.CommandLine, "CATALINA\_HOME") or icontains(Parent.CommandLine, "catalina.home") or icontains(Parent.CommandLine, "catalina.jar"))) and (iendswith(Process.Path, "\\arp.exe") or iendswith(Process.Path, "\\at.exe") or iendswith(Process.Path, "\\bash.exe") or iendswith(Process.Path, "\\bitsadmin.exe") or iendswith(Process.Path, "\\certutil.exe") or iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\dsget.exe") or iendswith(Process.Path, "\\hostname.exe") or iendswith(Process.Path, "\\nbtstat.exe") or iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\net1.exe") or iendswith(Process.Path, "\\netdom.exe") or iendswith(Process.Path, "\\netsh.exe") or iendswith(Process.Path, "\\nltest.exe") or iendswith(Process.Path, "\\ntdsutil.exe") or iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\qprocess.exe") or iendswith(Process.Path, "\\query.exe") or iendswith(Process.Path, "\\qwinsta.exe") or iendswith(Process.Path, "\\reg.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\sc.exe") or iendswith(Process.Path, "\\sh.exe") or iendswith(Process.Path, "\\wmic.exe") or iendswith(Process.Path, "\\wscript.exe") or iendswith(Process.Path, "\\wusa.exe")) and not (iendswith(Parent.Path, "\\java.exe") and iendswith(Process.CommandLine, "Windows\\system32\\cmd.exe /c C:\\ManageEngine\\ADManager \"Plus\\ES\\bin\\elasticsearch.bat -Enode.name=RMP-NODE1 -pelasticsearch-pid.txt") or iendswith(Parent.Path, "\\java.exe") and icontains(Process.CommandLine, "sc query") and icontains(Process.CommandLine, "ADManager Plus"))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


