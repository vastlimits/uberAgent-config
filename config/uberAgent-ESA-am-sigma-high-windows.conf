[ThreatDetectionRule platform=Windows]
# Detects Kapeka backdoor persistence activity.
# Depending on the process privileges, the Kapeka dropper then sets persistence for the backdoor either as a scheduled task (if admin or SYSTEM) or autorun registry (if not).
# For the scheduled task, it creates a scheduled task called "Sens Api" via schtasks command, which is set to run upon system startup as SYSTEM.
# To establish persistence through the autorun utility, it adds an autorun entry called "Sens Api" under HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run via the "reg add" command.
# Both persistence mechanisms are set to launch the binary by calling rundll32 and passing the backdoor's first export ordinal (#1) without any additional argument.
# Author: Swachchhanda Shrawan Poudel
RuleId = 64a871dd-83f6-4e5f-80fc-5a7ca3a8a819
RuleName = Kapeka Backdoor Persistence Activity
EventType = Process.Start
Tag = proc-start-kapeka-backdoor-persistence-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005"], "author": "Swachchhanda Shrawan Poudel"}
Query = ((iendswith(Process.Path, "\\schtasks.exe") or Process.Name == "schtasks.exe") and icontains(Process.CommandLine, "create") and icontains(Process.CommandLine, "ONSTART") or (iendswith(Process.Path, "\\reg.exe") or Process.Name == "reg.exe") and icontains(Process.CommandLine, "add") and icontains(Process.CommandLine, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Run")) and icontains(Process.CommandLine, "rundll32") and icontains(Process.CommandLine, ".wll") and icontains(Process.CommandLine, "#1") and (icontains(Process.CommandLine, "Sens Api") or icontains(Process.CommandLine, "OneDrive"))


[ThreatDetectionRule platform=Windows]
# Detects the creation of potentially malicious script and executable files in Windows startup folders, which is a common persistence technique used by threat actors.
# These files (.ps1, .vbs, .js, .bat, etc.) are automatically executed when a user logs in, making the Startup folder an attractive target for attackers.
# This technique is frequently observed in malvertising campaigns and malware distribution where attackers attempt to maintain long-term access to compromised systems.
# Author: Nasreddine Bencherchali (Nextron Systems), Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 28208707-fe31-437f-9a7f-4b1108b94d2e
RuleName = Suspicious Startup Folder Persistence
EventType = File.Create
Tag = suspicious-startup-folder-persistence
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.002", "T1547.001"], "author": "Nasreddine Bencherchali (Nextron Systems), Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(File.Path, "\\Windows\\Start Menu\\Programs\\Startup\\") and (iendswith(File.Path, ".bat") or iendswith(File.Path, ".cmd") or iendswith(File.Path, ".dll") or iendswith(File.Path, ".hta") or iendswith(File.Path, ".jar") or iendswith(File.Path, ".js") or iendswith(File.Path, ".jse") or iendswith(File.Path, ".msi") or iendswith(File.Path, ".ps1") or iendswith(File.Path, ".psd1") or iendswith(File.Path, ".psm1") or iendswith(File.Path, ".scr") or iendswith(File.Path, ".url") or iendswith(File.Path, ".vba") or iendswith(File.Path, ".vbe") or iendswith(File.Path, ".vbs") or iendswith(File.Path, ".wsf"))
GenericProperty1 = File.Path


