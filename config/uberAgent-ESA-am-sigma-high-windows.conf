[ThreatDetectionRule platform=Windows]
# Detects the creation of a file that has the same name as the default LiveKD kernel memory dump.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 814ddeca-3d31-4265-8e07-8cc54fb44903
RuleName = LiveKD Kernel Memory Dump File Created
EventType = File.Create
Tag = livekd-kernel-memory-dump-file-created
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = File.Path == "C:\\Windows\\livekd.dmp"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects renamed SysInternals tool execution with a binary named ps.exe as used by Dragonfly APT group and documented in TA17-293A report
# Author: Florian Roth (Nextron Systems)
RuleId = 18da1007-3f26-470f-875d-f77faf1cab31
RuleName = Ps.exe Renamed SysInternals Tool
EventType = Process.Start
Tag = proc-start-ps.exe-renamed-sysinternals-tool
RiskScore = 75
Annotation = {"mitre_attack": ["T1036.003"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "ps.exe -accepteula") and icontains(Process.CommandLine, "-s cmd /c netstat")


[ThreatDetectionRule platform=Windows]
# Detects suspicious launch of a renamed version of the PSEXESVC service with, which is not often used by legitimate administrators
# Author: Florian Roth (Nextron Systems)
RuleId = 51ae86a2-e2e1-4097-ad85-c46cb6851de4
RuleName = Renamed PsExec Service Execution
EventType = Process.Start
Tag = proc-start-renamed-psexec-service-execution
RiskScore = 75
Annotation = {"author": "Florian Roth (Nextron Systems)"}
Query = Process.Name == "psexesvc.exe" and not Process.Path == "C:\\Windows\\PSEXESVC.exe"


[ThreatDetectionRule platform=Windows]
# Detects the use of CleanWipe a tool usually used to delete Symantec antivirus.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = f44800ac-38ec-471f-936e-3fa7d9c53100
RuleName = PUA - CleanWipe Execution
EventType = Process.Start
Tag = proc-start-pua-cleanwipe-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\SepRemovalToolNative\_x64.exe") or iendswith(Process.Path, "\\CATClean.exe") and icontains(Process.CommandLine, "--uninstall") or iendswith(Process.Path, "\\NetInstaller.exe") and icontains(Process.CommandLine, "-r") or iendswith(Process.Path, "\\WFPUnins.exe") and icontains(Process.CommandLine, "/uninstall") and icontains(Process.CommandLine, "/enterprise")


[ThreatDetectionRule platform=Windows]
# Detects the suspicious use of the Velociraptor DFIR tool to execute other tools or download additional payloads, as seen in a campaign where it was abused for remote access and to stage further attacks.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 4bc90587-e6ca-4b41-be0b-ed4d04e4ed0c
RuleName = Suspicious Velociraptor Child Process
EventType = Process.Start
Tag = proc-start-suspicious-velociraptor-child-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1219"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\Velociraptor.exe") and (icontains(Process.CommandLine, "code.exe") and icontains(Process.CommandLine, "tunnel") and icontains(Process.CommandLine, "--accept-server-license-terms") or icontains(Process.CommandLine, "msiexec") and icontains(Process.CommandLine, "/i") and icontains(Process.CommandLine, "http") or (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\pwsh.exe")) and (icontains(Process.CommandLine, "Invoke-WebRequest ") or icontains(Process.CommandLine, "IWR ") or icontains(Process.CommandLine, ".DownloadFile") or icontains(Process.CommandLine, ".DownloadString")))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the malicious use of a control panel item
# Author: Kyaw Min Thein, Furkan Caliskan (@caliskanfurkan_)
RuleId = 0ba863e6-def5-4e50-9cea-4dd8c7dc46a4
RuleName = Control Panel Items
EventType = Process.Start
Tag = proc-start-control-panel-items
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.002", "T1546"], "author": "Kyaw Min Thein, Furkan Caliskan (@caliskanfurkan_)"}
Query = (iendswith(Process.Path, "\\reg.exe") or Process.Name == "reg.exe") and icontains(Process.CommandLine, "add") and icontains(Process.CommandLine, "CurrentVersion\\Control Panel\\CPLs") or iendswith(Process.CommandLine, ".cpl") and not (icontains(Process.CommandLine, "\\System32\\") or icontains(Process.CommandLine, "\%System\%") or icontains(Process.CommandLine, "|C:\\Windows\\system32|") or icontains(Process.CommandLine, "regsvr32 ") and icontains(Process.CommandLine, " /s ") and icontains(Process.CommandLine, "igfxCPL.cpl"))


[ThreatDetectionRule platform=Windows]
# Detects suspicious parameters of fsutil (deleting USN journal, configuring it with small size, etc).
# Might be used by ransomwares during the attack (seen by NotPetya and others).
# Author: Ecco, E.M. Anhaus, oscd.community
RuleId = add64136-62e5-48ea-807e-88638d02df1e
RuleName = Fsutil Suspicious Invocation
EventType = Process.Start
Tag = proc-start-fsutil-suspicious-invocation
RiskScore = 75
Annotation = {"mitre_attack": ["T1070", "T1485"], "author": "Ecco, E.M. Anhaus, oscd.community"}
Query = (iendswith(Process.Path, "\\fsutil.exe") or Process.Name == "fsutil.exe") and (icontains(Process.CommandLine, "deletejournal") or icontains(Process.CommandLine, "createjournal") or icontains(Process.CommandLine, "setZeroData"))


