ne, ".ps1\"") or iendswith(Process.CommandLine, ".dat") or iendswith(Process.CommandLine, ".dat'") or iendswith(Process.CommandLine, ".dat\"") or iendswith(Process.CommandLine, ".msi") or iendswith(Process.CommandLine, ".msi'") or iendswith(Process.CommandLine, ".msi\"") or iendswith(Process.CommandLine, ".bat") or iendswith(Process.CommandLine, ".bat'") or iendswith(Process.CommandLine, ".bat\"") or iendswith(Process.CommandLine, ".exe") or iendswith(Process.CommandLine, ".exe'") or iendswith(Process.CommandLine, ".exe\"") or iendswith(Process.CommandLine, ".vbs") or iendswith(Process.CommandLine, ".vbs'") or iendswith(Process.CommandLine, ".vbs\"") or iendswith(Process.CommandLine, ".vbe") or iendswith(Process.CommandLine, ".vbe'") or iendswith(Process.CommandLine, ".vbe\"") or iendswith(Process.CommandLine, ".hta") or iendswith(Process.CommandLine, ".hta'") or iendswith(Process.CommandLine, ".hta\"") or iendswith(Process.CommandLine, ".dll") or iendswith(Process.CommandLine, ".dll'") or iendswith(Process.CommandLine, ".dll\"") or iendswith(Process.CommandLine, ".psm1") or iendswith(Process.CommandLine, ".psm1'") or iendswith(Process.CommandLine, ".psm1\""))


[ThreatDetectionRule platform=Windows]
