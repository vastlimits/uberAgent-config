EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = snake-malware-covert-store-registry-key
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "SECURITY\\Policy\\Secrets\\n")
