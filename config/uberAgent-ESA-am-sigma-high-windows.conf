RiskScore = 75
Annotation = {"mitre_attack": ["T1021.002", "T1059.005"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(Process.Path, "\\nxc-windows-latest\\") or icontains(File.Path, "\\Temp\\\_MEI") and icontains(File.Path, "\\nxc\\data\\")
GenericProperty1 = File.Path


