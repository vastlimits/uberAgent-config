Tag = proc-start-scheduled-task-creation-masquerading-as-system-processes
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005", "T1036.004", "T1036.005"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\schtasks.exe") or Process.Name == "schtasks.exe") and (icontains(Process.CommandLine, " -create ") or icontains(Process.CommandLine, " /create ") or icontains(Process.CommandLine, " –create ") or icontains(Process.CommandLine, " —create ") or icontains(Process.CommandLine, " ―create ")) and (icontains(Process.CommandLine, " audiodg") or icontains(Process.CommandLine, " conhost") or icontains(Process.CommandLine, " dwm.exe") or icontains(Process.CommandLine, " explorer") or icontains(Process.CommandLine, " lsass") or icontains(Process.CommandLine, " lsm") or icontains(Process.CommandLine, " mmc") or icontains(Process.CommandLine, " msiexec") or icontains(Process.CommandLine, " regsvr32") or icontains(Process.CommandLine, " rundll32") or icontains(Process.CommandLine, " services") or icontains(Process.CommandLine, " spoolsv") or icontains(Process.CommandLine, " svchost") or icontains(Process.CommandLine, " taskeng") or icontains(Process.CommandLine, " taskhost") or icontains(Process.CommandLine, " wininit") or icontains(Process.CommandLine, " winlogon"))


