[ThreatDetectionRule platform=Windows]
# Detects attempts to disable Windows EventLog autologger sessions via registry modification.
# The AutoLogger event tracing session records events that occur early in the operating system boot process.
# Applications and device drivers can use the AutoLogger session to capture traces before the user logs in.
# Adversaries may disable these sessions to evade detection and prevent security monitoring of early boot activities and system events.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = d7b81144-b866-48a4-9bcc-275dc69d870e
RuleName = Windows EventLog Autologger Session Registry Modification Via CommandLine
EventType = Process.Start
Tag = proc-start-windows-eventlog-autologger-session-registry-modification-via-commandline
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\reg.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["reg.exe", "PowerShell.EXE", "pwsh.dll"]) and (icontains(Process.CommandLine, "add ") or icontains(Process.CommandLine, "Set-ItemProperty") or icontains(Process.CommandLine, "New-ItemProperty") or icontains(Process.CommandLine, "si ")) and icontains(Process.CommandLine, "\\Control\\WMI\\Autologger\\") and (icontains(Process.CommandLine, "Start") or icontains(Process.CommandLine, "Enabled"))


[ThreatDetectionRule platform=Windows]
# Detects the execution of certutil with the "encode" flag to encode a file to base64 where the files are located in potentially suspicious locations
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 82a6714f-4899-4f16-9c1e-9a333544d4c3
RuleName = File In Suspicious Location Encoded To Base64 Via Certutil.EXE
EventType = Process.Start
Tag = proc-start-file-in-suspicious-location-encoded-to-base64-via-certutil.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1027"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\certutil.exe") or Process.Name == "CertUtil.exe") and (icontains(Process.CommandLine, "-encode") or icontains(Process.CommandLine, "/encode") or icontains(Process.CommandLine, "–encode") or icontains(Process.CommandLine, "—encode") or icontains(Process.CommandLine, "―encode")) and (icontains(Process.CommandLine, "\\AppData\\Roaming\\") or icontains(Process.CommandLine, "\\Desktop\\") or icontains(Process.CommandLine, "\\Local\\Temp\\") or icontains(Process.CommandLine, "\\PerfLogs\\") or icontains(Process.CommandLine, "\\Users\\Public\\") or icontains(Process.CommandLine, "\\Windows\\Temp\\") or icontains(Process.CommandLine, "$Recycle.Bin"))


[ThreatDetectionRule platform=Windows]
# Detects the deletion of a prefetch file which may indicate an attempt to destroy forensic evidence
# Author: Cedric MAURUGEON
RuleId = 0a1f9d29-6465-4776-b091-7f43b26e4c89
RuleName = Prefetch File Deleted
EventType = File.Delete
Tag = prefetch-file-deleted
RiskScore = 75
Annotation = {"mitre_attack": ["T1070.004"], "author": "Cedric MAURUGEON"}
Query = icontains(File.Path, ":\\Windows\\Prefetch\\") and iendswith(File.Path, ".pf") and not (iendswith(Process.Path, ":\\windows\\system32\\svchost.exe") and (icontains(Process.User, "AUTHORI") or icontains(Process.User, "AUTORI")))
GenericProperty1 = Process.User
GenericProperty2 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects potential persistence behavior using the windows telemetry registry key.
# Windows telemetry makes use of the binary CompatTelRunner.exe to run a variety of commands and perform the actual telemetry collections.
# This binary was created to be easily extensible, and to that end, it relies on the registry to instruct on which commands to run.
# The problem is, it will run any arbitrary command without restriction of location or type.
# Author: Lednyov Alexey, oscd.community, Sreeman
RuleId = 73a883d0-0348-4be4-a8d8-51031c2564f8
RuleName = Potential Registry Persistence Attempt Via Windows Telemetry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-registry-persistence-attempt-via-windows-telemetry
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005"], "author": "Lednyov Alexey, oscd.community, Sreeman"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\AppCompatFlags\\TelemetryController\\") and iendswith(Reg.TargetObject, "\\Command") and (icontains(Reg.Value.Data, ".bat") or icontains(Reg.Value.Data, ".bin") or icontains(Reg.Value.Data, ".cmd") or icontains(Reg.Value.Data, ".dat") or icontains(Reg.Value.Data, ".dll") or icontains(Reg.Value.Data, ".exe") or icontains(Reg.Value.Data, ".hta") or icontains(Reg.Value.Data, ".jar") or icontains(Reg.Value.Data, ".js") or icontains(Reg.Value.Data, ".msi") or icontains(Reg.Value.Data, ".ps") or icontains(Reg.Value.Data, ".sh") or icontains(Reg.Value.Data, ".vb")) and not (icontains(Reg.Value.Data, "\\system32\\CompatTelRunner.exe") or icontains(Reg.Value.Data, "\\system32\\DeviceCensus.exe"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the execution of a renamed MegaSync.exe as seen used by ransomware families like Nefilim, Sodinokibi, Pysa, and Conti.
# Author: Sittikorn S
RuleId = 643bdcac-8b82-49f4-9fd9-25a90b929f3b
RuleName = Renamed MegaSync Execution
EventType = Process.Start
Tag = proc-start-renamed-megasync-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1218"], "author": "Sittikorn S"}
Query = Process.Name == "megasync.exe" and not iendswith(Process.Path, "\\megasync.exe")


[ThreatDetectionRule platform=Windows]
# Detects DNS queries containing patterns associated with Kerberos coercion attacks via DNS object spoofing.
# The pattern "1UWhRCAAAAA..BAAAA" is a base64-encoded signature that corresponds to a marshaled CREDENTIAL_TARGET_INFORMATION structure.
# Attackers can use this technique to coerce authentication from victim systems to attacker-controlled hosts.
# It is one of the strong indicators of a Kerberos coercion attack, where adversaries manipulate DNS records
# to spoof Service Principal Names (SPNs) and redirect authentication requests like CVE-2025-33073.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = e7a21b5f-d8c4-4ae5-b8d9-93c5d3f28e1c
RuleName = Suspicious DNS Query Indicating Kerberos Coercion via DNS Object SPN Spoofing
EventType = Dns.Query
Tag = suspicious-dns-query-indicating-kerberos-coercion-via-dns-object-spn-spoofing
RiskScore = 75
Annotation = {"mitre_attack": ["T1557.001", "T1187"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(Dns.QueryRequest, "UWhRCA") and icontains(Dns.QueryRequest, "BAAAA")
GenericProperty1 = Dns.QueryRequest


[ThreatDetectionRule platform=Windows]
# Detects execution of the binary "wpbbin" which is used as part of the UEFI based persistence method described in the reference section
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 4abc0ec4-db5a-412f-9632-26659cddf145
RuleName = UEFI Persistence Via Wpbbin - ProcessCreation
