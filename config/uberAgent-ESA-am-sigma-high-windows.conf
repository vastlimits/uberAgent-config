Annotation = {"mitre_attack": ["T1685"], "author": "@Kostastsale"}
Query = icontains(Process.CommandLine, "\\Microsoft\\Office\\") and icontains(Process.CommandLine, "\\Excel\\Security") and icontains(Process.CommandLine, "PythonFunctionWarnings") and icontains(Process.CommandLine, " 0")


