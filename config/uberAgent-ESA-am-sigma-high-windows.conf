RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\WmiPrvSE.exe") or iendswith(Parent.Path, "\\svchost.exe") or iendswith(Parent.Path, "\\dllhost.exe")) and (iendswith(Process.Path, "\\wab.exe") or iendswith(Process.Path, "\\wabmig.exe")) or iendswith(Parent.Path, "\\wab.exe") or iendswith(Parent.Path, "\\wabmig.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the addition of the 'MiniNt' key to the registry. Upon a reboot, Windows Event Log service will stop writing events.
# Windows Event Log is a service that collects and stores event logs from the operating system and applications. It is an important component of Windows security and auditing.
# Adversary may want to disable this service to disable logging of security events which could be used to detect their activities.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 8839e550-52d7-4958-9f2f-e13c1e736838
RuleName = Security Event Logging Disabled via MiniNt Registry Key - Registry Set
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = security-event-logging-disabled-via-minint-registry-key-registry-set
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001", "T1112"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = Reg.TargetObject == "HKLM\\System\\CurrentControlSet\\Control\\MiniNt\\(Default)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects a suspicious process pattern which could be a sign of an exploited Serv-U service
# Author: Florian Roth (Nextron Systems)
RuleId = 58f4ea09-0fc2-4520-ba18-b85c540b0eaf
RuleName = Suspicious Serv-U Process Pattern
EventType = Process.Start
Tag = proc-start-suspicious-serv-u-process-pattern
RiskScore = 75
Annotation = {"mitre_attack": ["T1555"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\Serv-U.exe") and (iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\wscript.exe") or iendswith(Process.Path, "\\cscript.exe") or iendswith(Process.Path, "\\sh.exe") or iendswith(Process.Path, "\\bash.exe") or iendswith(Process.Path, "\\schtasks.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\wmic.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\msiexec.exe") or iendswith(Process.Path, "\\forfiles.exe") or iendswith(Process.Path, "\\scriptrunner.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects installation of Kali Linux distribution through Windows Subsystem for Linux (WSL).
# Attackers may use Kali Linux WSL to leverage its penetration testing tools and capabilities for malicious purposes.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = eca8ae39-5c3c-4321-b538-9e64fe25822e
RuleName = Installation of WSL Kali-Linux
EventType = Process.Start
Tag = proc-start-installation-of-wsl-kali-linux
RiskScore = 75
Annotation = {"mitre_attack": ["T1059"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\wsl.exe") or Process.Name == "wsl") and (icontains(Process.CommandLine, " --install ") or icontains(Process.CommandLine, " -i ")) and icontains(Process.CommandLine, "kali")


[ThreatDetectionRule platform=Windows]
# Detects commonly-used chained commands and strings in the most recent 'url' value of the 'TypedPaths' key, which could be indicative of a user being targeted by the FileFix technique.
# Author: Alfie Champion (delivr.to), Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 4fee3d51-8069-4a4c-a0f7-924fcaff2c70
RuleName = FileFix - Command Evidence in TypedPaths
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = filefix-command-evidence-in-typedpaths
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.004"], "author": "Alfie Champion (delivr.to), Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\TypedPaths\\url1") and icontains(Reg.Value.Data, "#") and icontains(Reg.Value.Data, "http") and (icontains(Reg.Value.Data, "account") or icontains(Reg.Value.Data, "anti-bot") or icontains(Reg.Value.Data, "botcheck") or icontains(Reg.Value.Data, "captcha") or icontains(Reg.Value.Data, "challenge") or icontains(Reg.Value.Data, "confirmation") or icontains(Reg.Value.Data, "fraud") or icontains(Reg.Value.Data, "human") or icontains(Reg.Value.Data, "identification") or icontains(Reg.Value.Data, "identificator") or icontains(Reg.Value.Data, "identity") or icontains(Reg.Value.Data, "robot") or icontains(Reg.Value.Data, "validation") or icontains(Reg.Value.Data, "verification") or icontains(Reg.Value.Data, "verify") or icontains(Reg.Value.Data, "\%comspec\%") or icontains(Reg.Value.Data, "bitsadmin") or icontains(Reg.Value.Data, "certutil") or icontains(Reg.Value.Data, "cmd") or icontains(Reg.Value.Data, "cscript") or icontains(Reg.Value.Data, "curl") or icontains(Reg.Value.Data, "finger") or icontains(Reg.Value.Data, "mshta") or icontains(Reg.Value.Data, "powershell") or icontains(Reg.Value.Data, "pwsh") or icontains(Reg.Value.Data, "regsvr32") or icontains(Reg.Value.Data, "rundll32") or icontains(Reg.Value.Data, "schtasks") or icontains(Reg.Value.Data, "wget") or icontains(Reg.Value.Data, "wscript"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects UTF-8 and UTF-16 Base64 encoded powershell 'Invoke-' calls
# Author: pH-T (Nextron Systems), Harjot Singh, @cyb3rjy0t
RuleId = 6385697e-9f1b-40bd-8817-f4a91f40508e
RuleName = PowerShell Base64 Encoded Invoke Keyword
EventType = Process.Start
Tag = proc-start-powershell-base64-encoded-invoke-keyword
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001", "T1027"], "author": "pH-T (Nextron Systems), Harjot Singh, @cyb3rjy0t"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and icontains(Process.CommandLine, " -e") and (icontains(Process.CommandLine, "SQBuAHYAbwBrAGUALQ") or icontains(Process.CommandLine, "kAbgB2AG8AawBlAC0A") or icontains(Process.CommandLine, "JAG4AdgBvAGsAZQAtA") or icontains(Process.CommandLine, "SW52b2tlL") or icontains(Process.CommandLine, "ludm9rZS") or icontains(Process.CommandLine, "JbnZva2Ut"))


[ThreatDetectionRule platform=Windows]
# Detects the Internet Information Services (IIS) command-line tool, AppCmd, being used to list passwords
# Author: Tim Rauch, Janantha Marasinghe, Elastic (original idea)
RuleId = 2d3cdeec-c0db-45b4-aa86-082f7eb75701
RuleName = Microsoft IIS Service Account Password Dumped
EventType = Process.Start
Tag = proc-start-microsoft-iis-service-account-password-dumped
RiskScore = 75
Annotation = {"mitre_attack": ["T1003"], "author": "Tim Rauch, Janantha Marasinghe, Elastic (original idea)"}
Query = (iendswith(Process.Path, "\\appcmd.exe") or Process.Name == "appcmd.exe") and icontains(Process.CommandLine, "list ") and (icontains(Process.CommandLine, " /config") or icontains(Process.CommandLine, " /xml") or icontains(Process.CommandLine, " -config") or icontains(Process.CommandLine, " -xml") or (icontains(Process.CommandLine, " /@t") or icontains(Process.CommandLine, " /text") or icontains(Process.CommandLine, " /show") or icontains(Process.CommandLine, " -@t") or icontains(Process.CommandLine, " -text") or icontains(Process.CommandLine, " -show")) and (icontains(Process.CommandLine, ":*") or icontains(Process.CommandLine, "password")))


[ThreatDetectionRule platform=Windows]
# Detects the creation of command-line interpreters (cmd.exe, powershell.exe) as child processes of Windows Server Update Services (WSUS) related process wsusservice.exe.
# This behavior is a key indicator of exploitation for the critical remote code execution vulnerability such as CVE-2025-59287, where attackers spawn shells to conduct reconnaissance and further post-exploitation activities.
# Author: Huntress Labs, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 43259cc4-1b80-4931-bd98-baea01afc196
RuleName = Exploitation Activity of CVE-2025-59287 - WSUS Suspicious Child Process
EventType = Process.Start
Tag = proc-start-exploitation-activity-of-cve-2025-59287-wsus-suspicious-child-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1190", "T1203"], "author": "Huntress Labs, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\wsusservice.exe") or iendswith(Parent.Path, "\\w3wp.exe") and icontains(Parent.CommandLine, "WsusPool")) and (iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\powershell\_ise.exe"))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects execution of the legitimate Autoit3 utility from a suspicious parent process. AutoIt3.exe is used within
# the DarkGate infection chain to execute shellcode that performs process injection and connects to the DarkGate
# command-and-control server.
# Author: Micah Babinski
RuleId = f8e9aa1c-14f2-4dbd-aa59-b98968ed650d
RuleName = DarkGate - Autoit3.EXE Execution Parameters
EventType = Process.Start
Tag = proc-start-darkgate-autoit3.exe-execution-parameters
RiskScore = 75
Annotation = {"mitre_attack": ["T1059"], "author": "Micah Babinski"}
Query = (iendswith(Process.Path, "\\Autoit3.exe") or Process.Name == "AutoIt3.exe") and (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\KeyScramblerLogon.exe") or iendswith(Parent.Path, "\\msiexec.exe")) and not (iendswith(Process.Path, ":\\Program Files (x86)\\AutoIt3\\AutoIt3.exe") or iendswith(Process.Path, ":\\Program Files\\AutoIt3\\AutoIt3.exe"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the presence of a file that is decrypted backdoor binary dropped by the Kapeka Dropper, which disguises itself as a hidden file under a folder named "Microsoft" within "CSIDL_COMMON_APPDATA" or "CSIDL_LOCAL_APPDATA", depending on the process privileges.
# The file, typically 5-6 characters long with a random combination of consonants and vowels followed by a ".wll" extension to pose as a legitimate file to evade detection.
# Author: Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)
RuleId = 20228d05-dd68-435d-8b4e-e7e64938880c
RuleName = Potential Kapeka Decrypted Backdoor Indicator
EventType = File.Create
Tag = potential-kapeka-decrypted-backdoor-indicator
RiskScore = 75
Annotation = {"author": "Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(File.Path, ":\\ProgramData\\") or icontains(File.Path, "\\AppData\\Local\\")) and File.Path regex "\\\\[a-zA-Z]{5,6}\\.wll" or iendswith(File.Path, "\\win32log.exe") or iendswith(File.Path, "\\crdss.exe")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects file creation events with filename patterns used by Impacket.
# Author: The DFIR Report, IrishDeath
RuleId = 03f4ca17-de95-428d-a75a-4ee78b047256
RuleName = HackTool - Impacket File Indicators
EventType = File.Create
Tag = hacktool-impacket-file-indicators
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.001"], "author": "The DFIR Report, IrishDeath"}
Query = File.Path regex "\\\\sessionresume_[a-zA-Z]{8}$"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detect creation of suspicious executable file names.
# Some strings look for suspicious file extensions, others look for filenames that exploit unquoted service paths.
# Author: frack113
RuleId = 74babdd6-a758-4549-9632-26535279e654
RuleName = Suspicious Executable File Creation
EventType = File.Create
Tag = suspicious-executable-file-creation
RiskScore = 75
Annotation = {"mitre_attack": ["T1564"], "author": "frack113"}
Query = iendswith(File.Path, ":\\$Recycle.Bin.exe") or iendswith(File.Path, ":\\Documents and Settings.exe") or iendswith(File.Path, ":\\MSOCache.exe") or iendswith(File.Path, ":\\PerfLogs.exe") or iendswith(File.Path, ":\\Recovery.exe") or iendswith(File.Path, ".bat.exe") or iendswith(File.Path, ".sys.exe")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of winget to add a new insecure (http) download source.
# Winget will not allow the addition of insecure sources, hence this could indicate potential suspicious activity (or typos)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 81a0ecb5-0a41-4ba1-b2ba-c944eb92bfa2
RuleName = Add Insecure Download Source To Winget
EventType = Process.Start
Tag = proc-start-add-insecure-download-source-to-winget
RiskScore = 75
Annotation = {"mitre_attack": ["T1059"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\winget.exe") or Process.Name == "winget.exe") and icontains(Process.CommandLine, "source ") and icontains(Process.CommandLine, "add ") and icontains(Process.CommandLine, "http://")


[ThreatDetectionRule platform=Windows]
# Detects raspberry robin subsequent execution of commands.
