[ThreatDetectionRule platform=Windows]
# Detects suspicious file writes to SharePoint layouts directory which could indicate webshell activity or post-exploitation.
# This behavior has been observed in the exploitation of SharePoint vulnerabilities such as CVE-2025-49704, CVE-2025-49706 or CVE-2025-53770.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 1f0489be-b496-4ddf-b3a9-5900f2044e9c
RuleName = Suspicious File Write to SharePoint Layouts Directory
EventType = File.Create
Tag = suspicious-file-write-to-sharepoint-layouts-directory
RiskScore = 75
Annotation = {"mitre_attack": ["T1190", "T1505.003"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\w3wp.exe")) and (istartswith(File.Path, "C:\\Program Files\\Common Files\\Microsoft Shared\\Web Server Extensions\\") or istartswith(File.Path, "C:\\Program Files (x86)\\Common Files\\Microsoft Shared\\Web Server Extensions\\")) and (icontains(File.Path, "\\15\\TEMPLATE\\LAYOUTS\\") or icontains(File.Path, "\\16\\TEMPLATE\\LAYOUTS\\")) and (iendswith(File.Path, ".asax") or iendswith(File.Path, ".ascx") or iendswith(File.Path, ".ashx") or iendswith(File.Path, ".asmx") or iendswith(File.Path, ".asp") or iendswith(File.Path, ".aspx") or iendswith(File.Path, ".bat") or iendswith(File.Path, ".cmd") or iendswith(File.Path, ".cer") or iendswith(File.Path, ".config") or iendswith(File.Path, ".hta") or iendswith(File.Path, ".js") or iendswith(File.Path, ".jsp") or iendswith(File.Path, ".jspx") or iendswith(File.Path, ".php") or iendswith(File.Path, ".ps1") or iendswith(File.Path, ".vbs"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects javaw.exe in AppData folder as used by Adwind / JRAT
# Author: Florian Roth (Nextron Systems), Tom Ueltschi, Jonhnathan Ribeiro, oscd.community
RuleId = 0bcfabcb-7929-47f4-93d6-b33fb67d34d1
RuleName = Adwind RAT / JRAT File Artifact
EventType = File.Create
Tag = adwind-rat-/-jrat-file-artifact
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.005", "T1059.007"], "author": "Florian Roth (Nextron Systems), Tom Ueltschi, Jonhnathan Ribeiro, oscd.community"}
Query = icontains(File.Path, "\\AppData\\Roaming\\Oracle\\bin\\java") and icontains(File.Path, ".exe") or icontains(File.Path, "\\Retrive") and icontains(File.Path, ".vbs")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects uncommon "userinit.exe" child processes, which could be a sign of uncommon shells or login scripts used for persistence.
# Author: Tom Ueltschi (@c_APT_ure), Tim Shelton
RuleId = 0a98a10c-685d-4ab0-bddc-b6bdd1d48458
RuleName = Uncommon Userinit Child Process
EventType = Process.Start
Tag = proc-start-uncommon-userinit-child-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1037.001"], "author": "Tom Ueltschi (@c_APT_ure), Tim Shelton"}
