Tag = suspicious-volume-shadow-copy-vss_ps.dll-load
RiskScore = 75
Annotation = {"mitre_attack": ["T1490"], "author": "Markus Neis, @markus_neis"}
Query = iendswith(Image.Path, "\\vss\_ps.dll") and not (istartswith(Process.Path, "C:\\Windows\\") and (iendswith(Process.Path, "\\clussvc.exe") or iendswith(Process.Path, "\\dismhost.exe") or iendswith(Process.Path, "\\dllhost.exe") or iendswith(Process.Path, "\\inetsrv\\appcmd.exe") or iendswith(Process.Path, "\\inetsrv\\iissetup.exe") or iendswith(Process.Path, "\\msiexec.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\searchindexer.exe") or iendswith(Process.Path, "\\srtasks.exe") or iendswith(Process.Path, "\\svchost.exe") or iendswith(Process.Path, "\\System32\\SystemPropertiesAdvanced.exe") or iendswith(Process.Path, "\\taskhostw.exe") or iendswith(Process.Path, "\\thor.exe") or iendswith(Process.Path, "\\thor64.exe") or iendswith(Process.Path, "\\tiworker.exe") or iendswith(Process.Path, "\\vssvc.exe") or iendswith(Process.Path, "\\vssadmin.exe") or iendswith(Process.Path, "\\WmiPrvSE.exe") or iendswith(Process.Path, "\\wsmprovhost.exe")) or istartswith(Process.CommandLine, "C:\\$WinREAgent\\Scratch\\") and icontains(Process.CommandLine, "\\dismhost.exe {") or isnull(Process.Path)) and not (istartswith(Process.Path, "C:\\Program Files\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\"))
