[ThreatDetectionRule platform=Windows]
# Detects the use of reg.exe to disable the Event Tracing for Windows (ETW) Autologger session for Windows Defender API and Audit events.
# By setting the 'Start' value to '0' for the 'DefenderApiLogger' or 'DefenderAuditLogger' session, an attacker can prevent these critical security events
# from being logged, effectively blinding monitoring tools that rely on this data. This is a powerful defense evasion technique.
# Author: Matt Anderson (Huntress)
RuleId = a1b2c3d4-e5f6-a7b8-c9d0-e1f2a3b4c5d6
RuleName = Disabling Windows Defender WMI Autologger Session via Reg.exe
EventType = Process.Start
Tag = proc-start-disabling-windows-defender-wmi-autologger-session-via-reg.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Matt Anderson (Huntress)"}
Query = (iendswith(Process.Path, "\\reg.exe") or Process.Name == "reg.exe") and (icontains(Process.CommandLine, "\\Control\\WMI\\Autologger\\DefenderApiLogger\\Start") or icontains(Process.CommandLine, "\\Control\\WMI\\Autologger\\DefenderAuditLogger\\Start")) and icontains(Process.CommandLine, "add") and icontains(Process.CommandLine, "0") and not icontains(Process.CommandLine, "0x00000001")


[ThreatDetectionRule platform=Windows]
# Detects an executable in the users directory started from one of the Microsoft Office suite applications (Word, Excel, PowerPoint, Publisher, Visio)
# Author: Jason Lynch
RuleId = aa3a6f94-890e-4e22-b634-ffdfd54792cc
RuleName = Suspicious Binary In User Directory Spawned From Office Application
EventType = Process.Start
Tag = proc-start-suspicious-binary-in-user-directory-spawned-from-office-application
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.002"], "author": "Jason Lynch"}
Query = (iendswith(Parent.Path, "\\WINWORD.EXE") or iendswith(Parent.Path, "\\EXCEL.EXE") or iendswith(Parent.Path, "\\POWERPNT.exe") or iendswith(Parent.Path, "\\MSPUB.exe") or iendswith(Parent.Path, "\\VISIO.exe") or iendswith(Parent.Path, "\\MSACCESS.exe") or iendswith(Parent.Path, "\\EQNEDT32.exe")) and istartswith(Process.Path, "C:\\users\\") and iendswith(Process.Path, ".exe") and not iendswith(Process.Path, "\\Teams.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the installation of a Callout DLL via CalloutDlls and CalloutEnabled parameter in Registry, which can be used to execute code in context of the DHCP server (restart required)
# Author: Dimitrios Slamaris
RuleId = 9d3436ef-9476-4c43-acca-90ce06bdf33a
RuleName = DHCP Callout DLL Installation
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = dhcp-callout-dll-installation
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001", "T1112"], "author": "Dimitrios Slamaris"}
Query = iendswith(Reg.TargetObject, "\\Services\\DHCPServer\\Parameters\\CalloutDlls") or iendswith(Reg.TargetObject, "\\Services\\DHCPServer\\Parameters\\CalloutEnabled")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects changes to the "Default" property for keys located in the \Software\Microsoft\Windows\CurrentVersion\App Paths\ registry. Which might be used as a method of persistence
# The entries found under App Paths are used primarily for the following purposes.
# First, to map an application's executable file name to that file's fully qualified path.
# Second, to prepend information to the PATH environment variable on a per-application, per-process basis.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 707e097c-e20f-4f67-8807-1f72ff4500d6
RuleName = Potential Persistence Via App Paths Default Property
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-persistence-via-app-paths-default-property
RiskScore = 75
Annotation = {"mitre_attack": ["T1546.012"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\App Paths") and (iendswith(Reg.TargetObject, "(Default)") or iendswith(Reg.TargetObject, "Path")) and (icontains(Reg.Value.Data, "\\Users\\Public") or icontains(Reg.Value.Data, "\\AppData\\Local\\Temp\\") or icontains(Reg.Value.Data, "\\Windows\\Temp\\") or icontains(Reg.Value.Data, "\\Desktop\\") or icontains(Reg.Value.Data, "\\Downloads\\") or icontains(Reg.Value.Data, "\%temp\%") or icontains(Reg.Value.Data, "\%tmp\%") or icontains(Reg.Value.Data, "iex") or icontains(Reg.Value.Data, "Invoke-") or icontains(Reg.Value.Data, "rundll32") or icontains(Reg.Value.Data, "regsvr32") or icontains(Reg.Value.Data, "mshta") or icontains(Reg.Value.Data, "cscript") or icontains(Reg.Value.Data, "wscript") or icontains(Reg.Value.Data, ".bat") or icontains(Reg.Value.Data, ".hta") or icontains(Reg.Value.Data, ".dll") or icontains(Reg.Value.Data, ".ps1"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects execution of the hacktool NetExec.
# NetExec (formerly CrackMapExec) is a widely used post-exploitation tool designed for Active Directory penetration testing and network enumeration
# In enterprise environments, the use of NetExec is considered suspicious or potentially malicious because it enables attackers to enumerate hosts, exploit network services, and move laterally across systems.
# Threat actors and red teams commonly use NetExec to identify vulnerable systems, harvest credentials, and execute commands remotely.
# Author: Chirag Damani
RuleId = 7638e5fe-600c-4289-a968-f49dd537ec7d
RuleName = HackTool - NetExec Execution
EventType = Process.Start
Tag = proc-start-hacktool-netexec-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1018", "T1021"], "author": "Chirag Damani"}
Query = iendswith(Process.Path, "\\nxc.exe") and (icontains(Process.CommandLine, " ftp ") or icontains(Process.CommandLine, " ldap ") or icontains(Process.CommandLine, " mssql ") or icontains(Process.CommandLine, " nfs ") or icontains(Process.CommandLine, " rdp ") or icontains(Process.CommandLine, " smb ") or icontains(Process.CommandLine, " ssh ") or icontains(Process.CommandLine, " vnc ") or icontains(Process.CommandLine, " winrm ") or icontains(Process.CommandLine, " wmi "))


[ThreatDetectionRule platform=Windows]
# Attempts to detect system changes made by Blue Mockingbird
# Author: Trent Liffick (@tliffick)
RuleId = c3198a27-23a0-4c2c-af19-e5328d49680e
RuleName = Blue Mockingbird
EventType = Process.Start
Tag = proc-start-blue-mockingbird
RiskScore = 75
Annotation = {"mitre_attack": ["T1112", "T1047"], "author": "Trent Liffick (@tliffick)"}
Query = iendswith(Process.Path, "\\cmd.exe") and icontains(Process.CommandLine, "sc config") and icontains(Process.CommandLine, "wercplsupporte.dll") or iendswith(Process.Path, "\\wmic.exe") and iendswith(Process.CommandLine, "COR\_PROFILER")


[ThreatDetectionRule platform=Windows]
# Detects attempts to disable Windows Credential Guard by setting registry values to 0. Credential Guard uses virtualization-based security to isolate secrets so that only privileged system software can access them.
# Adversaries may disable Credential Guard to gain access to sensitive credentials stored in the system, such as NTLM hashes and Kerberos tickets, which can be used for lateral movement and privilege escalation.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 73921b9c-cafd-4446-b0c6-fdb0ace42bc0
RuleName = Windows Credential Guard Disabled - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = windows-credential-guard-disabled-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Reg.TargetObject, "\\DeviceGuard\\EnableVirtualizationBasedSecurity") or iendswith(Reg.TargetObject, "\\DeviceGuard\\LsaCfgFlags") or iendswith(Reg.TargetObject, "\\Lsa\\LsaCfgFlags")) and Reg.Value.Data == "DWORD (0x00000000)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects a network connection that is initiated by the "notepad.exe" process.
# This might be a sign of process injection from a beacon process or something similar.
# Notepad rarely initiates a network communication except when printing documents for example.
# Author: EagleEye Team
RuleId = e81528db-fc02-45e8-8e98-4e84aba1f10b
RuleName = Network Connection Initiated Via Notepad.EXE
EventType = Net.Any
Tag = network-connection-initiated-via-notepad.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1055"], "author": "EagleEye Team"}
Query = iendswith(Process.Path, "\\notepad.exe") and not Net.Target.Port == 9100
GenericProperty1 = Net.Target.Port


[ThreatDetectionRule platform=Windows]
# Detects potential execution of the SquiblyTwo technique that leverages Windows Management Instrumentation (WMI)
# to execute malicious code remotely. This technique bypasses application whitelisting by using wmic.exe to process
# malicious XSL (eXtensible Stylesheet Language) scripts that can contain embedded JScript or VBScript.
# The attack typically works by fetching XSL content from a remote source (using HTTP/HTTPS) and executing it
# with full trust privileges directly in memory, avoiding disk-based detection mechanisms. This is a common
# LOLBin (Living Off The Land Binary) technique used for defense evasion and code execution.
# Author: Markus Neis, Florian Roth, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 8d63dadf-b91b-4187-87b6-34a1114577ea
RuleName = Potential Remote SquiblyTwo Technique Execution
EventType = Process.Start
Tag = proc-start-potential-remote-squiblytwo-technique-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1047", "T1220", "T1059.005", "T1059.007"], "author": "Markus Neis, Florian Roth, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\wmic.exe") or Process.Name == "wmic.exe" or icontains(Process.Hashes, "IMPHASH=1B1A3F43BF37B5BFE60751F2EE2F326E") or icontains(Process.Hashes, "IMPHASH=37777A96245A3C74EB217308F3546F4C") or icontains(Process.Hashes, "IMPHASH=9D87C9D67CE724033C0B40CC4CA1B206") or icontains(Process.Hashes, "IMPHASH=B12619881D79C3ACADF45E752A58554A") or icontains(Process.Hashes, "IMPHASH=16A48C3CABF98A9DC1BF02C07FE1EA00")) and (icontains(Process.CommandLine, "-format:") or icontains(Process.CommandLine, "/format:") or icontains(Process.CommandLine, "–format:") or icontains(Process.CommandLine, "—format:") or icontains(Process.CommandLine, "―format:")) and (icontains(Process.CommandLine, "://") or icontains(Process.CommandLine, "\\\\"))
GenericProperty1 = Process.Hashes


[ThreatDetectionRule platform=Windows]
# Detects the invocation of the Stored User Names and Passwords dialogue (Key Manager)
