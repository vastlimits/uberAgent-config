ine, ".dat") or iendswith(Process.CommandLine, ".dat'") or iendswith(Process.CommandLine, ".dat\"") or iendswith(Process.CommandLine, ".msi") or iendswith(Process.CommandLine, ".msi'") or iendswith(Process.CommandLine, ".msi\"") or iendswith(Process.CommandLine, ".bat") or iendswith(Process.CommandLine, ".bat'") or iendswith(Process.CommandLine, ".bat\"") or iendswith(Process.CommandLine, ".exe") or iendswith(Process.CommandLine, ".exe'") or iendswith(Process.CommandLine, ".exe\"") or iendswith(Process.CommandLine, ".vbs") or iendswith(Process.CommandLine, ".vbs'") or iendswith(Process.CommandLine, ".vbs\"") or iendswith(Process.CommandLine, ".vbe") or iendswith(Process.CommandLine, ".vbe'") or iendswith(Process.CommandLine, ".vbe\"") or iendswith(Process.CommandLine, ".hta") or iendswith(Process.CommandLine, ".hta'") or iendswith(Process.CommandLine, ".hta\"") or iendswith(Process.CommandLine, ".dll") or iendswith(Process.CommandLine, ".dll'") or iendswith(Process.CommandLine, ".dll\"") or iendswith(Process.CommandLine, ".psm1") or iendswith(Process.CommandLine, ".psm1'") or iendswith(Process.CommandLine, ".psm1\""))


[ThreatDetectionRule platform=Windows]
# Detects tampering with autologger trace sessions which is a technique used by attackers to disable logging.
# The AutoLogger event tracing session records events up that occur early in the operating system boot process.
# Applications and device drivers can use the AutoLogger session to capture traces before the user logs in, and also used by security solutions as telemetry source.
# Adversaries may disable these sessions to evade detection and prevent security monitoring of early boot activities and system events.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = f37b4bce-49d0-4087-9f5b-58bffda77316
RuleName = Potential AutoLogger Sessions Tampering
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-autologger-sessions-tampering
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\Control\\WMI\\Autologger\\") and (icontains(Reg.TargetObject, "\\EventLog-") or icontains(Reg.TargetObject, "\\Defender")) and (iendswith(Reg.TargetObject, "\\Enabled") or iendswith(Reg.TargetObject, "\\Start")) and Reg.Value.Data == "DWORD (0x00000000)" and not (Process.Path == "C:\\Windows\\system32\\wevtutil.exe" or (istartswith(Process.Path, "C:\\ProgramData\\Microsoft\\Windows Defender\\Platform\\") or istartswith(Process.Path, "C:\\Program Files\\Windows Defender\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\Windows Defender\\")) and iendswith(Process.Path, "\\MsMpEng.exe") and (icontains(Reg.TargetObject, "\\DefenderApiLogger\\") or icontains(Reg.TargetObject, "\\DefenderAuditLogger\\")))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


