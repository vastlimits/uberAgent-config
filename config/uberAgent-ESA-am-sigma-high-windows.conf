RuleName = Time Travel Debugging Utility Usage - Image
EventType = Image.Load
Tag = time-travel-debugging-utility-usage-image
RiskScore = 75
Annotation = {"mitre_attack": ["T1218", "T1003.001"], "author": "Ensar \u015eamil, @sblmsrsn, @oscd_initiative"}
Query = iendswith(Image.Path, "\\ttdrecord.dll") or iendswith(Image.Path, "\\ttdwriter.dll") or iendswith(Image.Path, "\\ttdloader.dll")
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the use of NPS, a port forwarding and intranet penetration proxy server
# Author: Florian Roth (Nextron Systems)
RuleId = 68d37776-61db-42f5-bf54-27e87072d17e
RuleName = PUA - NPS Tunneling Tool Execution
EventType = Process.Start
Tag = proc-start-pua-nps-tunneling-tool-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1090"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\npc.exe") or icontains(Process.CommandLine, " -server=") and icontains(Process.CommandLine, " -vkey=") and icontains(Process.CommandLine, " -password=") or icontains(Process.CommandLine, " -config=npc") or icontains(Process.Hashes, "MD5=AE8ACF66BFE3A44148964048B826D005") or icontains(Process.Hashes, "SHA1=CEA49E9B9B67F3A13AD0BE1C2655293EA3C18181") or icontains(Process.Hashes, "SHA256=5A456283392FFCEEEACA3D3426C306EB470304637520D72FED1CC1FEBBBD6856")
GenericProperty1 = Process.Hashes


[ThreatDetectionRule platform=Windows]
# Detects a suspicious Microsoft desktopimgdownldr execution with parameters used to download files from the Internet
# Author: Florian Roth (Nextron Systems)
RuleId = bb58aa4a-b80b-415a-a2c0-2f65a4c81009
RuleName = Suspicious Desktopimgdownldr Command
EventType = Process.Start
Tag = proc-start-suspicious-desktopimgdownldr-command
RiskScore = 75
Annotation = {"mitre_attack": ["T1105"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, " /lockscreenurl:") and not (icontains(Process.CommandLine, ".jpg") or icontains(Process.CommandLine, ".jpeg") or icontains(Process.CommandLine, ".png")) or icontains(Process.CommandLine, "reg delete") and icontains(Process.CommandLine, "\\PersonalizationCSP")


[ThreatDetectionRule platform=Windows]
# Bypasses User Account Control using a fileless method
# Author: frack113
RuleId = 46dd5308-4572-4d12-aa43-8938f0184d4f
RuleName = Bypass UAC Using DelegateExecute
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = bypass-uac-using-delegateexecute
RiskScore = 75
Annotation = {"mitre_attack": ["T1548.002"], "author": "frack113"}
Query = iendswith(Reg.TargetObject, "\\open\\command\\DelegateExecute") and Reg.Value.Data == "(Empty)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects process creation activity indicators related to Diamond Sleet APT
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = b5495d8d-24ad-4a44-8caf-ceae9a07a5c2
RuleName = Diamond Sleet APT Process Activity Indicators
EventType = Process.Start
Tag = proc-start-diamond-sleet-apt-process-activity-indicators
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, " uTYNkfKxHiZrx3KJ")


[ThreatDetectionRule platform=Windows]
# Detects suspicious UltraVNC command line flag combination that indicate a auto reconnect upon execution, e.g. startup (as seen being used by Gamaredon threat group)
# Author: Bhabesh Raj
RuleId = 871b9555-69ca-4993-99d3-35a59f9f3599
RuleName = Suspicious UltraVNC Execution
EventType = Process.Start
Tag = proc-start-suspicious-ultravnc-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1021.005"], "author": "Bhabesh Raj"}
Query = icontains(Process.CommandLine, "-autoreconnect ") and icontains(Process.CommandLine, "-connect ") and icontains(Process.CommandLine, "-id:")


[ThreatDetectionRule platform=Windows]
# Detects the creation of files that indicator an interactive use of PowerShell in the SYSTEM user context
# Author: Florian Roth (Nextron Systems)
RuleId = 5b40a734-99b6-4b98-a1d0-1cea51a08ab2
RuleName = Suspicious Interactive PowerShell as SYSTEM
EventType = File.Create
Tag = suspicious-interactive-powershell-as-system
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Florian Roth (Nextron Systems)"}
Query = File.Path in ["C:\\Windows\\System32\\config\\systemprofile\\AppData\\Roaming\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost\_history.txt", "C:\\Windows\\System32\\config\\systemprofile\\AppData\\Local\\Microsoft\\Windows\\PowerShell\\StartupProfileData-Interactive"]
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the Emotet Epoch4 loader as reported by @malware_traffic back in 2022.
# The ".lnk" file was delivered via phishing campaign.
# Author: @kostastsale
RuleId = 1f32d820-1d5c-43fe-8fe2-feef0c952eb7
RuleName = Emotet Loader Execution Via .LNK File
EventType = Process.Start
Tag = proc-start-emotet-loader-execution-via-.lnk-file
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.006"], "author": "@kostastsale"}
Query = (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\explorer.exe") or iendswith(Parent.Path, "\\powershell.exe")) and (iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\powershell.exe")) and icontains(Process.CommandLine, "findstr") and icontains(Process.CommandLine, ".vbs") and icontains(Process.CommandLine, ".lnk")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects potential beaconing activity to domains related to 3CX 3CXDesktopApp compromise
# Author: Nasreddine Bencherchali (Nextron Systems)
