Tag = proc-start-potential-arbitrary-command-execution-using-msdt.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1202"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\msdt.exe") or Process.Name == "msdt.exe") and (icontains(Process.CommandLine, "IT\_BrowseForFile=") or icontains(Process.CommandLine, " PCWDiagnostic") and (icontains(Process.CommandLine, " -af ") or icontains(Process.CommandLine, " /af ") or icontains(Process.CommandLine, " –af ") or icontains(Process.CommandLine, " —af ") or icontains(Process.CommandLine, " ―af ")))


[ThreatDetectionRule platform=Windows]
# Detects the execution of a renamed AutoIt2.exe or AutoIt3.exe.
# AutoIt is a scripting language and automation tool for Windows systems. While primarily used for legitimate automation tasks, it can be misused in cyber attacks.
# Attackers can leverage AutoIt to create and distribute malware, including keyloggers, spyware, and botnets. A renamed AutoIt executable is particularly suspicious.
# Author: Florian Roth (Nextron Systems)
RuleId = f4264e47-f522-4c38-a420-04525d5b880f
RuleName = Renamed AutoIt Execution
EventType = Process.Start
Tag = proc-start-renamed-autoit-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1027"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.CommandLine, " /AutoIt3ExecuteScript") or icontains(Process.CommandLine, " /ErrorStdOut") or icontains(Process.Hashes, "IMPHASH=FDC554B3A8683918D731685855683DDF") or icontains(Process.Hashes, "IMPHASH=CD30A61B60B3D60CECDB034C8C83C290") or icontains(Process.Hashes, "IMPHASH=F8A00C72F2D667D2EDBB234D0C0AE000") or Process.Name in ["AutoIt3.exe", "AutoIt2.exe", "AutoIt.exe"]) and not (iendswith(Process.Path, "\\AutoIt.exe") or iendswith(Process.Path, "\\AutoIt2.exe") or iendswith(Process.Path, "\\AutoIt3\_x64.exe") or iendswith(Process.Path, "\\AutoIt3.exe"))
GenericProperty1 = Process.Hashes


[ThreatDetectionRule platform=Windows]
# The Fax service attempts to load ualapi.dll, which is non-existent. An attacker can then (side)load their own malicious DLL using this service.
# Author: NVISO
RuleId = 828af599-4c53-4ed2-ba4a-a9f835c434ea
RuleName = Fax Service DLL Search Order Hijack
EventType = Image.Load
Tag = fax-service-dll-search-order-hijack
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001"], "author": "NVISO"}
Query = iendswith(Process.Path, "\\fxssvc.exe") and iendswith(Image.Path, "ualapi.dll") and not istartswith(Image.Path, "C:\\Windows\\WinSxS\\")
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects file names with specific patterns seen generated and used by tools such as Mimikatz and DSInternals related to exported or stolen DPAPI backup keys and certificates.
# Author: Nounou Mbeiri, Nasreddine Bencherchali (Nextron Systems)
RuleId = 7892ec59-c5bb-496d-8968-e5d210ca3ac4
RuleName = DPAPI Backup Keys And Certificate Export Activity IOC
EventType = File.Create
Tag = dpapi-backup-keys-and-certificate-export-activity-ioc
RiskScore = 75
Annotation = {"mitre_attack": ["T1555", "T1552.004"], "author": "Nounou Mbeiri, Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(File.Path, "ntds\_capi\_") or icontains(File.Path, "ntds\_legacy\_") or icontains(File.Path, "ntds\_unknown\_")) and (iendswith(File.Path, ".cer") or iendswith(File.Path, ".key") or iendswith(File.Path, ".pfx") or iendswith(File.Path, ".pvk"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the addition of a key 'MiniNt' to the registry. Upon a reboot, Windows Event Log service will stop writing events.
# Author: Ilyas Ochkov, oscd.community
RuleId = 919f2ef0-be2d-4a7a-b635-eb2b41fde044
RuleName = Disable Security Events Logging Adding Reg Key MiniNt
EventType = Reg.Key.Create
EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = disable-security-events-logging-adding-reg-key-minint
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001", "T1112"], "author": "Ilyas Ochkov, oscd.community"}
Query = Reg.TargetObject == "HKLM\\SYSTEM\\CurrentControlSet\\Control\\MiniNt" and Reg.EventType == "CreateKey" or Reg.Key.Path.New == "HKLM\\SYSTEM\\CurrentControlSet\\Control\\MiniNt"
Hive = HKLM,HKU
GenericProperty1 = Reg.Key.Path.New
GenericProperty2 = Reg.TargetObject
GenericProperty3 = Reg.EventType


[ThreatDetectionRule platform=Windows]
