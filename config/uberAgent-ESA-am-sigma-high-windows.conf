[ThreatDetectionRule platform=Windows]
# Detects the image load of VSS DLL by uncommon executables
# Author: frack113
RuleId = 37774c23-25a1-4adb-bb6d-8bb9fd59c0f8
RuleName = Suspicious Volume Shadow Copy Vssapi.dll Load
EventType = Image.Load
Tag = suspicious-volume-shadow-copy-vssapi.dll-load
RiskScore = 75
Annotation = {"mitre_attack": ["T1490"], "author": "frack113"}
Query = iendswith(Image.Path, "\\vssapi.dll") and not (Process.Path in ["C:\\Windows\\explorer.exe", "C:\\Windows\\ImmersiveControlPanel\\SystemSettings.exe"] or istartswith(Process.Path, "C:\\Windows\\System32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\") or istartswith(Process.Path, "C:\\Windows\\Temp\\{") or istartswith(Process.Path, "C:\\Windows\\WinSxS\\") or istartswith(Process.Path, "C:\\Program Files\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\") or isnull(Process.Path)) and not (istartswith(Process.Path, "C:\\ProgramData\\Package Cache\\") or icontains(Process.Path, "\\temp\\is-") and icontains(Process.Path, "\\avira\_system\_speedup.tmp"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of the IEExec utility to download and execute files
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 9801abb8-e297-4dbf-9fbd-57dde0e830ad
RuleName = File Download And Execution Via IEExec.EXE
EventType = Process.Start
Tag = proc-start-file-download-and-execution-via-ieexec.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1105"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\IEExec.exe") or Process.Name == "IEExec.exe") and (icontains(Process.CommandLine, "http://") or icontains(Process.CommandLine, "https://"))


[ThreatDetectionRule platform=Windows]
# Detects changes to registry keys related to "Trusted Location" of Microsoft Office where the path is set to something uncommon. Attackers might add additional trusted locations to avoid macro security restrictions.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = f742bde7-9528-42e5-bd82-84f51a8387d2
RuleName = Uncommon Microsoft Office Trusted Location Added
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = uncommon-microsoft-office-trusted-location-added
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "Security\\Trusted Locations\\Location") and iendswith(Reg.TargetObject, "\\Path") and not (icontains(Process.Path, ":\\Program Files\\Common Files\\Microsoft Shared\\ClickToRun\\") and iendswith(Process.Path, "\\OfficeClickToRun.exe") or icontains(Process.Path, ":\\Program Files\\Microsoft Office\\") or icontains(Process.Path, ":\\Program Files (x86)\\Microsoft Office\\")) and not (icontains(Reg.Value.Data, "\%APPDATA\%\\Microsoft\\Templates") or icontains(Reg.Value.Data, "\%\%APPDATA\%\%\\Microsoft\\Templates") or icontains(Reg.Value.Data, "\%APPDATA\%\\Microsoft\\Word\\Startup") or icontains(Reg.Value.Data, "\%\%APPDATA\%\%\\Microsoft\\Word\\Startup") or icontains(Reg.Value.Data, ":\\Program Files (x86)\\Microsoft Office\\root\\Templates\\") or icontains(Reg.Value.Data, ":\\Program Files\\Microsoft Office (x86)\\Templates") or icontains(Reg.Value.Data, ":\\Program Files\\Microsoft Office\\root\\Templates\\") or icontains(Reg.Value.Data, ":\\Program Files\\Microsoft Office\\Templates\\"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the execution of more.com and vbc.exe in the process tree.
# This behavior was observed by a set of samples related to Lummac Stealer.
# The Lummac payload is injected into the vbc.exe process.
# Author: Joseliyo Sanchez, @Joseliyo_Jstnk
RuleId = 19b3806e-46f2-4b4c-9337-e3d8653245ea
RuleName = Lummac Stealer Activity - Execution Of More.com And Vbc.exe
EventType = Process.Start
Tag = proc-start-lummac-stealer-activity-execution-of-more.com-and-vbc.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1055"], "author": "Joseliyo Sanchez, @Joseliyo_Jstnk"}
Query = iendswith(Parent.Path, "\\more.com") and (iendswith(Process.Path, "\\vbc.exe") or Process.Name == "vbc.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Running Chrome VPN Extensions via the Registry install 2 vpn extension
# Author: frack113
RuleId = b64a026b-8deb-4c1d-92fd-98893209dff1
RuleName = Running Chrome VPN Extensions via the Registry 2 VPN Extension
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = running-chrome-vpn-extensions-via-the-registry-2-vpn-extension
