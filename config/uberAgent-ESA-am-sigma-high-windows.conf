EventType = Process.Start
Tag = proc-start-potential-defense-evasion-via-right-to-left-override
RiskScore = 75
Annotation = {"mitre_attack": ["T1036.002"], "author": "Micah Babinski, @micahbabinski, Swachchhanda Shrawan Poudel (Nextron Systems), Luc G\u00e9naux"}
Query = icontains(Process.CommandLine, "\\u202e") or icontains(Process.CommandLine, "[U+202E]") or icontains(Process.CommandLine, "‮")


[ThreatDetectionRule platform=Windows]
# Detects programs on a Windows system that should not write executables to disk
