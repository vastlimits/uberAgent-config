# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 07db928c-8632-488e-ac7d-3db847489175
RuleName = Forest Blizzard APT - Process Creation Activity
EventType = Process.Start
Tag = proc-start-forest-blizzard-apt-process-creation-activity
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.Hashes, "SHA256=6b311c0a977d21e772ac4e99762234da852bbf84293386fbe78622a96c0b052f") or icontains(Process.Hashes, "SHA256=c60ead92cd376b689d1b4450f2578b36ea0bf64f3963cfa5546279fa4424c2a5") or iendswith(Process.Path, "\\schtasks.exe") and icontains(Process.CommandLine, "Create") and icontains(Process.CommandLine, "/RU") and icontains(Process.CommandLine, "SYSTEM") and icontains(Process.CommandLine, "\\Microsoft\\Windows\\WinSrv") and (icontains(Process.CommandLine, "servtask.bat") or icontains(Process.CommandLine, "execute.bat") or icontains(Process.CommandLine, "doit.bat")) or iendswith(Process.Path, "\\schtasks.exe") and icontains(Process.CommandLine, "Delete") and icontains(Process.CommandLine, "/F ") and icontains(Process.CommandLine, "\\Microsoft\\Windows\\WinSrv") or icontains(Process.CommandLine, "Get-ChildItem") and icontains(Process.CommandLine, ".save") and icontains(Process.CommandLine, "Compress-Archive -DestinationPath C:\\ProgramData\\")
GenericProperty1 = Process.Hashes


[ThreatDetectionRule platform=Windows]
# Detects unusual parent or children of the ImagingDevices.exe (Windows Contacts) process as seen being used with Bumblebee activity
