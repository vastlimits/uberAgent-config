[ThreatDetectionRule platform=Windows]
# Detects potential credential harvesting attempts through LSASS memory dumps using ProcDump.
# This rule identifies suspicious command-line patterns that combine memory dump flags (-ma, -mm, -mp) with LSASS-related process markers.
# LSASS (Local Security Authority Subsystem Service) contains sensitive authentication data including plaintext passwords, NTLM hashes, and Kerberos tickets in memory.
# Attackers commonly dump LSASS memory to extract credentials for lateral movement and privilege escalation.
# Author: Florian Roth (Nextron Systems)
RuleId = 5afee48e-67dd-4e03-a783-f74259dcf998
RuleName = Potential LSASS Process Dump Via Procdump
EventType = Process.Start
Tag = proc-start-potential-lsass-process-dump-via-procdump
RiskScore = 75
Annotation = {"mitre_attack": ["T1036", "T1003.001"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.CommandLine, " -ma ") or icontains(Process.CommandLine, " /ma ") or icontains(Process.CommandLine, " –ma ") or icontains(Process.CommandLine, " —ma ") or icontains(Process.CommandLine, " ―ma ") or icontains(Process.CommandLine, " -mm ") or icontains(Process.CommandLine, " /mm ") or icontains(Process.CommandLine, " –mm ") or icontains(Process.CommandLine, " —mm ") or icontains(Process.CommandLine, " ―mm ") or icontains(Process.CommandLine, " -mp ") or icontains(Process.CommandLine, " /mp ") or icontains(Process.CommandLine, " –mp ") or icontains(Process.CommandLine, " —mp ") or icontains(Process.CommandLine, " ―mp ")) and (icontains(Process.CommandLine, " ls") or icontains(Process.CommandLine, " keyiso") or icontains(Process.CommandLine, " samss"))


[ThreatDetectionRule platform=Windows]
# Detects potential abuse of WerFaultSecure.exe to dump Protected Process Light (PPL) processes like LSASS or to freeze security solutions (EDR/antivirus).
# This technique is used by tools such as EDR-Freeze and WSASS to bypass PPL protections and access sensitive information or disable security software.
# Distinct command line patterns help identify the specific tool:
# - WSASS usage typically shows: "WSASS.exe WerFaultSecure.exe [PID]" in ParentCommandLine
# - EDR-Freeze usage typically shows: "EDR-Freeze_[version].exe [PID] [timeout]" in ParentCommandLine
# Legitimate debugging operations using WerFaultSecure are rare in production environments and should be investigated.
# Author: Jason (https://github.com/0xbcf)
RuleId = 1f0b4cac-9c81-41f4-95d0-8475ff46b3e2
RuleName = PPL Tampering Via WerFaultSecure
EventType = Process.Start
Tag = proc-start-ppl-tampering-via-werfaultsecure
RiskScore = 75
Annotation = {"mitre_attack": ["T1685", "T1003.001"], "author": "Jason (https://github.com/0xbcf)"}
Query = (iendswith(Process.Path, "\\WerFaultSecure.exe") or Process.Name == "WerFaultSecure.exe") and icontains(Process.CommandLine, " /h ") and icontains(Process.CommandLine, " /pid ") and icontains(Process.CommandLine, " /tid ") and icontains(Process.CommandLine, " /encfile ") and icontains(Process.CommandLine, " /cancel ") and icontains(Process.CommandLine, " /type ") and icontains(Process.CommandLine, " 268310")


[ThreatDetectionRule platform=Windows]
# Detects the use of argument injection in the Commvault qlogin command - potential exploitation for CVE-2025-57791.
