Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\reg.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll", "reg.exe"]) and (icontains(Process.CommandLine, "add ") or icontains(Process.CommandLine, "New-ItemProperty ") or icontains(Process.CommandLine, "Set-ItemProperty ") or icontains(Process.CommandLine, "si ")) and icontains(Process.CommandLine, "\\DeviceGuard") and (icontains(Process.CommandLine, "EnableVirtualizationBasedSecurity") or icontains(Process.CommandLine, "HypervisorEnforcedCodeIntegrity"))


