Query = icontains(Process.CommandLine, "qlogin") and icontains(Process.CommandLine, " -cs ") and icontains(Process.CommandLine, " -localadmin") and icontains(Process.CommandLine, " -clp ") and icontains(Process.CommandLine, "\_localadmin\_\_")


