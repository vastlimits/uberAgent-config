") or iendswith(Process.Path, "\\sh.exe") or iendswith(Process.Path, "\\svchost.exe") or iendswith(Process.Path, "\\verclsid.exe") or iendswith(Process.Path, "\\wmic.exe") or iendswith(Process.Path, "\\workfolders.exe") or iendswith(Process.Path, "\\wscript.exe") or iendswith(Process.Path, "\\explorer.exe") and (icontains(Process.CommandLine, ".hta") or icontains(Process.CommandLine, ".vb") or icontains(Process.CommandLine, ".wsh") or icontains(Process.CommandLine, ".js") or icontains(Process.CommandLine, ".ps") or icontains(Process.CommandLine, ".scr") or icontains(Process.CommandLine, ".pif") or icontains(Process.CommandLine, ".bat") or icontains(Process.CommandLine, ".cmd")) or icontains(Process.Path, "\\AppData\\") or icontains(Process.Path, "\\Users\\Public\\") or icontains(Process.Path, "\\ProgramData\\") or icontains(Process.Path, "\\Windows\\Tasks\\") or icontains(Process.Path, "\\Windows\\Temp\\") or icontains(Process.Path, "\\Windows\\System32\\Tasks\\")) and not (iendswith(Process.Path, "\\AppData\\Local\\Microsoft\\Teams\\current\\Teams.exe") and iendswith(Process.CommandLine, "-Embedding") or icontains(Process.Path, "\\AppData\\Local\\Microsoft\\OneDrive\\") and iendswith(Process.Path, "\\FileCoAuth.exe") and iendswith(Process.CommandLine, "-Embedding"))
