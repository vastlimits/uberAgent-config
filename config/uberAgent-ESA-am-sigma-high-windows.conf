RuleName = Registry Export of Third-Party Credentials
EventType = Process.Start
Tag = proc-start-registry-export-of-third-party-credentials
RiskScore = 75
Annotation = {"mitre_attack": ["T1552.002"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\reg.exe") or Process.Name == "reg.exe") and (icontains(Process.CommandLine, "save") or icontains(Process.CommandLine, "export")) and (icontains(Process.CommandLine, "\\Software\\Aerofox\\Foxmail\\V3.1") or icontains(Process.CommandLine, "\\Software\\Aerofox\\FoxmailPreview") or icontains(Process.CommandLine, "\\Software\\DownloadManager\\Passwords") or icontains(Process.CommandLine, "\\Software\\FTPWare\\COREFTP\\Sites") or icontains(Process.CommandLine, "\\Software\\IncrediMail\\Identities") or icontains(Process.CommandLine, "\\Software\\Martin Prikryl\\WinSCP 2\\Sessions") or icontains(Process.CommandLine, "\\Software\\Mobatek\\MobaXterm") or icontains(Process.CommandLine, "\\Software\\OpenSSH\\Agent\\Keys") or icontains(Process.CommandLine, "\\Software\\OpenVPN-GUI\\configs") or icontains(Process.CommandLine, "\\Software\\ORL\\WinVNC3\\Password") or icontains(Process.CommandLine, "\\Software\\Qualcomm\\Eudora\\CommandLine") or icontains(Process.CommandLine, "\\Software\\RealVNC\\WinVNC4") or icontains(Process.CommandLine, "\\Software\\RimArts\\B2\\Settings") or icontains(Process.CommandLine, "\\Software\\SimonTatham\\PuTTY\\Sessions") or icontains(Process.CommandLine, "\\Software\\SimonTatham\\PuTTY\\SshHostKeys") or icontains(Process.CommandLine, "\\Software\\Sota\\FFFTP") or icontains(Process.CommandLine, "\\Software\\TightVNC\\Server") or icontains(Process.CommandLine, "\\Software\\WOW6432Node\\Radmin\\v3.0\\Server\\Parameters\\Radmin"))


[ThreatDetectionRule platform=Windows]
