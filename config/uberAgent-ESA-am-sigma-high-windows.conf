[ThreatDetectionRule platform=Windows]
# Detects potential persistence activity via outlook today page.
# An attacker can set a custom page to execute arbitrary code and link to it via the registry values "URL" and "UserDefinedUrl".
# Author: Tobias Michalski (Nextron Systems), David Bertho (@dbertho) & Eirik Sveen (@0xSV1), Storebrand
RuleId = 487bb375-12ef-41f6-baae-c6a1572b4dd1
RuleName = Potential Persistence Via Outlook Today Page
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-persistence-via-outlook-today-page
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "Tobias Michalski (Nextron Systems), David Bertho (@dbertho) & Eirik Sveen (@0xSV1), Storebrand"}
Query = icontains(Reg.TargetObject, "Software\\Microsoft\\Office\\") and icontains(Reg.TargetObject, "\\Outlook\\Today\\") and (iendswith(Reg.TargetObject, "\\Stamp") and Reg.Value.Data == "DWORD (0x00000001)" or iendswith(Reg.TargetObject, "\\URL") or iendswith(Reg.TargetObject, "\\UserDefinedUrl")) and not ((istartswith(Process.Path, "C:\\Program Files\\Common Files\\Microsoft Shared\\ClickToRun\\") or istartswith(Process.Path, "C:\\Program Files\\Common Files\\Microsoft Shared\\ClickToRun\\Updates\\")) and iendswith(Process.Path, "\\OfficeClickToRun.exe"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects execution of "rundll32" calling "advpack.dll" with potential obfuscated ordinal calls in order to leverage the "RegisterOCX" function
# Author: Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = a1473adb-5338-4a20-b4c3-126763e2d3d3
RuleName = Suspicious Advpack Call Via Rundll32.EXE
EventType = Process.Start
Tag = proc-start-suspicious-advpack-call-via-rundll32.exe
RiskScore = 75
Annotation = {"author": "Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\rundll32.exe") or Process.Name == "RUNDLL32.EXE" or icontains(Process.CommandLine, "rundll32")) and icontains(Process.CommandLine, "advpack") and (icontains(Process.CommandLine, "#+") and icontains(Process.CommandLine, "12") or icontains(Process.CommandLine, "#-"))


[ThreatDetectionRule platform=Windows]
# Detects potential DLL sideloading of DLLs that are known to be abused from suspicious locations
# Author: X__Junior (Nextron Systems)
RuleId = 799a5f48-0ac1-4e0f-9152-71d137d48c2a
RuleName = Abusable DLL Potential Sideloading From Suspicious Location
EventType = Image.Load
Tag = abusable-dll-potential-sideloading-from-suspicious-location
RiskScore = 75
Annotation = {"mitre_attack": ["T1059"], "author": "X__Junior (Nextron Systems)"}
Query = (iendswith(Image.Path, "\\coreclr.dll") or iendswith(Image.Path, "\\facesdk.dll") or iendswith(Image.Path, "\\HPCustPartUI.dll") or iendswith(Image.Path, "\\libcef.dll") or iendswith(Image.Path, "\\ZIPDLL.dll")) and (icontains(Image.Path, ":\\Perflogs\\") or icontains(Image.Path, ":\\Users\\Public\\") or icontains(Image.Path, "\\Temporary Internet") or icontains(Image.Path, "\\Windows\\Temp\\") or icontains(Image.Path, ":\\Users\\") and icontains(Image.Path, "\\Favorites\\") or icontains(Image.Path, ":\\Users\\") and icontains(Image.Path, "\\Favourites\\") or icontains(Image.Path, ":\\Users\\") and icontains(Image.Path, "\\Contacts\\") or icontains(Image.Path, ":\\Users\\") and icontains(Image.Path, "\\Pictures\\"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of Windows Input Method Editor (IME) keyboard layout feature, which allows an attacker to load a DLL into the process after sending the WM_INPUTLANGCHANGEREQUEST message.
# Before doing this, the client needs to register the DLL in a special registry key that is assumed to implement this keyboard layout. This registry key should store a value named "Ime File" with a DLL path.
# IMEs are essential for languages that have more characters than can be represented on a standard keyboard, such as Chinese, Japanese, and Korean.
# Author: X__Junior (Nextron Systems)
RuleId = b888e3f2-224d-4435-b00b-9dd66e9ea1f1
RuleName = Uncommon Extension In Keyboard Layout IME File Registry Value
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = uncommon-extension-in-keyboard-layout-ime-file-registry-value
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "X__Junior (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\Control\\Keyboard Layouts\\") and icontains(Reg.TargetObject, "Ime File") and not iendswith(Reg.Value.Data, ".ime")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects changes to the "HVCIDisallowedImages" registry value to potentially add a driver to the list, in order to prevent it from loading.
# Author: Nasreddine Bencherchali (Nextron Systems), Omar Khaled (@beacon_exe)
RuleId = 555155a2-03bf-4fe7-af74-d176b3fdbe16
RuleName = Driver Added To Disallowed Images In HVCI - Registry
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = driver-added-to-disallowed-images-in-hvci-registry
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems), Omar Khaled (@beacon_exe)"}
Query = icontains(Reg.TargetObject, "\\Control\\CI\\") and icontains(Reg.TargetObject, "\\HVCIDisallowedImages")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects suspicious child processes of the SQLServer process. This could indicate potential RCE or SQL Injection.
# Author: FPT.EagleEye Team, wagga
RuleId = 869b9ca7-9ea2-4a5a-8325-e80e62f75445
RuleName = Suspicious Child Process Of SQL Server
EventType = Process.Start
Tag = proc-start-suspicious-child-process-of-sql-server
RiskScore = 75
Annotation = {"mitre_attack": ["T1505.003", "T1190"], "author": "FPT.EagleEye Team, wagga"}
Query = iendswith(Parent.Path, "\\sqlservr.exe") and (iendswith(Process.Path, "\\bash.exe") or iendswith(Process.Path, "\\bitsadmin.exe") or iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\netstat.exe") or iendswith(Process.Path, "\\nltest.exe") or iendswith(Process.Path, "\\ping.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\regsvr32.exe") or iendswith(Process.Path, "\\rundll32.exe") or iendswith(Process.Path, "\\sh.exe") or iendswith(Process.Path, "\\systeminfo.exe") or iendswith(Process.Path, "\\tasklist.exe") or iendswith(Process.Path, "\\wsl.exe")) and not (istartswith(Parent.Path, "C:\\Program Files\\Microsoft SQL Server\\") and iendswith(Parent.Path, "DATEV\_DBENGINE\\MSSQL\\Binn\\sqlservr.exe") and Process.Path == "C:\\Windows\\System32\\cmd.exe" and istartswith(Process.CommandLine, "\"C:\\Windows\\system32\\cmd.exe\" "))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects usage of the Quarks PwDump tool via commandline arguments
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 0685b176-c816-4837-8e7b-1216f346636b
RuleName = HackTool - Quarks PwDump Execution
EventType = Process.Start
Tag = proc-start-hacktool-quarks-pwdump-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.002"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\QuarksPwDump.exe") or Process.CommandLine in [" -dhl", " --dump-hash-local", " -dhdc", " --dump-hash-domain-cached", " --dump-bitlocker", " -dhd ", " --dump-hash-domain ", "--ntds-file"]


[ThreatDetectionRule platform=Windows]
# Detects potential exploitation of the BearLPE exploit using Task Scheduler ".job" import arbitrary DACL write\par
# Author: Olaf Hartong
RuleId = 931b6802-d6a6-4267-9ffa-526f57f22aaf
RuleName = Potential BearLPE Exploitation
EventType = Process.Start
Tag = proc-start-potential-bearlpe-exploitation
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005"], "author": "Olaf Hartong"}
Query = (iendswith(Process.Path, "\\schtasks.exe") or Process.Name == "schtasks.exe") and icontains(Process.CommandLine, "/change") and icontains(Process.CommandLine, "/TN") and icontains(Process.CommandLine, "/RU") and icontains(Process.CommandLine, "/RP")


[ThreatDetectionRule platform=Windows]
# Detects suspicious Splwow64.exe process without any command line parameters
# Author: Florian Roth (Nextron Systems)
RuleId = 1f1a8509-2cbb-44f5-8751-8e1571518ce2
RuleName = Suspicious Splwow64 Without Params
EventType = Process.Start
Tag = proc-start-suspicious-splwow64-without-params
RiskScore = 75
Annotation = {"mitre_attack": ["T1202"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\splwow64.exe") and iendswith(Process.CommandLine, "splwow64.exe")


