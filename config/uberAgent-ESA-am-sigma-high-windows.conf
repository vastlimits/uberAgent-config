[ThreatDetectionRule platform=Windows]
# Detects the creation of a schtask that potentially executes a base64 encoded payload stored in the Windows Registry using PowerShell.
# Author: pH-T (Nextron Systems), @Kostastsale, TheDFIRReport, X__Junior (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = c4eeeeae-89f4-43a7-8b48-8d1bdfa66c78
RuleName = Scheduled Task Executing Encoded Payload from Registry
EventType = Process.Start
Tag = proc-start-scheduled-task-executing-encoded-payload-from-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005", "T1059.001"], "author": "pH-T (Nextron Systems), @Kostastsale, TheDFIRReport, X__Junior (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\schtasks.exe") or Process.Name == "schtasks.exe") and icontains(Process.CommandLine, "/Create") and (icontains(Process.CommandLine, "FromBase64String") or icontains(Process.CommandLine, "encodedcommand")) and (icontains(Process.CommandLine, "Get-ItemProperty") or icontains(Process.CommandLine, " gp ")) and (icontains(Process.CommandLine, "HKCU:") or icontains(Process.CommandLine, "HKLM:") or icontains(Process.CommandLine, "registry::") or icontains(Process.CommandLine, "HKEY\_"))


[ThreatDetectionRule platform=Windows]
# Detects the suspicious RUN keys created by software located in Download or temporary Outlook/Internet Explorer directories
# Author: Florian Roth (Nextron Systems), Swachchhanda Shrawan Poude (Nextron Systems)
RuleId = 9c5037d1-c568-49b3-88c7-9846a5bdc2be
RuleName = Suspicious Run Key from Download
EventType = Reg.Key.Create
EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = suspicious-run-key-from-download
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "Florian Roth (Nextron Systems), Swachchhanda Shrawan Poude (Nextron Systems)"}
Query = (icontains(Process.Path, "\\AppData\\Local\\Packages\\Microsoft.Outlook\_") or icontains(Process.Path, "\\AppData\\Local\\Microsoft\\Olk\\Attachments\\") or icontains(Process.Path, "\\Downloads\\") or icontains(Process.Path, "\\Temporary Internet Files\\Content.Outlook\\") or icontains(Process.Path, "\\Local Settings\\Temporary Internet Files\\")) and (icontains(Reg.TargetObject, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Run") or icontains(Reg.TargetObject, "\\Software\\WOW6432Node\\Microsoft\\Windows\\CurrentVersion\\Run") or icontains(Reg.TargetObject, "\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer\\Run"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects process creation activity related to Peach Sandstorm APT
# Author: X__Junior (Nextron Systems)
RuleId = 2e7bbd54-2f26-476e-b4a1-ba5f1a012614
RuleName = Peach Sandstorm APT Process Activity Indicators
EventType = Process.Start
Tag = proc-start-peach-sandstorm-apt-process-activity-indicators
RiskScore = 75
Annotation = {"author": "X__Junior (Nextron Systems)"}
Query = icontains(Process.CommandLine, "QP's*(58vaP!tF4")


[ThreatDetectionRule platform=Windows]
# Detects the creation of known offensive powershell scripts used for exploitation
# Author: Markus Neis, Nasreddine Bencherchali (Nextron Systems), Mustafa Kaan Demir, Georg Lauenstein
RuleId = f331aa1f-8c53-4fc3-b083-cc159bc971cb
