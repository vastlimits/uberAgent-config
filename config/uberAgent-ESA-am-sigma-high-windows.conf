[ThreatDetectionRule platform=Windows]
# Detects the execution of installed GuLoader malware on the host.
# GuLoader is initiating network connections via the rundll32.exe process that is spawned via a browser parent(injected) process.
# Author: @kostastsale
RuleId = 89e1490f-1a3e-452a-bbb8-b68a5f58072f
RuleName = Injected Browser Process Spawning Rundll32 - GuLoader Activity
EventType = Process.Start
Tag = proc-start-injected-browser-process-spawning-rundll32-guloader-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1055"], "author": "@kostastsale"}
Query = (iendswith(Parent.Path, "\\chrome.exe") or iendswith(Parent.Path, "\\firefox.exe") or iendswith(Parent.Path, "\\msedge.exe")) and iendswith(Process.Path, "\\rundll32.exe") and iendswith(Process.CommandLine, "\\rundll32.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects PowerShell writing startup shortcuts.
# This procedure was highlighted in Red Canary Intel Insights Oct. 2021, "We frequently observe adversaries using PowerShell to write malicious .lnk files into the startup directory to establish persistence.
# Accordingly, this detection opportunity is likely to identify persistence mechanisms in multiple threats.
# In the context of Yellow Cockatoo, this persistence mechanism eventually launches the command-line script that leads to the installation of a malicious DLL"
# Author: Christopher Peacock '@securepeacock', SCYTHE
RuleId = 92fa78e7-4d39-45f1-91a3-8b23f3f1088d
RuleName = Potential Startup Shortcut Persistence Via PowerShell.EXE
EventType = File.Create
Tag = potential-startup-shortcut-persistence-via-powershell.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "Christopher Peacock '@securepeacock', SCYTHE"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and icontains(File.Path, "\\start menu\\programs\\startup\\") and iendswith(File.Path, ".lnk")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of "reg.exe" commands with the "delete" flag on safe boot registry keys. Often used by attacker to prevent safeboot execution of security products
# Author: Nasreddine Bencherchali (Nextron Systems), Tim Shelton
RuleId = fc0e89b5-adb0-43c1-b749-c12a10ec37de
RuleName = SafeBoot Registry Key Deleted Via Reg.EXE
EventType = Process.Start
Tag = proc-start-safeboot-registry-key-deleted-via-reg.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Nasreddine Bencherchali (Nextron Systems), Tim Shelton"}
Query = (iendswith(Process.Path, "reg.exe") or Process.Name == "reg.exe") and icontains(Process.CommandLine, " delete ") and icontains(Process.CommandLine, "\\SYSTEM\\CurrentControlSet\\Control\\SafeBoot")


[ThreatDetectionRule platform=Windows]
# Detects potential path traversal attempt via cmd.exe. Could indicate possible command/argument confusion/hijacking
# Author: xknow @xknow_infosec, Tim Shelton
RuleId = 087790e3-3287-436c-bccf-cbd0184a7db1
RuleName = Potential CommandLine Path Traversal Via Cmd.EXE
EventType = Process.Start
Tag = proc-start-potential-commandline-path-traversal-via-cmd.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.003"], "author": "xknow @xknow_infosec, Tim Shelton"}
Query = (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Process.Path, "\\cmd.exe") or Process.Name == "cmd.exe") and (icontains(Parent.CommandLine, "/c") or icontains(Parent.CommandLine, "/k") or icontains(Parent.CommandLine, "/r") or icontains(Process.CommandLine, "/c") or icontains(Process.CommandLine, "/k") or icontains(Process.CommandLine, "/r")) and (Parent.CommandLine == "/../../" or icontains(Process.CommandLine, "/../../")) and not icontains(Process.CommandLine, "\\Tasktop\\keycloak\\bin\\/../../jre\\bin\\java")
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects potential process injection via Microsoft Remote Asssistance (Msra.exe) by looking at suspicious child processes spawned from the aforementioned process. It has been a target used by many threat actors and used for discovery and persistence tactics
# Author: Alexander McDonald
RuleId = 744a188b-0415-4792-896f-11ddb0588dbc
RuleName = Potential Process Injection Via Msra.EXE
EventType = Process.Start
Tag = proc-start-potential-process-injection-via-msra.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1055"], "author": "Alexander McDonald"}
Query = iendswith(Parent.Path, "\\msra.exe") and iendswith(Parent.CommandLine, "msra.exe") and (iendswith(Process.Path, "\\arp.exe") or iendswith(Process.Path, "\\cmd.exe") or iendswith(Process.Path, "\\net.exe") or iendswith(Process.Path, "\\netstat.exe") or iendswith(Process.Path, "\\nslookup.exe") or iendswith(Process.Path, "\\route.exe") or iendswith(Process.Path, "\\schtasks.exe") or iendswith(Process.Path, "\\whoami.exe"))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects findstring commands that include the keyword lsass, which indicates recon actviity for the LSASS process PID
# Author: Florian Roth (Nextron Systems)
RuleId = fe63010f-8823-4864-a96b-a7b4a0f7b929
RuleName = LSASS Process Reconnaissance Via Findstr.EXE
EventType = Process.Start
Tag = proc-start-lsass-process-reconnaissance-via-findstr.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1552.006"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\find.exe") or iendswith(Process.Path, "\\findstr.exe") or Process.Name in ["FIND.EXE", "FINDSTR.EXE"]) and icontains(Process.CommandLine, "lsass") or icontains(Process.CommandLine, " -i \"lsass") or icontains(Process.CommandLine, " /i \"lsass") or icontains(Process.CommandLine, " –i \"lsass") or icontains(Process.CommandLine, " —i \"lsass") or icontains(Process.CommandLine, " ―i \"lsass") or icontains(Process.CommandLine, " -i lsass.exe") or icontains(Process.CommandLine, " /i lsass.exe") or icontains(Process.CommandLine, " –i lsass.exe") or icontains(Process.CommandLine, " —i lsass.exe") or icontains(Process.CommandLine, " ―i lsass.exe") or icontains(Process.CommandLine, "findstr \"lsass") or icontains(Process.CommandLine, "findstr lsass") or icontains(Process.CommandLine, "findstr.exe \"lsass") or icontains(Process.CommandLine, "findstr.exe lsass")


[ThreatDetectionRule platform=Windows]
# Detects the execution of obfuscated PowerShell commands that attempt to install MSI packages via the Windows Installer COM object (`WindowsInstaller.Installer`).
# The technique involves manipulating strings to hide functionality, such as constructing class names using string insertion (e.g., 'indowsInstaller.Installer'.Insert(0,'W')) and correcting
# malformed URLs (e.g., converting 'htps://' to 'https://') at runtime. This behavior is commonly associated with malware loaders or droppers that aim to bypass static detection
# by hiding intent in runtime-generated strings and using legitimate tools for code execution. The use of `InstallProduct` and COM object creation, particularly combined with
# hidden window execution and suppressed UI, indicates an attempt to install software (likely malicious) without user interaction.
# Author: Meroujan Antonyan (vx3r)
RuleId = 7b6a7418-3afc-11f0-aff4-000d3abf478c
RuleName = Obfuscated PowerShell MSI Install via WindowsInstaller COM
EventType = Process.Start
Tag = proc-start-obfuscated-powershell-msi-install-via-windowsinstaller-com
RiskScore = 75
Annotation = {"mitre_attack": ["T1027.010", "T1218.007", "T1059.001"], "author": "Meroujan Antonyan (vx3r)"}
Query = (iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell\_ISE.EXE", "PowerShell.EXE", "pwsh.dll"]) and icontains(Process.CommandLine, "-ComObject") and icontains(Process.CommandLine, "InstallProduct(") and icontains(Process.CommandLine, ".Insert(") and icontains(Process.CommandLine, "UILevel")


[ThreatDetectionRule platform=Windows]
# Detects execution of devcon.exe with commands that disable the VMware Virtual Machine Communication Interface (VMCI) device.
# This can be legitimate during VMware Tools troubleshooting or driver conflicts, but may also indicate malware attempting to hijack communication with the hardware via the VMCI device.
# This has been used to facilitate VMware ESXi vulnerability exploits to escape VMs and execute code on the ESXi host.
# Author: Matt Anderson, Dray Agha, Anna Pham (Huntress)
RuleId = 85f520e7-6f5e-43ca-874c-222e5bf9c0de
RuleName = Devcon Execution Disabling VMware VMCI Device
EventType = Process.Start
Tag = proc-start-devcon-execution-disabling-vmware-vmci-device
RiskScore = 75
Annotation = {"mitre_attack": ["T1543.003", "T1685"], "author": "Matt Anderson, Dray Agha, Anna Pham (Huntress)"}
Query = (iendswith(Process.Path, "\\devcon.exe") or Process.Name == "DevCon.exe") and icontains(Process.CommandLine, " disable ") and (icontains(Process.CommandLine, "15AD&DEV\_0740") or icontains(Process.CommandLine, "VMWVMCIHOSTDEV"))


[ThreatDetectionRule platform=Windows]
