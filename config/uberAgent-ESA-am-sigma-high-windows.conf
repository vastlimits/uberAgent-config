[ThreatDetectionRule platform=Windows]
# Detects execution of LiveKD with the "-m" flag to potentially dump the kernel memory
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = c7746f1c-47d3-43d6-8c45-cd1e54b6b0a2
RuleName = Kernel Memory Dump Via LiveKD
EventType = Process.Start
Tag = proc-start-kernel-memory-dump-via-livekd
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\livekd.exe") or iendswith(Process.Path, "\\livekd64.exe") or Process.Name == "livekd.exe") and (icontains(Process.CommandLine, " -m") or icontains(Process.CommandLine, " /m") or icontains(Process.CommandLine, " –m") or icontains(Process.CommandLine, " —m") or icontains(Process.CommandLine, " ―m"))


[ThreatDetectionRule platform=Windows]
# Detects the load of RstrtMgr DLL (Restart Manager) by a suspicious process.
# This library has been used during ransomware campaigns to kill processes that would prevent file encryption by locking them (e.g. Conti ransomware, Cactus ransomware). It has also recently been seen used by the BiBi wiper for Windows.
# It could also be used for anti-analysis purposes by shut downing specific processes.
# Author: Luc Génaux
RuleId = b48492dc-c5ef-4572-8dff-32bc241c15c8
RuleName = Load Of RstrtMgr.DLL By A Suspicious Process
EventType = Image.Load
Tag = load-of-rstrtmgr.dll-by-a-suspicious-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1486", "T1685"], "author": "Luc G\u00e9naux"}
Query = (iendswith(Image.Path, "\\RstrtMgr.dll") or Process.Name == "RstrtMgr.dll") and (icontains(Process.Path, ":\\Perflogs\\") or icontains(Process.Path, ":\\Users\\Public\\") or icontains(Process.Path, "\\Temporary Internet") or icontains(Process.Path, ":\\Users\\") and icontains(Process.Path, "\\Favorites\\") or icontains(Process.Path, ":\\Users\\") and icontains(Process.Path, "\\Favourites\\") or icontains(Process.Path, ":\\Users\\") and icontains(Process.Path, "\\Contacts\\"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the clearing or configuration tampering of EventLog using utilities such as "wevtutil", "powershell" and "wmic".
# This technique were seen used by threat actors and ransomware strains in order to evade defenses.
# Author: Ecco, Daniil Yugoslavskiy, oscd.community, D3F7A5105, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = cc36992a-4671-4f21-a91d-6c2b72a2edf5
RuleName = Suspicious Eventlog Clearing or Configuration Change Activity
EventType = Process.Start
Tag = proc-start-suspicious-eventlog-clearing-or-configuration-change-activity
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.005", "T1685.001"], "author": "Ecco, Daniil Yugoslavskiy, oscd.community, D3F7A5105, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\wevtutil.exe") or Process.Name == "wevtutil.exe") and (icontains(Process.CommandLine, "clear-log ") or icontains(Process.CommandLine, " cl ") or icontains(Process.CommandLine, "set-log ") or icontains(Process.CommandLine, " sl ") or icontains(Process.CommandLine, "lfn:")) or (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\pwsh.exe")) and (icontains(Process.CommandLine, "Clear-EventLog ") or icontains(Process.CommandLine, "Remove-EventLog ") or icontains(Process.CommandLine, "Limit-EventLog ") or icontains(Process.CommandLine, "Clear-WinEvent ") or icontains(Process.CommandLine, "Eventing.Reader.EventLogSession") and icontains(Process.CommandLine, "ClearLog") or icontains(Process.CommandLine, "Diagnostics.EventLog") and icontains(Process.CommandLine, "Clear")) or (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\wmic.exe")) and icontains(Process.CommandLine, "ClearEventLog") and not ((Parent.Path in ["C:\\Windows\\SysWOW64\\msiexec.exe", "C:\\Windows\\System32\\msiexec.exe"]) and icontains(Process.CommandLine, " sl "))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects execution of commands that leverage the "mshtml.dll" RunHTMLApplication export to run arbitrary code via different protocol handlers (vbscript, javascript, file, http...)
# Author: Nasreddine Bencherchali (Nextron Systems),  Florian Roth (Nextron Systems), Josh Nickels, frack113, Zaw Min Htun (ZETA)
RuleId = 4782eb5a-a513-4523-a0ac-f3082b26ac5c
RuleName = Mshtml.DLL RunHTMLApplication Suspicious Usage
EventType = Process.Start
Tag = proc-start-mshtml.dll-runhtmlapplication-suspicious-usage
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems),  Florian Roth (Nextron Systems), Josh Nickels, frack113, Zaw Min Htun (ZETA)"}
Query = icontains(Process.CommandLine, "\\..\\") and icontains(Process.CommandLine, "mshtml") and (icontains(Process.CommandLine, "#135") or icontains(Process.CommandLine, "RunHTMLApplication"))


[ThreatDetectionRule platform=Windows]
# Once executed, colorcpl.exe will copy the arbitrary file to c:\windows\system32\spool\drivers\color\
# Author: frack113
RuleId = e15b518d-b4ce-4410-a9cd-501f23ce4a18
RuleName = Suspicious Creation with Colorcpl
EventType = File.Create
Tag = suspicious-creation-with-colorcpl
RiskScore = 75
Annotation = {"mitre_attack": ["T1564"], "author": "frack113"}
Query = iendswith(Process.Path, "\\colorcpl.exe") and not (iendswith(File.Path, ".icm") or iendswith(File.Path, ".gmmp") or iendswith(File.Path, ".cdmp") or iendswith(File.Path, ".camp"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects an unexpected process spawning from dns.exe which may indicate activity related to remote code execution or other forms of exploitation as seen in CVE-2020-1350 (SigRed)
# Author: Tim Rauch, Elastic (idea)
RuleId = a4e3d776-f12e-42c2-8510-9e6ed1f43ec3
RuleName = Unusual Child Process of dns.exe
EventType = Process.Start
Tag = proc-start-unusual-child-process-of-dns.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1133"], "author": "Tim Rauch, Elastic (idea)"}
Query = iendswith(Parent.Path, "\\dns.exe") and not iendswith(Process.Path, "\\conhost.exe")
GenericProperty1 = Parent.Path


