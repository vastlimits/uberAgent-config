RuleName = PUA - Ngrok Execution
EventType = Process.Start
Tag = proc-start-pua-ngrok-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1572"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, " tcp 139") or icontains(Process.CommandLine, " tcp 445") or icontains(Process.CommandLine, " tcp 3389") or icontains(Process.CommandLine, " tcp 5985") or icontains(Process.CommandLine, " tcp 5986") or icontains(Process.CommandLine, " start ") and icontains(Process.CommandLine, "--all") and icontains(Process.CommandLine, "--config") and icontains(Process.CommandLine, ".yml") or iendswith(Process.Path, "ngrok.exe") and (icontains(Process.CommandLine, " tcp ") or icontains(Process.CommandLine, " http ") or icontains(Process.CommandLine, " authtoken ")) or icontains(Process.CommandLine, ".exe authtoken ") or icontains(Process.CommandLine, ".exe start --all")


