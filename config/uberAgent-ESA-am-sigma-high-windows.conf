# Author: @Kostastsale
RuleId = 023c654f-8f16-44d9-bb2b-00ff36a62af9
RuleName = Python Function Execution Security Warning Disabled In Excel
EventType = Process.Start
Tag = proc-start-python-function-execution-security-warning-disabled-in-excel
