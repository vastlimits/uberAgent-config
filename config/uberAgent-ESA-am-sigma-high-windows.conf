[ThreatDetectionRule platform=Windows]
# Detect modification of the User Shell Folders registry values for Startup or Common Startup which could indicate persistence attempts.
# Attackers may modify User Shell Folders registry keys to point to malicious executables or scripts that will be executed during startup.
# This technique is often used to maintain persistence on a compromised system by ensuring that the malicious payload is executed automatically.
# Author: frack113, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 9c226817-8dc9-46c2-a58d-66655aafd7dc
RuleName = Modify User Shell Folders Startup Value
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = modify-user-shell-folders-startup-value
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "frack113, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (icontains(Reg.TargetObject, "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\User Shell Folders") or icontains(Reg.TargetObject, "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Shell Folders")) and (iendswith(Reg.TargetObject, "\\Common Startup") or iendswith(Reg.TargetObject, "\\Startup")) and not (isnull(Reg.Value.Data) or icontains(Reg.Value.Data, "C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\Startup") or icontains(Reg.Value.Data, "\%ProgramData\%\\Microsoft\\Windows\\Start Menu\\Programs\\Startup") or icontains(Reg.Value.Data, "\%USERPROFILE\%\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Startup") or icontains(Reg.Value.Data, "\%\%USERPROFILE\%\%\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Startup") or icontains(Reg.Value.Data, "C:\\Users\\") and icontains(Reg.Value.Data, "\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\\Startup"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
