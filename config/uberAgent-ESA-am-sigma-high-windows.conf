[ThreatDetectionRule platform=Windows]
# Detects suspicious FileFix execution patterns where users are tricked into running malicious commands through browser file upload dialog manipulation.
# This attack typically begins when users visit malicious websites impersonating legitimate services or news platforms,
# which may display fake CAPTCHA challenges or direct instructions to open file explorer and paste clipboard content.
# The clipboard content usually contains commands that download and execute malware, such as information stealing tools.
# Author: 0xFustang, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = b5b29e4e-31fa-4fdf-b058-296e7a1aa0c2
RuleName = Suspicious FileFix Execution Pattern
EventType = Process.Start
Tag = proc-start-suspicious-filefix-execution-pattern
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.004"], "author": "0xFustang, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\brave.exe") or iendswith(Parent.Path, "\\chrome.exe") or iendswith(Parent.Path, "\\firefox.exe") or iendswith(Parent.Path, "\\msedge.exe")) and icontains(Process.CommandLine, "#") and (icontains(Process.CommandLine, "\%comspec\%") or icontains(Process.CommandLine, "bitsadmin") or icontains(Process.CommandLine, "certutil") or icontains(Process.CommandLine, "cmd") or icontains(Process.CommandLine, "cscript") or icontains(Process.CommandLine, "curl") or icontains(Process.CommandLine, "finger") or icontains(Process.CommandLine, "mshta") or icontains(Process.CommandLine, "powershell") or icontains(Process.CommandLine, "pwsh") or icontains(Process.CommandLine, "regsvr32") or icontains(Process.CommandLine, "rundll32") or icontains(Process.CommandLine, "schtasks") or icontains(Process.CommandLine, "wget") or icontains(Process.CommandLine, "wscript") or icontains(Process.CommandLine, "account") or icontains(Process.CommandLine, "anti-bot") or icontains(Process.CommandLine, "botcheck") or icontains(Process.CommandLine, "captcha") or icontains(Process.CommandLine, "challenge") or icontains(Process.CommandLine, "confirmation") or icontains(Process.CommandLine, "fraud") or icontains(Process.CommandLine, "human") or icontains(Process.CommandLine, "identification") or icontains(Process.CommandLine, "identificator") or icontains(Process.CommandLine, "identity") or icontains(Process.CommandLine, "robot") or icontains(Process.CommandLine, "validation") or icontains(Process.CommandLine, "verification") or icontains(Process.CommandLine, "verify"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of the LOLBIN PrintBrm.exe, which can be used to create or extract ZIP files. PrintBrm.exe should not be run on a normal workstation.
# Author: frack113
RuleId = cafeeba3-01da-4ab4-b6c4-a31b1d9730c7
RuleName = PrintBrm ZIP Creation of Extraction
EventType = Process.Start
Tag = proc-start-printbrm-zip-creation-of-extraction
RiskScore = 75
Annotation = {"mitre_attack": ["T1105", "T1564.004"], "author": "frack113"}
Query = iendswith(Process.Path, "\\PrintBrm.exe") and icontains(Process.CommandLine, " -f") and icontains(Process.CommandLine, ".zip")


[ThreatDetectionRule platform=Windows]
# Detects Formbook like process executions that inject code into a set of files in the System32 folder, which executes a special command command line to delete the dropper from the AppData Temp folder. We avoid false positives by excluding all parent process with command line parameters.
# Author: Florian Roth (Nextron Systems), oscd.community, Jonhnathan Ribeiro
RuleId = 032f5fb3-d959-41a5-9263-4173c802dc2b
RuleName = Formbook Process Creation
EventType = Process.Start
Tag = proc-start-formbook-process-creation
RiskScore = 75
Annotation = {"mitre_attack": ["T1587.001"], "author": "Florian Roth (Nextron Systems), oscd.community, Jonhnathan Ribeiro"}
Query = (istartswith(Parent.CommandLine, "C:\\Windows\\System32\\") or istartswith(Parent.CommandLine, "C:\\Windows\\SysWOW64\\")) and iendswith(Parent.CommandLine, ".exe") and (icontains(Process.CommandLine, "/c") and icontains(Process.CommandLine, "del") and icontains(Process.CommandLine, "C:\\Users\\") and icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\") or icontains(Process.CommandLine, "/c") and icontains(Process.CommandLine, "del") and icontains(Process.CommandLine, "C:\\Users\\") and icontains(Process.CommandLine, "\\Desktop\\") or icontains(Process.CommandLine, "/C") and icontains(Process.CommandLine, "type nul >") and icontains(Process.CommandLine, "C:\\Users\\") and icontains(Process.CommandLine, "\\Desktop\\")) and iendswith(Process.CommandLine, ".exe")
GenericProperty1 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects DNS queries for "anonfiles.com", which is an anonymous file upload platform often used for malicious purposes
# Author: pH-T (Nextron Systems)
RuleId = 065cceea-77ec-4030-9052-fc0affea7110
RuleName = DNS Query for Anonfiles.com Domain - Sysmon
EventType = Dns.Query
Tag = dns-query-for-anonfiles.com-domain-sysmon
