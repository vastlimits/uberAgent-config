# Detects the modification of Outlook setting "LoadMacroProviderOnBoot" which if enabled allows the automatic loading of any configured VBA project/module
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 396ae3eb-4174-4b9b-880e-dc0364d78a19
RuleName = Potential Persistence Via Outlook LoadMacroProviderOnBoot Setting
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = potential-persistence-via-outlook-loadmacroprovideronboot-setting
RiskScore = 75
Annotation = {"mitre_attack": ["T1137", "T1008", "T1546"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\Outlook\\LoadMacroProviderOnBoot") and icontains(Reg.Value.Data, "0x00000001")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detect DLL deletions from Spooler Service driver folder. This might be a potential exploitation attempt of CVE-2021-1675
# Author: Bhabesh Raj
RuleId = 5b2bbc47-dead-4ef7-8908-0cf73fcbecbf
RuleName = Potential PrintNightmare Exploitation Attempt
EventType = File.Delete
Tag = potential-printnightmare-exploitation-attempt
RiskScore = 75
Annotation = {"mitre_attack": ["T1574"], "author": "Bhabesh Raj"}
Query = iendswith(Process.Path, "\\spoolsv.exe") and icontains(File.Path, "C:\\Windows\\System32\\spool\\drivers\\x64\\3\\")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects email exfiltration via powershell cmdlets
# Author: Nasreddine Bencherchali (Nextron Systems),  Azure-Sentinel (idea)
RuleId = 312d0384-401c-4b8b-abdf-685ffba9a332
RuleName = Email Exifiltration Via Powershell
EventType = Process.Start
Tag = proc-start-email-exifiltration-via-powershell
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems),  Azure-Sentinel (idea)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and icontains(Process.CommandLine, "Add-PSSnapin") and icontains(Process.CommandLine, "Get-Recipient") and icontains(Process.CommandLine, "-ExpandProperty") and icontains(Process.CommandLine, "EmailAddresses") and icontains(Process.CommandLine, "SmtpAddress") and icontains(Process.CommandLine, "-hidetableheaders")


[ThreatDetectionRule platform=Windows]
# Detects when a user downloads a file from an IP based URL using CertOC.exe
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = b86f6dea-0b2f-41f5-bdcc-a057bd19cd6a
RuleName = File Download From IP Based URL Via CertOC.EXE
EventType = Process.Start
Tag = proc-start-file-download-from-ip-based-url-via-certoc.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1105"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\certoc.exe") or Process.Name == "CertOC.exe") and Process.CommandLine regex "://[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}" and icontains(Process.CommandLine, "-GetCACAPS")


[ThreatDetectionRule platform=Windows]
# Detects execution of "reg.exe" commands with the "delete" flag on services registry key. Often used by attacker to remove AV software services
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 05b2aa93-1210-42c8-8d9a-2fcc13b284f5
RuleName = Service Registry Key Deleted Via Reg.EXE
EventType = Process.Start
Tag = proc-start-service-registry-key-deleted-via-reg.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "reg.exe") or Process.Name == "reg.exe") and icontains(Process.CommandLine, " delete ") and icontains(Process.CommandLine, "\\SYSTEM\\CurrentControlSet\\services\\")


[ThreatDetectionRule platform=Windows]
# Detects the creation of a file with the ".pdf" extension by the "RegEdit.exe" process.
# This indicates that a user is trying to print/save a registry key as a PDF in order to potentially extract sensitive information and bypass defenses.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 145095eb-e273-443b-83d0-f9b519b7867b
RuleName = PDF File Created By RegEdit.EXE
EventType = File.Create
Tag = pdf-file-created-by-regedit.exe
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\regedit.exe") and iendswith(File.Path, ".pdf")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects shell32.dll executing a DLL in a suspicious directory
# Author: Christian Burkard (Nextron Systems)
RuleId = 32b96012-7892-429e-b26c-ac2bf46066ff
RuleName = Shell32 DLL Execution in Suspicious Directory
EventType = Process.Start
Tag = proc-start-shell32-dll-execution-in-suspicious-directory
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.011"], "author": "Christian Burkard (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\rundll32.exe") or Process.Name == "RUNDLL32.EXE") and icontains(Process.CommandLine, "shell32.dll") and icontains(Process.CommandLine, "Control\_RunDLL") and (icontains(Process.CommandLine, "\%AppData\%") or icontains(Process.CommandLine, "\%LocalAppData\%") or icontains(Process.CommandLine, "\%Temp\%") or icontains(Process.CommandLine, "\%tmp\%") or icontains(Process.CommandLine, "\\AppData\\") or icontains(Process.CommandLine, "\\Temp\\") or icontains(Process.CommandLine, "\\Users\\Public\\"))


[ThreatDetectionRule platform=Windows]
# Detects a whoami.exe executed with the /priv command line flag instructing the tool to show all current user privileges. This is often used after a privilege escalation attempt.
# Author: Florian Roth (Nextron Systems)
RuleId = 97a80ec7-0e2f-4d05-9ef4-65760e634f6b
RuleName = Security Privileges Enumeration Via Whoami.EXE
EventType = Process.Start
Tag = proc-start-security-privileges-enumeration-via-whoami.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1033"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\whoami.exe") or Process.Name == "whoami.exe") and (icontains(Process.CommandLine, " /priv") or icontains(Process.CommandLine, " -priv"))


[ThreatDetectionRule platform=Windows]
# Identifies use of Fodhelper.exe to bypass User Account Control. Adversaries use this technique to execute privileged processes.
# Author: E.M. Anhaus (originally from Atomic Blue Detections, Tony Lambert), oscd.community
RuleId = 7f741dcf-fc22-4759-87b4-9ae8376676a2
RuleName = Bypass UAC via Fodhelper.exe
EventType = Process.Start
Tag = proc-start-bypass-uac-via-fodhelper.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1548.002"], "author": "E.M. Anhaus (originally from Atomic Blue Detections, Tony Lambert), oscd.community"}
Query = iendswith(Parent.Path, "\\fodhelper.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects a specific process creation patterns as seen used by UNC2452 and provided by Microsoft as Microsoft Defender ATP queries
# Author: Florian Roth (Nextron Systems)
RuleId = 9be34ad0-b6a7-4fbd-91cf-fc7ec1047f5f
RuleName = UNC2452 Process Creation Patterns
EventType = Process.Start
Tag = proc-start-unc2452-process-creation-patterns
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "7z.exe a -v500m -mx9 -r0 -p") or icontains(Process.CommandLine, "7z.exe a -mx9 -r0 -p")) and icontains(Process.CommandLine, ".zip") and icontains(Process.CommandLine, ".txt") or (icontains(Process.CommandLine, "7z.exe a -v500m -mx9 -r0 -p") or icontains(Process.CommandLine, "7z.exe a -mx9 -r0 -p")) and icontains(Process.CommandLine, ".zip") and icontains(Process.CommandLine, ".log") or icontains(Parent.CommandLine, "wscript.exe") and icontains(Parent.CommandLine, ".vbs") and icontains(Process.CommandLine, "rundll32.exe") and icontains(Process.CommandLine, "C:\\Windows") and icontains(Process.CommandLine, ".dll,Tk\_") or iendswith(Parent.Path, "\\rundll32.exe") and icontains(Parent.CommandLine, "C:\\Windows") and icontains(Parent.CommandLine, ".dll") and icontains(Process.CommandLine, "cmd.exe /C ") or iendswith(Parent.Path, "\\rundll32.exe") and iendswith(Process.Path, "\\dllhost.exe") and Process.CommandLine == ""
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects usage of the "Set-Service" powershell cmdlet to configure a new SecurityDescriptor that allows a service to be hidden from other utilities such as "sc.exe", "Get-Service"...etc. (Works only in powershell 7)
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 514e4c3a-c77d-4cde-a00f-046425e2301e
RuleName = Abuse of Service Permissions to Hide Services Via Set-Service
EventType = Process.Start
Tag = proc-start-abuse-of-service-permissions-to-hide-services-via-set-service
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.011"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\pwsh.exe") or Process.Name == "pwsh.dll") and icontains(Process.CommandLine, "Set-Service ") and icontains(Process.CommandLine, "DCLCWPDTSD") and (icontains(Process.CommandLine, "-SecurityDescriptorSddl ") or icontains(Process.CommandLine, "-sd "))


[ThreatDetectionRule platform=Windows]
# Detects RunDLL32.exe spawning explorer.exe as child, which is very uncommon, often observes Gamarue spawning the explorer.exe process in an unusual way
# Author: elhoim, CD_ROM_
RuleId = caa06de8-fdef-4c91-826a-7f9e163eef4b
RuleName = RunDLL32 Spawning Explorer
EventType = Process.Start
Tag = proc-start-rundll32-spawning-explorer
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.011"], "author": "elhoim, CD_ROM_"}
Query = iendswith(Parent.Path, "\\rundll32.exe") and iendswith(Process.Path, "\\explorer.exe") and not icontains(Parent.CommandLine, "\\shell32.dll,Control\_RunDLL")
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Threat actors can use auditpol binary to change audit policy configuration to impair detection capability.
# This can be carried out by selectively disabling/removing certain audit policies as well as restoring a custom policy owned by the threat actor.
# Author: Janantha Marasinghe (https://github.com/blueteam0ps)
RuleId = 0a13e132-651d-11eb-ae93-0242ac130002
RuleName = Audit Policy Tampering Via Auditpol
EventType = Process.Start
Tag = proc-start-audit-policy-tampering-via-auditpol
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001"], "author": "Janantha Marasinghe (https://github.com/blueteam0ps)"}
Query = (iendswith(Process.Path, "\\auditpol.exe") or Process.Name == "AUDITPOL.EXE") and (icontains(Process.CommandLine, "disable") or icontains(Process.CommandLine, "clear") or icontains(Process.CommandLine, "remove") or icontains(Process.CommandLine, "restore"))


[ThreatDetectionRule platform=Windows]
# Detects Kapeka backdoor process execution pattern, where the dropper launch the backdoor binary by calling rundll32 and passing the backdoor's first export ordinal (#1) with a "-d" argument.
# Author: Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)
RuleId = e98f741c-6a5b-4c83-bc2a-1f4e58d07b12
RuleName = Kapeka Backdoor Execution Via RunDLL32.EXE
EventType = Process.Start
Tag = proc-start-kapeka-backdoor-execution-via-rundll32.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.011"], "author": "Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\rundll32.exe") or Process.Name == "RUNDLL32.EXE") and (icontains(Process.CommandLine, ":\\ProgramData") or icontains(Process.CommandLine, "\\AppData\\Local")) and (icontains(Process.CommandLine, ".wll") and icontains(Process.CommandLine, "#1") and icontains(Process.CommandLine, " -d") or icontains(Process.CommandLine, ".wll") and iendswith(Process.CommandLine, "#1"))


[ThreatDetectionRule platform=Windows]
# Detects suspicious process patterns used in NTDS.DIT exfiltration
# Author: Florian Roth (Nextron Systems)
RuleId = 8bc64091-6875-4881-aaf9-7bd25b5dda08
RuleName = Suspicious Process Patterns NTDS.DIT Exfil
EventType = Process.Start
Tag = proc-start-suspicious-process-patterns-ntds.dit-exfil
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.003"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(Process.Path, "\\NTDSDump.exe") or iendswith(Process.Path, "\\NTDSDumpEx.exe") or icontains(Process.CommandLine, "ntds.dit") and icontains(Process.CommandLine, "system.hiv") or icontains(Process.CommandLine, "NTDSgrab.ps1") or icontains(Process.CommandLine, "ac i ntds") and icontains(Process.CommandLine, "create full") or icontains(Process.CommandLine, "/c copy ") and icontains(Process.CommandLine, "\\windows\\ntds\\ntds.dit") or icontains(Process.CommandLine, "activate instance ntds") and icontains(Process.CommandLine, "create full") or icontains(Process.CommandLine, "powershell") and icontains(Process.CommandLine, "ntds.dit") or icontains(Process.CommandLine, "ntds.dit") and (icontains(Parent.Path, "\\apache") or icontains(Parent.Path, "\\tomcat") or icontains(Parent.Path, "\\AppData\\") or icontains(Parent.Path, "\\Temp\\") or icontains(Parent.Path, "\\Public\\") or icontains(Parent.Path, "\\PerfLogs\\") or icontains(Process.Path, "\\apache") or icontains(Process.Path, "\\tomcat") or icontains(Process.Path, "\\AppData\\") or icontains(Process.Path, "\\Temp\\") or icontains(Process.Path, "\\Public\\") or icontains(Process.Path, "\\PerfLogs\\"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects instances of svchost.exe running with an unusual or uncommon command line parameter by excluding known legitimate or common patterns.
# This could point at a file masquerading as svchost, a process injection, or hollowing of a legitimate svchost instance.
# Author: Liran Ravich
RuleId = f17211f1-1f24-4d0c-829f-31e28dc93cdd
RuleName = Uncommon Svchost Command Line Parameter
EventType = Process.Start
Tag = proc-start-uncommon-svchost-command-line-parameter
RiskScore = 75
Annotation = {"mitre_attack": ["T1036.005", "T1055", "T1055.012"], "author": "Liran Ravich"}
Query = iendswith(Process.Path, "\\svchost.exe") and not (Process.CommandLine regex "-k\\s\\w{1,64}(?:\\s?(?:-p|-s))?" or Process.CommandLine == "" or isnull(Process.CommandLine)) and not (iendswith(Parent.Path, "\\MsMpEng.exe") and icontains(Process.CommandLine, "svchost.exe") or iendswith(Parent.Path, "\\MRT.exe") and Process.CommandLine == "svchost.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects VB DLL's loaded by an office application. Which could indicate the presence of VBA Macros.
# Author: Antonlovesdnb
RuleId = e6ce8457-68b1-485b-9bdd-3c2b5d679aa9
RuleName = VBA DLL Loaded Via Office Application
EventType = Image.Load
Tag = vba-dll-loaded-via-office-application
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.002"], "author": "Antonlovesdnb"}
Query = (iendswith(Process.Path, "\\excel.exe") or iendswith(Process.Path, "\\mspub.exe") or iendswith(Process.Path, "\\onenote.exe") or iendswith(Process.Path, "\\onenoteim.exe") or iendswith(Process.Path, "\\outlook.exe") or iendswith(Process.Path, "\\powerpnt.exe") or iendswith(Process.Path, "\\winword.exe")) and (iendswith(Image.Path, "\\VBE7.DLL") or iendswith(Image.Path, "\\VBEUI.DLL") or iendswith(Image.Path, "\\VBE7INTL.DLL"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the creation of a file with the name "code_tunnel.json" which indicate execution and usage of VsCode tunneling utility by an "Image" or "Process" other than VsCode.
# Author: Nasreddine Bencherchali (Nextron Systems)
