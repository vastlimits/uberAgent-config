[ThreatDetectionRule platform=Windows]
# Detects PowerShell commands that decrypt an ".LNK" "file to drop the next stage of the malware.
# Author: X__Junior (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = 434c08ba-8406-4d15-8b24-782cb071a691
RuleName = PowerShell Execution With Potential Decryption Capabilities
EventType = Process.Start
Tag = proc-start-powershell-execution-with-potential-decryption-capabilities
RiskScore = 75
Annotation = {"author": "X__Junior (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe")) and (Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and (icontains(Process.CommandLine, "Get-ChildItem ") or icontains(Process.CommandLine, "dir ") or icontains(Process.CommandLine, "gci ") or icontains(Process.CommandLine, "ls ")) and (icontains(Process.CommandLine, "Get-Content ") or icontains(Process.CommandLine, "gc ") or icontains(Process.CommandLine, "cat ") or icontains(Process.CommandLine, "type ") or icontains(Process.CommandLine, "ReadAllBytes")) and (icontains(Process.CommandLine, " ^| ") and icontains(Process.CommandLine, "*.lnk") and icontains(Process.CommandLine, "-Recurse") and icontains(Process.CommandLine, "-Skip ") or icontains(Process.CommandLine, " -ExpandProperty ") and icontains(Process.CommandLine, "*.lnk") and icontains(Process.CommandLine, "WriteAllBytes") and icontains(Process.CommandLine, " .length "))


[ThreatDetectionRule platform=Windows]
