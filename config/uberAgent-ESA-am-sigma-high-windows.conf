[ThreatDetectionRule platform=Windows]
# Detects the execution of "reg.exe" for enabling/disabling the RDP service on the host by tampering with the 'CurrentControlSet\Control\Terminal Server' values
# Author: pH-T (Nextron Systems), @Kostastsale, TheDFIRReport
RuleId = 0d5675be-bc88-4172-86d3-1e96a4476536
RuleName = Potential Tampering With RDP Related Registry Keys Via Reg.EXE
EventType = Process.Start
Tag = proc-start-potential-tampering-with-rdp-related-registry-keys-via-reg.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1021.001", "T1112"], "author": "pH-T (Nextron Systems), @Kostastsale, TheDFIRReport"}
Query = (iendswith(Process.Path, "\\reg.exe") or Process.Name == "reg.exe") and icontains(Process.CommandLine, " add ") and icontains(Process.CommandLine, "\\CurrentControlSet\\Control\\Terminal Server") and icontains(Process.CommandLine, "REG\_DWORD") and icontains(Process.CommandLine, " /f") and (icontains(Process.CommandLine, "Licensing Core") and icontains(Process.CommandLine, "EnableConcurrentSessions") or icontains(Process.CommandLine, "AllowTSConnections") or icontains(Process.CommandLine, "fDenyTSConnections") or icontains(Process.CommandLine, "fEnableWinStation") or icontains(Process.CommandLine, "fSingleSessionPerUser") or icontains(Process.CommandLine, "IdleWinStationPoolCount") or icontains(Process.CommandLine, "MaxInstanceCount") or icontains(Process.CommandLine, "SecurityLayer") or icontains(Process.CommandLine, "TSAdvertise") or icontains(Process.CommandLine, "TSAppCompat") or icontains(Process.CommandLine, "TSEnabled") or icontains(Process.CommandLine, "TSUserEnabled") or icontains(Process.CommandLine, "WinStations\\RDP-Tcp")) and not (icontains(Process.CommandLine, "SecurityLayer") and icontains(Process.CommandLine, "02"))


[ThreatDetectionRule platform=Windows]
