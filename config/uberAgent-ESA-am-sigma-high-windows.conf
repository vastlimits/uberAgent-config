Tag = proc-start-self-extracting-package-creation-via-iexpress.exe-from-potentially-suspicious-location
RiskScore = 75
Annotation = {"mitre_attack": ["T1218"], "author": "Joseliyo Sanchez, @Joseliyo_Jstnk, Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\iexpress.exe") or Process.Name == "IEXPRESS.exe") and (icontains(Process.CommandLine, " -n ") or icontains(Process.CommandLine, " /n ") or icontains(Process.CommandLine, " –n ") or icontains(Process.CommandLine, " —n ") or icontains(Process.CommandLine, " ―n ")) and (icontains(Process.CommandLine, ":\\ProgramData\\") or icontains(Process.CommandLine, ":\\Temp\\") or icontains(Process.CommandLine, ":\\Windows\\System32\\Tasks\\") or icontains(Process.CommandLine, ":\\Windows\\Tasks\\") or icontains(Process.CommandLine, ":\\Windows\\Temp\\") or icontains(Process.CommandLine, "\\AppData\\Local\\Temp\\"))


[ThreatDetectionRule platform=Windows]
