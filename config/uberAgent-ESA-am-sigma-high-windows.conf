[ThreatDetectionRule platform=Windows]
# Detects changes to the NGenAssemblyUsageLog registry key.
# .NET Usage Log output location can be controlled by setting the NGenAssemblyUsageLog CLR configuration knob in the Registry or by configuring an environment variable (as described in the next section).
# By simplify specifying an arbitrary value (e.g. fake output location or junk data) for the expected value, a Usage Log file for the .NET execution context will not be created.
# Author: frack113
RuleId = 28036918-04d3-423d-91c0-55ecf99fb892
RuleName = NET NGenAssemblyUsageLog Registry Key Tamper
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = net-ngenassemblyusagelog-registry-key-tamper
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "frack113"}
Query = iendswith(Reg.TargetObject, "SOFTWARE\\Microsoft\\.NETFramework\\NGenAssemblyUsageLog")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


