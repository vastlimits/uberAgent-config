RiskScore = 75
Annotation = {"mitre_attack": ["T1210"], "author": "@Kostastsale, Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, " -Inject ") and (icontains(Process.CommandLine, " -PayloadArgs ") or icontains(Process.CommandLine, " -PayloadFile ")) or (icontains(Process.CommandLine, " approve ") or icontains(Process.CommandLine, " create ") or icontains(Process.CommandLine, " check ") or icontains(Process.CommandLine, " delete ")) and (icontains(Process.CommandLine, " /payload:") or icontains(Process.CommandLine, " /payload=") or icontains(Process.CommandLine, " /updateid:") or icontains(Process.CommandLine, " /updateid="))


[ThreatDetectionRule platform=Windows]
