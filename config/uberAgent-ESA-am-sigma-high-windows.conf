Query = (iendswith(Process.Path, "\\wab.exe") or iendswith(Process.Path, "\\wabmig.exe")) and not (istartswith(Process.Path, "C:\\Windows\\WinSxS\\") or istartswith(Process.Path, "C:\\Program Files\\Windows Mail\\") or istartswith(Process.Path, "C:\\Program Files (x86)\\Windows Mail\\"))


