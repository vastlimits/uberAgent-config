EventType = Image.Load
Tag = aruba-network-service-potential-dll-sideloading
RiskScore = 75
Annotation = {"mitre_attack": ["T1574.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Process.Path, "\\arubanetsvc.exe") and (iendswith(Image.Path, "\\wtsapi32.dll") or iendswith(Image.Path, "\\msvcr100.dll") or iendswith(Image.Path, "\\msvcp100.dll") or iendswith(Image.Path, "\\dbghelp.dll") or iendswith(Image.Path, "\\dbgcore.dll") or iendswith(Image.Path, "\\wininet.dll") or iendswith(Image.Path, "\\iphlpapi.dll") or iendswith(Image.Path, "\\version.dll") or iendswith(Image.Path, "\\cryptsp.dll") or iendswith(Image.Path, "\\cryptbase.dll") or iendswith(Image.Path, "\\wldp.dll") or iendswith(Image.Path, "\\profapi.dll") or iendswith(Image.Path, "\\sspicli.dll") or iendswith(Image.Path, "\\winsta.dll") or iendswith(Image.Path, "\\dpapi.dll")) and not (istartswith(Image.Path, "C:\\Windows\\System32\\") or istartswith(Image.Path, "C:\\Windows\\SysWOW64\\") or istartswith(Image.Path, "C:\\Windows\\WinSxS\\"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# File .conf created related to VenomRAT, AsyncRAT and Lummac samples observed in the wild.
# Author: Joseliyo Sanchez, @Joseliyo_Jstnk
