Tag = proc-start-potential-file-overwrite-via-sysinternals-sdelete
RiskScore = 75
Annotation = {"mitre_attack": ["T1485"], "author": "frack113"}
Query = Process.Name == "sdelete.exe" and not (icontains(Process.CommandLine, " -h") or icontains(Process.CommandLine, " -c") or icontains(Process.CommandLine, " -z") or icontains(Process.CommandLine, " /?"))


[ThreatDetectionRule platform=Windows]
# Detects a suspicious CertReq execution downloading a file.
# This behavior is often used by attackers to download additional payloads or configuration files.
# Certreq is a built-in Windows utility used to request and retrieve certificates from a certification authority (CA). However, it can be abused by threat actors for malicious purposes.
# Author: Christian Burkard (Nextron Systems)
RuleId = 4480827a-9799-4232-b2c4-ccc6c4e9e12b
RuleName = Suspicious CertReq Command to Download
EventType = Process.Start
Tag = proc-start-suspicious-certreq-command-to-download
RiskScore = 75
Annotation = {"mitre_attack": ["T1105"], "author": "Christian Burkard (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\certreq.exe") or Process.Name == "CertReq.exe") and (icontains(Process.CommandLine, "-Post") or icontains(Process.CommandLine, "/Post") or icontains(Process.CommandLine, "–Post") or icontains(Process.CommandLine, "—Post") or icontains(Process.CommandLine, "―Post")) and (icontains(Process.CommandLine, "-config") or icontains(Process.CommandLine, "/config") or icontains(Process.CommandLine, "–config") or icontains(Process.CommandLine, "—config") or icontains(Process.CommandLine, "―config")) and icontains(Process.CommandLine, "http")


[ThreatDetectionRule platform=Windows]
# Detects the pattern of UAC Bypass using registry key manipulation of sdclt.exe (e.g. UACMe 53)
