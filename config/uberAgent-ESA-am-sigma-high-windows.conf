Query = (icontains(Process.Path, "\\EDR-Freeze") or icontains(Process.Path, "\\EDRFreeze")) and iendswith(Process.Path, ".exe") or icontains(Process.Hashes, "IMPHASH=1195F7935954A2CD09157390C33F8E8C") or icontains(Process.Hashes, "IMPHASH=129F58DE3D687FB7F012BF6C3D679997") or icontains(Process.Hashes, "IMPHASH=2C617A175D0086251642C6619F7CC8BA") or icontains(Process.Hashes, "IMPHASH=8828F0B906F7844358FB92A899E9520F") or icontains(Process.Hashes, "IMPHASH=AF76D95157EC554DC1EF178E4E66D447") or icontains(Process.Hashes, "IMPHASH=E1B04316B61ACA31DD52ABBEC0A37FD5") or icontains(Process.Hashes, "IMPHASH=8B2D5B54AFCFEC60D54F6B31D80ED4A0") or icontains(Process.Hashes, "IMPHASH=AB8BB31EDD91D2A05FE7B62A535E9EB7")
GenericProperty1 = Process.Hashes


