# Since, it is heavily abused, it is also heavily monitored by security products. To evade detection, threat actors may rename the schtasks.exe binary to schedule their malicious tasks.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = f91e51c9-f344-4b32-969b-0b6f6b8537d4
RuleName = Renamed Schtasks Execution
EventType = Process.Start
Tag = proc-start-renamed-schtasks-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1036.003", "T1053.005"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (icontains(Process.CommandLine, " -create ") or icontains(Process.CommandLine, " /create ") or icontains(Process.CommandLine, " –create ") or icontains(Process.CommandLine, " —create ") or icontains(Process.CommandLine, " ―create ") or icontains(Process.CommandLine, " -delete ") or icontains(Process.CommandLine, " /delete ") or icontains(Process.CommandLine, " –delete ") or icontains(Process.CommandLine, " —delete ") or icontains(Process.CommandLine, " ―delete ") or icontains(Process.CommandLine, " -query ") or icontains(Process.CommandLine, " /query ") or icontains(Process.CommandLine, " –query ") or icontains(Process.CommandLine, " —query ") or icontains(Process.CommandLine, " ―query ") or icontains(Process.CommandLine, " -change ") or icontains(Process.CommandLine, " /change ") or icontains(Process.CommandLine, " –change ") or icontains(Process.CommandLine, " —change ") or icontains(Process.CommandLine, " ―change ") or icontains(Process.CommandLine, " -run ") or icontains(Process.CommandLine, " /run ") or icontains(Process.CommandLine, " –run ") or icontains(Process.CommandLine, " —run ") or icontains(Process.CommandLine, " ―run ") or icontains(Process.CommandLine, " -end ") or icontains(Process.CommandLine, " /end ") or icontains(Process.CommandLine, " –end ") or icontains(Process.CommandLine, " —end ") or icontains(Process.CommandLine, " ―end ")) and (icontains(Process.CommandLine, " -tn ") or icontains(Process.CommandLine, " /tn ") or icontains(Process.CommandLine, " –tn ") or icontains(Process.CommandLine, " —tn ") or icontains(Process.CommandLine, " ―tn ") or icontains(Process.CommandLine, " -tr ") or icontains(Process.CommandLine, " /tr ") or icontains(Process.CommandLine, " –tr ") or icontains(Process.CommandLine, " —tr ") or icontains(Process.CommandLine, " ―tr ") or icontains(Process.CommandLine, " -sc ") or icontains(Process.CommandLine, " /sc ") or icontains(Process.CommandLine, " –sc ") or icontains(Process.CommandLine, " —sc ") or icontains(Process.CommandLine, " ―sc ") or icontains(Process.CommandLine, " -st ") or icontains(Process.CommandLine, " /st ") or icontains(Process.CommandLine, " –st ") or icontains(Process.CommandLine, " —st ") or icontains(Process.CommandLine, " ―st ") or icontains(Process.CommandLine, " -ru ") or icontains(Process.CommandLine, " /ru ") or icontains(Process.CommandLine, " –ru ") or icontains(Process.CommandLine, " —ru ") or icontains(Process.CommandLine, " ―ru ") or icontains(Process.CommandLine, " -fo ") or icontains(Process.CommandLine, " /fo ") or icontains(Process.CommandLine, " –fo ") or icontains(Process.CommandLine, " —fo ") or icontains(Process.CommandLine, " ―fo ")) and not icontains(Process.CommandLine, "schtasks") or Process.Name == "schtasks.exe" and not iendswith(Process.Path, "\\schtasks.exe")


