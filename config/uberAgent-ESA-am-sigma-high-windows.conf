[ThreatDetectionRule platform=Windows]
# Detect the creation of a service with a service binary located in a suspicious directory
# Author: Florian Roth (Nextron Systems), frack113
RuleId = a07f0359-4c90-4dc4-a681-8ffea40b4f47
RuleName = Service Binary in Suspicious Folder
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = service-binary-in-suspicious-folder
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "Florian Roth (Nextron Systems), frack113"}
Query = (istartswith(Reg.TargetObject, "HKLM\\System\\CurrentControlSet\\Services\\") and iendswith(Reg.TargetObject, "\\Start") and (icontains(Process.Path, "\\Users\\Public\\") or icontains(Process.Path, "\\Perflogs\\") or icontains(Process.Path, "\\ADMIN$\\") or icontains(Process.Path, "\\Temp\\")) and (Reg.Value.Data in ["DWORD (0x00000000)", "DWORD (0x00000001)", "DWORD (0x00000002)"]) or istartswith(Reg.TargetObject, "HKLM\\System\\CurrentControlSet\\Services\\") and iendswith(Reg.TargetObject, "\\ImagePath") and (icontains(Reg.Value.Data, "\\Users\\Public\\") or icontains(Reg.Value.Data, "\\Perflogs\\") or icontains(Reg.Value.Data, "\\ADMIN$\\") or icontains(Reg.Value.Data, "\\Temp\\"))) and not (icontains(Process.Path, "\\Common Files\\") and icontains(Process.Path, "\\Temp\\") or iendswith(Reg.TargetObject, "\\CurrentControlSet\\Services\\MBAMInstallerService\\ImagePath") and iendswith(Reg.Value.Data, "\\AppData\\Local\\Temp\\MBAMInstallerService.exe\"") and Process.Path == "C:\\Windows\\system32\\services.exe")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
