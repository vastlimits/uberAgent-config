[ThreatDetectionRule platform=Windows]
# Disables HTTP logging on a Windows IIS web server as seen by Threat Group 3390 (Bronze Union)
# Author: frack113
RuleId = e4ed6030-ffe5-4e6a-8a8a-ab3c1ab9d94e
RuleName = Disable Windows IIS HTTP Logging
EventType = Process.Start
Tag = proc-start-disable-windows-iis-http-logging
RiskScore = 75
Annotation = {"mitre_attack": ["T1685.001"], "author": "frack113"}
Query = (iendswith(Process.Path, "\\appcmd.exe") or Process.Name == "appcmd.exe") and icontains(Process.CommandLine, "set") and icontains(Process.CommandLine, "config") and icontains(Process.CommandLine, "section:httplogging") and icontains(Process.CommandLine, "dontLog:true")


[ThreatDetectionRule platform=Windows]
# Detects files written by the different tools that exploit HiveNightmare
# Author: Florian Roth (Nextron Systems)
RuleId = 6ea858a8-ba71-4a12-b2cc-5d83312404c7
RuleName = HackTool - Typical HiveNightmare SAM File Export
EventType = File.Create
Tag = hacktool-typical-hivenightmare-sam-file-export
RiskScore = 75
Annotation = {"mitre_attack": ["T1552.001"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(File.Path, "\\hive\_sam\_") or icontains(File.Path, "\\SAM-2021-") or icontains(File.Path, "\\SAM-2022-") or icontains(File.Path, "\\SAM-2023-") or icontains(File.Path, "\\SAM-haxx") or icontains(File.Path, "\\Sam.save") or File.Path == "C:\\windows\\temp\\sam"
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of a renamed "Msdt.exe" binary
# Author: pH-T (Nextron Systems)
RuleId = bd1c6866-65fc-44b2-be51-5588fcff82b9
RuleName = Renamed Msdt.EXE Execution
EventType = Process.Start
Tag = proc-start-renamed-msdt.exe-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1036.003"], "author": "pH-T (Nextron Systems)"}
Query = Process.Name == "msdt.exe" and not iendswith(Process.Path, "\\msdt.exe")


[ThreatDetectionRule platform=Windows]
# Detects a privilege elevation attempt by coercing NTLM authentication on the Printer Spooler service
# Author: Elastic (idea), Tobias Michalski (Nextron Systems)
RuleId = bb76d96b-821c-47cf-944b-7ce377864492
RuleName = Suspicious NTLM Authentication on the Printer Spooler Service
EventType = Process.Start
Tag = proc-start-suspicious-ntlm-authentication-on-the-printer-spooler-service
RiskScore = 75
Annotation = {"mitre_attack": ["T1212"], "author": "Elastic (idea), Tobias Michalski (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\rundll32.exe") or Process.Name == "RUNDLL32.EXE") and icontains(Process.CommandLine, "C:\\windows\\system32\\davclnt.dll,DavSetCookie") and icontains(Process.CommandLine, "http") and (icontains(Process.CommandLine, "spoolss") or icontains(Process.CommandLine, "srvsvc") or icontains(Process.CommandLine, "/print/pipe/"))


[ThreatDetectionRule platform=Windows]
# Detects spawning of suspicious child processes by Atlassian Confluence server which may indicate successful exploitation of CVE-2021-26084
# Author: Bhabesh Raj
RuleId = 245f92e3-c4da-45f1-9070-bc552e06db11
RuleName = Potential Atlassian Confluence CVE-2021-26084 Exploitation Attempt
EventType = Process.Start
Tag = proc-start-potential-atlassian-confluence-cve-2021-26084-exploitation-attempt
RiskScore = 75
Annotation = {"mitre_attack": ["T1190", "T1059"], "author": "Bhabesh Raj"}
Query = iendswith(Parent.Path, "\\Atlassian\\Confluence\\jre\\bin\\java.exe") and (icontains(Process.CommandLine, "certutil") or icontains(Process.CommandLine, "cmd /c") or icontains(Process.CommandLine, "cmd /k") or icontains(Process.CommandLine, "cscript") or icontains(Process.CommandLine, "curl") or icontains(Process.CommandLine, "ipconfig") or icontains(Process.CommandLine, "powershell") or icontains(Process.CommandLine, "pwsh") or icontains(Process.CommandLine, "regsvr32") or icontains(Process.CommandLine, "rundll32") or icontains(Process.CommandLine, "whoami") or icontains(Process.CommandLine, "wscript"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects an executable initiating a network connection to "ngrok" tunneling domains.
# Attackers were seen using this "ngrok" in order to store their second stage payloads and malware.
# While communication with such domains can be legitimate, often times is a sign of either data exfiltration by malicious actors or additional download.
# Author: Florian Roth (Nextron Systems)
RuleId = 1d08ac94-400d-4469-a82f-daee9a908849
RuleName = Communication To Ngrok Tunneling Service Initiated
EventType = Net.Any
Tag = communication-to-ngrok-tunneling-service-initiated
RiskScore = 75
Annotation = {"mitre_attack": ["T1567", "T1568.002", "T1572", "T1090", "T1102"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Net.Target.Name, "tunnel.us.ngrok.com") or icontains(Net.Target.Name, "tunnel.eu.ngrok.com") or icontains(Net.Target.Name, "tunnel.ap.ngrok.com") or icontains(Net.Target.Name, "tunnel.au.ngrok.com") or icontains(Net.Target.Name, "tunnel.sa.ngrok.com") or icontains(Net.Target.Name, "tunnel.jp.ngrok.com") or icontains(Net.Target.Name, "tunnel.in.ngrok.com")
GenericProperty1 = Net.Target.Name


[ThreatDetectionRule platform=Windows]
# Detects process creation with suspicious whitespace padding followed by a '#' character, which may indicate ClickFix or FileFix techniques used to conceal malicious commands from visual inspection.
# ClickFix and FileFix are social engineering attack techniques where adversaries distribute phishing documents or malicious links that deceive users into opening the Windows Run dialog box or File Explorer search bar.
# The victims are then instructed to paste commands from their clipboard, which contain extensive whitespace padding using various Unicode space characters to push the actual malicious command far to the right, effectively hiding it from immediate view.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 3ae9974a-eb09-4044-8e70-8980a50c12c8
RuleName = Suspicious Explorer Process with Whitespace Padding - ClickFix/FileFix
EventType = Process.Start
Tag = proc-start-suspicious-explorer-process-with-whitespace-padding-clickfix/filefix
RiskScore = 75
Annotation = {"mitre_attack": ["T1204.004", "T1027.010"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\explorer.exe") and icontains(Process.CommandLine, "#") and (icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            ") or icontains(Process.CommandLine, "            "))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of SharpSuccessor, a tool used to exploit the BadSuccessor attack for privilege escalation in WinServer 2025 Active Directory environments.
# Successful usage of this tool can let the attackers gain the domain admin privileges by exploiting the BadSuccessor vulnerability.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 38a1ac5f-9c74-47d2-a345-dd6f5eb4e7c8
RuleName = HKTL - SharpSuccessor Privilege Escalation Tool Execution
EventType = Process.Start
Tag = proc-start-hktl-sharpsuccessor-privilege-escalation-tool-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1068"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Process.Path, "\\SharpSuccessor.exe") or Process.Name == "SharpSuccessor.exe" or icontains(Process.CommandLine, "SharpSuccessor") or icontains(Process.CommandLine, " add ") and icontains(Process.CommandLine, " /impersonate") and icontains(Process.CommandLine, " /path") and icontains(Process.CommandLine, " /account") and icontains(Process.CommandLine, " /name")


[ThreatDetectionRule platform=Windows]
# Detect usage of the "driverquery" utility to perform reconnaissance on installed drivers
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 9fc3072c-dc8f-4bf7-b231-18950000fadd
RuleName = Potential Recon Activity Using DriverQuery.EXE
EventType = Process.Start
Tag = proc-start-potential-recon-activity-using-driverquery.exe
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "driverquery.exe") or Process.Name == "drvqry.exe") and (iendswith(Parent.Path, "\\cscript.exe") or iendswith(Parent.Path, "\\mshta.exe") or iendswith(Parent.Path, "\\regsvr32.exe") or iendswith(Parent.Path, "\\rundll32.exe") or iendswith(Parent.Path, "\\wscript.exe") or icontains(Parent.Path, "\\AppData\\Local\\") or icontains(Parent.Path, "\\Users\\Public\\") or icontains(Parent.Path, "\\Windows\\Temp\\"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects WinRAR creating files in Windows startup locations, which may indicate an attempt to establish persistence by adding malicious files to the Startup folder.
# This kind of behaviour has been associated with exploitation of WinRAR path traversal vulnerability CVE-2025-6218 or CVE-2025-8088.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 74a2b37d-fea4-41e0-9ac7-c9fbcf1f60cc
RuleName = WinRAR Creating Files in Startup Locations
EventType = File.Create
Tag = winrar-creating-files-in-startup-locations
RiskScore = 75
Annotation = {"mitre_attack": ["T1547.001"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\WinRAR.exe") or iendswith(Process.Path, "\\Rar.exe")) and icontains(File.Path, "\\Start Menu\\Programs\\Startup\\")
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects possible Sysmon filter driver unloaded via fltmc.exe
# Author: Kirill Kiryanov, oscd.community
RuleId = 4d7cda18-1b12-4e52-b45c-d28653210df8
RuleName = Sysmon Driver Unloaded Via Fltmc.EXE
EventType = Process.Start
Tag = proc-start-sysmon-driver-unloaded-via-fltmc.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1070", "T1685", "T1685.001"], "author": "Kirill Kiryanov, oscd.community"}
Query = (iendswith(Process.Path, "\\fltMC.exe") or Process.Name == "fltMC.exe") and icontains(Process.CommandLine, "unload") and icontains(Process.CommandLine, "sysmon")


[ThreatDetectionRule platform=Windows]
# Detects usage of Time Travel Debugging Utility. Adversaries can execute malicious processes and dump processes, such as lsass.exe, via tttracer.exe.
# Author: Ensar Şamil, @sblmsrsn, @oscd_initiative
RuleId = 0b4ae027-2a2d-4b93-8c7e-962caaba5b2a
RuleName = Time Travel Debugging Utility Usage
EventType = Process.Start
Tag = proc-start-time-travel-debugging-utility-usage
RiskScore = 75
Annotation = {"mitre_attack": ["T1218", "T1003.001"], "author": "Ensar \u015eamil, @sblmsrsn, @oscd_initiative"}
Query = iendswith(Parent.Path, "\\tttracer.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects when an attacker modifies the registry value of the "hhctrl" to point to a custom binary
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = f10ed525-97fe-4fed-be7c-2feecca941b1
RuleName = Persistence Via Hhctrl.ocx
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = persistence-via-hhctrl.ocx
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\CLSID\\{52A2AAAE-085D-4187-97EA-8C30DB990436}\\InprocServer32\\(Default)") and not Reg.Value.Data == "C:\\Windows\\System32\\hhctrl.ocx"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the execution of PowerShell with a specific flag sequence that is used by the Wmiexec script
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 022eaba8-f0bf-4dd9-9217-4604b0bb3bb0
RuleName = HackTool - Wmiexec Default Powershell Command
EventType = Process.Start
Tag = proc-start-hacktool-wmiexec-default-powershell-command
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "-NoP -NoL -sta -NonI -W Hidden -Exec Bypass -Enc")


[ThreatDetectionRule platform=Windows]
# Detects addition of users to the local Remote Desktop Users group via "Net" or "Add-LocalGroupMember".
# Author: Florian Roth (Nextron Systems)
RuleId = ffa28e60-bdb1-46e0-9f82-05f7a61cc06e
RuleName = User Added to Remote Desktop Users Group
EventType = Process.Start
Tag = proc-start-user-added-to-remote-desktop-users-group
RiskScore = 75
Annotation = {"mitre_attack": ["T1133", "T1136.001", "T1021.001"], "author": "Florian Roth (Nextron Systems)"}
Query = (icontains(Process.CommandLine, "localgroup ") and icontains(Process.CommandLine, " /add") or icontains(Process.CommandLine, "Add-LocalGroupMember ") and icontains(Process.CommandLine, " -Group ")) and (icontains(Process.CommandLine, "Remote Desktop Users") or icontains(Process.CommandLine, "Utilisateurs du Bureau à distance") or icontains(Process.CommandLine, "Usuarios de escritorio remoto"))


[ThreatDetectionRule platform=Windows]
# Detects all variations of obfuscated powershell IEX invocation code generated by Invoke-Obfuscation framework from the following code block
# Author: Daniel Bohannon (@Mandiant/@FireEye), oscd.community
RuleId = 4bf943c6-5146-4273-98dd-e958fd1e3abf
RuleName = Invoke-Obfuscation Obfuscated IEX Invocation
EventType = Process.Start
Tag = proc-start-invoke-obfuscation-obfuscated-iex-invocation
RiskScore = 75
Annotation = {"mitre_attack": ["T1027", "T1059.001"], "author": "Daniel Bohannon (@Mandiant/@FireEye), oscd.community"}
Query = Process.CommandLine regex "\\$PSHome\\[\\s*\\d{1,3}\\s*\\]\\s*\\+\\s*\\$PSHome\\[" or Process.CommandLine regex "\\$ShellId\\[\\s*\\d{1,3}\\s*\\]\\s*\\+\\s*\\$ShellId\\[" or Process.CommandLine regex "\\$env:Public\\[\\s*\\d{1,3}\\s*\\]\\s*\\+\\s*\\$env:Public\\[" or Process.CommandLine regex "\\$env:ComSpec\\[(?:\\s*\\d{1,3}\\s*,){2}" or Process.CommandLine regex "\\*mdr\\*\\W\\s*\\)\\.Name" or Process.CommandLine regex "\\$VerbosePreference\\.ToString\\(" or Process.CommandLine regex "\\[String\\]\\s*\\$VerbosePreference"


[ThreatDetectionRule platform=Windows]
# Detects the presence of the keywords "lsass" and ".dmp" in the commandline, which could indicate a potential attempt to dump or create a dump of the lsass process.
# Author: E.M. Anhaus, Tony Lambert, oscd.community, Nasreddine Bencherchali (Nextron Systems)
RuleId = ffa6861c-4461-4f59-8a41-578c39f3f23e
RuleName = LSASS Dump Keyword In CommandLine
EventType = Process.Start
Tag = proc-start-lsass-dump-keyword-in-commandline
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.001"], "author": "E.M. Anhaus, Tony Lambert, oscd.community, Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Process.CommandLine, "lsass.dmp") or icontains(Process.CommandLine, "lsass.zip") or icontains(Process.CommandLine, "lsass.rar") or icontains(Process.CommandLine, "Andrew.dmp") or icontains(Process.CommandLine, "Coredump.dmp") or icontains(Process.CommandLine, "NotLSASS.zip") or icontains(Process.CommandLine, "lsass\_2") or icontains(Process.CommandLine, "lsassdump") or icontains(Process.CommandLine, "lsassdmp") or icontains(Process.CommandLine, "lsass") and icontains(Process.CommandLine, ".dmp") or icontains(Process.CommandLine, "SQLDmpr") and icontains(Process.CommandLine, ".mdmp") or icontains(Process.CommandLine, "nanodump") and icontains(Process.CommandLine, ".dmp")


[ThreatDetectionRule platform=Windows]
# Detects Archer malware invocation via rundll32
# Author: Florian Roth (Nextron Systems)
RuleId = 3d4aebe0-6d29-45b2-a8a4-3dfde586a26d
RuleName = Fireball Archer Install
EventType = Process.Start
Tag = proc-start-fireball-archer-install
RiskScore = 75
Annotation = {"mitre_attack": ["T1218.011"], "author": "Florian Roth (Nextron Systems)"}
Query = icontains(Process.CommandLine, "rundll32.exe") and icontains(Process.CommandLine, "InstallArcherSvc")


[ThreatDetectionRule platform=Windows]
# Detects changes to Microsoft Office protected view registry keys with which the attacker disables this feature.
# Author: frack113, Nasreddine Bencherchali (Nextron Systems)
RuleId = a5c7a43f-6009-4a8c-80c5-32abf1c53ecc
RuleName = Microsoft Office Protected View Disabled
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = microsoft-office-protected-view-disabled
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "frack113, Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\Microsoft\\Office\\") and icontains(Reg.TargetObject, "\\Security\\ProtectedView\\") and (Reg.Value.Data == "DWORD (0x00000001)" and (iendswith(Reg.TargetObject, "\\DisableAttachementsInPV") or iendswith(Reg.TargetObject, "\\DisableInternetFilesInPV") or iendswith(Reg.TargetObject, "\\DisableIntranetCheck") or iendswith(Reg.TargetObject, "\\DisableUnsafeLocationsInPV")) or Reg.Value.Data == "DWORD (0x00000000)" and (iendswith(Reg.TargetObject, "\\enabledatabasefileprotectedview") or iendswith(Reg.TargetObject, "\\enableforeigntextfileprotectedview")))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the modification of the registry to disable a system restore on the computer
# Author: frack113
RuleId = 5de03871-5d46-4539-a82d-3aa992a69a83
RuleName = Registry Disable System Restore
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = registry-disable-system-restore
RiskScore = 75
Annotation = {"mitre_attack": ["T1490"], "author": "frack113"}
Query = (icontains(Reg.TargetObject, "\\Policies\\Microsoft\\Windows NT\\SystemRestore") or icontains(Reg.TargetObject, "\\Microsoft\\Windows NT\\CurrentVersion\\SystemRestore")) and (iendswith(Reg.TargetObject, "DisableConfig") or iendswith(Reg.TargetObject, "DisableSR")) and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects non-sysinternals tools setting the "accepteula" key which normally is set on sysinternals tool execution
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 8023f872-3f1d-4301-a384-801889917ab4
RuleName = Usage of Renamed Sysinternals Tools - RegistrySet
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = usage-of-renamed-sysinternals-tools-registryset
RiskScore = 75
Annotation = {"mitre_attack": ["T1588.002"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = (icontains(Reg.TargetObject, "\\PsExec") or icontains(Reg.TargetObject, "\\ProcDump") or icontains(Reg.TargetObject, "\\Handle") or icontains(Reg.TargetObject, "\\LiveKd") or icontains(Reg.TargetObject, "\\Process Explorer") or icontains(Reg.TargetObject, "\\PsLoglist") or icontains(Reg.TargetObject, "\\PsPasswd") or icontains(Reg.TargetObject, "\\Active Directory Explorer")) and iendswith(Reg.TargetObject, "\\EulaAccepted") and not (iendswith(Process.Path, "\\PsExec.exe") or iendswith(Process.Path, "\\PsExec64.exe") or iendswith(Process.Path, "\\procdump.exe") or iendswith(Process.Path, "\\procdump64.exe") or iendswith(Process.Path, "\\handle.exe") or iendswith(Process.Path, "\\handle64.exe") or iendswith(Process.Path, "\\livekd.exe") or iendswith(Process.Path, "\\livekd64.exe") or iendswith(Process.Path, "\\procexp.exe") or iendswith(Process.Path, "\\procexp64.exe") or iendswith(Process.Path, "\\psloglist.exe") or iendswith(Process.Path, "\\psloglist64.exe") or iendswith(Process.Path, "\\pspasswd.exe") or iendswith(Process.Path, "\\pspasswd64.exe") or iendswith(Process.Path, "\\ADExplorer.exe") or iendswith(Process.Path, "\\ADExplorer64.exe")) and not isnull(Process.Path)
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject


[ThreatDetectionRule platform=Windows]
# Detects potential malicious modification of the property value of UseLogonCredential from HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest to enable clear-text credentials
# Author: Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)
RuleId = d6a9b252-c666-4de6-8806-5561bbbd3bdc
RuleName = Wdigest Enable UseLogonCredential
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = wdigest-enable-uselogoncredential
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)"}
Query = iendswith(Reg.TargetObject, "WDigest\\UseLogonCredential") and Reg.Value.Data == "DWORD (0x00000001)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects a command used by conti to find volume shadow backups
# Author: Max Altgelt (Nextron Systems), Tobias Michalski (Nextron Systems)
RuleId = 7b30e0a7-c675-4b24-8a46-82fa67e2433d
RuleName = Conti Volume Shadow Listing
EventType = Process.Start
Tag = proc-start-conti-volume-shadow-listing
RiskScore = 75
Annotation = {"mitre_attack": ["T1587.001"], "author": "Max Altgelt (Nextron Systems), Tobias Michalski (Nextron Systems)"}
Query = icontains(Process.CommandLine, "vssadmin list shadows") and icontains(Process.CommandLine, "log.txt")


[ThreatDetectionRule platform=Windows]
# Detects the usage of "reg.exe" to tamper with different Windows Defender registry keys in order to disable some important features related to protection and detection
# Author: Florian Roth (Nextron Systems), Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)
RuleId = 452bce90-6fb0-43cc-97a5-affc283139b3
RuleName = Suspicious Windows Defender Registry Key Tampering Via Reg.EXE
EventType = Process.Start
Tag = proc-start-suspicious-windows-defender-registry-key-tampering-via-reg.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Florian Roth (Nextron Systems), Swachchhanda Shrawan Poudel, Nasreddine Bencherchali (Nextron Systems)"}
