[ThreatDetectionRule platform=Windows]
# Detects suspicious command lines used in Covenant luanchers
# Author: Florian Roth (Nextron Systems), Jonhnathan Ribeiro, oscd.community
RuleId = c260b6db-48ba-4b4a-a76f-2f67644e99d2
RuleName = HackTool - Covenant PowerShell Launcher
EventType = Process.Start
Tag = proc-start-hacktool-covenant-powershell-launcher
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001", "T1564.003"], "author": "Florian Roth (Nextron Systems), Jonhnathan Ribeiro, oscd.community"}
Query = icontains(Process.CommandLine, "-Sta") and icontains(Process.CommandLine, "-Nop") and icontains(Process.CommandLine, "-Window") and icontains(Process.CommandLine, "Hidden") and (icontains(Process.CommandLine, "-Command") or icontains(Process.CommandLine, "-EncodedCommand")) or icontains(Process.CommandLine, "sv o (New-Object IO.MemorySteam);sv d ") or icontains(Process.CommandLine, "mshta file.hta") or icontains(Process.CommandLine, "GruntHTTP") or icontains(Process.CommandLine, "-EncodedCommand cwB2ACAAbwAgA")


[ThreatDetectionRule platform=Windows]
# Detects the use of DISM to enable the PowerShell Web Access feature, which could be used for remote access and potential abuse
# Author: Michael Haag
RuleId = 7e8f2d3b-9c1a-4f67-b9e8-8d9006e0e51f
RuleName = PowerShell Web Access Feature Enabled Via DISM
EventType = Process.Start
Tag = proc-start-powershell-web-access-feature-enabled-via-dism
RiskScore = 75
Annotation = {"mitre_attack": ["T1548.002"], "author": "Michael Haag"}
Query = (iendswith(Process.Path, "\\dism.exe") or Process.Name == "DISM.EXE") and icontains(Process.CommandLine, "WindowsPowerShellWebAccess") and icontains(Process.CommandLine, "/online") and icontains(Process.CommandLine, "/enable-feature")


[ThreatDetectionRule platform=Windows]
# Detects Obfuscated use of stdin to execute PowerShell
# Author: Jonathan Cheong, oscd.community
RuleId = 6c96fc76-0eb1-11eb-adc1-0242ac120002
RuleName = Invoke-Obfuscation STDIN+ Launcher
EventType = Process.Start
Tag = proc-start-invoke-obfuscation-stdin+-launcher
RiskScore = 75
Annotation = {"mitre_attack": ["T1027", "T1059.001"], "author": "Jonathan Cheong, oscd.community"}
Query = Process.CommandLine regex "cmd.{0,5}(?:/c|/r).+powershell.+(?:\\$\\{?input\\}?|noexit).+\\\""


[ThreatDetectionRule platform=Windows]
# Detects the import of an alternate data stream with regini.exe, regini.exe can be used to modify registry keys.
# Author: Eli Salem, Sander Wiebing, oscd.community
RuleId = 77946e79-97f1-45a2-84b4-f37b5c0d8682
RuleName = Suspicious Registry Modification From ADS Via Regini.EXE
EventType = Process.Start
Tag = proc-start-suspicious-registry-modification-from-ads-via-regini.exe
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "Eli Salem, Sander Wiebing, oscd.community"}
Query = (iendswith(Process.Path, "\\regini.exe") or Process.Name == "REGINI.EXE") and Process.CommandLine regex ":[^ \\\\]"


[ThreatDetectionRule platform=Windows]
# Detects uses of the createdump.exe LOLOBIN utility to dump process memory
# Author: Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = 515c8be5-e5df-4c5e-8f6d-a4a2f05e4b48
RuleName = CreateDump Process Dump
EventType = Process.Start
Tag = proc-start-createdump-process-dump
RiskScore = 75
Annotation = {"mitre_attack": ["T1036", "T1003.001"], "author": "Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\createdump.exe") or Process.Name == "FX\_VER\_INTERNALNAME\_STR") and (icontains(Process.CommandLine, " -u ") or icontains(Process.CommandLine, " --full ") or icontains(Process.CommandLine, " -f ") or icontains(Process.CommandLine, " --name ") or icontains(Process.CommandLine, ".dmp "))


[ThreatDetectionRule platform=Windows]
# Detects changes to "DsrmAdminLogonBehavior" registry value.
# During a Domain Controller (DC) promotion, administrators create a Directory Services Restore Mode (DSRM) local administrator account with a password that rarely changes. The DSRM account is an “Administrator” account that logs in with the DSRM mode when the server is booting up to restore AD backups or recover the server from a failure.
# Attackers could abuse DSRM account to maintain their persistence and access to the organization's Active Directory.
# If the "DsrmAdminLogonBehavior" value is set to "0", the administrator account can only be used if the DC starts in DSRM.
# If the "DsrmAdminLogonBehavior" value is set to "1", the administrator account can only be used if the local AD DS service is stopped.
# If the "DsrmAdminLogonBehavior" value is set to "2", the administrator account can always be used.
# Author: Nischal Khadgi
RuleId = b61e87c0-50db-4b2e-8986-6a2be94b33b0
RuleName = Directory Service Restore Mode(DSRM) Registry Value Tampering
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = directory-service-restore-mode(dsrm)-registry-value-tampering
RiskScore = 75
Annotation = {"mitre_attack": ["T1556"], "author": "Nischal Khadgi"}
Query = iendswith(Reg.TargetObject, "\\Control\\Lsa\\DsrmAdminLogonBehavior") and not Reg.Value.Data == "DWORD (0x00000000)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects loading of dbgcore.dll or dbghelp.dll from uncommon locations such as user directories.
# These DLLs contain the MiniDumpWriteDump function, which can be abused for credential dumping purposes or in some cases for evading EDR/AV detection by suspending processes.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 416bc4a2-7217-4519-8dc7-c3271817f1d5
RuleName = Suspicious Loading of Dbgcore/Dbghelp DLLs from Uncommon Location
EventType = Image.Load
Tag = suspicious-loading-of-dbgcore/dbghelp-dlls-from-uncommon-location
RiskScore = 75
Annotation = {"mitre_attack": ["T1003", "T1685"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (icontains(Process.Path, ":\\Perflogs\\") or icontains(Process.Path, ":\\Temp\\") or icontains(Process.Path, ":\\Users\\Public\\") or icontains(Process.Path, "\\$Recycle.Bin\\") or icontains(Process.Path, "\\Contacts\\") or icontains(Process.Path, "\\Documents\\") or icontains(Process.Path, "\\Favorites\\") or icontains(Process.Path, "\\Favourites\\") or icontains(Process.Path, "\\inetpub\\wwwroot\\") or icontains(Process.Path, "\\Music\\") or icontains(Process.Path, "\\Pictures\\") or icontains(Process.Path, "\\Start Menu\\Programs\\Startup\\") or icontains(Process.Path, "\\Users\\Default\\") or icontains(Process.Path, "\\Videos\\")) and (iendswith(Image.Path, "\\dbgcore.dll") or iendswith(Image.Path, "\\dbghelp.dll"))
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the execution of a renamed instance of the Remote Monitoring and Management (RMM) tool, MeshAgent.
# RMM tools such as MeshAgent are commonly utilized by IT administrators for legitimate remote support and system management.
# However, malicious actors may exploit these tools by renaming them to bypass detection mechanisms, enabling unauthorized access and control over compromised systems.
# Author: Norbert Jaśniewicz (AlphaSOC)
RuleId = b471f462-eb0d-4832-be35-28d94bdb4780
RuleName = Remote Access Tool - Renamed MeshAgent Execution - Windows
EventType = Process.Start
Tag = proc-start-remote-access-tool-renamed-meshagent-execution-windows
RiskScore = 75
Annotation = {"mitre_attack": ["T1219.002", "T1036.003"], "author": "Norbert Ja\u015bniewicz (AlphaSOC)"}
Query = (icontains(Process.CommandLine, "--meshServiceName") or icontains(Process.Name, "meshagent")) and not iendswith(Process.Path, "\\meshagent.exe")


[ThreatDetectionRule platform=Windows]
# Detects the execution of a renamed version of the "Mavinject" process. Which can be abused to perform process injection using the "/INJECTRUNNING" flag
# Author: frack113, Florian Roth
RuleId = e6474a1b-5390-49cd-ab41-8d88655f7394
RuleName = Renamed Mavinject.EXE Execution
EventType = Process.Start
Tag = proc-start-renamed-mavinject.exe-execution
RiskScore = 75
Annotation = {"mitre_attack": ["T1055.001", "T1218.013"], "author": "frack113, Florian Roth"}
Query = (Process.Name in ["mavinject32.exe", "mavinject64.exe"]) and not (iendswith(Process.Path, "\\mavinject32.exe") or iendswith(Process.Path, "\\mavinject64.exe"))


[ThreatDetectionRule platform=Windows]
# Detects disabling Windows Defender PUA protection
# Author: Austin Songer @austinsonger
RuleId = 8ffc5407-52e3-478f-9596-0a7371eafe13
RuleName = Disable PUA Protection on Windows Defender
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = disable-pua-protection-on-windows-defender
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Austin Songer @austinsonger"}
Query = icontains(Reg.TargetObject, "\\Policies\\Microsoft\\Windows Defender\\PUAProtection") and Reg.Value.Data == "DWORD (0x00000000)"
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects programs on a Windows system that should not write an archive to disk
# Author: frack113, Florian Roth
RuleId = 654fcc6d-840d-4844-9b07-2c3300e54a26
RuleName = Legitimate Application Dropped Archive
EventType = File.Create
Tag = legitimate-application-dropped-archive
RiskScore = 75
Annotation = {"mitre_attack": ["T1218"], "author": "frack113, Florian Roth"}
Query = (iendswith(Process.Path, "\\winword.exe") or iendswith(Process.Path, "\\excel.exe") or iendswith(Process.Path, "\\powerpnt.exe") or iendswith(Process.Path, "\\msaccess.exe") or iendswith(Process.Path, "\\mspub.exe") or iendswith(Process.Path, "\\eqnedt32.exe") or iendswith(Process.Path, "\\visio.exe") or iendswith(Process.Path, "\\wordpad.exe") or iendswith(Process.Path, "\\wordview.exe") or iendswith(Process.Path, "\\certutil.exe") or iendswith(Process.Path, "\\certoc.exe") or iendswith(Process.Path, "\\CertReq.exe") or iendswith(Process.Path, "\\Desktopimgdownldr.exe") or iendswith(Process.Path, "\\esentutl.exe") or iendswith(Process.Path, "\\finger.exe") or iendswith(Process.Path, "\\notepad.exe") or iendswith(Process.Path, "\\AcroRd32.exe") or iendswith(Process.Path, "\\RdrCEF.exe") or iendswith(Process.Path, "\\mshta.exe") or iendswith(Process.Path, "\\hh.exe")) and (iendswith(File.Path, ".zip") or iendswith(File.Path, ".rar") or iendswith(File.Path, ".7z") or iendswith(File.Path, ".diagcab") or iendswith(File.Path, ".appx"))
GenericProperty1 = File.Path


