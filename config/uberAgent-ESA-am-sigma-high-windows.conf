RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001", "T1027.005"], "author": "Thomas Patzke"}
Query = (iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or Process.Name in ["PowerShell.EXE", "pwsh.dll"]) and (Process.CommandLine like r"%join%split%" or icontains(Process.CommandLine, "( $ShellId[1]+$ShellId[13]+'x')") or Process.CommandLine like r"%( $PSHome[%]+$PSHOME[%]+%" or icontains(Process.CommandLine, "( $env:Public[13]+$env:Public[5]+'x')") or Process.CommandLine like r"%( $env:ComSpec[4,%,25]-Join'')%" or icontains(Process.CommandLine, "[1,3]+'x'-Join'')"))


[ThreatDetectionRule platform=Windows]
# Adversaries may execute their own malicious payloads by hijacking vulnerable file path references.
