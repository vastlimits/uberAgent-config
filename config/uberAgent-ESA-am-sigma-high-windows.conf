RiskScore = 75
Annotation = {"mitre_attack": ["T1204.002", "T1218.011"], "author": "Swachchhanda Shrawan Poudel"}
Query = iendswith(Process.Path, "\\rundll32.exe") and (icontains(Image.Path, ":\\ProgramData") or icontains(Image.Path, "\\AppData\\Local\\")) and Image.Path regex "[a-zA-Z]{5,6}\\.wll"
GenericProperty1 = Image.Path


[ThreatDetectionRule platform=Windows]
# Detects the use of SDelete to erase a file not the free space
