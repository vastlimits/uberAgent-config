[ThreatDetectionRule platform=Windows]
# Detects the export of a crital Registry key to a file.
# Author: Oddvar Moe, Sander Wiebing, oscd.community
RuleId = 82880171-b475-4201-b811-e9c826cd5eaa
RuleName = Exports Critical Registry Keys To a File
EventType = Process.Start
Tag = proc-start-exports-critical-registry-keys-to-a-file
RiskScore = 75
Annotation = {"mitre_attack": ["T1012"], "author": "Oddvar Moe, Sander Wiebing, oscd.community"}
Query = (iendswith(Process.Path, "\\regedit.exe") or Process.Name == "REGEDIT.EXE") and (icontains(Process.CommandLine, " -E ") or icontains(Process.CommandLine, " /E ") or icontains(Process.CommandLine, " –E ") or icontains(Process.CommandLine, " —E ") or icontains(Process.CommandLine, " ―E ")) and (icontains(Process.CommandLine, "hklm") or icontains(Process.CommandLine, "hkey\_local\_machine")) and (iendswith(Process.CommandLine, "\\system") or iendswith(Process.CommandLine, "\\sam") or iendswith(Process.CommandLine, "\\security"))


[ThreatDetectionRule platform=Windows]
