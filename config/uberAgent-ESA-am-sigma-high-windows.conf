[ThreatDetectionRule platform=Windows]
# Detects tampering of RDP Terminal Service/Server sensitive settings.
# Such as allowing unauthorized users access to a system via the 'fAllowUnsolicited' or enabling RDP via 'fDenyTSConnections', etc.
# 
# Below is a list of registry keys/values that are monitored by this rule:
# 
# - Shadow: Used to enable Remote Desktop shadowing, which allows an administrator to view or control a user's session.
# - DisableRemoteDesktopAntiAlias: Disables anti-aliasing for remote desktop sessions.
# - DisableSecuritySettings: Disables certain security settings for Remote Desktop connections.
# - fAllowUnsolicited: Allows unsolicited remote assistance offers.
# - fAllowUnsolicitedFullControl: Allows unsolicited remote assistance offers with full control.
# - InitialProgram: Specifies a program to run automatically when a user logs on to a remote computer.
# - ServiceDll: Used in RDP hijacking techniques to specify a custom DLL to be loaded by the Terminal Services service.
# - SecurityLayer: Specifies the security layer used for RDP connections.
# Author: Samir Bousseaden, David ANDRE, Roberto Rodriguez @Cyb3rWard0g, Nasreddine Bencherchali
RuleId = 3f6b7b62-61aa-45db-96bd-9c31b36b653c
RuleName = RDP Sensitive Settings Changed
EventType = Reg.Value.Write
EventType = Reg.Key.Rename
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = rdp-sensitive-settings-changed
RiskScore = 75
Annotation = {"mitre_attack": ["T1112"], "author": "Samir Bousseaden, David ANDRE, Roberto Rodriguez @Cyb3rWard0g, Nasreddine Bencherchali"}
Query = ((icontains(Reg.TargetObject, "\\Control\\Terminal Server\\") or icontains(Reg.TargetObject, "\\Windows NT\\Terminal Services\\")) and iendswith(Reg.TargetObject, "\\Shadow") and (Reg.Value.Data in ["DWORD (0x00000001)", "DWORD (0x00000002)", "DWORD (0x00000003)", "DWORD (0x00000004)"]) or (icontains(Reg.TargetObject, "\\Control\\Terminal Server\\") or icontains(Reg.TargetObject, "\\Windows NT\\Terminal Services\\")) and (iendswith(Reg.TargetObject, "\\DisableRemoteDesktopAntiAlias") or iendswith(Reg.TargetObject, "\\DisableSecuritySettings") or iendswith(Reg.TargetObject, "\\fAllowUnsolicited") or iendswith(Reg.TargetObject, "\\fAllowUnsolicitedFullControl")) and Reg.Value.Data == "DWORD (0x00000001)" or icontains(Reg.TargetObject, "\\Control\\Terminal Server\\InitialProgram") or icontains(Reg.TargetObject, "\\Control\\Terminal Server\\WinStations\\RDP-Tcp\\InitialProgram") or icontains(Reg.TargetObject, "\\services\\TermService\\Parameters\\ServiceDll") or icontains(Reg.TargetObject, "\\Terminal Server\\WinStations\\RDP-Tcp\\SecurityLayer") or icontains(Reg.TargetObject, "\\Windows NT\\Terminal Services\\InitialProgram")) and not (iendswith(Reg.TargetObject, "\\SecurityLayer") and Reg.Value.Data == "DWORD (0x00000002)")
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects the specific Windows execution chain and process tree associated with the Axios NPM supply chain compromise.
# On March 30, 2026, malicious versions (1.14.1, 0.30.4) were published to npm, injecting a dependency (plain-crypto-js@4.2.1) that executed a postinstall script as a cross-platform RAT dropper.
# The dropper contacted a C2 server, delivered platform-specific payloads, deleted itself, and replaced package.json to evade detection.
# The attack used cscript.exe (VBScript), curl.exe (C2), and PowerShell masquerading as Windows Terminal.
# Author: Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = f6c27ecc-d890-4452-80e6-2e274a10e097
RuleName = Axios NPM Compromise Indicators - Windows
EventType = Process.Start
Tag = proc-start-axios-npm-compromise-indicators-windows
RiskScore = 75
Annotation = {"mitre_attack": ["T1195.002", "T1059.003", "T1059.005", "T1105"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = (iendswith(Parent.Path, "\\node.exe") or iendswith(Parent.Path, "\\bun.exe")) and iendswith(Process.Path, "\\cmd.exe") and icontains(Process.CommandLine, "cscript") and icontains(Process.CommandLine, "AppData\\Local\\Temp") and icontains(Process.CommandLine, "//nologo && del") and icontains(Process.CommandLine, "6202033.vbs") or (iendswith(Process.Path, "\\curl.exe") or iendswith(Process.Path, "\\powershell.exe")) and icontains(Process.CommandLine, "http://sfrclak.com") or Process.Name == "PowerShell.EXE" and icontains(Process.CommandLine, "\"C:\\ProgramData\\wt.exe\" -w hidden -ep bypass -file")
