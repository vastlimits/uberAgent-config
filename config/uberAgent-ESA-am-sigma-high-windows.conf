[ThreatDetectionRule platform=Windows]
# Detects a specific child/parent process relationship indicative of a "WerFault" process running from the "WinSxS" as a service. This could be indicative of potential SNAKE malware activity as reported by CISA.
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = f7536642-4a08-4dd9-b6d5-c3286d8975ed
RuleName = Potential SNAKE Malware Persistence Service Execution
EventType = Process.Start
Tag = proc-start-potential-snake-malware-persistence-service-execution
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(Parent.Path, "\\services.exe") and istartswith(Process.Path, "C:\\Windows\\WinSxS\\") and iendswith(Process.Path, "\\WerFault.exe")
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
# Detects creation of a file named "ntds.dit" (Active Directory Database) by an uncommon parent process or directory
# Author: Florian Roth (Nextron Systems)
RuleId = 4e7050dd-e548-483f-b7d6-527ab4fa784d
RuleName = NTDS.DIT Creation By Uncommon Parent Process
EventType = File.Create
Tag = ntds.dit-creation-by-uncommon-parent-process
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.003"], "author": "Florian Roth (Nextron Systems)"}
Query = iendswith(File.Path, "\\ntds.dit") and (iendswith(Parent.Path, "\\cscript.exe") or iendswith(Parent.Path, "\\httpd.exe") or iendswith(Parent.Path, "\\nginx.exe") or iendswith(Parent.Path, "\\php-cgi.exe") or iendswith(Parent.Path, "\\powershell.exe") or iendswith(Parent.Path, "\\pwsh.exe") or iendswith(Parent.Path, "\\w3wp.exe") or iendswith(Parent.Path, "\\wscript.exe") or icontains(Parent.Path, "\\apache") or icontains(Parent.Path, "\\tomcat") or icontains(Parent.Path, "\\AppData\\") or icontains(Parent.Path, "\\Temp\\") or icontains(Parent.Path, "\\Public\\") or icontains(Parent.Path, "\\PerfLogs\\"))
GenericProperty1 = Parent.Path
GenericProperty2 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects suspicious child processes spawned by SolarWinds WebHelpDesk (WHD) application, which may indicate exploitation activity leveraging RCE vulnerabilities such as CVE-2025-40551, CVE-2025-40536, or CVE-2025-26399
# Author: Huntress Team, Swachchhanda Shrawan Poudel (Nextron Systems)
RuleId = 8c7f4a2d-3b9e-4f1c-9a6d-2e8f5c3d9a1b
RuleName = Suspicious Child Process of SolarWinds WebHelpDesk
EventType = Process.Start
Tag = proc-start-suspicious-child-process-of-solarwinds-webhelpdesk
RiskScore = 75
Annotation = {"mitre_attack": ["T1190"], "author": "Huntress Team, Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = icontains(Parent.Path, "\\WebHelpDesk\\bin\\") and (iendswith(Parent.Path, "\\java.exe") or iendswith(Parent.Path, "\\javaw.exe")) and icontains(Parent.CommandLine, "tomcat") and (icontains(Process.CommandLine, "-enc") or icontains(Process.CommandLine, "base64") or icontains(Process.CommandLine, "bitsadmin") or icontains(Process.CommandLine, "certutil") or icontains(Process.CommandLine, "curl") or icontains(Process.CommandLine, "Invoke-RestMethod") or icontains(Process.CommandLine, "Invoke-WebRequest") or icontains(Process.CommandLine, "irm ") or icontains(Process.CommandLine, "iwr ") or icontains(Process.CommandLine, "mshta") or icontains(Process.CommandLine, "msiexec") or icontains(Process.CommandLine, "Net.WebClient") or icontains(Process.CommandLine, "Start-BitsTransfer") or icontains(Process.CommandLine, "wget") or icontains(Process.CommandLine, "wmic"))
GenericProperty1 = Parent.Path
GenericProperty2 = Parent.CommandLine


[ThreatDetectionRule platform=Windows]
# Detects scheduled task creations that have suspicious action command and folder combinations
# Author: Florian Roth (Nextron Systems)
RuleId = 8a8379b8-780b-4dbf-b1e9-31c8d112fefb
RuleName = Schtasks From Suspicious Folders
EventType = Process.Start
Tag = proc-start-schtasks-from-suspicious-folders
RiskScore = 75
Annotation = {"mitre_attack": ["T1053.005"], "author": "Florian Roth (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\schtasks.exe") or Process.Name == "schtasks.exe") and icontains(Process.CommandLine, " /create ") and (icontains(Process.CommandLine, "powershell") or icontains(Process.CommandLine, "pwsh") or icontains(Process.CommandLine, "cmd /c ") or icontains(Process.CommandLine, "cmd /k ") or icontains(Process.CommandLine, "cmd /r ") or icontains(Process.CommandLine, "cmd.exe /c ") or icontains(Process.CommandLine, "cmd.exe /k ") or icontains(Process.CommandLine, "cmd.exe /r ")) and (icontains(Process.CommandLine, "C:\\ProgramData\\") or icontains(Process.CommandLine, "\%ProgramData\%"))


[ThreatDetectionRule platform=Windows]
# Detects the use of iexpress.exe to create binaries via Self Extraction Directive (SED) files located in potentially suspicious locations.
# This behavior has been observed in-the-wild by different threat actors.
# Author: Joseliyo Sanchez, @Joseliyo_Jstnk, Nasreddine Bencherchali (Nextron Systems)
RuleId = b2b048b0-7857-4380-b0fb-d3f0ab820b71
RuleName = Self Extracting Package Creation Via Iexpress.EXE From Potentially Suspicious Location
