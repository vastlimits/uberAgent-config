Tag = windows-credential-guard-related-registry-value-deleted-registry
RiskScore = 75
Annotation = {"mitre_attack": ["T1685"], "author": "Swachchhanda Shrawan Poudel (Nextron Systems)"}
Query = iendswith(Reg.TargetObject, "\\DeviceGuard\\EnableVirtualizationBasedSecurity") or iendswith(Reg.TargetObject, "\\DeviceGuard\\LsaCfgFlags") or iendswith(Reg.TargetObject, "\\DeviceGuard\\RequirePlatformSecurityFeatures") or iendswith(Reg.TargetObject, "\\Lsa\\LsaCfgFlags")
Hive = HKLM,HKU
