EventType = Reg.Value.Write
EventType = Reg.Key.Delete
EventType = Reg.Value.Delete
EventType = Reg.Key.Rename
EventType = Reg.Key.Load
EventType = Reg.Key.Unload
EventType = Reg.Key.Save
EventType = Reg.Key.Restore
EventType = Reg.Key.Replace
Tag = esentutl-volume-shadow-copy-service-keys
RiskScore = 75
Annotation = {"mitre_attack": ["T1003.002"], "author": "Roberto Rodriguez (Cyb3rWard0g), OTR (Open Threat Research)"}
Query = icontains(Reg.TargetObject, "System\\CurrentControlSet\\Services\\VSS") and iendswith(Process.Path, "esentutl.exe") and not icontains(Reg.TargetObject, "System\\CurrentControlSet\\Services\\VSS\\Start")
