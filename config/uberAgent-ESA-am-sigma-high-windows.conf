Annotation = {"mitre_attack": ["T1003"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = icontains(Reg.TargetObject, "\\SOFTWARE\\ODBC\\ODBCINST.INI\\") and (iendswith(Reg.TargetObject, "\\Driver") or iendswith(Reg.TargetObject, "\\Setup")) and (icontains(Reg.Value.Data, ":\\PerfLogs\\") or icontains(Reg.Value.Data, ":\\ProgramData\\") or icontains(Reg.Value.Data, ":\\Temp\\") or icontains(Reg.Value.Data, ":\\Users\\Public\\") or icontains(Reg.Value.Data, ":\\Windows\\Registration\\CRMLog") or icontains(Reg.Value.Data, ":\\Windows\\System32\\com\\dmp\\") or icontains(Reg.Value.Data, ":\\Windows\\System32\\FxsTmp\\") or icontains(Reg.Value.Data, ":\\Windows\\System32\\Microsoft\\Crypto\\RSA\\MachineKeys\\") or icontains(Reg.Value.Data, ":\\Windows\\System32\\spool\\drivers\\color\\") or icontains(Reg.Value.Data, ":\\Windows\\System32\\spool\\PRINTERS\\") or icontains(Reg.Value.Data, ":\\Windows\\System32\\spool\\SERVERS\\") or icontains(Reg.Value.Data, ":\\Windows\\System32\\Tasks\_Migrated\\") or icontains(Reg.Value.Data, ":\\Windows\\System32\\Tasks\\Microsoft\\Windows\\SyncCenter\\") or icontains(Reg.Value.Data, ":\\Windows\\SysWOW64\\com\\dmp\\") or icontains(Reg.Value.Data, ":\\Windows\\SysWOW64\\FxsTmp\\") or icontains(Reg.Value.Data, ":\\Windows\\SysWOW64\\Tasks\\Microsoft\\Windows\\PLA\\System\\") or icontains(Reg.Value.Data, ":\\Windows\\SysWOW64\\Tasks\\Microsoft\\Windows\\SyncCenter\\") or icontains(Reg.Value.Data, ":\\Windows\\Tasks\\") or icontains(Reg.Value.Data, ":\\Windows\\Temp\\") or icontains(Reg.Value.Data, ":\\Windows\\Tracing\\") or icontains(Reg.Value.Data, "\\AppData\\Local\\Temp\\") or icontains(Reg.Value.Data, "\\AppData\\Roaming\\"))
Hive = HKLM,HKU
GenericProperty1 = Reg.TargetObject
GenericProperty2 = Reg.Value.Data


[ThreatDetectionRule platform=Windows]
# Detects usage of bitsadmin downloading a file to a suspicious target folder
