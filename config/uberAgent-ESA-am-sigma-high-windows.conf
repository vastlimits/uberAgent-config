EventType = File.Create
Tag = renamed-vscode-code-tunnel-execution-file-indicator
RiskScore = 75
Annotation = {"author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = iendswith(File.Path, "\\code\_tunnel.json") and not (iendswith(Process.Path, "\\code-tunnel.exe") or iendswith(Process.Path, "\\code.exe"))
GenericProperty1 = File.Path


[ThreatDetectionRule platform=Windows]
# Detects suspicious mshta process execution patterns
# Author: Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)
RuleId = e32f92d1-523e-49c3-9374-bdb13b46a3ba
RuleName = Suspicious Mshta.EXE Execution Patterns
EventType = Process.Start
Tag = proc-start-suspicious-mshta.exe-execution-patterns
RiskScore = 75
Annotation = {"mitre_attack": ["T1106"], "author": "Florian Roth (Nextron Systems), Nasreddine Bencherchali (Nextron Systems)"}
Query = (iendswith(Process.Path, "\\mshta.exe") or Process.Name == "MSHTA.EXE") and (iendswith(Parent.Path, "\\cmd.exe") or iendswith(Parent.Path, "\\cscript.exe") or iendswith(Parent.Path, "\\powershell.exe") or iendswith(Parent.Path, "\\pwsh.exe") or iendswith(Parent.Path, "\\regsvr32.exe") or iendswith(Parent.Path, "\\rundll32.exe") or iendswith(Parent.Path, "\\wscript.exe")) and (icontains(Process.CommandLine, "\\AppData\\Local\\") or icontains(Process.CommandLine, "C:\\ProgramData\\") or icontains(Process.CommandLine, "C:\\Users\\Public\\") or icontains(Process.CommandLine, "C:\\Windows\\Temp\\")) or (iendswith(Process.Path, "\\mshta.exe") or Process.Name == "MSHTA.EXE") and not (istartswith(Process.Path, "C:\\Windows\\System32\\") or istartswith(Process.Path, "C:\\Windows\\SysWOW64\\") or icontains(Process.CommandLine, ".htm") or icontains(Process.CommandLine, ".hta") or iendswith(Process.CommandLine, "mshta.exe") or iendswith(Process.CommandLine, "mshta"))
GenericProperty1 = Parent.Path


[ThreatDetectionRule platform=Windows]
