[ThreatDetectionRule platform=Windows]
# Detects the use of various CLI utilities exfiltrating data via web requests
# Author: Nasreddine Bencherchali (Nextron Systems)
RuleId = 7d1aaf3d-4304-425c-b7c3-162055e0b3ab
RuleName = Potential Data Exfiltration Activity Via CommandLine Tools
EventType = Process.Start
Tag = proc-start-potential-data-exfiltration-activity-via-commandline-tools
RiskScore = 75
Annotation = {"mitre_attack": ["T1059.001"], "author": "Nasreddine Bencherchali (Nextron Systems)"}
Query = ((iendswith(Process.Path, "\\powershell\_ise.exe") or iendswith(Process.Path, "\\powershell.exe") or iendswith(Process.Path, "\\pwsh.exe") or iendswith(Process.Path, "\\cmd.exe")) and (icontains(Process.CommandLine, "curl ") or icontains(Process.CommandLine, "Invoke-RestMethod") or icontains(Process.CommandLine, "Invoke-WebRequest") or icontains(Process.CommandLine, "irm ") or icontains(Process.CommandLine, "iwr ") or icontains(Process.CommandLine, "wget ")) and icontains(Process.CommandLine, " -ur") and icontains(Process.CommandLine, " -me") and icontains(Process.CommandLine, " -b") and icontains(Process.CommandLine, " POST ") or iendswith(Process.Path, "\\curl.exe") and icontains(Process.CommandLine, "--ur") and (icontains(Process.CommandLine, " -d ") or icontains(Process.CommandLine, " --data ")) or iendswith(Process.Path, "\\wget.exe") and (icontains(Process.CommandLine, "--post-data") or icontains(Process.CommandLine, "--post-file"))) and (Process.CommandLine regex "net\\s+view" or Process.CommandLine regex "sc\\s+query" or icontains(Process.CommandLine, "Get-Content") or icontains(Process.CommandLine, "GetBytes") or icontains(Process.CommandLine, "hostname") or icontains(Process.CommandLine, "ifconfig") or icontains(Process.CommandLine, "ipconfig") or icontains(Process.CommandLine, "netstat") or icontains(Process.CommandLine, "nltest") or icontains(Process.CommandLine, "qprocess") or icontains(Process.CommandLine, "systeminfo") or icontains(Process.CommandLine, "tasklist") or icontains(Process.CommandLine, "ToBase64String") or icontains(Process.CommandLine, "whoami") or icontains(Process.CommandLine, "type ") and icontains(Process.CommandLine, " > ") and icontains(Process.CommandLine, " C:\\"))


[ThreatDetectionRule platform=Windows]
# Detects the execution node.exe which is shipped with multiple software such as VMware, Adobe...etc. In order to execute arbitrary code. For example to establish reverse shell as seen in Log4j attacks...etc
